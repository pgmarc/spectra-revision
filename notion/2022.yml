syntaxVersion: '2.1'
saasName: Notion
createdAt: '2022-11-30'
version: '2022-11-30'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20221130194246/https://www.notion.so/pricing
features:
  pages:
    description: Every page you create in Notion is a fresh canvas where you can add whatever content you want.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  blocks:
    description: Blocks are places of content you add to a page, like a paragraph, a to-do item, an image,
      an embedded file, etc. Blocks are now unlimited for all plans. A 1,000 block limit applies for Team Plan trials.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  guests:
    description: Guests are individuals external to your workspace, such as friends, family, contractors or clients.
      Collaborate privately by inviting guests on individual pages.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fileUploads:
    description: A per file size limit may apply to any file that your upload to a Notion page or database.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  versionHistory:
    description: View and restore past versions of any Notion page.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  realTimeCollaboration:
    description: Work with others in real time, with live pressence and comments.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  linkSharing:
    description: Share a secret link with anyone, so they can view, comment, or edit your page at your discretion.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collaborativeWorkspace:
    description: The collaborative workspace lets members easily share pages to the whole team in a shared hierachy, with
      granular persmissions.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  openTeamSpaces:
    description: Create dedicated areas for folks to work together, without creating information silos. People can join the
      teamspaces that interest them, and leave the one that don't. In open team spaces anyone can join
      and view the content inside this teamspace.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  closeTeamSpaces:
    description: Create dedicated areas for folks to work together, without creating information silos. People can join the
      teamspaces that interest them, and leave the one that don't. In closed team spaces everyone can see that this
      teamspace exists, but can't join unless they're invited by an owner or member.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  privateTeamSpaces:
    description: Create teamspaces that can't be seen or discovered by anyone except those you add. Great for sensitive
      information like company planning or performance reviews.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedTeamSpacePermissions:
    description: Override teamspace permissions for specific people or groups, giving you even more control over who has view
      vs. edit access to content.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  webApp:
    description: Notion runs in your web browser with no installation required.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  desktopApp:
    description: Download our app for Mac or Windows
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  mobileApp:
    description: Download our app for iOS, or Android
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  blockContentTypes:
    description: "Block are different types of content you can add to a page: a to-do item, an image, a code block, an
      uploaded file.
      
      Blocks also help you embed content from services like Google Drive, Github, Twitter, and Typeform."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  starterTemplates:
    description: "Start with a blank canvas or choose from our library of expertly designed templates.

      Some favourites include: notes, goals, company home, meeting notes, product roadmap, new hire onboarding, and
      engineering wiki."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  wikis:
    description: Use Notion for shared wikis.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  docs:
    description: Use Notion for shared docs.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  notes:
    description: Use Notion as a powerful notetaking tools.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databases:
    description: Build powerful databases with rich properties, such as checkboxes, dropdown selects, currencies,
      assignees, dates, files and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tableView:
    description: A table is the classic database view, but tables in Notion are more than just rows and columns.
      Each row opens up into its own page, and can contain whatever properties you want
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  listView:
    description: Lists are simple and minimalist database views. They're ideal for storing notes, articles, and
      documents that don't need too many properties. Every item in a list is a page that can be opened with one
      click and store as much content as you need
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  calendarView:
    description: Calendars let you visualize how database items connect to certain dates. Use one when you want
      a bird's-eye view for important launch dates, multi-day events, or even projects spanning multiple months
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  kanbanBoardView:
    description: Boards are helpful for showing items in a database as they move through stages of a process,
      or grouped by property
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  galleryView:
    description: Gallery view is the best way to display databases with visual components, like mood boards,
      office directories, virtual recipe boxes, and more
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  timelineView:
    description: For anyone who needs to visualize their projects plotted chronologically - whether it's hours,
      years, or anything in between - Notion's timeline is a type of database that keeps you on task and on track
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  syncDatabases:
    description: See up-to-date information from Jira and Github, all synced into Notion as a database.
      Personal plans are limited to 1 database with 100 rows.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  linkPreviews:
    description: See dynamic, up-to-date previews from dozens of tools like Slack, Dropbox, Figma and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  api:
    description: Access the Notion API to build custom integrations for your team.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  bulkExport:
    description: YOu own your data. Download all your pages as HTML, Markdown, or CSV (for databases), and any files/images
      you've uploaded, too.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  adminTools:
    description: Create separate admin and member permissions for more control. Only admins can invite new members and change
      workspace settings.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  permissionGroups:
    description: Set varying and granular permissions for different groups and team.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedPermissions:
    description: Set more granular permission to restrict invited people from sharing the page to others.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedSecurityControls:
    description: Unlock extra permission controls to prevent certain people from sharing pages externally, disable guests,
      and set workspace-level rules.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  samlSso:
    description: Manage employee access at scale with secure single sign-on.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userProvisioning:
    description: Access the Notion SCIM API to provision and manage users and groups.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  membershipAdmin:
    description: Membership admins can add & remove members from workspaces and groups, but do not have access to other
      workspace settings.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  auditLog:
    description: Access a detailed log of security and safety-related acitvity for your workspace account to identify potential
      security issues, investigate suspicious behaviour, or troubleshoot access.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  bulkPdfExport:
    description: Export all of your content at once as PDFs. Handy for legal or compliance backups.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  prioritySupport:
    description: We're always around to help.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedCustomerManager:
    description: Reserved for teams larger than 100 people paying annually.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  customContract:
    description: We'll work with you to create a custom contract and payment via PO/invoice.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  invoicing:
    description: We'll work with you to create a custom contract and payment via PO/invoice.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  accessFeaturesEarly:
    description: Early access means you'll always have the most powerful version of Notion. You'll also influence our
      future product roadmap.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
usageLimits:
  membersLimit:
    description: Members are teammates you invite to your workspace. They can access and add pages for all members to see,
      or be added to pages with permissions for private collaboration.
    valueType: NUMERIC
    defaultValue: 1
    unit: member
    type: NON_RENEWABLE
  guestsLimit:
    description: Maximum number of guests in your Notion account
    valueType: NUMERIC
    defaultValue: 5
    unit: guest
    type: NON_RENEWABLE
    linkedFeatures:
    - guests
  fileUploadsLimit:
    description: Maximum file size upload threshold
    valueType: NUMERIC
    defaultValue: 5
    unit: MB
    type: NON_RENEWABLE
    linkedFeatures:
    - fileUploads
  versionHistoryThreshold:
    description: Maximum version history period threshold
    valueType: NUMERIC
    defaultValue: 0
    unit: days
    type: NON_RENEWABLE
    linkedFeatures:
    - versionHistory
  syncDatabasesLimit:
    description: Maximum databases to sync
    valueType: NUMERIC
    defaultValue: 1
    unit: database
    type: NON_RENEWABLE
    linkedFeatures:
    - syncDatabases
plans:
  PERSONAL:
    description: For organizing every corner of your life.
    price: 0
    unit: user/month
    features: null
    usageLimits: null
  PERSONAL_PRO:
    description: For power users who want to do even more.
    price: 5
    unit: user/month
    features:
      versionHistory:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      guestsLimit:
        value: .inf
      fileUploadsLimit:
        value: .inf
      versionHistoryThreshold:
        value: 30
      syncDatabasesLimit:
        value: .inf
  TEAM:
    description: Collaborate with your entire team in one place.
    price: 10
    unit: user/month
    features:
      versionHistory:
        value: true
      collaborativeWorkspace:
        value: true
      openTeamSpaces:
        value: true
      closeTeamSpaces:
        value: true
      adminTools:
        value: true
      permissionGroups:
        value: true
      advancedPermissions:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      membersLimit:
        value: .inf
      guestsLimit:
        value: .inf
      fileUploadsLimit:
        value: .inf
      versionHistoryThreshold:
        value: 30
      syncDatabasesLimit:
        value: .inf
  ENTERPRISE:
    description: Advanced controls & support to run your entire organization.
    price: Contact Sales
    unit: user/month
    features:
      versionHistory:
        value: true
      collaborativeWorkspace:
        value: true
      openTeamSpaces:
        value: true
      closeTeamSpaces:
        value: true
      privateTeamSpaces:
        value: true
      advancedTeamSpacePermissions:
        value: true
      adminTools:
        value: true
      permissionGroups:
        value: true
      advancedPermissions:
        value: true
      advancedSecurityControls:
        value: true
      samlSso:
        value: true
      userProvisioning:
        value: true
      membershipAdmin:
        value: true
      auditLog:
        value: true
      bulkPdfExport:
        value: true
      prioritySupport:
        value: true
      dedicatedCustomerManager:
        value: true
      customContract:
        value: true
      invoicing:
        value: true
      accessFeaturesEarly:
        value: true
    usageLimits:
      membersLimit:
        value: .inf
      guestsLimit:
        value: .inf
      fileUploadsLimit:
        value: .inf
      versionHistoryThreshold:
        value: .inf
      syncDatabasesLimit:
        value: .inf
addOns: null
