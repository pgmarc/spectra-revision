syntaxVersion: '2.1'
saasName: Notion
createdAt: '2025-03-07'
version: '2025'
url: https://web.archive.org/web/20250307094314/https://www.notion.com/pricing
tags:
- Content
- Sharing & collaboration
- Manage work and time
- Web publishing
- API & integrations
- Admin & security
- Support
billing:
  monthly: 1.0
  annually: 0.8
currency: USD
features:
  pages:
    description: Every page you create in Notion is a fresh canvas where you can add whatever content you want.
    valueType: BOOLEAN
    defaultValue: true
    tag: Content
    type: DOMAIN
  blocks:
    description: Blocks are pieces of content you add to a page (e.g to-do checkboxes, paragraphs, bullet points, etc.).
      Teams who want to try collaborating in Notion can use the Free Plan with up to certain number of blocks before upgrading.
    valueType: BOOLEAN
    defaultValue: true
    tag: Content
    type: DOMAIN
  fileUploads:
    description: A per file size limit may apply to any file that your upload to a Notion page or database.
      On the Free plan, you can upload images, videos and file attachments up to 5MB each. Upgrade to a paid plan for
      unlimited file uploads with a ~5GB max per file.
    valueType: BOOLEAN
    defaultValue: true
    tag: Content
    type: DOMAIN
  pageHistory:
    description: Restore your page to a previous version.
    valueType: BOOLEAN
    defaultValue: true
    tag: Content
    type: DOMAIN
  basicPageAnalytics:
    description: Get actionable insights about who's viewing and interacting with your content.
    valueType: BOOLEAN
    defaultValue: true
    tag: Content
    type: INFORMATION
  advancedPageAnalytics:
    description: More advanced insights apart from basic Page Analytics.
    valueType: BOOLEAN
    defaultValue: false
    tag: Content
    type: INFORMATION
  verifyAnyPage:
    description: Add a verified badge to pages that are up to date. Appears in search
      results and AI citations.
    valueType: BOOLEAN
    defaultValue: false
    tag: Content
    type: INFORMATION
  collaborativeWorkspace:
    description: Plan, create, and get organized, together. Share your workspace with multiple
      people and teams, so everyone can stay aligned in a single place.
    valueType: BOOLEAN
    defaultValue: true
    tag: Sharing & collaboration
    type: DOMAIN
  guests:
    description: Invite individuals outside your organization to collaborate. Guests often include external clients
      and contractos. Contact Sales for a higher limit.
    valueType: BOOLEAN
    defaultValue: true
    tag: Sharing & collaboration
    type: DOMAIN
  permissionGroups:
    description: Create groups of people according to role of deparment to streamline page & teamspace permissions.
    valueType: BOOLEAN
    defaultValue: true
    tag: Sharing & collaboration
    type: MANAGEMENT
  openTeamSpaces:
    description: Create dedicated areas for folks to work together, without creating information silos. People can join the
      teamspaces that interest them, and leave the one that don't. In open team spaces anyone can join
      and view the content inside this teamspace.
    valueType: BOOLEAN
    defaultValue: true
    tag: Sharing & collaboration
    type: DOMAIN
  closeTeamSpaces:
    description: Create dedicated areas for folks to work together, without creating information silos. People can join the
      teamspaces that interest them, and leave the one that don't. In closed team spaces everyone can see that this
      teamspace exists, but can't join unless they're invited by an owner or member.
    valueType: BOOLEAN
    defaultValue: true
    tag: Sharing & collaboration
    type: DOMAIN
  privateTeamSpaces:
    description: Create teamspaces that can't be seen or discovered by anyone except those you add. Great for sensitive
      information like company planning or performance reviews.
    valueType: BOOLEAN
    defaultValue: false
    tag: Sharing & collaboration
    type: DOMAIN
  advancedTeamSpacePermissions:
    description: Override teamspace permissions for specific people or groups, giving you even more control over who has view
      vs. edit access to content.
    valueType: BOOLEAN
    defaultValue: false
    tag: Sharing & collaboration
    type: MANAGEMENT
  notionCalendar:
    description: Connect multiple Google Calendars to manage work and time together.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  views:
    description: Customize how you see items and tasks.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  subtasks:
    description: Add subtasks
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  tasksDependency:
    description: Add link dependencies
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  customProperties:
    description: Add unlimited database properties
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  filtering:
    description: Add filters to organize information.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  formulas:
    description: Add a formula property to run calculations and functions based on other properties.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  basicAutomations:
    description: Automatically create pages and new blocks, set status, assignee, and property values, and more.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customDatabaseAutomations:
    description: Create your own workflows with custom database automations
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage work and time
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  charts:
    description: Visualize data from databases in different ways (e.g. donut, bar,
      and line charts).
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: INFORMATION
  forms:
    description: Capture, organize, and act on responses right inside Notion.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage work and time
    type: DOMAIN
  additionalFormCustomization:
    description: Capture, organize, and act on responses right inside Notion.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage work and time
    type: DOMAIN
  publishedPages:
    description: Publish an unlimited number of pages to the web.
    valueType: BOOLEAN
    defaultValue: true
    tag: Web publishing
    type: DOMAIN
  notionSiteDomain:
    description: Select a custom notion.site domain for your published pages.
    valueType: BOOLEAN
    defaultValue: true
    tag: Web publishing
    type: DOMAIN
  basicSEO:
    description: Turn on search engine indexing for any Site. Upgrade to a paid plan to customize your
      title and description metadata.
    valueType: BOOLEAN
    defaultValue: true
    tag: Web publishing
    type: DOMAIN
  advancedSEO:
    description: Turn on search engine indexing for any Site. Upgrade to a paid plan to customize your
      title and description metadata. Upgrade to a paid plan to customize your title and description metadata.
    valueType: BOOLEAN
    defaultValue: false
    tag: Web publishing
    type: DOMAIN
  siteCustomization:
    description: Set a homepage, customize your Site's favicon and share preview, build a custom header bar, and set ligth
      or dark mode.
    valueType: BOOLEAN
    defaultValue: false
    tag: Web publishing
    type: DOMAIN
  googleAnalyticsIntegration:
    description: Connect with Google Analytics to see page visits and other data about your Site.
    valueType: BOOLEAN
    defaultValue: false
    tag: Web publishing
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://analytics.google.com/analytics/web/
  customDomainAndBranding:
    description: Connect a custom domain to your Site and remove Notion branding for $8/month/domain paid annually, or
      $10/month per domain paid monthly.
    valueType: BOOLEAN
    defaultValue: false
    tag: Web publishing
    type: DOMAIN
  syncDatabases:
    description: See up-to-date information from Jira, Github & Asana, all synced into Notion as a database.
      Personal plans are limited to 1 database with 100 rows.
    valueType: BOOLEAN
    defaultValue: true
    tag: API & integrations
    type: INTEGRATION
    integrationType: MARKETPLACE
  dynamicLinkPreviews:
    description: Paste a link to a Github PR, Jira ticket, Figma artboard & more to add a dynamic preview of content
      in your docs & notes.
    valueType: BOOLEAN
    defaultValue: true
    tag: API & integrations
    type: DOMAIN
  slackIntegration:
    description: Send information from Notion to Slack, and vice versa.
    valueType: BOOLEAN
    defaultValue: true
    tag: API & integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  zapierIntegration:
    description: Connect to Zapier to create automated workflows with the tools you rely on.
    valueType: BOOLEAN
    defaultValue: true
    tag: API & integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  publicApi:
    description: Build bespoke integrations to connect your Notion workspace to internal tools and workflows.
    valueType: BOOLEAN
    defaultValue: true
    tag: API & integrations
    type: INTEGRATION
    integrationType: API
  exportEntireWorkspaceAsHTML:
    description: Create a backup of all the pages and content across your workspace as HTML.
    valueType: BOOLEAN
    defaultValue: true
    tag: Admin & security
    type: DOMAIN
  exportEntireWorkspaceAsMarkdown:
    description: Create a backup of all the pages and content across your workspace as Markdown.
    valueType: BOOLEAN
    defaultValue: true
    tag: Admin & security
    type: DOMAIN
  exportEntireWorkspaceAsCSV:
    description: Create a backup of all the pages and content across your workspace as CSV.
    valueType: BOOLEAN
    defaultValue: true
    tag: Admin & security
    type: DOMAIN
  twoStepVerification:
    description: Enable an extra layer of account security with a second method of verification, also know as 2FA or MFA.
    valueType: BOOLEAN
    defaultValue: true
    tag: Admin & security
    type: MANAGEMENT
  exportEntireWorkspaceAsPDF:
    description: Export all your content at once as PDFs. Perfect for legal or compliance backups.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: DOMAIN
  samlSso:
    description: Manage employee access at scale with secure single sign-on.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userProvisioning:
    description: Automatically provision members in and out of your workspace with identiy providers like Okta.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  advancedWorkspaceSecurityControls:
    description: Unlock extra permission controls to prevent certain people from sharing pages externally, disable guests,
      and set workspace-level rules.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  advancedTeamspaceSecurityControls:
    description: Unlock extra permission controls to prevent certain people from sharing pages externally, disable guests,
      and set workspace-level rules.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  workspaceAnalytics:
    description: Get actionable insights about how folks use your Notion workspace, from the most popular pages to overall traffic.
      Analytics data begins after Enterprise Plan start date.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INFORMATION
  granularAdminRoles:
    description: Designate membership admins who can add and remove members from the workspace and groups, but can't access
      other security & billing settings.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  auditLog:
    description: Access a detailed log of security and safety-related activity for your workspace account to identify potential
      security issues, investigate suspicious behaviour, or troubleshoot access.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INFORMATION
  adminContentSearch:
    description: Admin content search provides Workspace owners visibility into the content of their Notion workspace,
      letting them filter, search, and troubleshoot permissions.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  domainManagement:
    description: Establish ownership of your company domain and take actions on workspaces that belong to your verified
      domain (request ownership transfer, delete, claim)
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  workspaceConsolidation:
    description: Consolidate content from multiple workspaces, including users, page content, and permissions, into your
      main workspace as teamspaces(s) that keep their structure.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: DOMAIN
  managedUsersDashboard:
    description: Manage the users within your domain, including a dashboard where you can get information and make changes.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: DOMAIN
  managedUsersControls:
    description: Manage the users within your domain, including a dashboard where you can get information and make changes.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  securityIntegrations:
    description: Integrate with SIEM and DLP tools to automatically centralize audit logs & set policies to detect
      sensitive content in your workspace and trigger automated actions to remediate.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INTEGRATION
    integrationType: MARKETPLACE
  complianceIntegrations:
    description: Integrate with SIEM and DLP tools to automatically centralize audit logs & set policies to detect
      sensitive content in your workspace and trigger automated actions to remediate.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INTEGRATION
    integrationType: MARKETPLACE
  hipaaCompliance:
    description: Customer can store and process Protected Health Information (PHI) in Notion once they sign a Business
      Associate Agreement (BAA) and configured their workspace(s) security settings according to our HIPAA configuration
      instructions.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: GUARANTEE
  guestInviteRequests:
    description: Workspace members can send guest invite requests to their workspace owners for review when guests
      are disabled in the workspace.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: DOMAIN
  customDataRetentionPolicies:
    description: Control over when pages are deleted from Trash, and how long they are retained afterward.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: MANAGEMENT
  prioritySupport:
    description: We're always around to help. Just click the (?) button at the bottom right on desktop, or tap "Help &
      support" if you're on mobile.
    valueType: BOOLEAN
    defaultValue: false
    tag: Support
    type: SUPPORT
  customerSuccessManager:
    description: Our team of customer success managers are experts to help you get the most out of Notion.
    valueType: BOOLEAN
    defaultValue: false
    tag: Support
    type: SUPPORT
  notionAi:
    description: Infinite minds, built for teamwork. Answer questions, prioritize tasks, and
      write reports—all while you sleep.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
usageLimits:
  fileUploadsLimit:
    description: Maximum file size upload threshold
    valueType: NUMERIC
    defaultValue: 5
    unit: MB
    type: NON_RENEWABLE
    linkedFeatures:
    - fileUploads
  pageHistoryThreshold:
    description: Maximum page history period threshold
    valueType: NUMERIC
    defaultValue: 7
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - pageHistory
  notionSiteDomainLimit:
    description: Maximum notion site domain available
    valueType: NUMERIC
    defaultValue: 1
    unit: domain
    type: NON_RENEWABLE
    linkedFeatures:
    - notionSiteDomain
  guestsLimit:
    description: Maximum guest available in Notion
    valueType: NUMERIC
    defaultValue: 10
    unit: guest
    type: NON_RENEWABLE
    linkedFeatures:
    - guests
  chartsLimit:
    description: Maximum charts available in your Notion account
    valueType: NUMERIC
    defaultValue: 1
    unit: chart
    type: NON_RENEWABLE
    linkedFeatures:
    - charts
  customDomainsLimit:
    description: Maximum custom domain available in Notion
    valueType: NUMERIC
    defaultValue: 0
    unit: domain
    type: NON_RENEWABLE
    linkedFeatures:
    - customDomainAndBranding
  syncDatabasesLimit:
    description: Maximum databases to sync
    valueType: NUMERIC
    defaultValue: 1
    unit: database
    type: NON_RENEWABLE
    linkedFeatures:
    - syncDatabases
  rowLimitPerSyncedDatabase:
    description: See up-to-date information from Jira, Github & Asana, all synced into Notion as a database.
    valueType: NUMERIC
    defaultValue: 100
    unit: row
    type: NON_RENEWABLE
    linkedFeatures:
    - syncDatabases
plans:
  FREE:
    description: For individuals to organize personal projects and life
    price: 0
    unit: user/month
    features: null
    usageLimits: null
  PLUS:
    description: For small teams and professionals to work together
    price: 12
    unit: user/month
    features:
      customDatabaseAutomations:
        value: true
      additionalFormCustomization:
        value: true
      advancedSEO:
        value: true
      siteCustomization:
        value: true
      googleAnalyticsIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      fileUploadsLimit:
        value: .inf
      pageHistoryThreshold:
        value: 30
      notionSiteDomainLimit:
        value: 5
      guestsLimit:
        value: 100
      chartsLimit:
        value: .inf
      syncDatabasesLimit:
        value: .inf
      rowLimitPerSyncedDatabase:
        value: 20000
  BUSINESS:
    description: For growing businesses to streamline teamwork
    price: 18
    unit: user/month
    features:
      advancedPageAnalytics:
        value: true
      verifyAnyPage:
        value: true
      privateTeamSpaces:
        value: true
      customDatabaseAutomations:
        value: true
      additionalFormCustomization:
        value: true
      advancedSEO:
        value: true
      siteCustomization:
        value: true
      googleAnalyticsIntegration:
        value: true
      exportEntireWorkspaceAsPDF:
        value: true
      samlSso:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      fileUploadsLimit:
        value: .inf
      pageHistoryThreshold:
        value: 90
      notionSiteDomainLimit:
        value: 5
      guestsLimit:
        value: 250
      chartsLimit:
        value: .inf
      syncDatabasesLimit:
        value: .inf
      rowLimitPerSyncedDatabase:
        value: 20000
  ENTERPRISE:
    description: For organizations to operate with scalability, control, and security
    price: Contact Sales
    unit: user/month
    features:
      advancedPageAnalytics:
        value: true
      verifyAnyPage:
        value: true
      privateTeamSpaces:
        value: true
      advancedTeamSpacePermissions:
        value: true
      customDatabaseAutomations:
        value: true
      additionalFormCustomization:
        value: true
      advancedSEO:
        value: true
      siteCustomization:
        value: true
      googleAnalyticsIntegration:
        value: true
      exportEntireWorkspaceAsPDF:
        value: true
      samlSso:
        value: true
      userProvisioning:
        value: true
      advancedWorkspaceSecurityControls:
        value: true
      advancedTeamspaceSecurityControls:
        value: true
      workspaceAnalytics:
        value: true
      granularAdminRoles:
        value: true
      auditLog:
        value: true
      adminContentSearch:
        value: true
      domainManagement:
        value: true
      workspaceConsolidation:
        value: true
      managedUsersDashboard:
        value: true
      managedUsersControls:
        value: true
      securityIntegrations:
        value: true
      complianceIntegrations:
        value: true
      hipaaCompliance:
        value: true
      guestInviteRequests:
        value: true
      customDataRetentionPolicies:
        value: true
      prioritySupport:
        value: true
      customerSuccessManager:
        value: true
    usageLimits:
      fileUploadsLimit:
        value: .inf
      pageHistoryThreshold:
        value: .inf
      notionSiteDomainLimit:
        value: 5
      guestsLimit:
        value: 250
      chartsLimit:
        value: .inf
      syncDatabasesLimit:
        value: .inf
      rowLimitPerSyncedDatabase:
        value: 20000
addOns:
  customDomain:
    availableFor:
    - PLUS
    - BUSINESS
    - ENTERPRISE
    price: Contact Sales
    unit: domain/month
    features:
      customDomainAndBranding:
        value: true
    usageLimits: null
    usageLimitsExtensions:
      customDomainsLimit:
        value: 1
  extraCustomDomain:
    availableFor:
    - PLUS
    - BUSINESS
    - ENTERPRISE
    dependsOn:
    - customDomain
    price: Contact Sales
    unit: domain/month
    features: null
    usageLimits: null
    usageLimitsExtensions:
      customDomainsLimit:
        value: 1
  notionAi:
    availableFor:
    - FREE
    - PLUS
    - BUSINESS
    - ENTERPRISE
    price: 10
    unit: member/month
    features:
      notionAi:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
