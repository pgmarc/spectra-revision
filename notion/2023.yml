syntaxVersion: '2.1'
saasName: Notion
createdAt: '2023-11-29'
version: '2023-11-29'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20231129223436/https://www.notion.so/pricing
features:
  pages:
    description: Every page you create in Notion is a fresh canvas where you can add whatever content you want.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  blocks:
    description: Blocks are pieces of content you add to a page (e.g to-do checkboxes, paragraphs, bullet points, etc.).
      Teams who want to try collaborating in Notion can use the Free Plan with up to certain number of blocks before upgrading.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fileUploads:
    description: A per file size limit may apply to any file that your upload to a Notion page or database.
      On the Free plan, you can upload images, videos and file attachments up to 5MB each. Upgrade to a paid plan for
      unlimited file uploads with a ~5GB max per file.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pageHistory:
    description: Restore your page to a previous version.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  basicPageAnalytics:
    description: Get actionable insights about who's viewing and interacting with your content.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  advancedPageAnalytics:
    description: More advanced insights apart from basic Page Analytics.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  collaborativeWorkspace:
    description: Plan, create, and get organized, together. Share your workspace with multiple
      people and teams, so everyone can stay aligned in a single place.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  guests:
    description: Guests are individuals external to your workspace, such as friends, family, contractors or clients.
      Collaborate privately by inviting guests on individual pages.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  notionSiteDomain:
    description: Publish your resumé, startup pitch deck, company jobs page & more as a public webpage. Paid plans can
      select a homepage for their custom domain (e.g. acmedesign.notion.site).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  permissionGroups:
    description: Create groups of people according to role of deparment to streamline page & teamspace permissions.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  openTeamSpaces:
    description: Create dedicated areas for folks to work together, without creating information silos. People can join the
      teamspaces that interest them, and leave the one that don't. In open team spaces anyone can join
      and view the content inside this teamspace.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  closeTeamSpaces:
    description: Create dedicated areas for folks to work together, without creating information silos. People can join the
      teamspaces that interest them, and leave the one that don't. In closed team spaces everyone can see that this
      teamspace exists, but can't join unless they're invited by an owner or member.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateTeamSpaces:
    description: Create teamspaces that can't be seen or discovered by anyone except those you add. Great for sensitive
      information like company planning or performance reviews.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedTeamSpacePermissions:
    description: Override teamspace permissions for specific people or groups, giving you even more control over who has view
      vs. edit access to content.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  syncDatabases:
    description: See up-to-date information from Jira and Github, all synced into Notion as a database.
      Personal plans are limited to 1 database with 100 rows.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  dynamicLinkPreviews:
    description: Paste a link to a Github PR, Jira ticket, Figma artboard & more to add a dynamic preview of content
      in your docs & notes.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  slackIntegration:
    description: Send information from Notion to Slack, and vice versa.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  zapierIntegration:
    description: Connect to Zapier to create automated workflows with the tools you rely on.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  publicApi:
    description: Build bespoke integrations to connect your Notion workspace to internal tools and workflows.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  basicAutomations:
    description: Create custom workflows with buttons, automate your sprint tracker, and sync with Slack and Github.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customDatasetAutomations:
    description: Design custom automations triggered by database status changes, assignees and more. Free Plan users can test
      database automations via templates.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  exportEntireWorkspaceAsHTML:
    description: Create a backup of all the pages and content across your workspace as HTML.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  exportEntireWorkspaceAsMarkdown:
    description: Create a backup of all the pages and content across your workspace as Markdown.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  exportEntireWorkspaceAsCSV:
    description: Create a backup of all the pages and content across your workspace as CSV.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  exportEntireWorkspaceAsPDF:
    description: Export all your content at once as PDFs. Perfect for legal or compliance backups.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  samlSso:
    description: Manage employee access at scale with secure single sign-on.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userProvisioning:
    description: Automatically provision members in and out of your workspace with identiy providers like Okta.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  advancedWorkspaceSecurityControls:
    description: Unlock extra permission controls to prevent certain people from sharing pages externally, disable guests,
      and set workspace-level rules.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedTeamspaceSecurityControls:
    description: Unlock extra permission controls to prevent certain people from sharing pages externally, disable guests,
      and set workspace-level rules.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  workspaceAnalytics:
    description: Get actionable insights about how folks use your Notion workspace, from the most popular pages to overall traffic.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  granularAdminRoles:
    description: Designate membership admins who can add and remove members from the workspace and groups, but can't access
      other security & billing settings.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  auditLog:
    description: Access a detailed log of security and safety-related activity for your workspace account to identify potential
      security issues, investigate suspicious behaviour, or troubleshoot access.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  adminContentSearch:
    description: Admin content search provides Workspace owners visibility into the content of their Notion workspace,
      letting them filter, search, and troubleshoot permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  domainManagement:
    description: Establish ownership of your company domain and take actions on workspaces that belong to your verified
      domain (request ownership transfer, delete, claim)
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  workspaceConsolidation:
    description: Consolidate content from multiple workspaces, including users, page content, and permissions, into your
      main workspace as teamspaces(s) that keep their structure.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  managedUsersDashboard:
    description: Manage the users within your domain, including a dashboard where you can get information and make changes.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  managedUsersControls:
    description: Manage the users within your domain, including a dashboard where you can get information and make changes.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  securityIntegrations:
    description: Integrate with SIEM and DLP tools to automatically centralize audit logs & set policies to detect
      sensitive content in your workspace and trigger automated actions to remediate.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  complianceIntegrations:
    description: Integrate with SIEM and DLP tools to automatically centralize audit logs & set policies to detect
      sensitive content in your workspace and trigger automated actions to remediate.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  hipaaCompliance:
    description: Customer can store and process Protected Health Information (PHI) in Notion once they sign a Business
      Associate Agreement (BAA) and configured their workspace(s) security settings according to our HIPAA configuration
      instructions.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  guestInviteRequests:
    description: Workspace members can send guest invite requests to their workspace owners for review when guests
      are disabled in the workspace.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  prioritySupport:
    description: We're always around to help. Just click the (?) button at the bottom right on desktop, or tap "Help &
      feedback" if you're on mobile.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  customerSuccessManager:
    description: Our team of customer success managers are experts to help you get the most out of Notion.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  guestsLimit:
    description: Maximum number of guests in your Notion account
    valueType: NUMERIC
    defaultValue: 10
    unit: guest
    type: NON_RENEWABLE
    linkedFeatures:
    - guests
  fileUploadsLimit:
    description: Maximum file size upload threshold
    valueType: NUMERIC
    defaultValue: 5
    unit: MB
    type: NON_RENEWABLE
    linkedFeatures:
    - fileUploads
  pageHistoryThreshold:
    description: Maximum page history period threshold
    valueType: NUMERIC
    defaultValue: 7
    unit: days
    type: NON_RENEWABLE
    linkedFeatures:
    - pageHistory
  syncDatabasesLimit:
    description: Maximum databases to sync
    valueType: NUMERIC
    defaultValue: 1
    unit: database
    type: NON_RENEWABLE
    linkedFeatures:
    - syncDatabases
  rowLimitPerSyncedDatabase:
    description: See up-to-date information from Jira, Github & Asana, all synced into Notion as a database.
    valueType: NUMERIC
    defaultValue: 100
    unit: row
    type: NON_RENEWABLE
    linkedFeatures:
    - syncDatabases
plans:
  FREE:
    description: For organizing every corner of your work & life.
    price: 0
    unit: user/month
    features: null
    usageLimits: null
  PLUS:
    description: A place for small groups to plan & get organized.
    price: 8
    unit: user/month
    features:
      notionSiteDomain:
        value: true
      customDatasetAutomations:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      guestsLimit:
        value: 100
      pageHistoryThreshold:
        value: 30
      fileUploadsLimit:
        value: .inf
      syncDatabasesLimit:
        value: .inf
      rowLimitPerSyncedDatabase:
        value: 20000
  BUSINESS:
    description: or companies using Notion to connect several teams & tools.
    price: 18
    unit: user/month
    features:
      advancedPageAnalytics:
        value: true
      notionSiteDomain:
        value: true
      privateTeamSpaces:
        value: true
      customDatasetAutomations:
        value: true
      exportEntireWorkspaceAsPDF:
        value: true
      samlSso:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      guestsLimit:
        value: 250
      pageHistoryThreshold:
        value: 90
      fileUploadsLimit:
        value: .inf
      syncDatabasesLimit:
        value: .inf
      rowLimitPerSyncedDatabase:
        value: 20000
  ENTERPRISE:
    description: Advanced controls & support to run your entire organization.
    price: Contact Sales
    unit: user/month
    features:
      advancedPageAnalytics:
        value: true
      notionSiteDomain:
        value: true
      privateTeamSpaces:
        value: true
      advancedTeamSpacePermissions:
        value: true
      customDatasetAutomations:
        value: true
      exportEntireWorkspaceAsPDF:
        value: true
      samlSso:
        value: true
      userProvisioning:
        value: true
      advancedWorkspaceSecurityControls:
        value: true
      advancedTeamspaceSecurityControls:
        value: true
      workspaceAnalytics:
        value: true
      granularAdminRoles:
        value: true
      auditLog:
        value: true
      adminContentSearch:
        value: true
      domainManagement:
        value: true
      workspaceConsolidation:
        value: true
      managedUsersDashboard:
        value: true
      managedUsersControls:
        value: true
      securityIntegrations:
        value: true
      complianceIntegrations:
        value: true
      hipaaCompliance:
        value: true
      guestInviteRequests:
        value: true
      prioritySupport:
        value: true
      customerSuccessManager:
        value: true
    usageLimits:
      guestsLimit:
        value: 250
      pageHistoryThreshold:
        value: .inf
      fileUploadsLimit:
        value: .inf
      syncDatabasesLimit:
        value: .inf
      rowLimitPerSyncedDatabase:
        value: 20000
addOns: null
