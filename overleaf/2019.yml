syntaxVersion: '2.1'
saasName: Overleaf
createdAt: '2019-11-04'
version: '2019-11-04'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20191104132617/https://www.overleaf.com/user/subscription/plans
features:
  privateProjects:
    description: All your projects are private by default. Invite collaborators to read or edit by email
      address or by sending them a secret link.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  realTimeCollaboration:
    description: When you're working together, you can see your collaborators' cursors and their changes in real time,
      so everyone always has the latest version.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  templates:
    description: Produce beautiful documents starting from our gallery of LaTeX templates for journals, conferences,
      theses, reports, CVs and much more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  latexEditor:
    description: Everything you need in a modern LaTeX editor --- spell check, intelligent autocomplete,
      syntax highlighting, dozens of color themes, vim and emacs bindings, help with LaTeX warnings and
      error messages, and much more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  realTimeTrackChanges:
    description: Now you don't have to choose between tracked changes and typesetting in LaTeX. Leave comments,
      keep track of TODOs, and accept or reject others' changes.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedReferenceSearch:
    description: You can always search by citation key, and advanced reference search lets you also search
      by author, title, year or journal.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  referenceManagerSync:
    description: Manage your reference library in Mendeley and link it directly to a .bib file in Overleaf,
      so you can easily cite anything in your Mendeley library.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  fullDocumentHistory:
    description: Travel back in time to see any version and who made changes. No matter what happens, we've got your back.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dropboxIntegration:
    description: Work online and offline seamlessly with two-way Dropbox sync. Changes you make locally will be sent
      automatically to the version on Overleaf and vice versa.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.dropbox.com/plans
  githubIntegration:
    description: Push and pull commits to and from GitHub, so you or your collaborators can work offline with
      git and online with Overleaf.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  prioritySupport:
    description: Prioritize and escalate support requests where necessary.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  groupLicenseManagement:
    description: Feature for centrally managing multiple user licenses under a group
      account.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
  discountedPricingForMultipleLicenses:
    description: Benefit of reduced per-license cost when purchasing multiple licenses
      for a group.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
  unlimitedSiteWideAccess:
    description: Provides unlimited premium access for all users within a single organizational
      site.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
  centralizedBillingAndManagement:
    description: Streamlined billing and administrative management for organizational
      accounts, including site licenses.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
usageLimits:
  maxCollaboratorsPerProject:
    description: Maximum number of collaborators per project.
    valueType: NUMERIC
    defaultValue: 1
    unit: collaborator
    type: NON_RENEWABLE
    linkedFeatures:
    - realTimeCollaboration
plans:
  PERSONAL:
    description: Ideal when working solo
    price: 0
    unit: /month
    features: null
    usageLimits: null
  COLLABORATOR:
    description: Great for shared projects
    price: 15
    unit: /month
    features:
      realTimeTrackChanges:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      fullDocumentHistory:
        value: true
      dropboxIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxCollaboratorsPerProject:
        value: 10
  STUDENT:
    description: Save even more
    price: 8
    unit: /month
    features:
      realTimeTrackChanges:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      fullDocumentHistory:
        value: true
      dropboxIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxCollaboratorsPerProject:
        value: 6
  PROFESSIONAL:
    description: For those working with many
    price: 30
    unit: /month
    features:
      realTimeTrackChanges:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      fullDocumentHistory:
        value: true
      dropboxIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxCollaboratorsPerProject:
        value: .inf
addOns:
  groupAccount:
    description: Provides discounted multiple licenses for colleagues, with centralized
      management options.
    price: Contact Sales
    unit: license
    features:
      groupLicenseManagement:
        value: true
      discountedPricingForMultipleLicenses:
        value: true
    usageLimits: null
    availableFor:
    - COLLABORATOR
    - PROFESSIONAL
    dependsOn: []
    excludes:
    - siteLicense
    usageLimitsExtensions: null
  siteLicense:
    description: Provides unlimited premium access for all users within an organization
      or site.
    price: Contact Sales
    unit: site
    features:
      unlimitedSiteWideAccess:
        value: true
      centralizedBillingAndManagement:
        value: true
    usageLimits: null
    availableFor:
    - COLLABORATOR
    - PROFESSIONAL
    dependsOn: []
    excludes:
    - groupAccount
    usageLimitsExtensions: null

