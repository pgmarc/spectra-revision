syntaxVersion: '2.1'
saasName: Overleaf
createdAt: '2022-11-28'
version: '2022-11-28'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20221128005642/https://www.overleaf.com/user/subscription/plans
features:
  privateProjects:
    description: All your projects are private by default. Invite collaborators to read or edit by email
      address or by sending them a secret link.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  realTimeCollaboration:
    description: you can see your collaborators' cursors and changes in real time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  templates:
    description: Produce beautiful documents starting from our gallery of LaTeX templates for journals,
      conferences, theses, reports, CVs and much more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  latexEditor:
    description: Spell check, intelligent autocomplete, syntax highlighting, dozens of color themes, vim and
      emacs bindings, help with LaTeX warnings and error messages, and more. Everyone always has the latest version,
      and you can see your collaborators' cursors and changes in real time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  latexCompilation:
    description: This is how much time you get to compile your project on the Overleaf servers. For short and simple
      projects, 1 minute should be enough, but you may need longer for complex or longer projects.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  realTimeTrackChanges:
    description: Switch on track changes to see who made every change, accept or reject others' changes, and write comments.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  fullDocumentHistory:
    description: You can see all the edits in your project and who made every change. Add labels to quickly access
      specific versions.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedReferenceSearch:
    description: It's easy to find your references - you can search by author, title, year or journal. You can
      still search by citation key too.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  referenceManagerSync:
    description: Overleaf's reference manager integrations allow you to import entire .bib files that are
      synchronized with your reference manager, or build your project's .bib file dynamically with data from your
      reference manager using the Advanced Reference Search feature.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  dropboxIntegration:
    description: Work online and offline seamlessly with two-way Dropbox sync. Changes you make locally will
      be sent automatically to the version on Overleaf and vice versa.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.dropbox.com/plans
  gitIntegration:
    description: You can clone your Overleaf project to a local repository, treating your Overleaf project as a
      remote repository that changes can be pushed to and pulled from.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  githubIntegration:
    description: Link your Overleaf projects directly to a GitHub repository that acts as a remote repository
      for your overleaf project. This allows you to share with collaborators outside of Overleaf, and integrate
      Overleaf into more complex workflows.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  prioritySupport:
    description: Our helpful Support team will prioritise and escalate your support requests where necessary.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  maxCollaboratorsPerProject:
    description: The number of people you can invite to work on each project. They just need to have an Overleaf account.
      They can be different people in each project.
    valueType: NUMERIC
    defaultValue: 1
    unit: collaborator
    type: NON_RENEWABLE
    linkedFeatures:
    - realTimeCollaboration
  compileTimeoutLimit:
    description: This is how much time you get to compile your project on the Overleaf servers. For short and simple
      projects, 1 minute should be enough, but you may need longer for complex or longer projects.
    valueType: NUMERIC
    defaultValue: 1
    unit: min
    type: TIME_DRIVEN
    linkedFeatures:
    - latexCompilation
plans:
  FREE:
    description: Free
    price: 0
    unit: /month
    features: null
    usageLimits: null
  PERSONAL:
    description: Ideal when working solo
    price: 15
    unit: /month
    features:
      fullDocumentHistory:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      dropboxIntegration:
        value: true
      gitIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      compileTimeoutLimit:
        value: 4
  STUDENT:
    description: Save even more
    price: 8
    unit: /month
    features:
      realTimeTrackChanges:
        value: true
      fullDocumentHistory:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      dropboxIntegration:
        value: true
      gitIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxCollaboratorsPerProject:
        value: 6
      compileTimeoutLimit:
        value: 4
  STANDARD:
    description: ''
    price: 23
    unit: /month
    features:
      realTimeTrackChanges:
        value: true
      fullDocumentHistory:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      dropboxIntegration:
        value: true
      gitIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxCollaboratorsPerProject:
        value: 10
      compileTimeoutLimit:
        value: 4
  PROFESSIONAL:
    description: For those working with many
    price: 45
    unit: /month
    features:
      realTimeTrackChanges:
        value: true
      fullDocumentHistory:
        value: true
      advancedReferenceSearch:
        value: true
      referenceManagerSync:
        value: true
      dropboxIntegration:
        value: true
      gitIntegration:
        value: true
      githubIntegration:
        value: true
      prioritySupport:
        value: true
    usageLimits:
      maxCollaboratorsPerProject:
        value: .inf
      compileTimeoutLimit:
        value: 4
addOns: null
