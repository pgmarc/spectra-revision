syntaxVersion: '2.1'
saasName: OpenPhone
createdAt: '2021-11-18'
version: '2021-11-18'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20211118055140/https://www.openphone.co/pricing
features:
  usAndCanadaCalling:
    description: As long as you have an internet connection, you can call US and Canadian numbers from any
      country without incurring additional charges (subject to our fair use policy).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  usAndCanadaMessaging:
    description: In order to guarantee message deliverability to three major US carriers (AT&T, T-Mobile, and
      Verizon), you'll need to register your business with the Campaign Registry (TCR).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  internationalCalling:
    description: Call most countries around the world. US & Canadian numbers are included, but for other countries,
      per-minute and per-message rates apply.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  internationalMessaging:
    description: Text most countries around the world. US & Canadian numbers are included, but for other countries,
      per-minute and per-message rates apply.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  groupMessaging:
    description: Bring multiple people into a single message thread to keep everyone in the know.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  voicemailToText:
    description: Every voicemail is automatically transcribed to text so they're easier to review.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  phoneNumbers:
    description: Every user added to your OpenPhone workspace gets one local or toll-free phone number to
      themselves, but you can remove or reassign them as needed.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  portPhoneNumbersFromOtherCarriers:
    description: Our team will help you transfer your existing phone number into OpenPhone for free
      (additional phone number costs still apply). Don't worry, you shouldn't experience any service disruptions
      during the porting process.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  callRecording:
    description: Record any call, or enable auto-recording on any phone number for a permannent record of every call.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sharedPhoneNumbers:
    description: Share call and text histories with others in your workspace, see when your team is talking or
      typing, and even ring multiple teammates during incoming calls.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  snippets:
    description: Save frequently sent messages as snippets to send complete replies with a single click.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  autoReplies:
    description: Automatically respond to texts, missed calls, or voicemails with pre-defined messages.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  standardAutoAtendant:
    description: Great callers with a message and let them select which team or person to connect with.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  advancedAutoAtendant:
    description: Great callers with a message and let them select which team or person to connect with.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  callTransfers:
    description: Redirect callers to any team, group, or person in your workspace or externally.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  emailIntegration:
    description: Get notified by email when your numbers receive a call, message, or voicemail.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  slackIntegration:
    description: Instantly share calls, texts, and voicemails with any Slack user or channel.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  zapierIntegration:
    description: Trigger actioins in thousands of other tools when specific events happen in OpenPhone.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  smsViaZapier:
    description: Send an SMS through OpenPhone based on actions that take place in other apps.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  hubSpotCRMIntegration:
    description: Sync your phone activity with Hubspot to spend less time typing and more time closing.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.hubspot.com/pricing
  adminDashboard:
    description: Track team performance, call volume, and communication patterns with OpenPhone.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  analytics:
    description: Get insight into how every phone number in your account is being used.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  reporting:
    description: Get visibility into how every phone number in your account is being used.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  auditLog:
    description: Review a log of all account-related activities for complete transparency and oversight.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  emailSupport:
    description: We're standing by to answer your questions (wherever you feel like asking them). Support via email.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  smsSupport:
    description: We're standing by to answer your questions (wherever you feel like asking them). Support via SMS.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  prioritySupport:
    description: Support requests are prioritized to ensure you get the help you need fast.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountManager:
    description: Get a dedicated point-of-contact within OpenPhone you can turn to for help or advice.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  phoneNumbersLimit:
    description: Every user added to your OpenPhone workspace get one local or toll-fee phone number to themselves,
      but you can remove or reassing them as needed.
    valueType: NUMERIC
    defaultValue: 1
    unit: phone number
    type: NON_RENEWABLE
    linkedFeatures:
    - phoneNumbers
  usAndCanadCallsLimit:
    description: Maximum number of calls to US and Canada
    valueType: NUMERIC
    defaultValue: 10000000000000
    unit: call
    type: NON_RENEWABLE
    linkedFeatures:
    - usAndCanadaCalling
  usAndCanadaMessagesLimit:
    description: Maximum number of SMS messages to US and Canada
    valueType: NUMERIC
    defaultValue: 10000000000000
    unit: message
    type: NON_RENEWABLE
    linkedFeatures:
    - usAndCanadaMessaging
  smsViaZapierAddonLimit:
    description: Maximum SMS messages via Zapier limit
    valueType: NUMERIC
    defaultValue: 0
    unit: message
    type: NON_RENEWABLE
    linkedFeatures:
    - smsViaZapier
plans:
  STANDARD:
    description: The essentials to get you up and running.
    price: 10
    unit: user/month
    features: null
    usageLimits: null
  PREMIUM:
    description: For power users and teams looking for more integrations and collaboration
      features.
    price: 25
    unit: user/month
    features:
      advancedAutoAtendant:
        value: true
      callTransfers:
        value: true
      hubSpotCRMIntegration:
        value: true
      analytics:
        value: true
      reporting:
        value: true
      prioritySupport:
        value: true
    usageLimits: null
  ENTERPRISE:
    description: For organizations with complex requirements.
    price: Contact Sales
    unit: user/month
    features:
      advancedAutoAtendant:
        value: true
      callTransfers:
        value: true
      hubSpotCRMIntegration:
        value: true
      analytics:
        value: true
      reporting:
        value: true
      auditLog:
        value: true
      prioritySupport:
        value: true
      dedicatedAccountManager:
        value: true
    usageLimits: null
addOns:
  aditionalPhoneNumbers:
    availableFor:
    - STANDARD
    - PREMIUM
    - ENTERPRISE
    price: 5
    unit: phoneNumber/month
    features: null
    usageLimits: null
    usageLimitsExtensions:
      phoneNumbersLimit:
        value: 1
  internationalCallingAndMessaging:
    availableFor:
    - STANDARD
    - PREMIUM
    - ENTERPRISE
    price: See Rates
    unit: user/month
    features:
      internationalCalling:
        value: true
      internationalMessaging:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
  smsViaZapierAddon:
    availableFor:
    - STANDARD
    - PREMIUM
    - ENTERPRISE
    price: 0.01
    unit: message
    features:
      smsViaZapier:
        value: true
    usageLimits: null
    usageLimitsExtensions:
      smsViaZapierAddonLimit:
        value: 1
