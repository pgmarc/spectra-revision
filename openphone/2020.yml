syntaxVersion: '2.1'
saasName: OpenPhone
createdAt: '2020-11-12'
version: '2020-11-12'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20201112011236/https://www.openphone.co/pricing
features:
  usAndCanadaCalling:
    description: As long as you have an internet connection, you can call US and Canadian numbers from any
      country without incurring additional charges (subject to our fair use policy).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  usAndCanadaMessaging:
    description: In order to guarantee message deliverability to three major US carriers (AT&T, T-Mobile, and
      Verizon), you'll need to register your business with the Campaign Registry (TCR).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  voicemailToText:
    description: Every voicemail is automatically transcribed to text so they're easier to review.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  phoneNumbers:
    description: Every user added to your OpenPhone workspace gets one local or toll-free phone number to
      themselves, but you can remove or reassign them as needed.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  portPhoneNumbersFromOtherCarriers:
    description: Our team will help you transfer your existing phone number into OpenPhone for free
      (additional phone number costs still apply). Don't worry, you shouldn't experience any service disruptions
      during the porting process.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  callRecording:
    description: Record any call, or enable auto-recording on any phone number for a permannent record of every call.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sharedPhoneNumbers:
    description: Share call and text histories with others in your workspace, see when your team is talking or
      typing, and even ring multiple teammates during incoming calls.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  ivrAutoAtendant:
    description: Greet callers with a message and let them select which team or person
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  emailIntegration:
    description: Get notified by email when your numbers receive a call, message, or voicemail.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  slackIntegration:
    description: Instantly share calls, texts, and voicemails with any Slack user or channel.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  crmIntegration:
    description: Sync your phone activity with Hubspot to spend less time typing and more time closing.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  analytics:
    description: Get insight into how every phone number in your account is being used.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  reporting:
    description: Get visibility into how every phone number in your account is being used.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  auditLog:
    description: Review a log of all account-related activities for complete transparency and oversight.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  emailSupport:
    description: We're standing by to answer your questions (wherever you feel like asking them). Support via email.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  smsSupport:
    description: We're standing by to answer your questions (wherever you feel like asking them). Support via SMS.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  phoneSupport:
    description: Support via phone.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountManager:
    description: Get a dedicated point-of-contact within OpenPhone you can turn to for help or advice.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  phoneNumbersLimit:
    description: Every user added to your OpenPhone workspace get one local or toll-fee phone number to themselves,
      but you can remove or reassing them as needed.
    valueType: NUMERIC
    defaultValue: 1
    unit: phone number
    type: NON_RENEWABLE
    linkedFeatures:
    - phoneNumbers
  usAndCanadCallsLimit:
    description: Maximum number of calls to US and Canada
    valueType: NUMERIC
    defaultValue: 10000000000000
    unit: call
    type: NON_RENEWABLE
    linkedFeatures:
    - usAndCanadaCalling
  usAndCanadaMessagesLimit:
    description: Maximum number of SMS messages to US and Canada
    valueType: NUMERIC
    defaultValue: 10000000000000
    unit: message
    type: NON_RENEWABLE
    linkedFeatures:
    - usAndCanadaMessaging
plans:
  STANDARD:
    description: For individuals, teams and companies.
    price: 10
    unit: user/month
    features: null
    usageLimits: null
  ENTERPRISE:
    description: For organizations with more requirements.
    price: Contact Sales
    unit: user/month
    features:
      crmIntegration:
        value: true
      analytics:
        value: true
      reporting:
        value: true
      auditLog:
        value: true
      phoneSupport:
        value: true
      dedicatedAccountManager:
        value: true
    usageLimits: null
addOns:
  aditionalPhoneNumbers:
    availableFor:
    - STANDARD
    - ENTERPRISE
    price: 5
    unit: phoneNumber/month
    features: null
    usageLimits: null
    usageLimitsExtensions:
      phoneNumbersLimit:
        value: 1
