syntaxVersion: '2.1'
saasName: OpenPhone
createdAt: '2025-03-07'
version: '2025'
url: https://web.archive.org/web/20250307093649/https://www.openphone.com/pricing
tags:
- Core features
- Productivity & collaboration
- Integrations
- Admin & security
- Support
billing:
  monthly: 1.0
currency: USD
features:
  usAndCanadaCalling:
    description: As long as you have an internet connection, you can call US and Canadian numbers from any
      country without incurring additional charges (subject to our fair use policy).
    valueType: BOOLEAN
    defaultValue: true
    tag: Core features
    type: DOMAIN
  usAndCanadaMessaging:
    description: In order to guarantee message deliverability to three major US carriers (AT&T, T-Mobile, and
      Verizon), you'll need to register your business with the Campaign Registry (TCR).
    valueType: BOOLEAN
    defaultValue: false
    tag: Core features
    type: DOMAIN
  internationalCalling:
    description: Call most countries around the world. US & Canadian numbers are included, but for other countries,
      per-minute and per-message rates apply.
    valueType: BOOLEAN
    defaultValue: false
    tag: Core features
    type: DOMAIN
  internationalMessaging:
    description: Text most countries around the world. US & Canadian numbers are included, but for other countries,
      per-minute and per-message rates apply.
    valueType: BOOLEAN
    defaultValue: false
    tag: Core features
    type: DOMAIN
  phoneNumbers:
    description: Every user added to your OpenPhone workspace gets one local or toll-free phone number to
      themselves, but you can remove or reassign them as needed.
    valueType: BOOLEAN
    defaultValue: true
    tag: Core features
    type: DOMAIN
  portPhoneNumbersFromOtherCarriers:
    description: Our team will help you transfer your existing phone number into OpenPhone for free
      (additional phone number costs still apply). Don't worry, you shouldn't experience any service disruptions
      during the porting process.
    valueType: BOOLEAN
    defaultValue: true
    tag: Core features
    type: DOMAIN
  sharedPhoneNumbers:
    description: Share call and text histories with others in your workspace, see when your team is talking or
      typing, and even ring multiple teammates during incoming calls.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  snippets:
    description: Save frequently sent messages as snippets to send complete replies with a single click.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  aiMessageResponses:
    description: Save time and reply faster using AI-suggested message responses. You can also prompt OpenPhone AI
      to draft a message based on a specific topic or context.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: AUTOMATION
    automationType: BOT
  internalThreads:
    description: Chat with your teammates behind the scenes, right in the context of the conversation.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  sharedContacts:
    description: Contacts added to a shared phone number are visible to everyone sharing that number. You can
      also share contacts to teammates individually.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  contactNotes:
    description: Jot down important details about any contact that you and your team should remember.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  businessHours:
    description: Automatically mute notifications from specific phone numbers after business hours to avoid
      disruptions after work.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  voicemailTranscripts:
    description: Every voicemail is automatically transcribed to text so they're easier to review.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  manualCallRecording:
    description: Record calls manually.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  automaticCallRecording:
    description: Set up automatic recording for consistent documentation.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  autoReplies:
    description: Automatically respond to texts, missed calls, or voicemails with pre-defined messages.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  scheduledMessages:
    description: Schedule the delivery of a text message for any point in the future.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  userGroups:
    description: Organize teammates into distinct groups.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: MANAGEMENT
  groupMessaging:
    description: Bring multiple people into a single message thread to keep everyone in the know.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  basicCallForwarding:
    description: Automatically forward all calls to another US or Canadian number.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  callViews:
    description: Automatically forward all calls to another US or Canadian number.
    valueType: BOOLEAN
    defaultValue: true
    tag: Productivity & collaboration
    type: DOMAIN
  advancedCallForwarding:
    description: Automatically forward unanswered calls to another US or Canadian number based on your business
      hours.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  phoneMenus:
    description: Also konow as IVR. Greet callers with a message and let them select which team or person
      to connect with.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  aiCallSummaries:
    description: When you finish a call, OpenPhone AI will automatically generate a summary of what was said and
      even outline the next steps. You can also check out the entire transcript of the call.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: AUTOMATION
    automationType: BOT
  aiCallTranscripts:
    description: When you finish a call, OpenPhone AI will automatically generate a summary of what was said and
      even outline the next steps. You can also check out the entire transcript of the call.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: AUTOMATION
    automationType: BOT
  groupCalling:
    description: Include multiple active participants on any call.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  callHold:
    description: Place external callers on hold. Hold music will play while the caller is on hold.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  callTransfers:
    description: Also known as "warn" transfers, redirect callers to any team, group, or person in your workspace
      or externally, without leaving the call.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  ringOrder:
    description: Ring teammates on shared phone numbers in batches, instead of all at once.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  conditionalCallRouting:
    description: Conditional call forwarding for more sophisticated routing based on business hours or
      specific conditions
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  aiCallTags:
    description: Whe you receive a voicemail or record a call, OpenPhone AI will scan the transcript and pre-fill
      contact details like name and company.
    valueType: BOOLEAN
    defaultValue: false
    tag: Productivity & collaboration
    type: DOMAIN
  emailIntegration:
    description: Get email notifications for calls, messages, and voicemail.
    valueType: BOOLEAN
    defaultValue: true
    tag: Integrations
    type: INTEGRATION
    integrationType: MARKETPLACE
  slackIntegration:
    description: OpenPhone Slack integration sends real-time notifications to your chosen Slack channels
      whenever your OpenPhone numbers receive calls, messages, or voicemail.
    valueType: BOOLEAN
    defaultValue: true
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  zapierIntegration:
    description: OpenPhone Zapier integration connects your business phone system with 8,000+ applications,
      enabling powerful automation workflows that save time and reduce manual work. Create sophisticated
      triggers and actions to streamline your communication processes.
    valueType: BOOLEAN
    defaultValue: true
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  makeIntegration:
    description: Create visual automation workflows between OpenPhone and thousands of apps using Make's
      no-code platform
    valueType: BOOLEAN
    defaultValue: true
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.make.com/en/pricing
  smsViaApi:
    description: Send SMS messages with the OpenPhone API.
    valueType: BOOLEAN
    defaultValue: false
    tag: Integrations
    type: INTEGRATION
    integrationType: API
  smsViaZapierAndMake:
    description: Send SMS with OpenPhone integration in Zapier and Make.
    valueType: BOOLEAN
    defaultValue: false
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  googleContactsIntegration:
    description: Automatically sync your Google contacts with OpenPhone.
    valueType: BOOLEAN
    defaultValue: true
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://workspace.google.com/pricing
  webhooksIntegration:
    description: Webhooks provide real-time notifications when events occur in your OpenPhone workspace, enabling
      powerful integrations and automated workflows. Configure webhooks to send event data to your applications
      instantly when calls complete, messages arrive, or contacts change.
    valueType: BOOLEAN
    defaultValue: true
    tag: Integrations
    type: INTEGRATION
    integrationType: API
  hubSpotCRMIntegration:
    description: OpenPhone's HubSpot integration connects your phone communications with your CRM, The HubSpot integration
      makes it easier to view contact details as a HubSpot contact, whenever a HubSpot contact calls or messages your
      OpenPhone number. You don't even have to add them as an OpenPhone contact. The following fields from HubSpot are
      automatically imported into the contact profile in OpenPhone
    valueType: BOOLEAN
    defaultValue: false
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.hubspot.com/pricing
  salesforceIntegration:
    description: OpenPhone Salesforce integration connects your communications with your CRM, automatically syncing
      contact details and logging all call and message activities. Streamline your sales process with seamless
      data flow between OpenPhone and Salesforce.
    valueType: BOOLEAN
    defaultValue: false
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.salesforce.com/products/sales-cloud/pricing/
  gongIntegration:
    description: OpenPhone Gong integration automatically syncs call recordings to Gong for conversation intelligence
      and analysis. Analyze call interactions, track key moments, and leverage Gong's AI-powered insights on your
      OpenPhone conversations.
    valueType: BOOLEAN
    defaultValue: false
    tag: Integrations
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.gong.io/pricing/
  userRoles:
    description: Full, granular control over all users, phone numbers, and billing in your workspace.
    valueType: BOOLEAN
    defaultValue: true
    tag: Admin & security
    type: MANAGEMENT
  userManagement:
    description: Full, granular control over all users, phone numbers, and billing in your workspace.
    valueType: BOOLEAN
    defaultValue: true
    tag: Admin & security
    type: MANAGEMENT
  analytics:
    description: Get insight into how every phone number in your account is being used.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INFORMATION
  reporting:
    description: Get visibility into how every phone number in your account is being used.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INFORMATION
  auditLog:
    description: Review a log of all account-related activities for complete transparency and oversight.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INFORMATION
  SOC2Report:
    description: Verification of the processes and systems in place to securely manage your data.
    valueType: BOOLEAN
    defaultValue: false
    tag: Admin & security
    type: INFORMATION
  emailTicketSupport:
    description: Email us or submit a ticket via Help Center for any questions.
    valueType: BOOLEAN
    defaultValue: true
    tag: Support
    type: SUPPORT
  liveChatSupport:
    description: Chat live with one of our team members.
    valueType: BOOLEAN
    defaultValue: false
    tag: Support
    type: SUPPORT
  prioritySupport:
    description: Support requests are prioritized to ensure you get the help you need fast.
    valueType: BOOLEAN
    defaultValue: false
    tag: Support
    type: SUPPORT
  dedicatedAccountManager:
    description: Dedicated account manager
    valueType: BOOLEAN
    defaultValue: false
    tag: Support
    type: SUPPORT
usageLimits:
  useCanadaMessagingFeePayed:
    description: The Campaign Registry charges a montly fee based on your use case to help you maintain good standing
      with the large US cell carriers.
    valueType: BOOLEAN
    defaultValue: false
    type: NON_RENEWABLE
    linkedFeatures:
    - usAndCanadaMessaging
  phoneNumbersLimit:
    description: Every user added to your OpenPhone workspace get one local or toll-fee phone number to themselves,
      but you can remove or reassing them as needed.
    valueType: NUMERIC
    defaultValue: 1
    unit: phone number
    type: NON_RENEWABLE
    linkedFeatures:
    - phoneNumbers
  sharedPhoneNumbersLimit:
    description: Maximum number of users to see shared call and text histories.
    valueType: NUMERIC
    defaultValue: 10
    unit: user
    type: NON_RENEWABLE
    linkedFeatures:
    - sharedPhoneNumbers
  smsViaApiAddOnLimit:
    description: Maximum number of SMS messages to send via API.
    valueType: NUMERIC
    defaultValue: 0
    unit: message
    type: NON_RENEWABLE
    linkedFeatures:
    - smsViaApi
  smsViaZapierAndMakeAddonLimit:
    description: Maximum number of SMS messages to send via Zapier and Make.
    valueType: NUMERIC
    defaultValue: 0
    unit: message
    type: NON_RENEWABLE
    linkedFeatures:
    - smsViaZapierAndMake
