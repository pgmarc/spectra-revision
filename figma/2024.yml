syntaxVersion: '2.1'
saasName: Figma
createdAt: '2024-07-06'
version: '2024-07-06'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20240606081645/https://www.figma.com/pricing/
features:
  versionHistory:
    description: Figma auto-saves and creates versions of your file every 30 minutes. You can name a version
      at anytime and link to any past versions.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  figmaEditor:
    description: All the design features you're familiar with—canvas, layers, grids, vectors, shapes, text, constraints, and more
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedDrawingTools:
    description: Figma invents features purpose built for web/UI designers, like Smart Selection, Vector Networks, and Arc Tool
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  autoLayout:
    description: Create interface designs which resize automatically with their content
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pluginsAndWidgets:
    description: Use plugins built by the Figma community to improve your workflow
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  fileStorage:
    description: Unlimited cloud storage; access files from anywhere
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  crossPlatform:
    description: Figma works on Mac, PC, and Linux devices
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sketchImport:
    description: Create a new Figma file from your Sketch import
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  viewPropertiesAndVariables:
    description: See component properties from your design system in the in Inspect panel
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  basicCodeGen:
    description: Generate CSS, iOS, and Android code snippets
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  multiplayer:
    description: Figma enables multiple editors to jump into the same file, live edit, and work together
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  shareableLinks:
    description: Send a link to a Figma file or prototype—and control who get access to view or edit
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  onCanvasCommenting:
    description: Collaborators can comment directly on a prototype or file, so you know exactly what they're referencing
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  observationMode:
    description: Click on a specific user to see what they see on their screen—great for user testing and design critiques
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateProjects:
    description: Create invite-only spaces for your team to work privately
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  prototypeSharingPermissions:
    description: Share prototypes with clients and stakeholders without sharing the underlying design file
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  audioConversations:
    description: Use audio to talk with your collaborators directly in a Figma or FigJam file
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  teamAndProjectTransfer:
    description: Option to request a team or project transfer from one company to another.
      Only Organization and Enterprise plans can receive transfers.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  teams:
    description: Bring multiple teams together under one central Figma account for easier management and collaboration
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  unlimitedTeams:
    description: Create and manage multiple teams within your organization to help groups find and focus on relevant work.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  branchingAndMerging:
    description: Work in a separate branch and merge changes to the main file when you are ready.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customWorkspaces:
    description: Organize users and content into multiple, focused workspaces that mirror how your organization is structured.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  interactivePrototypes:
    description: Create prototypes with interactive overlays that simulate how a user may interact with your design
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  videosInPrototypes:
    description: Add videos to Figma prototypes for richer, more realistic experiences
    valueType: TEXT
    defaultValue: Choose videos from the Figma Community
    type: DOMAIN
  overlays:
    description: Easily prototype an interaction where an element appears above another
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  transitions:
    description: Choose from a variety of transition animation options
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedAnimations:
    description: Use Smart Animate or create your own animations with springs, slides, dissolves, and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  responsivePrototypingViewer:
    description: Create prototypes with interactive overlays that simulate how a user may interact with your design
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  setVariable:
    description: Create prototypes with variables for more dynamic interactions
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  conditionalLogic:
    description: Use if/else statements in prototyping interactions for more customized flows
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multipleActions:
    description: Define multiple actions in a prototyping interaction
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  expressions:
    description: Use operators in your interactions to generate dynamic number or string values
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  variables:
    description: Define color, number, and more to unlock design theming and more dynamic prototyping
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  components:
    description: Create a component out of any collection of objects or layers and use it as a reusable design.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  styles:
    description: Define color, text and any effects to be reused across objects
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  uiKits:
    description: UI kits are a set of libraries curated by Figma and partners. UI kits contain high-quality components,
      styles, variables, and example screens to kick-start your designs, even if you don't have a design system of your own.
      They behave just like any other library in Figma, in that you can pull assets onto your canvas directly from the Assets tab.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  variableModes:
    description: Switch between different variable values to unlock theming and more
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  teamLibraries:
    description: Create design systems with shared UI components for your team to use
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sharedFonts:
    description: Access your organization's shared fonts in Figma—instantly available to all Editors
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  organizationWideDesignSystems:
    description: Manage and share design systems across multiple teams at your organization
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  inAppLibraryAnalytics:
    description: Provides access and ownership of your library data to track adoption, measure impact, and more. Now available in beta.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  libraryAnalyticsAPI:
    description: Provides access and ownership of your library data to track adoption, measure impact, and more. Now available in beta.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  defaultLibrariesByWorkspace:
    description: Enable libraries by default for all files in the workspace.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  restApiForVariables:
    description: Use the API to scale your design systems
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  approvedLibraries:
    description: Designate admin-recommended libraries at the workspace or organization level
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedInspection:
    description: Get measurements, specs, layouts, and production ready code—all in a single click.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  readyForDev:
    description: The ready for dev view in Dev Mode displays all designs that have been marked as Ready for
      dev in a single location. This allows developers to quickly find what they need without having
      to navigate around the canvas or across multiple pages. A counter displays the number of designs
      that have been marked as Ready for dev.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  compareChanges:
    description: Compare different versions of a frame to quickly see what's changed
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  annotations:
    description: Full design users can add redlines and notes. Dev Mode users can see redlines and
      notes added to file by full design users.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  assetExport:
    description: Easily export assets from design files
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedCodeGen:
    description: Customize code output with alternative dimension units and plugins
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  devResources:
    description: Add additional developer links to reference during implementation
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  figmaForVsCode:
    description: An extension that lets users navigate and inspect Figma design files, collaborate with
      designers, track changes, and speed up design implementation directly in VS Code.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  devPlugins:
    description: Build and run plugins to customize Dev Mode workflows and codegen
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  viewDetachedComponents:
    description: See information for components - even when detached in the file
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  componentPlayground:
    description: View and explore component properties in an interactive playground
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  privatePlugins:
    description: Build your own private plugins for your organization to use in Dev Mode
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  codeConnect:
    description: Access component code from your library in Dev Mode. Now available in beta.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  handoffProcessManagement:
    description: Figma enables a design handoff experience that keeps designers and developers
      on the same page. Communicate better, deliver consistency, and build great products.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  syncingWorkflowsThroughAPI:
    description: Tap into our REST APIs to bring Figma into your external tools and products
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  automatingWorkflowsThroughAPI:
    description: Manage users and content for each workspace to scale administration and create a more tailored experience for users.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  adminControlsForInspectPanel:
    description: Control inspect panel settings and defaults for all your teams.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  restApis:
    description: Tap into our REST APIs to bring Figma into your external tools and products.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  thirdPartyIntegrations:
    description: Figma integrates with tools like JIRA, Zeplin, Dropbox, Slack, so you can customize your workflow.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  liveEmbeds:
    description: Embed live Figma designs and prototypes wherever you need them.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  webhooks:
    description: Use our webhooks to automate workflows between Figma and your external tools or products.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  privatePluginsAndWidgets:
    description: Build your own private plugins and widgets for your team or organization to use.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  passwordProtection:
    description: Set a password on files and Open Sessions to share work publicly with more control.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  defaultRoles:
    description: Set the role that new users join your instance with to better control costs.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  pluginAndWidgetApproval:
    description: Easily manage plugin and widget approval requests from your team-right within Figma.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  centralizedAdministration:
    description: Bring multiple teams together under one central Figma account; manage users and billing in one place.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  domainCapture:
    description: Option that allows you to automatically add anyone with a verified email address to your
      Figma account. Talk to sales to learn more.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  linkAccessControls:
    description: Limit the ability to share files via a link outside your organization, ensuring
      no one can view files unless explicitly invited
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  singleSignOn:
    description: Set up SAML single sign-on with your existing identity management system; enforce SSO for
      all team members and manage provisioning via SCIM
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  activityLogs:
    description: See a record of actions members have taken in Figma that helps admins keep their organization secure.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  workspaceAdministration:
    description: Manage users and content for each workspace in your organization to scale
      administration and create a more tailored experience for users.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  guestAccessControls:
    description: Limit the ability for external collaborators to join your organization.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  defaultTeams:
    description: Automatically add all new workspace members to specific teams to help them onboard and find relevant work.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  roleAssigmentViaSCIM:
    description: Automatically assign users a role in Figma using your identity management provider.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  passwordProtectionRequired:
    description: Require that users set a password on files shared outside the organization.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  teamCreationControls:
    description: Limit the ability to create teams to only admins or all members.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  externalContentsControls:
    description: Choose if members can access content from outside your organization.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  activityLogsApi:
    description: Track what's happening in Figma programmatically via the API and build custom apps.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  windowsInstaller:
    description: Deploy Figma safely across your company at scale and control software updates.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  idleSessionTimeout:
    description: Customize an idle session timeout limit so Figma automatically logs out members from their session.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  euDataHosting:
    description: Host key parts of Figma and FigJam files in the EU.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  expiringPublicLinks:
    description: Require that users set expiration on a file's public link
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  puglinAndWidgetsAnalytics:
    description: View plugin and widget usage analytics to track adoption and more effectively manage apps.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  figmaSupportForum:
    description: Ask questions, share feedback, and connect with the Figma community.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  figmaHelpCenter:
    description: Find answers to common questions quickly by browsing our collection of helpful articles and videos.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  onboardingPlanningAndSupport:
    description: Work hand in hand with the Figma team to plan and execute a successful Figma rollout.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  versionHistoryDepth:
    description: Version history tracks at maximum X days
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - versionHistory
  variableModesLimits:
    description: Maximum limit for variable modes
    valueType: NUMERIC
    defaultValue: 0
    unit: mode
    type: NON_RENEWABLE
    linkedFeatures:
    - variableModes
