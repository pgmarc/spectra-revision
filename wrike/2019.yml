    - storageSpace
  useStorageAccount:
    description: Wrike disk storage per month
    valueType: NUMERIC
    defaultValue: 0
    unit: GB/month
    type: RENEWABLE
    linkedFeatures:
    - videoUploads
  numberOfUsers:
    description: Add users to Wrike account
    valueType: NUMERIC
    defaultValue: 5
    unit: user
    type: NON_RENEWABLE
