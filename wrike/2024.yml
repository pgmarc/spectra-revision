syntaxVersion: '2.1'
saasName: Wrike
createdAt: '2024-07-10'
version: '2024-07-10'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20240710093853/https://www.wrike.com/comparison-table/
features:
  multiLanguageSupport:
    description: 'Wrike supports multiple languages: German, English, French, Italian,
      Japanese, Portuguese, Spanish, and Russian.'
    valueType: TEXT
    defaultValue: German, English, French, Italian, Japanese, Portuguese, Spanish,
      and Russian
    type: GUARANTEE
    docUrl: https://www.wrike.com/comparison-table/
  wrikeForWindowsAndMac:
    description: Easily create workstreams, automate everyday tasks, and manage impactful work from start to finish with Wrike's
      desktop app. App for Windows and Mac.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  wrikeIOSAndAndroidApps:
    description: App for iOS and Android.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  brandedWorkspace:
    description: Align the look and feel of your Wrike workspace with your own logo.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  storageAccount:
    description: The storage/account
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  storageSpace:
    description: The storage/user
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  taskManagement:
    description: Kick-start projects with one-click task creation. Use blueprints and dynamic requests to reduce
      setup time and instantly turn plans into action.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  subtaskManagement:
    description: Tackle overwhelming projects efficiently by splitting them into bite-sized subtasks in Wrike. Assign
      smaller tasks to different team members to distribute workload evenly and make large requests more feasible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  folderHierachy:
    description: Configure the unlimited folder structure to one that makes the most
      sense for your processes and teams.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  accountWideWorkSchedules:
    description: Designate your team's work week and see when you or your teammates
      are scheduled to work.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  personalWorkSchedules:
    description: Create additional work schedules and assign them to teammates. Mark
      vacation or PTO days and designate additional working days for yourself or for
      team members.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customFieldsWorkflows&Statuses:
    description: Track anything related to your work. Customize workflow stages to
      fit your process.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  projectPortfolioManagement:
    description: Use projects, folders, and customizable groups (spaces) to create
      a hierarchy for projects that works for your teams.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  emailIntegration&Notifications:
    description: "All users on all account types can use the email integration. Collaborators, Contributors, or
      Viewers with limited access roles might not have the ability to create new tasks and edit task details via
      email integration.

      Wrike's patented email integration engine allows you to engage with Wrike tasks directly from your email. You can:

      - Create tasks and folders.
      - Add comments.
      - Update a task's status.
      - Set task due dates.

      Sending important action items to Wrike as tasks means that you and your team can easily work on the task together
      and keep everything organized in one place. Once a task is in Wrike, you can also receive notifications to keep a
      better pulse on how your projects are progressing."
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  customWorkViews:
    description: Enhance collaboration, optimize workflows, and drive project success with our diverse work views.
       Create the perfect environment for your team's unique requirements.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  calendars:
    description: Turn your team project calendar into a map of who's doing what and when, so clashes surface early
      and plans stay accurate.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dynamicGanttChart:
    description: Wrike's Gantt chart software manages impactful work from beginning to end and helps users create
      workflows without limits.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dashboards:
    description: Information is power. Wrike's new project management dashboard democratizes data, offering instant
      insights and visibility to all stakeholders.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  realTimeReports:
    description: Powerful and easy-to-use report builder lets you visualize and share
      project status. Subscribe to scheduled notifications and get regular report
      updates and reviews.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  analyticsView:
    description: Enable customizable 360 bird-eye view of your team’s work with
      Anlytics view. See task statuses by assignee or team in real-time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  chartView:
    description: Enable customizable 360 bird-eye view of your team's work with
      Chart view. See task statuses by assignee or team in real-time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tableauIntegration:
    description: Run advanced analytics and reports and get greater insight into project performance by integrating
      Wrike with Tableau.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  businessIntelligenceAPI:
    description: "BI Export lets you export your account's data for future import to third-party analytics tools
      (e.g. PowerBI or Qlik). This allows for building reports and analytics that are not available in Wrike and
      merge Wrike data with data from other sources. The data that is exposed to Tableau includes but is not limited to
      the following:

      - Projects
      - Folders
      - Tasks
      - Users
      - User Groups
      - Timelogs
      - Workflows
      - Activity Log
      - History of status and custom field changes
      - Effort fields

      The data is stored in tables, which are connected using foreign key identifiers (like in a relational database).
      Each table is stored as a separate .csv file."
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  advancedAnalytics&DataVisualizations:
    description: Boost your decision making processes with powerful reporting and BI tools.
      Turn raw data into actionable insights.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  smarthSearch:
    description: Narrow or extend search results based on the location. Get quick
      search preview results accross multiple tools and items.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  voiceAssistantInteraction:
    description: All users can use Siri to work with Wrike for iOS.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  smartRepliesAndQuickReactions:
    description: You can quickly reply to comments of other users without the need to manually @mention them.
      Using Quick Reactions in Wrike's Android app, you can react to comments without having to open the tasks.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  documentProcessingAndTextRecognition:
    description: Users on all account types can scan documents and attach them to tasks, folders, and projects as well
      as use the text recognition feature to turn a scanned document into text for a description field or a comment.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  generativeAI:
    description: Create, edit, and summarize content in item descriptions and comments. You can use it to generate ideas,
      refine writing, translate text, and quickly summarize long discussions, making collaboration faster and more efficient.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  aiRecommendedTasks:
    description: Recommended by AI detects repetitive activities in a Space and suggests ready-to-use automation rules to
      save time and speed up workflows. It runs only at the Space level, uses Wrike's own technology (no third-party AI,
      no external training), and can be set up via Space ▸ Automation ▸ +Add rule ▸ Recommended
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  aiSubitemCreation:
    description: This feature uses natural language processing to select which parts of text in the task description or
      comment are actionable tasks. It then creates subitems from these sections of text.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  aiProjectRiskPrediction:
    description: AI Project Risk Prediction monitors your projects for any risks that may cause you to miss your
      deadlines, then assigns a risk level (low, medium, or high). AI estimations have replaced the previous system
      of Project Health calculations (color-coding). You can find these estimations in the Project Progress window
      in the project info panel, Table view, the project dashboard widget, and project-based reports.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  useCaseProjectTemplates:
    description: Wrike's templates make managing projects easier than ever. Dive into our categories to simplify
      complex processes and save time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  automations:
    description: Wrike's Automation helps reduce repetitive and manual work, speeds up your work process, and
      minimizes the likelihood  of human error. Instead of handling all the work by yourself, you and your team
      can employ the automation of various actions with tasks, projects, and custom items in Wrike.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  teamSpecificAdministration:
    description: Configure team specific workflows, statuses, automations, custom
      fields & request forms.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  requestForms:
    description: Provide the structure and automation you need for work intake so
      you get the right information from the start.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dynamicRequestForms:
    description: Wrike's custom request forms makes it easy for teams to streamline their request process and eliminate delays.
      Use automation to keep requests moving towards resolution.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  companyWideAdministration:
    description: Centralized permission and workflow administration
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customTemplatesAndBlueprints:
    description: Manage project, folder, and task templates and plan activities while
      keeping it separated from the ongoing work.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customItemTypes:
    description: Build a customizable library in your Wrike workspace and mirror the unique processes of your
      team, department, or company. With Wrike's custom item types, you can build a workspace tailored to
      your role, department, or industry.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  taskAndProjectApproval:
    description: An approval process is the definitive path an organization takes to greenlight everything from budgets
      and PTO to vendors and software access. Wrike's robust approval process software streamlines this journey, allowing
      you to assign ownership, clear bottlenecks before they stall progress, and maintain total visibility over every decision.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customApprovalFlows:
    description: Setup any approval workflow to enable stakeholders to quickly take
      actions all within Wrike
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  resourcesView:
    description: See a centralized view of all resources associated with a project.
      Ensure the right resources are available for the project, and balance resource
      coverage across the entire portfolio.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  workloadCharts:
    description: Allocate work based on team capacity. Plan work allocation, re-prioritize
      projects, and distribute hours flexibly and in real time across assignees.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  effortAllocation:
    description: Determine how many hours it takes to complete each task, or estimate
      what percentage of a team member's time you need dedicated to a task.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  resourceAssigment:
    description: Intuitively drag and drop to add, move, or adjust tasks based on
      individuals' capacity and work schedule in real time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  timeTracking:
    description: Log worked hours — create, review, approve, and restrict timesheets. Advanced employee time tracking
      improves task visibility, streamlines project resources, and avoids inaccurate data.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  timeSheets:
    description: Find all the time you've tracked and update time for your work in
      a single place on a daily or weekly basis.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  jobRoles:
    description: Assign team members job roles to streamline planning and work allocation
      based on functional area.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  budgeting:
    description: Plan and monitor project, portfolio and client budgets based on team
      member or job role bill and cost rates.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  resourceBookings:
    description: Estimate project effort by team member or job role without creating
      a detailed work breakdown structure.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  teamUtilizationAndPerformanceDashboard:
    description: Measure planned vs. actual utilization of individuals or teams over
      time.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  collaborators:
    description: Involve team mates from other departments, clients, and contractors
      for free.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  guestApprovals:
    description: Get approvals from different stakeholders in your business ecosystem
      such as partners and clients.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  fileProofingAndApproval:
    description: Approve creative assets quickly with Wrike's online proofing software — including real-time collaboration.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedProfingInHTML5AndSharepoint:
    description: Advanced proofing in HTML5 and Sharepoint
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  extensionForAdobeCreativeCloud:
    description: Transform the way you work in Adobe Creative Cloud. Get design feedback, upload new versions of assets,
      and stay synced on all your projects without leaving your creative zone.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  digitalAssetManagementIntegration:
    description: Maintaining brand cohesion across channels and campaigns isn't easy. That's why Wrike partners with today's
      leading digital asset management (DAM) software providers to help your team quickly find the right files for every project.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  cloudContentConnector:
    description: Whether you're a DAM vendor or user, Wrike's Cloud Content Connector is a seamless way to link your
      DAM solution of choice directly with Wrike. Powering a unified and modern creative workflow for you or your
      users has never been easier.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  openRESTfulAPI:
    description: Wrike's easy-to-use APIs make connecting Wrike with your current tools and workflows a cinch.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  cloudStoragePlatforms:
    description: Connect Wrike to Cloud storage platforms like Google Drive, Microsoft Sharepoint, Microsoft OneDrive
      Tenovos, Dropbox or Box
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  productivityAppsAndTools:
    description: Integration with G Suite, Office 365, MS Project, Excel and Slack
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  salesForceIntegration:
    description: Make collaboration between sales and cross-functional teams much easier with Wrike's Salesforce integration.
      You can track task status in real time without leaving Salesforce. Meanwhile, cross-functional teams can work on these
      in Wrike without needing to log into Salesforce. Since all key information remains at the fingertips of the sales team,
      you'll cut down on response time and ensure customer requests never fall through the cracks.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  netSuiteAndQuickBookIntegrations:
    description: Integrations with financial solutions, like NetSuite and QuickBooks, for seamless budgeting, billing, and
      invoicing
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  adobeCreativeCloudExtension:
    description: Transform the way you work in Adobe Creative Cloud. Get design feedback, upload new versions of assets,
      and stay synced on all your projects without leaving your creative zone.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  powerBIIntegration:
    description: Enhance your team's capabilities with Wrike and Power BI. Track performance, customize metrics, and tailor
      dashboards to drive results.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  enterpriseGradeSecurity:
    description: Our secure project management software offers the most comprehensive security on the market. Keep data
      safe with double encryption, role-based access, customizable user types, selective sharing, global server presence,
      and multiple privacy certifications — all with Wrike's secure project management tools.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
    docUrl: https://www.wrike.com/features/admin-security/
  authenticationViaGSuite:
    description: If you have a Gmail account - either personal or corporate - you can use Google credentials to log in to
      Wrike. No need to keep a lot of passwords in your head, just click the "Login with Google" button and enter your
      Google email and password and you'll see all your Wrike tasks and Projects.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  folderAndProjectPermissions:
    description: Admins can create, edit, rename, and delete custom access roles in Settings → Access Roles.
      Assign permissions by checking or unchecking rights, then save changes. Changes apply immediately, inherited
      roles use the highest access level, and default roles can't be deleted.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  userAuditReports:
    description: An on-demand report tracks activity of regular users and Wrike account
      admins.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  singleSignOn:
    description: Enable SAML single sign-on for your Wrike account and increase security by enforcing access policies and
      multi-factor authentication (optional), reduce administrative costs with just-in-time user provisioning, and make
      it easier for your team to use Wrike with one-click access and no extra passwords to memorize.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  twoStepVerification:
    description: Add an extra layer of security, requiring a time-sensitive verification
      code along with a username and password.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  controlledAdminPermission:
    description: Controlled admin permissions are a feature of Enterprise accounts. It allows different admin users
      within the account to be granted different permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  networkAccess:
    description: Lock down access to Wrike to a list of approved IP addresses only.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  passwordPolicySettings:
    description: Implement password policy to ensure that passwords meet minimum strength
      requirements and users change them regularly.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedUserAccessControls:
    description: Customize and add new access roles, selectively share subfolders
      and subprojects by keeping them from inheriting permissions, and run access
      reports to see who has access to folders, projects, and tasks.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customizableUserTypes:
    description: Harness the infinite flexibility and control that comes with Wrike's Customizable User Types, enabling
      your teams to clearly define and edit unique types of users for each account.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  lockedSpaces:
    description: Locked spaces are restricted, secure spaces for confidential collaboration such as at board or
      executive-level. You may also use Locked spaces to create isolated working spaces for separate customers.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  wrikeIntegrate:
    description: Wrike Integrate allows you to configure robust integrations, add custom automation, and manage complex,
      cross-functional, and multi-app workflows with ease.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  wrikeSync:
    description: Set up two-way syncs between your Wrike account and 22 integrated systems, including Jira, GitHub, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  wrikeLock:
    description: Control is paramount when it comes to data security, which is why many companies with a significant focus
      on security keep their data on-premises. Wrike Lock lets you own and manage the keys to your encrypted Wrike data,
      giving you increased control even though your data is in the cloud.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  minNumberOfUsers:
    description: Minimum number of users in Wrike account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  maxNumberOfUsers:
    description: Maximum number of users in Wrike account
    valueType: NUMERIC
    defaultValue: 10000000000
    unit: user
    type: NON_RENEWABLE
  useStorageAccount:
    description: Maximum number of storage per account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB/account
    type: NON_RENEWABLE
    linkedFeatures:
    - storageAccount
  useStorage:
    description: Maximum number of GB per user
    valueType: NUMERIC
    defaultValue: 0
    unit: GB/user
    type: NON_RENEWABLE
    linkedFeatures:
    - storageSpace
  useAutomations:
    description: Maximum number of actions per seat. Renewed per month
    valueType: NUMERIC
    defaultValue: 0
    unit: action/seat
    type: RENEWABLE
    linkedFeatures:
    - automations
