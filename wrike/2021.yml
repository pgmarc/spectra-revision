syntaxVersion: '2.1'
saasName: Wrike
createdAt: '2021-11-24'
version: '2021-11-24'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20211124054704/https://www.wrike.com/price-vh/
features:
  wrikeForWindowsAndMac:
    description: Easily create workstreams, automate everyday tasks, and manage impactful work from start to finish with Wrike's
      desktop app. App for Windows and Mac.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  wrikeIOSAndAndroidApps:
    description: App for iOS and Android.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  aiWorkIntelligence:
    description: Work faster with AI recommended tasks, assignee suggestions, and search rankings.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  taskManagement:
    description: Kick-start projects with one-click task creation. Use blueprints and dynamic requests to reduce
      setup time and instantly turn plans into action.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  subtaskManagement:
    description: Tackle overwhelming projects efficiently by splitting them into bite-sized subtasks in Wrike. Assign
      smaller tasks to different team members to distribute workload evenly and make large requests more feasible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  liveActivityStream:
    description: See all updates in real-time. Quickly filter updates and participate in discussions in a familiar social
      media format.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collaborators:
    description: Collaborate across boundaries with teammates from other departments, contractors, and clients.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  interactiveBoardAndSpreadsheetViews:
    description: See work in your preferred way, from Kanban boards to spreadsheets and tables.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  accountWideWorkSchedules:
    description: Designate your team's work week and see when you or your teammates
      are scheduled to work.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  cloudStoragePlatforms:
    description: Bring your content into Wrike with pre-built integrations with popular storage tools
      (Google Drive, Dropbox, Box, MSFT Office 365, and OneDrive).
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  activeTaskLimitations:
    description: Wrike Integrate task limits define how many automation jobs your account can run each month, with usage
      tied to recipes, monitored via a dashboard, and optimized by reducing unnecessary triggers to keep integrations
      running smoothly.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  storageAccount:
    description: Disk storage space per account
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  storageSpace:
    description: Disk space storage in your Wrike account
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  shareableDashboards:
    description: Share dashboards with links
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  interactiveGanttChart:
    description: Wrike's Gantt chart software manages impactful work from beginning to end and helps users create
      workflows without limits.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  productivityIntegrations:
    description: Integration with MS Project, Excel and RSS
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  customFields:
    description: Track anything related to your work.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customWorkflows:
    description: Customize workflow stages to fit your process.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  brandedWorkspace:
    description: Align the look and feel of your Wrike workspace with your own logo
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  automationEngine:
    description: Wrike's Automation helps reduce repetitive and manual work, speeds up your work process, and
      minimizes the likelihood  of human error. Instead of handling all the work by yourself, you and your team
      can employ the automation of various actions with tasks, projects, and custom items in Wrike.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  taskAndProjectApproval:
    description: An approval process is the definitive path an organization takes to greenlight everything from budgets
      and PTO to vendors and software access. Wrike's robust approval process software streamlines this journey, allowing
      you to assign ownership, clear bottlenecks before they stall progress, and maintain total visibility over every decision.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  guestApprovals:
    description: Get approvals from different stakeholders in your business ecosystem
      such as partners and clients.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  realTimeReports:
    description: Powerful and easy-to-use report builder lets you visualize and share
      project status. Subscribe to scheduled notifications and get regular report
      updates and reviews.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  reportTemplates:
    description: Report templates help you quickly create reports so you can gain more visibility into your projects,
      see how work is progressing, or assess what work still needs to be assigned.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  requestForms:
    description: Wrike's custom request forms makes it easy for teams to streamline their request process and eliminate delays.
      Use automation to keep requests moving towards resolution.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  calendars:
    description: Turn your team project calendar into a map of who's doing what and when, so clashes surface early
      and plans stay accurate.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  personal&AccountWideWorkSchedules:
    description: Create additional work schedules and assign them to teammates. Mark
      vacation or PTO days and designate additional working days for yourself or for
      team members.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  resourceManagement:
    description: See a centralized view of all resources associated with a project.
      Ensure the right resources are available for the project, and balance resource
      coverage across the entire portfolio.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  timeTracking:
    description: Log worked hours — create, review, approve, and restrict timesheets. Advanced employee time tracking
      improves task visibility, streamlines project resources, and avoids inaccurate data.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  timeSheets:
    description: Find all the time you've tracked and update time for your work in
      a single place on a daily or weekly basis.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  workloadCharts:
    description: Allocate work based on team capacity. Plan work allocation, re-prioritize
      projects, and distribute hours flexibly and in real time across assignees.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  effortAllocation:
    description: Determine how many hours it takes to complete each task, or estimate
      what percentage of a team member's time you need dedicated to a task.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  extensionForAdobeCreativeCloud:
    description: Transform the way you work in Adobe Creative Cloud. Get design feedback, upload new versions of assets,
      and stay synced on all your projects without leaving your creative zone.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  fileAndVideoProofing:
    description: 30+ files formats
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  salesForceIntegration:
    description: Make collaboration between sales and cross-functional teams much easier with Wrike's Salesforce integration.
      You can track task status in real time without leaving Salesforce. Meanwhile, cross-functional teams can work on these
      in Wrike without needing to log into Salesforce. Since all key information remains at the fingertips of the sales team,
      you'll cut down on response time and ensure customer requests never fall through the cracks.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  singleSignOn:
    description: Enable SAML single sign-on for your Wrike account and increase security by enforcing access policies and
      multi-factor authentication (optional), reduce administrative costs with just-in-time user provisioning, and make
      it easier for your team to use Wrike with one-click access and no extra passwords to memorize.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  twoFactorVerification:
    description: Add an extra layer of security, requiring a time-sensitive verification
      code along with a username and password.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  passwordPolicies:
    description: Implement password policy to ensure that passwords meet minimum strength
      requirements and users change them regularly.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customAccessRoles:
    description: "There are four access roles to choose from: Full, Editor, Limited, or Read Only, and each role has a
      set of permissions. Customize the permissions for certain roles and can create new roles."
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  adminPermissions:
    description: Controlled admin permissions are a feature of Enterprise accounts. It allows different admin users
      within the account to be granted different permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  userAuditReports:
    description: An on-demand report tracks activity of regular users and Wrike account
      admins.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  lockedSpaces:
    description: Locked spaces are restricted, secure spaces for confidential collaboration such as at board or
      executive-level. You may also use Locked spaces to create isolated working spaces for separate customers.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedReportingAndBI:
    description: Advanced Reporting and BI (Wrike Analyze) is a powerful tool that helps you gain insights into your
      projects and workflows. With customizable dashboards and reports, you can visualize data to make informed decisions
      and optimize your team's performance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  teamUtilizationAndPerformanceDashboard:
    description: Measure planned vs. actual utilization of individuals or teams over
      time.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  jobRoles:
    description: Assign team members job roles to streamline planning and work allocation
      based on functional area.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  budgetingAndBillableHours:
    description: Plan and monitor project, portfolio and client budgets based on team
      member or job role bill and cost rates.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  bookings:
    description: Project-level effort & time planning.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedProfingInHTML5AndSharepoint:
    description: Advanced proofing in HTML5 and Sharepoint
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  digitalAssetManagementIntegration:
    description: Maintaining brand cohesion across channels and campaigns isn't easy. That's why Wrike partners with today's
      leading digital asset management (DAM) software providers to help your team quickly find the right files for every project.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  wrikeMarketingInsights:
    description: Take a data-centric approach to your customer journey with simplified, cross-channel performance analysis.
      This is Wrike Marketing Insights, designed for marketing teams.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  wrikeIntegrate:
    description: Wrike Integrate allows you to configure robust integrations, add custom automation, and manage complex,
      cross-functional, and multi-app workflows with ease.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  wrikeTwoWaySync:
    description: Set up two-way syncs between your Wrike account and 22 integrated systems, including Jira, GitHub, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  wrikeLock:
    description: Control is paramount when it comes to data security, which is why many companies with a significant focus
      on security keep their data on-premises. Wrike Lock lets you own and manage the keys to your encrypted Wrike data,
      giving you increased control even though your data is in the cloud.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  minNumberOfUsers:
    description: Minimum number of users in Wrike account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  maxNumberOfUsers:
    description: Maximum number of users in Wrike account
    valueType: NUMERIC
    defaultValue: 10000000000
    unit: user
    type: NON_RENEWABLE
  useStorageAccount:
    description: Maximum disk storage per user account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB/account
    type: NON_RENEWABLE
    linkedFeatures:
    - storageAccount
  useStorage:
    description: Maximum number of GB per user
    valueType: NUMERIC
    defaultValue: 0
    unit: GB/user
    type: NON_RENEWABLE
    linkedFeatures:
    - storageSpace
  useAutomations:
    description: Maximum number of actions per seat. Renewed per month
    valueType: NUMERIC
    defaultValue: 0
    unit: action/user/month
    type: RENEWABLE
    linkedFeatures:
    - automationEngine
  users:
    description: Maximum number of users in your Wrike account
    valueType: NUMERIC
    defaultValue: 5
    unit: user
    type: NON_RENEWABLE
