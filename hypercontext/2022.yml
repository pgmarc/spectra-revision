syntaxVersion: '2.1'
saasName: HyperContext
createdAt: '2022-10-14'
version: '2022-10-14'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20221014081829/https://hypercontext.com/pricing
features:
  oneToOneMeetings:
    description: Create as many meetings as you need. We'll never cap your limit.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  teamMeetings:
    description: Create as many meetings as you need. We'll never cap your limit.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  meetingNotes:
    description: Automatically send out your meeting agenda to all members after every meeting.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  calendarIntegrationAndSync:
    description: Sync to your Google or Outlook calendar.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  meetingArchives:
    description: A complete history of all your past meetings.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  meetingSearch:
    description: Use the search function to reference past meetings easily for performance reviews, growth plans and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  realTimeCollaboration:
    description: Collaborate on your agenda, add next steps, summaries, comments, and reactions in real-time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  realTimeEmployeesFeedback:
    description: Automatic post-meeting survey questions to track meeting effectiveness and team pulse over time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  conversationStarters:
    description: Access over 300 suggested conversation starters.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fileAttachments:
    description: Access and collaborate on cloud files from within your Hypercontext agenda.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  cloudLinkIntegrations:
    description: Access and collaborate on cloud files from within your Hypercontext agenda.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  googleMeetAgendaOverlay:
    description: With the Chrome Extension, you can interact with your meeting agenda directly from your Google Meet Video call.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://workspace.google.com/pricing
  guestUsers:
    description: Run effective external meetings without paying for extra users.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  markdownEditor:
    description: Use mark-up language to take your notes to another level!
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateMeetingScratchpad:
    description: "Your own private space within an agenda for notes: talking points, personal details and more."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicMeetingScratchpad:
    description: A public space for meeting participants to document things that will carry across every meeting.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  nextSteps:
    description: Assign action items with timelines to individuals boost accountability on your team.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  favoriteItems:
    description: Create a favorties list to easily access your most used items and conversation starters.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  meetingInsights:
    description: With the help of machine learning, Hypercontext will provide insights to help teams
      have better, more balanced conversations based on agenda items.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  itemVoting:
    description: Vote on agenda items to prioritize team discussions.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customPersonalAgendaTemplates:
    description: Create your own agenda templates and reuse across your team.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customOrgWideAgendaTemplates:
    description: Create custom agenda templates for your entire Hypercontext community to help
      standardize specific meetings like performance reviews, salary reviews, etc.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  goalSetting:
    description: A dashboard to create and track individual and team goals.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  milestones:
    description: A dashboard to create and track individual and team goals.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  okrExampleLibrary:
    description: Access over 200 OKR and goal examples for every role in tech.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  largeGroupDiscussions:
    description: From town halls to AMAs, create large-group discussions across your company.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  99%uptimeSLA:
    description: This is our promise to you.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  adminReporting:
    description: Receive custom dashboards for your admin team to better understand engagement across your entire team.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  engagementInsights:
    description: Receive custom dashboards for your admin team to better understand engagement across your entire team.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  dedicatedCSM:
    description: Work directly with a CSM to ensure you're set up for success throughout your entire experience with Hypercontext.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dedicatedQBR:
    description: Work directly with a CSM to ensure you're set up for success throughout your entire experience with Hypercontext.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  teamTraining:
    description: Our CS team will run onboarding sessions to ensure you're successful, from onboarding to ongoing usage.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  teamOnboarding:
    description: Our CS team will run onboarding sessions to ensure you're successful, from onboarding to ongoing usage.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  prioritySupport:
    description: Skip the line. Your tickets will be responded to first.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  googleSSO:
    description: Google SSO integration
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  slackSSO:
    description: Slack SSO integration
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  microsoftSSO:
    description: Microsoft SSO integration
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  azureSSO:
    description: Azure Active Directory integration
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  emailSSO:
    description: Email SSO integration
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  customSSO:
    description: Connect to Hypercontext using Custom SSO
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  googleWorkspace:
    description: Auth and sync with your GCal and full Google Suite.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://workspace.google.com/pricing
  googleCalendar:
    description: Integrate your calendar events to your Hypercontext agendas. With the
      Chrome extension, next steps will appear in your calendar.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://workspace.google.com/pricing
  googleMeet:
    description: When calendar events are connected to the agenda, jump into your call from your Hypercontext agenda.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://workspace.google.com/pricing
  chromeMeetingExtension:
    description: Manage and run meetings right from your Google Calendar and Google Meet.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  slackbot:
    description: Set up new meetings, add items, check your schedule, and more without ever leaving Slack!
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  microsoftTeams:
    description: The entire Hypercontext experience! Book, plan and run meetings — without leaving Microsoft Teams.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.microsoft.com/en-us/microsoft-teams/compare-microsoft-teams-business-options
  outlookCalendar:
    description: Sync your meetings to your calendar events to get helpful reminders about upcoming meetings.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.microsoft.com/en-us/microsoft-365/outlook/compare-microsoft-outlook-email-plans
  mobileApps:
    description: Use Hypercontext from your phone. Download our iOS and Android apps.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  zapier:
    description: Connect Hypercontext to 2000+ apps.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
usageLimits:
  meetingSearchThreshold:
    description: Maximum time tracking threshold for meetings
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - meetingSearch
  storageLimit:
    description: Maximum disk space storage in Hypercontext account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - fileAttachments
    - cloudLinkIntegrations
plans:
  BASIC:
    description: Best for people who want to take Hypercontext for a spin.
    price: 0
    unit: person/month
    features: null
    usageLimits: null
  PRO:
    description: Best for managers with too much on their plate.
    price: 7
    unit: person/month
    features:
      realTimeCollaboration:
        value: true
      publicMeetingScratchpad:
        value: true
      nextSteps:
        value: true
      favoriteItems:
        value: true
      meetingInsights:
        value: true
      itemVoting:
        value: true
      customPersonalAgendaTemplates:
        value: true
      zapier:
        value: true
    usageLimits:
      meetingSearchThreshold:
        value: .inf
      storageLimit:
        value: 250
  BUSINESS:
    description: Best for standardizing meetings and hitting goals.
    price: 11
    unit: person/month
    features:
      realTimeCollaboration:
        value: true
      publicMeetingScratchpad:
        value: true
      nextSteps:
        value: true
      favoriteItems:
        value: true
      meetingInsights:
        value: true
      itemVoting:
        value: true
      customPersonalAgendaTemplates:
        value: true
      customOrgWideAgendaTemplates:
        value: true
      goalSetting:
        value: true
      milestones:
        value: true
      okrExampleLibrary:
        value: true
      largeGroupDiscussions:
        value: true
      99%uptimeSLA:
        value: true
      adminReporting:
        value: true
      engagementInsights:
        value: true
      dedicatedCSM:
        value: true
      dedicatedQBR:
        value: true
      teamTraining:
        value: true
      teamOnboarding:
        value: true
      prioritySupport:
        value: true
      zapier:
        value: true
    usageLimits:
      meetingSearchThreshold:
        value: .inf
      storageLimit:
        value: .inf
addOns:
  customSSO:
    availableFor:
    - BUSINESS
    price: Contact Sales
    unit: /month
    features:
      customSSO:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
