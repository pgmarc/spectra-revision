syntaxVersion: '2.1'
saasName: Webflow
createdAt: '2025-02-22'
version: '2025'
billing:
  monthly: 1.0
  annual: 0.85
currency: USD
url: https://web.archive.org/web/20250222010005/https://webflow.com/pricing
features:
  # Site Plans Features
  ## Website Plans Features
  publishToWebflowIo:
    description: "Publish to the webflow.io subdomain. Example: mysite.webflow.io."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customDomain:
    description: Connect and publish your site to a custom domain.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  removeWebflowBadge:
    description: Remove the badge in the bottom right corner of your site that says “Made in Webflow.”
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  publishingWorkflows:
    description: Isolate your staged site from changes occurring in the Designer. Publish directly from staging to production.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  publishingSummary:
    description: Review a summary of changes prior to publishing to reduce the risk of unintended changes going live.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  staticPages:
    description: The number of static, non-CMS-generated pages you can have on your site.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  formSubmissions:
    description: Collect form submissions, customize notification emails, and download submissions as a CSV
      (comma-separated values) file.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sitePasswordProtection:
    description: Password protect your site.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  pagePasswordProtection:
    description: Password protect individual pages on your site.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customCode:
    description: Add custom code and scripts that apply to your entire site or individual pages.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  siteSearch:
    description: Create a custom search engine so visitors can search for specific content.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  formFileUpload:
    description: Collect files from site visitors using forms via an upload button. Max file size per upload is 10MB.
      Storage is free up to 10GB and $0.50/month per GB after that.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  fileStorage:
    description: Store files
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  wellKnownFilesSupported:
    description: Upload and serve well-known files for site verification and integrations.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  userAccounts:
    description: Allow visitors to log in and unlock gated content.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  logicFlows:
    description: Automate workflows using triggers, actions, and conditions.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  legacyEditorsUsers:
    description: Invite teammates to write and edit content in Webflow's simplified Editor interface.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  backups:
    description: Automatically generated backups — restore your site in one click.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  cmsItems:
    description: "The maximum number of records you can have in your CMS database. Ex: 50 projects in a portfolio."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  cmsCollections:
    description: "These can represent page templates or lists. Example: A collection of blog posts with a single page template,
      or a collection of office locations that show up in a single list."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  cmsApi:
    description: Connect to third-party applications to automate adding, updating, or deleting Collection items.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  perItemPublishing:
    description: Unpublish individual CMS items from the Designer, the Editor, and the CMS API — without republishing
      your entire site.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  perItemUnpublishing:
    description: Unpublish individual CMS items from the Designer, the Editor, and the CMS API — without republishing
      your entire site.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiItemPublishing:
    description: Publish and unpublish multiple CMS items at once.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiItemUnpublishing:
    description: Publish and unpublish multiple CMS items at once.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  scheduledPublishing:
    description: Schedule items to be published at specific times in the future.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dynamicEmbeds:
    description: Insert dynamic CMS content directly into embedded Custom Code.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  rssFeed:
    description: Auto-generate RSS feeds for your CMS Collections.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  surgeProtection:
    description: Basic, CMS, and Business plans receive one month of complimentary surge protection.
      Sites that exceed their bandwidth limits for a second consecutive month will be automatically upgraded
      to the plan with the appropriate usage allotment at the end of that second month.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customSurgeProtection:
    description: Basic, CMS, and Business plans receive one month of complimentary surge protection. Sites that
      exceed their bandwidth limits for a second consecutive month will be automatically upgraded to the plan with
      the appropriate usage allotment at the end of that second month.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  globalCdn:
    description: A content delivery network uses the server closest to your site visitors for faster page loads.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customCdn:
    description: A content delivery network uses the server closest to your site visitors for faster page loads.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  uptimeStandardAgreement:
    description: Enterprise Site plans offer a service-level agreement with guaranteed uptime. You'll also
      receive access to Webflow's security certifications and audits.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  uptimeSLA:
    description: Enterprise Site plans offer a service-level agreement with guaranteed uptime. You'll also
      receive access to Webflow's security certifications and audits.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  301Redirects:
    description: Redirect traffic from an old to a new URL.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sitemapsControl:
    description: Auto generate an XML sitemap so Google can find and crawl your pages.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  schemaMarkupSupport:
    description: Optimize SEO rankings and save time with dynamically generated schema markup.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  openGraphMetaTags:
    description: Manage the look of previews when your page is shared.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  structuredSearchSupport:
    description: Help search engines better understand your site content and improve search visibility
      and click-through rates.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  preBuiltInteractions:
    description: Bring elements to life with pre-build animations.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  triggerBasedInteractions:
    description: Add animations that start with a scroll or a click.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  afterEffectsLottieIntegration:
    description: Bring the industry standard for motion graphics to your website.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  twoFactorAuthentication:
    description: "Two-factor authentication gives your account an extra layer of security by requiring
      two authentication items:

      - Your account password
      - A unique authentication code"
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  basicDdosProtection:
    description: Basic ddos protection
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  advancedDdosProtection:
    description: Advanced ddos protection
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  singleSignOn:
    description: Single Sign-On (SSO) is a password-authentication strategy that lets team members access Webflow using your
      organization's existing login system. With SSO, users authenticate once through your identity provider (IdP) — making
      login faster, more secure, and easier to manage at scale. Users won't have to manage multiple passwords as they sign in
      with one set of credentials.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  customSecurityHeaders:
    description: Custom security headers add an extra layer of security to any of your published sites, and can
      prevent activities like cross-site scripting attacks, iframe embedding, and other domain level security issues.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customSslCertificates:
    description: For increased flexibility and control over the details in your SSL certificates, you can upload your own
      custom SSL certificates to your site.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  privateWebflowStaging:
    description: If you're a Webflow Enterprise customer or Enterprise partner, you can enable private staging on your sites to
      give you and your team greater control over who can view site updates before they're launched publicly.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  billing:
    description: Credit card billing or pay by invoice
    valueType: TEXT
    defaultValue:
      - CARD
    type: PAYMENT
  helpCenterSupport:
    description: Access help center support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  supportPortalSupport:
    description: Access support portal
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  prioritySupportQueue:
    description: Enter a priority support queue
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  customerSuccessManager:
    description: Dedicated customer success manager
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  webflowUniversityTraining:
    description: Get access to webflow university training and courses
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  guidedOnboardingTraining:
    description: Guided onboarding training
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  localization:
    description: Localize your site for audiences around the world.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  siteOptimization:
    description: Maximize conversions from your site.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  siteAnalysis:
    description: Get actionable insights on your site performance.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  ## Ecommerce Plans Features
  ecommerceItems:
    description: Includes all Ecommerce products, variants, and categories. Independent of CMS items.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customCheckout:
    description: Visually customize the design and layout of your checkout page.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customShoppingCart:
    description: Visually customize the look and feel of your add to cart and shopping cart.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  paidUserAccounts:
    description: Charge visitors a memberships fee to access gated and personalized content.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  emailProductFields:
    description: Add custom fields to products and use that data in your designs.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  emailCustomization:
    description: Customize colors, logos, and text in receipt and order update emails.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  unbrandedEmails:
    description: Remove Webflow references from transaction email footers.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  transactionFee:
    description: In addition to Stripe or Paypal processing fees
    valueType: TEXT
    defaultValue: ""
    type: DOMAIN
  stripePoweredPayments:
    description: Connect a Stripe account to process payments, refunds, and payouts.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://stripe.com/pricing
  paypalSupport:
    description: Paypal support
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  applePay:
    description: Let customers pay with stored payment details in their browser.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
    integrationType: EXTERNAL_DEVICE
  webPayments:
    description: Let customers pay with stored payment details in their browser.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  automaticTaxCalculation:
    description: Automatic sales tax and VAT calculated at checkout.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  unlimitedSalesVolume:
    description: Benefit from unlimited gross merchandise value volume.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  facebookIntegration:
    description: Sync products to Facebook and Instagram to run smarter marketing campaigns.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  instagramIntegration:
    description: Sync products to Facebook and Instagram to run smarter marketing campaigns.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  googleShoppingIntegration:
    description: Sync products to Google to run Google Shopping campaigns.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  mailchimpIntegration:
    description: Connect forms to MailChimp for email marketing.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  configureManualShippingRules:
    description: Define shipping regions and set custom rates for each location.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  staffAccounts:
    description: Invite colleagues and clients to manage products, inventory, and fulfillment.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  # Workspace Plans Features
  teams:
    description: "The maximum number of member seats your Workspace supports. Note: Workspaces are billed per seat."
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  freeAgencyOrFreelancerGuests:
    description: Invite an Agency or Freelancer Guest into your Workspace for free. These do not count against your team size.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  clientPayments:
    description: Invite your clients to securely add their credit card on file to cover any new site plan or other site add-ons.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  pageBuilding:
    description: Empower less technical teammates to build landing pages on their own using designer-approved building blocks.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  contentEditingRole:
    description: These users have limited access to safely edit copy, assets (images/videos), and links. They cannot
      change page design
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  siteSpecificAccess:
    description: Control which sites your team members and guests can access, and set site roles.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  siteLevelRoles:
    description: Control which roles and permissions your users have on each site.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  publishingPermissions:
    description: Manage which teammates can publish which sites.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  pageBranching:
    description: Multiple designers working on separate pages in parallel.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  designApprovals:
    description: Require review and approval of proposed design changes to the site by specific users.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customRoles:
    description: Tailor user permissions to your needs with custom roles.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customPermissions:
    description: Tailor user permissions to your needs with custom roles.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  webflowStaging:
    description: Free Starter sites that can be published to webflow.io. Hosted projects with paid Site plans don't
      count toward this limit.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  siteTransfer:
    description: Transfer sites to other Workspaces.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  codeExport:
    description: "Export clean and semantic HTML & CSS files to hand off to your dev team. Note: dynamic
      content (CMS items and pages) cannot be exported."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sharedLibraries:
    description: Shareable design system to drive consistency and reusability across all of the sites in a Workspace.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  siteActivityLog:
    description: A historical log of important design changes made to your site.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  siteActivityLogApi:
    description: Query events from the Site Activity log via API.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  branchStaging:
    description: Publish a branch to its own staging environment to test designs faster.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  privateStaging:
    description: Restrict access to your staged sites to logged-in members of your Workspace.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  scim:
    description: Automated user provisioning via SCIM and JIT.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  auditLogApi:
    description: Monitor key events like login activity, role & permission changes, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
usageLimits:
  ## Website Usage Limits
  pagesLimit:
    description: Maximum pages available
    valueType: NUMERIC
    defaultValue: 0
    unit: page
    type: NON_RENEWABLE
    linkedFeatures:
    - staticPages
  formSubmissionsLimit:
    description: Maximum form submissions available
    valueType: NUMERIC
    defaultValue: 0
    unit: submission
    type: NON_RENEWABLE
    linkedFeatures:
    - formSubmissions
  autoSiteIndexingFrequency:
    description: The frequency at which you can re-index your site in auto mode.
    valueType: NUMERIC
    defaultValue: 0
    unit: hours
    type: NON_RENEWABLE
    linkedFeatures:
      - siteSearch
  manualSiteIndexingFrequency:
    description: The frequency at which you can re-index your site in manual mode.
    valueType: NUMERIC
    defaultValue: 0
    unit: hours
    type: NON_RENEWABLE
    linkedFeatures:
      - siteSearch
  userAccountsLimit:
    description: Maximum user accounts in your Webflow account
    valueType: NUMERIC
    defaultValue: 0
    unit: user account
    type: NON_RENEWABLE
    linkedFeatures:
    - userAccounts
    - paidUserAccounts
  logicFlowsLimit:
    description: Maximum logic flows available
    valueType: NUMERIC
    defaultValue: 0
    unit: flow
    type: NON_RENEWABLE
    linkedFeatures:
    - logicFlows
  logicFlowsExecutions:
    description: Maximum logic flows executions available
    valueType: NUMERIC
    defaultValue: 0
    unit: flow execution/month
    type: RENEWABLE
    linkedFeatures:
    - logicFlows
  legacyEditorsLimit:
    description: Maximum legacy editor available
    valueType: NUMERIC
    defaultValue: 0
    unit: editor
    type: NON_RENEWABLE
    linkedFeatures:
    - legacyEditorsUsers
  cmsItemsLimit:
    description: "The maximum number of records you can have in your CMS database. Ex: 50 projects in a portfolio."
    valueType: NUMERIC
    defaultValue: 0
    unit: item
    type: NON_RENEWABLE
    linkedFeatures:
    - cmsItems
  cmsCollectionsLimit:
    description: Maximum CMS collection available
    valueType: NUMERIC
    defaultValue: 0
    unit: item
    type: NON_RENEWABLE
    linkedFeatures:
    - cmsCollections
  apiRequestsPerMinute:
    description: Maximum API request per mintute
    valueType: NUMERIC
    defaultValue: 0
    unit: request/min
    type: NON_RENEWABLE
    linkedFeatures:
    - cmsApi
  cdnBandwidth:
    description: Maximum cdn bandwidth available
    valueType: NUMERIC
    defaultValue: 0
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - globalCdn
    - customCdn
  formFileSizeLimit:
    description: Maximum form file size
    valueType: NUMERIC
    defaultValue: 0
    unit: MB
    type: NON_RENEWABLE
    linkedFeatures:
    - formFileUpload
  fileStorageLimit:
    description: Maximum file storage available
    valueType: NUMERIC
    defaultValue: 0
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - fileStorage
  ## Ecommerce Usage Limits
  ecommerceItemsLimit:
    description: Maximum ecommerce items available
    valueType: NUMERIC
    defaultValue: 0
    unit: account
    type: NON_RENEWABLE
    linkedFeatures:
    - ecommerceItems
  staffAccountsLimit:
    description: Maximum staff account available
    valueType: NUMERIC
    defaultValue: 0
    unit: account
    type: NON_RENEWABLE
    linkedFeatures:
    - staffAccounts
  ## Account Usage Limits
  fullSeats:
    description: Maximum seats for your Webflow account
    valueType: NUMERIC
    defaultValue: 0
    unit: seat
    type: NON_RENEWABLE
    linkedFeatures:
    - teams
  limitedSeats:
    description: Maximum limited seats for your Webflow account
    valueType: NUMERIC
    defaultValue: 0
    unit: seat
    type: NON_RENEWABLE
    linkedFeatures:
    - teams
  freeAgencyOrFreelancerGuestsLimit:
    description: Maximum free agency or freelancer guests available
    valueType: NUMERIC
    defaultValue: 0
    unit: guest
    type: NON_RENEWABLE
    linkedFeatures:
    - freeAgencyOrFreelancerGuests
  webflowStagingLimit:
    description: Maximum webflow staging available
    valueType: NUMERIC
    defaultValue: 0
    unit: site
    type: NON_RENEWABLE
    linkedFeatures:
    - webflowStaging
  webflowStagingPageLimit:
    description: Maximum webflow staging page available
    valueType: NUMERIC
    defaultValue: 0
    unit: site
    type: NON_RENEWABLE
    linkedFeatures:
    - webflowStaging
