billing:
  monthly: 1.0
currency: USD
features:
  ownerRole:
    description: The Owner serves as the primary contact for the account. Owners can perform all actions in the
      account, including inviting new users, editing billing information, and closing the account.
    valueType: BOOLEAN
    defaultValue: true
    tag: Contacts & Tiering
    type: MANAGEMENT
  adminRole:
    description: The Admin has the same permissions as the Owner.
    valueType: BOOLEAN
    defaultValue: false
    tag: Contacts & Tiering
    type: MANAGEMENT
  authorRole:
    description: The Author can create, edit, and delete emails and templates, and view reports.
    valueType: BOOLEAN
    defaultValue: false
    tag: Contacts & Tiering
    type: MANAGEMENT
  viewerRole:
    description: The Viewer can view email and SMS reports in the account.
    valueType: BOOLEAN
    defaultValue: false
    tag: Contacts & Tiering
    type: MANAGEMENT
  managerRole:
    description: The Manager can create and send emails and SMS messages, import audiences, and view reports,
      but can't view billing information, export audiences, or close the account.
    valueType: BOOLEAN
    defaultValue: false
    tag: Contacts & Tiering
    type: MANAGEMENT
  contacts:
    description: "Create contacts. Contact: An individual member of your audience who can receive or view your marketing.
      Subscribed, unsubscribed, and non-subscribed contacts all make up your contact count."
    valueType: BOOLEAN
    defaultValue: true
    tag: Contacts & Tiering
    type: DOMAIN
  audiences:
    description: "Send mails to your audience. Audience: lists of contacts to which you send campaigns"
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  basicSegmentation:
    description: Whether you want to target messages based on how people engage with you or bring your
      own custom insights into Mailchimp as segmentation options, you'll have all the options you
      need to filter your audience data.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  advancedSegmentation:
    description: Whether you want to target messages based on how people engage with you or bring your
      own custom insights into Mailchimp as segmentation options, you'll have all the options you
      need to filter your audience data. Segment your contacts with further options and use more complex logic.
    valueType: BOOLEAN
    defaultValue: false
    tag: Audience
    type: DOMAIN
  contactProfiles:
    description: Contact profiles give you an in-depth view of each person in your audience—simple,
      powerful, and accessible from any device.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  tags:
    description: Organize contacts however you need to with tags
    
      Tags are customizable labels you create for your contacts based on what's important
      for you to know. While Mailchimp comes with lots of built-in ways to search within your
      audience data, tags let you add insights unique to your needs—then use them to create segments.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  inbox:
    description: Use Mailchimp Inbox to organize your conversations and coordinate your replies with other
      users in your account. Organize your messages with labels, internal comments and other familiar inbox tools.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  mailchipMobileApp:
    description: Grow your business, wherever you are
      
      With Mailchimp's mobile app you can stay on top of your reports, audience growth, and
      campaign content—all from your mobile device.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  audienceDashboard:
    description: Our audience dashboard gives you the tools you need to understand
      contact data and act on it—all in one place.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: INFORMATION
  surveys:
    description: Use survey responses to define audience segments with tags. Get to know your
      customers with fewer assumptions and more proof.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  predictedDemographics:
    description: Use predicted demographics to learn about who your customers are so they can start
      connecting with you. Use those insights to create more personalized campaigns that resonate with
      different age and gender segments.
    valueType: BOOLEAN
    defaultValue: false
    tag: Audience
    type: AUTOMATION
    automationType: BOT
  customerLifetimeValue:
    description: To help you market to your customers and drive e-commerce sales, we compare each individual's
      purchase history and patterns to what's normal for your store. Then, we estimate their customer lifetime
      value (CLV) and likelihood to purchase again.
    valueType: BOOLEAN
    defaultValue: false
    tag: Audience
    type: DOMAIN
  purchaseLikelihood:
    description: Looks at patterns in return customer behavior and may help you retain business.
    valueType: BOOLEAN
    defaultValue: false
    tag: Audience
    type: DOMAIN
  campainEngagement:
    description: Behavioral targeting by marketing engagement. When you know how people are interacting with
      your brand, you can send them messages that are more relevant to their needs.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  purchaseBehavior:
    description: Behavioral targeting by purchase behaviour. When you know how people are interacting with
      your brand, you can send them messages that are more relevant to their needs.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  appEngagement:
    description: Behavioral targeting using custom event data. When you know how people are interacting with
      your brand, you can send them messages that are more relevant to their needs.
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  siteViewsWebsiteEngagement:
    description: Track overall user interaction with the entire website
    valueType: BOOLEAN
    defaultValue: true
    tag: Audience
    type: DOMAIN
  pageViewsWebsiteEngagement:
    description: Track user interaction within a specific page
    valueType: BOOLEAN
    defaultValue: false
    tag: Audience
    type: DOMAIN
  contentStudio:
    description: Sync and store all of your photos, graphics, and other files, so your campaigns are always consistent.
    valueType: BOOLEAN
    defaultValue: true
    tag: Design
    type: DOMAIN
  basicTemplates:
    description: Build emails and landing pages in minutes.
      
      Our pre-designed templates include all the content blocks and design elements you
      need to launch a professional-looking campaign in minutes.
    valueType: BOOLEAN
    defaultValue: true
    tag: Design
    type: DOMAIN
  prebuiltTemplates:
    description: Includes pre-built tempales for mailchimp websites
    valueType: BOOLEAN
    defaultValue: false
    tag: Design
    type: DOMAIN
  customCodedTemplates:
    description: If you want more control over your email design than our templates offer, consider creating
      your own custom template. Designers can use Mailchimp's template language to create a dynamic template
      they can import as HTML. This is helpful for web designers who want to upload a template for a client,
      and create sections that are editable, repeatable, or hideable.
    valueType: BOOLEAN
    defaultValue: false
    tag: Design
    type: DOMAIN
  removeMailchimpFooter:
    description: The MonkeyRewards badge can be removed on paid monthly or Pay As You Go accounts. Emails
      sent from our Free plan are required to include the Mailchimp MonkeyRewards badge in the email footer.
    valueType: BOOLEAN
    defaultValue: false
    tag: Design
    type: DOMAIN
  publishDesignsFromMailchimp:
    description: Publish designs from Mailchimp Create Assistant AI
    valueType: BOOLEAN
    defaultValue: true
    tag: Design
    type: DOMAIN
  downloadDesigns:
    description: Download designs and use them in Creative Assistant
    valueType: BOOLEAN
    defaultValue: false
    tag: Design
    type: DOMAIN
  emailMarketing:
    description: Create beautiful, branded emails that make you look like a pro
    
      Engage your audience with email marketing. Whether you're just starting out or you're already
      a pro, Mailchimp's easy-to-use email builder has the tools you need to grow your business.
    valueType: BOOLEAN
    defaultValue: true
    tag: Marketing Channels
    type: DOMAIN
  emailScheduling:
    description: Schedule emails for your marketing campaign
    valueType: BOOLEAN
    defaultValue: false
    tag: Marketing Channels
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  landingPages:
    description: Create must-click destinations
    
      With Mailchimp, it takes just a few minutes to design beautiful landing pages that make
      people want to join your audience or buy your stuff.
    valueType: BOOLEAN
    defaultValue: true
    tag: Marketing Channels
    type: DOMAIN
  socialPosting:
    description: "Take your business where over 2 billion people are engaging with other brands like yours: Facebook, Instagram,
      and Twitter. With Mailchimp, you can create, manage, and publish social posts that help you stand out—all in one place."
    valueType: BOOLEAN
    defaultValue: true
    tag: Marketing Channels
    type: INTEGRATION
    integrationType: MARKETPLACE
  socialPostScheduling:
    description: Schedule posts ahead of time. And it's easy to pause, edit, and reschedule if your plans change
    valueType: BOOLEAN
    defaultValue: false
    tag: Marketing Channels
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  popupForms:
    description: Grow your list with custom signup forms
      
      Start collecting the data you need to send your customers personalized, relevant content.
    valueType: BOOLEAN
    defaultValue: true
    tag: Marketing Channels
    type: INTEGRATION
    integrationType: EXTENSION
  retargetingAds:
    description: Make your brand's message travel faster with digital ads
      
      With Mailchimp's powerful targeting options, you can reach the right people on Facebook, Instagram,
      and across the web with Google's ad network.
    valueType: BOOLEAN
    defaultValue: false
    tag: Marketing Channels
    type: INTEGRATION
    integrationType: MARKETPLACE
  marketingCalendar:
    description: Stay on top of it all with our marketing calendar
      
      Keep yourself organized and productive with one clear view into all your campaigns.
    valueType: BOOLEAN
    defaultValue: false
    tag: Marketing Channels
    type: DOMAIN
  singleStepAutomations:
    description: Automate your busy work with Mailchimp
      
      With our always-on marketing platform, you can send the right message to the right
      people at the right moment—without doing the work every time. Welcome email, order
      notifications, abandoned cart, and more
    valueType: BOOLEAN
    defaultValue: true
    tag: Automations
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  multiStepAutomations:
    description: Streamline an automation with various processes
    valueType: BOOLEAN
    defaultValue: false
    tag: Automations
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customerJourneyBuilder:
    description: Send emails based on customer actions or its 'journey' througth the website
    valueType: BOOLEAN
    defaultValue: false
    tag: Automations
    type: DOMAIN
  multipleStartingPoints:
    description: Make sure the right people enter your journey map
      Whether you choose 1 or 3, starting points let you control who enters your journey map.
      Put your customers on journeys that are relevant to them, so you can stay top of mind.
    valueType: BOOLEAN
    defaultValue: false
    tag: Automations
    type: DOMAIN
  branchingPoints:
    description: Curate a path for every option
      
      Create experiences for your customers based on who they are and how they interact with your business.
    valueType: BOOLEAN
    defaultValue: false
    tag: Automations
    type: DOMAIN
  smsMarketing:
    description: Mailchimp's SMS Marketing is a powerful service that helps you create and manage a text messaging program.
      Grow your SMS audience, purchase SMS credits, send marketing text messages, and reach your subscribed SMS
      contacts with a new marketing channel.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  sendSmsFromCustomerJourneyBuiler:
    description: Customer Journey actions perform marketing or organizational tasks in your journey map. Use
      Send SMS actions to send a text message to your subscribed SMS contacts. This allows you to target your
      SMS audience based on their activity and create a multi-channel marketing plan.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  sendMmsFromCustomerJourneyBuiler:
    description: Customer Journey actions perform marketing or organizational tasks in your journey map. Use
      Send SMS actions to send a text message to your subscribed SMS contacts. This allows you to target your
      SMS audience based on their activity and create a multi-channel marketing plan.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  smsAutomation:
    description: When contacts leave items in their shopping cart, invite them to complete their purchase with
      an automated email or SMS using the Customer Journey builder.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  smsAndMmsAddOnContentTemplates:
    description: When contacts leave items in their shopping cart, invite them to complete their purchase with
      an automated email or SMS using the Customer Journey builder.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  smsAddOnRealTimeReporting:
    description: SMS reports provide key data about your text messages, including delivery rates, click rates,
      and revenue generated
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: AUTOMATION
    automationType: TRACKING
  smsAddOnBulkConversations:
    description: Respond to sms messages in bulk
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  smsAddOnTwoWayConversations:
    description: Two-way messaging provides recipients the ability to respond immediately, whether they're
      confirming an appointment or inquiring to learn more about a product
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  smsAddOnTextToJoin:
    description: Create a text-to-join marketing automation flow and invite new contacts to opt in to
      your SMS marketing with a keyword.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  smsAddOnTapToText:
    description: With tap-to-text, site visitors can click a button in your sign-up form to automatically
      open their text messaging app
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: DOMAIN
  smsAddOnMultiStepPopUpForm:
    description: A pop-up signup form helps you connect with your website visitors. Design it to fit your brand,
      and add a special offer or discount to help grow your audience and boost sales.
    valueType: BOOLEAN
    defaultValue: false
    tag: SMS Marketing Add-on
    type: INTEGRATION
    integrationType: EXTENSION
  basicReports:
    description: See what's working for your business
      
      Mailchimp makes your data digestible, so it's easy to monitor trends, track performance, and
      create better campaigns as you go.
    valueType: BOOLEAN
    defaultValue: true
    tag: Insights & Optimization
    type: INFORMATION
  customReports:
    description: Create and build a custom report with the metrics that matter most to you to see how your
      contacts interact with your email campaigns. Use custom reports to help you improve your email performance.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: INFORMATION
  anomalyDetection:
    description: If tracking is enabled in your email, we'll collect and analyze data on clicks and unsubscribes
      after you send. If your email performance drops or increases significantly, we'll alert you and offer quick
      guidance on what actions you can take. This type of monitoring is also known as Anomaly Detection.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: AUTOMATION
    automationType: TRACKING
  comparativeReporting:
    description: Comparative Reports compile data from your sent Regular and RSS campaigns into a comprehensive,
      shareable report. Choose any number of campaigns to compare to help you identify patterns in subscriber engagement,
      and improve and target your campaign content.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: INFORMATION
  abTesting:
    description: See what works best
  
      Mailchimp takes the guesswork out of creating campaigns people click on. A/B and multivariate
      testing let you try things out and pick a winner.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: DOMAIN
  multivarianteTesting:
    description: When you create an email marketing campaign, there are many ways to present your content, but
      you may wonder which way is best. Use our Multivariate Testing feature to see how small changes to your
      email campaigns impact subscriber engagement.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: DOMAIN
  personalizedProductRecommendations:
    description: Drive more sales with personalized product recommendations
      
      Effortlessly create more cross-selling opportunities. Connect your store to Mailchimp and start
      recommending personalized, best-selling, and new products to your customers.
    valueType: BOOLEAN
    defaultValue: true
    tag: Insights & Optimization
    type: DOMAIN
  nextBestAction:
    description: AI-driven, data-backed feature providing actionable, real-time recommendations to
      improve campaign performance
    valueType: BOOLEAN
    defaultValue: true
    tag: Insights & Optimization
    type: AUTOMATION
    automationType: BOT
  subjectLineHelper:
    description: Subject line helper provides feedback on word and character count, as well as emoji and punctuation use.
    valueType: BOOLEAN
    defaultValue: true
    tag: Insights & Optimization
    type: DOMAIN
  contentOptimizer:
    description: Our Content Optimizer helps you improve your email content by comparing your campaigns
      to email best practices and offering suggestions to make your copy, imagery, and layout even better.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: DOMAIN
  dynamicContent:
    description: Create more personalized emails without doing extra work. Drag any content block into your
      email and quickly start personalizing content.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: DOMAIN
  sendTimeOptimization:
    description: If you wonder about the best time of day or night to send emails, Send Time Optimization
      can take ouIf you wonder about the best time of day or night to send emails, Send Time Optimization can take
      out the guesswork. Send Time Optimization uses data science to determine when your contacts are most likely to
      engage, and sends your emails at that time.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: DOMAIN
  deliveryByTimezone:
    description: Timewarp is a paid feature that schedules email campaigns based on each individual subscriber's
      time zone, so subscribers receive your scheduled campaigns at the correct time for them. For example,
      If you send from New York and schedule delivery for 9am, your west coast subscribers would normally get
      the email at 6am PST. Timewarp would delay sending to anyone until it's 9am in their time zone.
    valueType: BOOLEAN
    defaultValue: false
    tag: Insights & Optimization
    type: DOMAIN
  integrations:
    description: Mailchimp integrations directory
      
      See how Mailchimp works with your favorite apps and web services to help you do more with your
      marketing. Find tools you already use, or discover new ways to step things up.
    valueType: BOOLEAN
    defaultValue: true
    tag: Insights & Optimization
    type: INTEGRATION
    integrationType: MARKETPLACE
