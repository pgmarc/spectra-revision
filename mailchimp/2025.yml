usageLimits:
  contactsLimit:
    description: Maximum number of contacts to create in your Mailchimp account
    valueType: NUMERIC
    defaultValue: 500
    unit: contact
    type: NON_RENEWABLE
    linkedFeatures:
    - contacts
  audiencesLimit:
    description: Maximum number of audience to create in your Mailchimp account
    valueType: NUMERIC
    defaultValue: 1
    unit: audience
    type: NON_RENEWABLE
    linkedFeatures:
    - audiences
  seatsLimit:
    description: Maximum number of seats in your Mailchimp account
    valueType: NUMERIC
    defaultValue: 1
    unit: seat
    type: NON_RENEWABLE
  appEngagementThreshold:
    description: Maximum number of days to hold custom data for behavioural targeting
    valueType: NUMERIC
    defaultValue: 1
    unit: month
    type: NON_RENEWABLE
    linkedFeatures:
