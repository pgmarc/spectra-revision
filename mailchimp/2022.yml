syntaxVersion: '2.1'
saasName: MailChimp - Marketing
createdAt: '2022-12-01'
version: '2022-12-01'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20221201044534/https://mailchimp.com/pricing/marketing/compare-plans/
features:
  ownerRole:
    description: The Owner serves as the primary contact for the account. Owners can perform all actions in the
      account, including inviting new users, editing billing information, and closing the account.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  adminRole:
    description: The Admin has the same permissions as the Owner.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  authorRole:
    description: The Author can create, edit, and delete emails and templates, and view reports.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  viewerRole:
    description: The Viewer can view email and SMS reports in the account.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  managerRole:
    description: The Manager can create and send emails and SMS messages, import audiences, and view reports,
      but can't view billing information, export audiences, or close the account.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  contacts:
    description: "Create contacts. Contact: An individual member of your audience who can receive or view your marketing.
      Subscribed, unsubscribed, and non-subscribed contacts all make up your contact count."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  audiences:
    description: "Send mails to your audience. Audience: lists of contacts to which you send campaigns"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  basicSegmentation:
    description: Whether you want to target messages based on how people engage with you or bring your
      own custom insights into Mailchimp as segmentation options, you'll have all the options you
      need to filter your audience data.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedSegmentation:
    description: Whether you want to target messages based on how people engage with you or bring your
      own custom insights into Mailchimp as segmentation options, you'll have all the options you
      need to filter your audience data. Segment your contacts with further options and use more complex logic.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  contactProfiles:
    description: Contact profiles give you an in-depth view of each person in your audience—simple,
      powerful, and accessible from any device.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tags:
    description: Organize contacts however you need to with tags
    
      Tags are customizable labels you create for your contacts based on what's important
      for you to know. While Mailchimp comes with lots of built-in ways to search within your
      audience data, tags let you add insights unique to your needs—then use them to create segments.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  inbox:
    description: Use Mailchimp Inbox to organize your conversations and coordinate your replies with other
      users in your account. Organize your messages with labels, internal comments and other familiar inbox tools.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mailchipMobileApp:
    description: Grow your business, wherever you are
      
      With Mailchimp's mobile app you can stay on top of your reports, audience growth, and
      campaign content—all from your mobile device.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  audienceDashboard:
    description: Our audience dashboard gives you the tools you need to understand
      contact data and act on it—all in one place.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  surveys:
    description: Use survey responses to define audience segments with tags. Get to know your
      customers with fewer assumptions and more proof.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  predictedDemographics:
    description: Use predicted demographics to learn about who your customers are so they can start
      connecting with you. Use those insights to create more personalized campaigns that resonate with
      different age and gender segments.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  customerLifetimeValue:
    description: To help you market to your customers and drive e-commerce sales, we compare each individual's
      purchase history and patterns to what's normal for your store. Then, we estimate their customer lifetime
      value (CLV) and likelihood to purchase again.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  purchaseLikelihood:
    description: Looks at patterns in return customer behavior and may help you retain business.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  addressFinder:
    description: Send beautiful postcards to your audience, even if you only have their email addresses. Mailchimp's
      address finder matches mailing addresses from our network of over 200 million to your list contacts, so
      you can talk to them from inbox to mailbox.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  campainEngagement:
    description: Behavioral targeting by marketing engagement. When you know how people are interacting with
      your brand, you can send them messages that are more relevant to their needs.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  purchaseBehavior:
    description: Behavioral targeting by purchase behaviour. When you know how people are interacting with
      your brand, you can send them messages that are more relevant to their needs.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  appEngagement:
    description: Behavioral targeting using custom event data. When you know how people are interacting with
      your brand, you can send them messages that are more relevant to their needs.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  siteViewsWebsiteEngagement:
    description: Track overall user interaction with the entire website
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pageViewsWebsiteEngagement:
    description: Track user interaction within a specific page
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  contentStudio:
    description: Sync and store all of your photos, graphics, and other files, so your campaigns are always consistent.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  basicTemplates:
    description: Build emails and landing pages in minutes.
      
      Our pre-designed templates include all the content blocks and design elements you
      need to launch a professional-looking campaign in minutes.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  prebuiltTemplates:
    description: Includes pre-built tempales for mailchimp websites
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customCodedTemplates:
    description: If you want more control over your email design than our templates offer, consider creating
      your own custom template. Designers can use Mailchimp's template language to create a dynamic template
      they can import as HTML. This is helpful for web designers who want to upload a template for a client,
      and create sections that are editable, repeatable, or hideable.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  removeMailchimpFooter:
    description: The MonkeyRewards badge can be removed on paid monthly or Pay As You Go accounts. Emails
      sent from our Free plan are required to include the Mailchimp MonkeyRewards badge in the email footer.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  publishDesignsFromMailchimp:
    description: Publish designs from Mailchimp Create Assistant AI
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  downloadDesigns:
    description: Download designs and use them in Creative Assistant
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  emailMarketing:
    description: Create beautiful, branded emails that make you look like a pro
    
      Engage your audience with email marketing. Whether you're just starting out or you're already
      a pro, Mailchimp's easy-to-use email builder has the tools you need to grow your business.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  emailScheduling:
    description: Schedule emails for your marketing campaign
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  landingPages:
    description: Create must-click destinations
    
      With Mailchimp, it takes just a few minutes to design beautiful landing pages that make
      people want to join your audience or buy your stuff.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  facebookAds:
    description: Help your business make new friends
    
      Mailchimp is here to help you to find your people on social. Get your message out into the world,
      get more likes, and sell more stuff with Facebook ads.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://facebook.com/business
  instagramAds:
    description: Help your business make new friends
    
      Mailchimp is here to help you to find your people on social. Get your message out into the world,
      get more likes, and sell more stuff with Facebook ads.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://business.instagram.com/advertising
  socialPosting:
    description: "Take your business where over 2 billion people are engaging with other brands like yours: Facebook, Instagram,
      and Twitter. With Mailchimp, you can create, manage, and publish social posts that help you stand out—all in one place."
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  socialPostScheduling:
    description: Schedule posts ahead of time. And it's easy to pause, edit, and reschedule if your plans change
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  postCards:
    description: Print, stamp, and mail postcards to people around the world for as little as 75 cents a card.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  popupForms:
    description: Grow your list with custom signup forms
      
      Start collecting the data you need to send your customers personalized, relevant content.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  retargetingAds:
    description: Make your brand's message travel faster with digital ads
      
      With Mailchimp's powerful targeting options, you can reach the right people on Facebook, Instagram,
      and across the web with Google's ad network.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  marketingCalendar:
    description: Stay on top of it all with our marketing calendar
      
      Keep yourself organized and productive with one clear view into all your campaigns.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  singleStepAutomations:
    description: Automate your busy work with Mailchimp
      
      With our always-on marketing platform, you can send the right message to the right
      people at the right moment—without doing the work every time. Welcome email, order
      notifications, abandoned cart, and more
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  multiStepAutomations:
    description: Streamline an automation with various processes
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customerJourneyBuilder:
    description: Send emails based on customer actions or its 'journey' througth the website
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multipleStartingPoints:
    description: Make sure the right people enter your journey map
      Whether you choose 1 or 3, starting points let you control who enters your journey map.
      Put your customers on journeys that are relevant to them, so you can stay top of mind.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  branchingPoints:
    description: Curate a path for every option
      
      Create experiences for your customers based on who they are and how they interact with your business.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  prebuiltJourneys:
    description: Pre-Built Journeys made by Mailchimp
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  basicReports:
    description: See what's working for your business
      
      Mailchimp makes your data digestible, so it's easy to monitor trends, track performance, and
      create better campaigns as you go.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  comparativeReporting:
    description: Comparative Reports compile data from your sent Regular and RSS campaigns into a comprehensive,
      shareable report. Choose any number of campaigns to compare to help you identify patterns in subscriber engagement,
      and improve and target your campaign content.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  abTesting:
    description: See what works best
  
      Mailchimp takes the guesswork out of creating campaigns people click on. A/B and multivariate
      testing let you try things out and pick a winner.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multivarianteTesting:
    description: When you create an email marketing campaign, there are many ways to present your content, but
      you may wonder which way is best. Use our Multivariate Testing feature to see how small changes to your
      email campaigns impact subscriber engagement.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  personalizedProductRecommendations:
    description: Drive more sales with personalized product recommendations
      
      Effortlessly create more cross-selling opportunities. Connect your store to Mailchimp and start
      recommending personalized, best-selling, and new products to your customers.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  nextBestAction:
    description: AI-driven, data-backed feature providing actionable, real-time recommendations to
      improve campaign performance
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  subjectLineHelper:
    description: Subject line helper provides feedback on word and character count, as well as emoji and punctuation use.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  contentOptimizer:
    description: Our Content Optimizer helps you improve your email content by comparing your campaigns
      to email best practices and offering suggestions to make your copy, imagery, and layout even better.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dynamicContent:
    description: Create more personalized emails without doing extra work. Drag any content block into your
      email and quickly start personalizing content.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sendTimeOptimization:
    description: If you wonder about the best time of day or night to send emails, Send Time Optimization
      can take ouIf you wonder about the best time of day or night to send emails, Send Time Optimization can take
      out the guesswork. Send Time Optimization uses data science to determine when your contacts are most likely to
      engage, and sends your emails at that time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  deliveryByTimezone:
    description: Timewarp is a paid feature that schedules email campaigns based on each individual subscriber's
      time zone, so subscribers receive your scheduled campaigns at the correct time for them. For example,
      If you send from New York and schedule delivery for 9am, your west coast subscribers would normally get
      the email at 6am PST. Timewarp would delay sending to anyone until it's 9am in their time zone.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  integrations:
    description: Mailchimp integrations directory
      
      See how Mailchimp works with your favorite apps and web services to help you do more with your
      marketing. Find tools you already use, or discover new ways to step things up.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  guides:
    description: Get the most out of Mailchimp with our step-by-step guides.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  tutorials:
    description: Get the most out of Mailchimp with our step-by-step tutorials.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  30DayEmailSupport:
    description: 30 days of email support on Sign up
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  24/7EmailSupport:
    description: 24/7 email support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  liveChatSupport:
    description: 24/7 chat support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  phoneSupport:
    description: Phone support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  customDomain:
    description: Buy a domain name and use it to build your online presence.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedScheduling:
    description: Start taking appointments online
      
      Launch a website designed to take the hard work out of online scheduling.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  transactionalEmails:
    description: Reach inboxes when it matters most
      
      Send system notifications to your contacts with confidence.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  buildAndPublishWebsite:
    description: Build a website for the business you want to be
      
      Stand out even if you're just starting out—no coding skills needed.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pages:
    description: Create unlimited sites with Mailchimp website designer
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  unlimitedBandwidth:
    description: Website unlimited network bandwidth
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  seoTools:
    description: Edit your page settings to include search engine optimization (SEO) techniques that can help
      control how pages on your Mailchimp website display in browsers, search engine results, and social posts.
      Clear and informative content, as well as compelling visuals, can improve findability and drive traffic to your website.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sslCertificate:
    description: Access to a SSL certificate for your website
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  siteVisitAnalytics:
    description: Built-in site visit analytics for sites done in Mailchimp
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  unlimitedProductsInStore:
    description: Start selling online
      
      Don't just launch your online store—reach customers and drive sales with built-in marketing tools.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  shoppingCartInStore:
    description: Mailchimp store has shopping cart
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  usPaymentProcessing:
    description: US payment processing handled by Stripe
    valueType: BOOLEAN
    defaultValue: true
    type: PAYMENT
  ukPaymentProcessing:
    description: UK payment processing handled by Stripe
    valueType: BOOLEAN
    defaultValue: true
    type: PAYMENT
  ordersInStore:
    description: After you begin to make sales, you'll see a list of outstanding orders on your website dashboard.
      Each order includes the name of your customer, their order number, their billing address, and other important
      details needed to track and manage purchases.

      When you've packed up an item and sent it in the mail, you'll complete the order in Mailchimp to send your
      customer a shipping notification. You can come back to any completed order later to see what was ordered and
      how the payment was made.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  shippingInStore:
    description: You can set flat rate shipping costs for all items in your store. Choose to offer the required
      Standard shipping only, or add Expedited or Rush options for faster service. If you want to offer free
      shipping to your shoppers, you can set Standard shipping to 0.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  taxConfigurationInStore:
    description: "When a customer provides their shipping address during checkout, your store will automatically calculate
      the taxes that are due based on both your jurisdiction and the jurisdiction of that shopper. We work with Taxjar
      to automatically calculate taxes in the United States. For the United Kingdom, you can enable Valued Added Tax (VAT)
      collection. This will identify 20% of your product price as collected tax, and list your VAT number on your customer
      receipts.

      You'll be able to set tax exemption on a per-product basis on the product creation page. Note: Tax calculation is
      not itemized. Shoppers will not be able to see which products are taxable if you're selling a mix of taxable and
      non-taxable products."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  abandonedCartEmailsInStore:
    description: When customers leave stuff behind, we'll send an email with their cart information. All you need
      to do is add your logo and write a few lines of copy.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  orderAndShipmentConfirmationEmails:
    description: After a purchase is complete, your customer will see the order confirmation page, and we'll send an order
      notification email to the e-mail address they provided at checkout. They'll also receive a final shipping notification
      email when you review your orders and mark their order as shipped.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  salesReporting:
    description: Sales reporting analytics in your store page
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  1to1Appointments:
    description: Book one to one appointments online
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customServicePage:
    description: Our advanced scheduling add-on allows you to create unlimited one-on-one or group services.
      Each service includes customizable descriptions, location, and availability so you can offer flexible appointments
      to your customers.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  automatedNotificationEmails:
    description: Get notified when an appointment is close to due date
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  freeMailchimpDomain:
    description: Use a free mailchimpsites.com subdomain to publish a website.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
usageLimits:
  contactsLimit:
    description: Maximum number of contacts to create in your Mailchimp account
    valueType: NUMERIC
    defaultValue: 500
    unit: contact
    type: NON_RENEWABLE
    linkedFeatures:
    - contacts
  audiencesLimit:
    description: Maximum number of audience to create in your Mailchimp account
    valueType: NUMERIC
    defaultValue: 1
    unit: audience
    type: NON_RENEWABLE
    linkedFeatures:
    - audiences
  seatsLimit:
    description: Maximum number of seats in your Mailchimp account
    valueType: NUMERIC
    defaultValue: 1
    unit: seat
    type: NON_RENEWABLE
  appEngagementThreshold:
    description: Maximum number of days to hold custom data for behavioural targeting
    valueType: NUMERIC
    defaultValue: 1
    unit: month
    type: NON_RENEWABLE
    linkedFeatures:
    - appEngagement
  monthlyEmailSends:
    description: Maximum number of emails to send monthly
    valueType: NUMERIC
    defaultValue: 2500
    unit: email/month
    type: RENEWABLE
    linkedFeatures:
    - emailMarketing
  dailyEmailSends:
    description: Maximum number of emails  to send daily
    valueType: NUMERIC
    defaultValue: 500
    unit: email/day
    type: RENEWABLE
    linkedFeatures:
    - emailMarketing
