  PREMIUM:
    description: Advanced features for pros who need more customization.
    price: 299
    unit: /month
    features:
      predictedDemographics:
        value: true
      customerLifetimeValue:
        value: true
      purchaseLikelihood:
        value: true
      lookalikeAudienceFinder:
        value: true
      addressFinder:
        value: true
      allPrebuiltTemplates:
        value: true
      removeMailchimpFooter:
        value: true
      customCodedTemplates:
        value: true
      buyCustomDomain:
        value: true
      connectAnExistingDomain:
        value: true
      socialPostScheduling:
        value: true
      retargetingAds:
        value: true
      multiStepCustomWorkflows:
        value: true
      sendTimeOptimization:
        value: true
      deliveryByTimezone:
        value: true
      abTesting:
        value: true
      multivarianteTesting:
        value: true
      comparativeReporting:
        value: true
      24/7EmailSupport:
        value: true
      24/7ChatSupport:
        value: true
      phoneSupport:
        value: true
    usageLimits:
      contactsLimit:
        value: 200000
      audiencesLimit:
        value: .inf
      customEventDataThreshold:
        value: 540
      seatsLimit:
        value: .inf
      monthlyEmailSends:
        value: 3000000
addOns: null
