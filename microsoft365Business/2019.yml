usageLimits:
  maxUsers:
    description: Maximum number of users in your Microsoft Office 365 Business account
    valueType: NUMERIC
    defaultValue: 300
    unit: user
    type: NON_RENEWABLE
  maxMobileDevices:
    description: Maximum mobile devices connected to your Microsoft Office 365 Business account
    valueType: NUMERIC
    defaultValue: 5
    unit: device
    type: NON_RENEWABLE
    linkedFeatures:
    - microsoftWordMobileApp
    - microsoftExcelMobileApp
    - microsoftPowerPointMobileApp
    - microsoftOutlookMobileApp
  maxTabletDevices:
    description: Maximum tablet devices connected to your Microsoft Office 365 Business account
    valueType: NUMERIC
    defaultValue: 5
    unit: device
    type: NON_RENEWABLE
    linkedFeatures:
    - microsoftWordMobileApp
    - microsoftExcelMobileApp
    - microsoftPowerPointMobileApp
    - microsoftOutlookMobileApp
  maxDesktopDevices:
    description: Maximum desktop devices connected to your Microsoft Office 365 Business account
    valueType: NUMERIC
    defaultValue: 0
    unit: device
    type: NON_RENEWABLE
    linkedFeatures:
    - microsoftWordDesktopApp
    - microsoftExcelDesktopApp
    - microsoftPowerPointDesktopApp
    - microsoftOutlookDesktopApp
  cloudStorageLimit:
    description: Maximum number of disk storage available in your Microsoft Office 365 Business account
    valueType: NUMERIC
    defaultValue: 1000
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - cloudStorage
  slaMaxUptime:
    description: Uptime SLA
    valueType: NUMERIC
    defaultValue: 99.9
    unit: '%'
    type: NON_RENEWABLE
    linkedFeatures:
    - uptimeGuarantee
  mailboxMaxCapacity:
    description: Maximum mailbox storage capacity
    valueType: NUMERIC
    defaultValue: 0
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - mailbox
  onlineMeetingCapacity:
    description: Maximum capacity of your Microsoft Teams meetings
    valueType: NUMERIC
    defaultValue: 0
    unit: people
    type: NON_RENEWABLE
    linkedFeatures:
    - onlineMeetings
