syntaxVersion: '2.1'
saasName: UserGuiding
createdAt: '2020-11-25'
version: '2020-11-25'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20201125174346/https://userguiding.com/pricing/
features:
  users:
    description: User that can use Userguiding account simultaneously
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  userGuidingBranding:
    description: UserGuiding branding is automatically removed from your Tooltips, Hotspots, and Modals.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  teams:
    description: Invite a new team member to UserGuiding Panel
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  guides:
    description: Guides have become essential for great user experiences. They can educate, update, and inform
      users on the go by answering their questions.

      As the name implies, they guide end-users throughout any experience you provide within your web application.
      - A Guide can have either one or multiple steps.
      - Once a Guide is started, end-users can complete all the steps or stop before finishing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  hotspots:
    description: Hotspots are static onboarding contents that can exhibit near-at-hand information
      about any item of your product.
      
      You can think of a hotspot as an asynchronous box that can be placed on several locations on a page,
      presenting its informative content on demand without causing a crowd on your interface.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  onboardingChecklist:
    description: Checklists are onboarding contents containing a list of organized guides. They are
      placed on web applications' dashboards to assist and support end-users.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customization:
    description: Themes feature in UserGuiding allows to create a custom theme for onboarding
      content such as Guides, Hotspots, and Banners and how to apply them.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  npsSurveys:
    description: Net Promoter Score (NPS) is an essential tool for measuring customer satisfaction and loyalty. It's a widely
      accepted metric that helps businesses measure user sentiment and optimize customer experience.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  personalization:
    description: Full guide and brand customization
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  segmentation:
    description: With UserGuiding, you can target your onboarding materials to specific audiences instead of showing
      them to all your users; this is called Segmentation.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  userIdentification:
    description: The User Identification feature allows you to send precise user IDs for your end-users, ensuring a consistent
      experience for a user across different browsers or devices.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  userGuidingAPI:
    description: Access to Userguiding API
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  usageAnalytics:
    description: Usage analytics to see guider user engagement and completion
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  usageReporting:
    description: User usage reports available in dashboard panel
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  integrations:
    description: Integrations with serveral SaaS applications
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  emailSupport:
    description: Support via email
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  chatSupport:
    description: Support via chat
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  successCoaching:
    description: Dedicated sucess manager
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  customCSS:
    description: UserGuiding offers to style your content with CSS in addition to point-and-click styling in Themes.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sla:
    description: Service Level Agreement
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  singleSignOn:
    description: When SSO is activated, UserGuiding's login screen will intelligently recognize your organization's domain,
      enabling your team to log in seamlessly via your chosen identity provider.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
usageLimits:
  activeUsersLimit:
    description: Maximum active user available
    valueType: NUMERIC
    defaultValue: 20000
    unit: user
    type: NON_RENEWABLE
  teamMembersLimit:
    description: Maximum team members available
    valueType: NUMERIC
    defaultValue: 1
    unit: member
    type: NON_RENEWABLE
    linkedFeatures:
    - teams
  activeGuidesLimit:
    description: Maximum active guides available
    valueType: NUMERIC
    defaultValue: 10
    unit: guide
    type: NON_RENEWABLE
    linkedFeatures:
    - guides
  activeHotspotsLimit:
    description: Maximum hotspots available
    valueType: NUMERIC
    defaultValue: 10
    unit: hotspot
    type: NON_RENEWABLE
    linkedFeatures:
    - hotspots
  activeOnboardingChecklistsLimit:
    description: Maximum checklists available
    valueType: NUMERIC
    defaultValue: 1
    unit: checklist
    type: NON_RENEWABLE
    linkedFeatures:
    - onboardingChecklist
  limitedCustomization:
    description: Wheter limited customization is available
    valueType: BOOLEAN
    defaultValue: true
    type: RENEWABLE
    linkedFeatures:
    - customization
plans:
  STARTUP:
    description: ''
    price: 199
    unit: /month
    features: null
    usageLimits: null
  GROWTH:
    description: ''
    price: 399
    unit: /month
    features:
      successCoaching:
        value: true
    usageLimits: null
  ENTERPRISE:
    description: ''
    price: 999
    unit: /month
    features:
      successCoaching:
        value: true
      customCSS:
        value: true
      sla:
        value: true
      singleSignOn:
        value: true
    usageLimits:
      activeUsersLimit:
        value: 50000
      teamMembersLimit:
        value: 1000000000
      activeGuidesLimit:
        value: 1000000000
      activeHotspotsLimit:
        value: 1000000000
      activeOnboardingChecklistsLimit:
        value: 1000000000
addOns: null
