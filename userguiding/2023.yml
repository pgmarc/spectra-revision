      Ideal for startups and SMBs.
    price: 129
    unit: /month
    features: null
    usageLimits: null
  PROFESSIONAL:
    description: Maximize activation, customer revenue, and retention. Ideal for rapidly
      growing companies.
    price: 499
    unit: /month
    features:
      adoptionTracker:
        value: true
      errorLogging:
        value: true
      languageLocalization:
        value: true
      removeUserGuidingBranding:
        value: true
      materialScheduling:
        value: true
      zapier:
        value: true
      roleManagement:
        value: true
      permissionManagement:
        value: true
      employeeOnboardingModule:
        value: true
      dedicatedCustomerSuccessManager:
        value: true
    usageLimits:
      activeGuidesLimit:
        value: 1000000000
      activeHotspotsLimit:
        value: 1000000000
      activeOnboardingChecklistsLimit:
        value: 1000000000
      activeResourceCentersLimit:
        value: 1000000000
      customizableThemesLimit:
        value: 5
      activeUsersLimit:
        value: 20000
      teamMembersLimit:
        value: 5
      domainsLimit:
        value: 5
