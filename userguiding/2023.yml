    unit: /month
    features:
      adoptionTracker:
        value: true
      errorLogging:
        value: true
      languageLocalization:
        value: true
      removeUserGuidingBranding:
        value: true
      materialScheduling:
        value: true
      zapier:
        value: true
      roleManagement:
        value: true
      permissionManagement:
        value: true
      employeeOnboardingModule:
        value: true
      dedicatedCustomerSuccessManager:
        value: true
    usageLimits:
      activeGuidesLimit:
        value: 1000000000
      activeHotspotsLimit:
        value: 1000000000
      activeOnboardingChecklistsLimit:
        value: 1000000000
      activeResourceCentersLimit:
        value: 1000000000
      customizableThemesLimit:
        value: 1000000000
      activeUsersLimit:
        value: 1000000000
      teamMembersLimit:
        value: 1000000000
      domainsLimit:
        value: 1000000000
