syntaxVersion: '2.1'
saasName: Planable
createdAt: '2020-11-26'
version: '2020-11-26'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20201126003853/https://planable.io/pricing/
features:
  posts:
    description:  Creating a post is the core feature of Planable and we created the most simple way for you to
      preview and see what the content looks like before publishing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pages:
    description: Number of social media pages allowed in each workspace. It can be
      multiple pages from the same platform.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  workspaces:
    description: A workspace is a collaborative place for your brand's social media content. Where you can create,
      review, collaborate, publish posts and keep everyone in the flow. 
    
      One workspace may be used for one brand, company, or client. If you have 3 clients, it means that you need 3 workspaces.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  selfService:
    description: Sign up, and start using Planable features without talking to sales.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  realTimeSupport:
    description: You can contact our Support team by email at support@planable.io or use the Chat service that can
      be found on the bottom right corner of your screen.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  personalizedOnboarding:
    description: A member of our Planable support team will be guiding you to adapt to Planable as fast as posible.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  roleBasedAccessControl:
    description: When you first invite a user, you assign them a role. Each role comes with different permissions.
      Inside each workspace, a user can have different permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  unlimitedStorage:
    description: Unlimited storage for your social media posts
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  auditLogging:
    description: See user activity in detail
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedSecurity:
    description: Advanced security features
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  postPreviews:
    description: Pixel-perfect mockups show you and your boss or client exactly how posts will look live.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multipleViewOptions:
    description: "Choose the perfect view for you: calendar, feed, list, or grid. With 4 options, it's
      hard NOT to be organized."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  atAGlance:
    description: The sleek, visual layout makes content planning simple (as heck). See how your posts all fit together
      as you're creating them.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collaborationInContext:
    description: Keep all your convos where they belong — right next to the post. Discuss, share thoughts, give
      and get feedback in one place.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customerService:
    description: Because awesome deserves awesome. You get quick, mucho helpful responses from team members who know their stuff.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  oneClickApprovals:
    description: Your approver okays your post with a single click. Even on the go (via the app). Seriously — how
      could they not love working with you?
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  centralizedPublishing:
    description: Create, schedule, and publish all your social posts from one place. Why do 4 times what you could do just once?
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mediaLibrary:
    description: All your creatives at your fingertips, all the time. Just drag and drop for easy reuse.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
usageLimits:
  usersLimit:
    description: Maximum number of users in your Planable account
    valueType: NUMERIC
    defaultValue: 3
    unit: user
    type: NON_RENEWABLE
  postsLimit:
    description: Maximum number of posts in your Planable account
    valueType: NUMERIC
    defaultValue: 1000000000000
    unit: post
    type: NON_RENEWABLE
    linkedFeatures:
    - posts
  pagesLimit:
    description: Maximum number of pages in your Planable account
    valueType: NUMERIC
    defaultValue: 10
    unit: page
    type: NON_RENEWABLE
    linkedFeatures:
    - pages
  workspacesLimit:
    description: Maximum number of workspaces in your Planable account
    valueType: NUMERIC
    defaultValue: 1
    unit: worspace
    type: NON_RENEWABLE
    linkedFeatures:
    - workspaces
  storageCapacity:
    description: Maximum disk space available in your Planable account
    valueType: NUMERIC
    defaultValue: 0
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - unlimitedStorage
plans:
  FREE:
    description: For social media teams wanting to try out Planable
    price: 0
    unit: user/month
    features: null
    usageLimits:
      usersLimit:
        value: 1000000000000
      postsLimit:
        value: 50
      pagesLimit:
        value: 1000000000000
      workspacesLimit:
        value: 1000000000000
  STARTER:
    description: For freelancers & startups with up to 3 team members
    price: 39
    unit: user/month
    features: null
    usageLimits: null
  PREMIUM:
    description: For small agencies & brands
    price: 99
    unit: user/month
    features: null
    usageLimits:
      usersLimit:
        value: 7
      pagesLimit:
        value: 1000000000000
      workspacesLimit:
        value: 5
  ENTERPRISE:
    description: For large organizations
    price: Custom
    unit: user/month
    features:
      realTimeSupport:
        value: true
      personalizedOnboarding:
        value: true
      roleBasedAccessControl:
        value: true
      unlimitedStorage:
        value: true
      auditLogging:
        value: true
      advancedSecurity:
        value: true
    usageLimits:
      usersLimit:
        value: 1000000000000
      pagesLimit:
        value: 1000000000000
      workspacesLimit:
        value: 1000000000000
      storageCapacity:
        value: 1000000000
addOns: null
