syntaxVersion: '2.1'
saasName: Planable
createdAt: '2023-10-21'
version: '2023-10-21'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20231021202757/https://planable.io/pricing/
features:
  posts:
    description:  Creating a post is the core feature of Planable and we created the most simple way for you to
      preview and see what the content looks like before publishing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pages:
    description: Number of social media pages allowed in each workspace. It can be
      multiple pages from the same platform.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publishTweets:
    description: Publish tweets using Planable
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  saveAsAnAd:
    description: The option to send your Facebook drafts as a dark post to your Ads
      Manager.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  aiAssistant:
    description: Quickly describe what you need, and the AI delivers. Start a new post, click Generate with AI,
      and describe what you're looking for.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  workspaces:
    description: A workspace is a collaborative place for your brand's social media content. Where you can create,
      review, collaborate, publish posts and keep everyone in the flow. 
    
      One workspace may be used for one brand, company, or client. If you have 3 clients, it means that you need 3 workspaces.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  feedView:
    description: The feed view helps you see the content exactly as it would look like before publishing any post on Facebook,
      Twitter, Instagram, LinkedIn, Google My Business, YouTube, Pinterest, Threads, and TikTok.

      You'll see the same cover & profile picture as you have on the social media accounts and can scroll through the "newsfeed". 
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  calendarView:
    description: Visualize content by week or month and see everything at a glance across all your pages. One calendar,
      one integrated social media strategy across multiple channels.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  gridView:
    description: The Grid view is the place to plan and preview your Instagram posts. Strategically plan and schedule your
      content by dragging and dropping posts in your grid view, visualize all the content you have in advance, and
      see everything at a glance to perfectly organize your Instagram account.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  listView:
    description: The list view is a place to help you manage your content easier & faster. It's where you get a quick
      preview of posts across all your pages and can do bulk actions for multiple posts at a time.

      In this view, you'll see a snippet of the caption, the file type, status of the posts, author, labels, page,
      and date & time selected.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  labels:
    description: Categorize posts per campaign, topic or content pillar with color-coded
      labels.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mediaStorage:
    description: You can store all your brand creatives in your workspace Media Library. Simply upload your
      files and reuse them across posts whenever needed.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  syncPreviousContent:
    description: Import content published outside of Planable.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  publishedPostsStorage:
    description: Published posts are archived after 1 year. Then permanently deleted.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  archivedPostsStorage:
    description: Archive your posts instead of deleting them immediately when you no longer need them.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  noneApprovalWorkflows:
    description: Set workflows that do not require approval for publishing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  optionalApprovalWorkflows:
    description: Set workflows that have approvals enabled, but aren't required for
      publishing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  requiredApprovalWorkflows:
    description: Set workflows that require an approvals for publishing.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiLevelApprovalWorkflows:
    description: Set workflows that require 2 or more approvals for publishing.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  internalAndExternalCollaboration:
    description: Have the option to hold conversations and posts behind the scenes,
      out of approver's sight.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  versionHistory:
    description: See who did what and when. Preview & restore previous versions of
      your posts.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  helpCenter:
    description: Get access our to our knowledge support portal.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  prioritySupport:
    description: Your requests are prioritized over other plan tiers.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  chatSupport:
    description: Support via chat
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  personalizedOnboarding:
    description: A member of our Planable support team will be guiding you to adapt to Planable as fast as posible.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountManager:
    description: A member of our Planable support team will be guiding you to achieve long term results with the platform.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  paymentOptions:
    description: Pay with Debit/Credit card, ACH/Bank transfer or with a PayPal account.
    valueType: TEXT
    defaultValue:
    - CARD
    type: PAYMENT
usageLimits:
  postsLimit:
    description: Maximum number of posts in your Planable account
    valueType: NUMERIC
    defaultValue: 1000000000000
    unit: posts
    type: NON_RENEWABLE
    linkedFeatures:
    - posts
  postsPerMonthLimit:
    description: Maximum number of posts per month in your Planable account
    valueType: NUMERIC
    defaultValue: 10000000
    unit: posts/month
    type: RENEWABLE
    linkedFeatures:
    - posts
  socialMediaPagesLimit:
    description: Number of social media pages allowed in each workspace. It can be multiple pages from the same platform.
    valueType: NUMERIC
    defaultValue: 4
    unit: pages/workspace
    type: NON_RENEWABLE
    linkedFeatures:
    - pages
  tweetsLimit:
    description: Maximum number of tweets per page and day
    valueType: NUMERIC
    defaultValue: 1
    unit: tweet/page/day
    type: RENEWABLE
    linkedFeatures:
    - publishTweets
  workspacesLimit:
    description: Maximum number of workspaces in your Planable account
    valueType: NUMERIC
    defaultValue: 1
    unit: worspace
    type: NON_RENEWABLE
    linkedFeatures:
    - workspaces
  numberOfLabels:
    description: Categorize posts per campaign, topic or content pillar with color-coded labels.
    valueType: NUMERIC
    defaultValue: 5
    unit: label
    type: NON_RENEWABLE
    linkedFeatures:
    - labels
  mediaStorageCapacity:
    description: Maximum disk space storage for media
    valueType: NUMERIC
    defaultValue: 10
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - mediaStorage
  publishedPostsStorageLimit:
    description: Maximum disk space available for published posts
    valueType: NUMERIC
    defaultValue: 13
    unit: month
    type: NON_RENEWABLE
    linkedFeatures:
    - publishedPostsStorage
  archivedPostsStorageLimit:
    description: Maximum disk space available for achived posts
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - archivedPostsStorage
  versionHistoryThreshold:
    description: Maximum period to keep track of previous versions of posts
    valueType: NUMERIC
    defaultValue: 7
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - versionHistory
plans:
  FREE:
    description: For anyone wanting to test Planable out
    price: 0
    unit: /month
    features:
      saveAsAnAd:
        value: true
      gridView:
        value: true
      listView:
        value: true
      syncPreviousContent:
        value: true
      requiredApprovalWorkflows:
        value: true
      multiLevelApprovalWorkflows:
        value: true
      internalAndExternalCollaboration:
        value: true
    usageLimits:
      postsLimit:
        value: 50
      postsPerMonthLimit:
        value: 50
      socialMediaPagesLimit:
        value: 10
      numberOfLabels:
        value: 10000000
      mediaStorageCapacity:
        value: 1000000
      versionHistoryThreshold:
        value: 1000000
  BASIC:
    description: For businesses getting started with social media
    price: 13
    unit: user/month
    features: null
    usageLimits: null
  PRO:
    description: For growing social media teams
    price: 26
    unit: user/month
    features:
      saveAsAnAd:
        value: true
      gridView:
        value: true
      syncPreviousContent:
        value: true
      requiredApprovalWorkflows:
        value: true
      internalAndExternalCollaboration:
        value: true
      chatSupport:
        value: true
    usageLimits:
      socialMediaPagesLimit:
        value: 10
      tweetsLimit:
        value: 1000000000000
      numberOfLabels:
        value: 10
      mediaStorageCapacity:
        value: 50
      versionHistoryThreshold:
        value: 30
  ENTERPRISE:
    description: For large social media teams wanting to scale
    price: Custom
    unit: user/month
    features:
      saveAsAnAd:
        value: true
      gridView:
        value: true
      listView:
        value: true
      syncPreviousContent:
        value: true
      requiredApprovalWorkflows:
        value: true
      multiLevelApprovalWorkflows:
        value: true
      internalAndExternalCollaboration:
        value: true
      prioritySupport:
        value: true
      chatSupport:
        value: true
      personalizedOnboarding:
        value: true
      dedicatedAccountManager:
        value: true
      paymentOptions:
        value:
        - CARD
        - ACH
        - WIRE_TRANSFER
        - GATEWAY
    usageLimits:
      socialMediaPagesLimit:
        value: 10
      tweetsLimit:
        value: 1000000000000
      numberOfLabels:
        value: 10000000
      mediaStorageCapacity:
        value: 1000000
      publishedPostsStorageLimit:
        value: 24
      archivedPostsStorageLimit:
        value: 365
      versionHistoryThreshold:
        value: 1000000
addOns:
  extraWorkspace:
    description: Add an extra workspace to your account.
    availableFor:
    - BASIC
    - PRO
    price: 20
    unit: workspace/month
    features: null
    usageLimits: null
    usageLimitsExtensions:
      workspacesLimit:
        value: 1
