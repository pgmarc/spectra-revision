syntaxVersion: '2.1'
saasName: Trustmary - Full
createdAt: '2020-10-31'
version: '2020-10-31'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20201101013956/https://trustmary.com/pricing/
features:
  nps:
    description: Net-Promoter-Score is the most used metric for customer loyalty.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  csat:
    description: Customer satisfaction score is very commonly used for quick indication of satisfaction on
      specific product/service.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  forms:
    description: Recollect feedback with forms
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collectingFeedback:
    description: You can collect both customer feedback and reviews within the same survey.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  standardForms:
    description: Standard forms
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customForms:
    description: Customize your forms
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  collectWithEmail:
    description: Collect feedback via email
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  shareablelink:
    description: Share forms via shareable link
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  qrCode:
    description: Share forms via QR
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  thirteenQuestionTypes:
    description: 13 different questions types
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  importingContacts:
    description: Importing contacts
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  smartContactLists:
    description: Smart contact lists
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  embedSurbeysToWebsite:
    description: Embed surveys to website
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  textReviews:
    description: Text reviews
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  videoReviews:
    description: Video reviews
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  importReviewsFromGoogle:
    description: Import reviews from Google
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.google.com/
  importReviewsFromFacebook:
    description: Import reviews from Facebook
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.facebook.com/
  requestGoogleReviews:
    description: Request Google reviews
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  embedReviewsToWebsite:
    description: Embed reviews to website
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  embedTestimonialsToWebsite:
    description: Embed testimonials to website
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  customizeEmbeds:
    description: Customize embeds
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  socialMediaShare:
    description: Popup notifications
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  popupNotifications:
    description: Popup notifications
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  measureConversions:
    description: Measure conversions
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  emailSupport:
    description: Email support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  phoneSupport:
    description: Phone support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  designatedExpert:
    description: Designated expert
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  formsLimit:
    description: Maximum forms available
    valueType: NUMERIC
    defaultValue: 2
    unit: form
    type: NON_RENEWABLE
    linkedFeatures:
    - forms
  textReviewsLimit:
    description: Maximum text reviews available
    valueType: NUMERIC
    defaultValue: 50
    unit: review
    type: NON_RENEWABLE
    linkedFeatures:
    - textReviews
  embedsLimit:
    description: Maximum embeds available
    valueType: NUMERIC
    defaultValue: 0
    unit: embed
    type: NON_RENEWABLE
    linkedFeatures:
    - embedSurbeysToWebsite
    - embedReviewsToWebsite
    - embedTestimonialsToWebsite
  usersLimit:
    description: Maximum users allowed to access Trustmary
    valueType: NUMERIC
    defaultValue: 2
    unit: user
    type: NON_RENEWABLE
  emailsLimit:
    description: Maximum emails per month available
    valueType: NUMERIC
    defaultValue: 1000
    unit: email/month
    type: RENEWABLE
    linkedFeatures:
    - collectWithEmail
plans:
  LIGHT:
    description: ''
    price: Contact Sales
    unit: /month
    features: null
    usageLimits: null
  PLUS:
    description: ''
    price: Contact Sales
    unit: /month
    features:
      customForms:
        value: true
      thirteenQuestionTypes:
        value: true
      importingContacts:
        value: true
      smartContactLists:
        value: true
      embedSurbeysToWebsite:
        value: true
      videoReviews:
        value: true
      importReviewsFromGoogle:
        value: true
      importReviewsFromFacebook:
        value: true
      requestGoogleReviews:
        value: true
      customizeEmbeds:
        value: true
      socialMediaShare:
        value: true
      popupNotifications:
        value: true
      measureConversions:
        value: true
      phoneSupport:
        value: true
    usageLimits:
      formsLimit:
        value: 10
      textReviewsLimit:
        value: .inf
      usersLimit:
        value: 5
      emailsLimit:
        value: 1000
  ENTERPRISE:
    description: ''
    price: Contact Sales
    unit: /month
    features:
      customForms:
        value: true
      thirteenQuestionTypes:
        value: true
      importingContacts:
        value: true
      smartContactLists:
        value: true
      embedSurbeysToWebsite:
        value: true
      videoReviews:
        value: true
      importReviewsFromGoogle:
        value: true
      importReviewsFromFacebook:
        value: true
      requestGoogleReviews:
        value: true
      customizeEmbeds:
        value: true
      socialMediaShare:
        value: true
      popupNotifications:
        value: true
      measureConversions:
        value: true
      phoneSupport:
        value: true
      designatedExpert:
        value: true
    usageLimits:
      formsLimit:
        value: .inf
      textReviewsLimit:
        value: .inf
      usersLimit:
        value: .inf
      emailsLimit:
        value: .inf
addOns: null
