    integrationType: WEB_SAAS
  hubspotIntegration:
    description: Request responses automatically from your CRM contacts and push information back to their CRM profiles.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  pipedriveIntegration:
    description: Request responses automatically from your CRM contacts and push information back to their CRM profiles.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  chatSupport:
    description: In-app chat helps 24/7 in the app
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  emailSupport:
    description: Support via email
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  phoneSupport:
    description: More personal support over phone and video calls.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountManager:
    description: Get account manager for your service and plan goals together
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  onboardingPackage:
    description: Onboarding package included in Fullsuite plans but possible to get for self-service plans.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  viewsLimit:
    description: Maximum limit for views
    valueType: NUMERIC
    defaultValue: 500
    unit: view/month
    type: RENEWABLE
    linkedFeatures:
    - views
  reviewPlatformConnectionsLimit:
    description: Maximum review platform connections available
    valueType: NUMERIC
    defaultValue: 1
    unit: platform
    type: NON_RENEWABLE
    linkedFeatures:
    - reviewPlatformConnections
  reviewImportCountLimit:
    description: Maximum review import count available
    valueType: NUMERIC
    defaultValue: 1000
    unit: review
    type: NON_RENEWABLE
    linkedFeatures:
    - reviewImportCount
  monthlySurveyResponsesLimit:
    description: Maximum monthly survey responses available
    valueType: NUMERIC
    defaultValue: 5
    unit: response/month
    type: RENEWABLE
    linkedFeatures:
    - surveys
  annualSurveyResponsesLimit:
    description: Maximum annual survey responses available
    valueType: NUMERIC
    defaultValue: 0
    unit: response/year
    type: RENEWABLE
    linkedFeatures:
    - surveys
  monthlyEmailRequestsLimit:
    description: Monthly email request available
    valueType: NUMERIC
    defaultValue: 5
    unit: request/month
    type: RENEWABLE
    linkedFeatures:
