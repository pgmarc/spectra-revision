syntaxVersion: '2.1'
saasName: Trustmary - Collect
createdAt: '2023-10-30'
version: '2023-10-30'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20231031155120/https://trustmary.com/pricing/
features:
  responses:
    description: Responses is the number responses you get to your surveys. Limit resets monthly.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiAccess:
    description: Our public API can currently be used in adding contacts (your customers) and getting the answer
      data back to your system.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  requestsViaEmail:
    description: You can distribute surveys email.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  automations:
    description: Automate your reviews and feedback process with email
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  zapierIntegration:
    description: Zapier allows you to automate collection from +5,000 different software platforms.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  hubspotIntegration:
    description: Request responses automatically from your CRM contacts and push information back to their CRM profiles.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.hubspot.com/pricing/marketing/starter
  pipedriveIntegration:
    description: Request responses automatically from your CRM contacts and push information back to their CRM profiles.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.pipedrive.com/en/pricing
  domains:
    description: Add widgets to an unlimited number of websites.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  widgets:
    description: Create as many widgets as you want.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  reviews:
    description: Connect a review source, import existing reviews and manage them all in Trustmary — unlimited
      number of imported reviews from one source!
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  removeTrustmaryBranding:
    description: Remove Trustmary branding from the bottom of the review widget.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  views:
    description: Views is the total number of times the widgets load on a website. The limit resets on the 1st day of every month.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  reviewPlatform:
    description: The number of review platforms you can import reviews from and show in widgets. We currently support Google,
      Facebook, Capterra, G2, Tripadvisor, and Yelp.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  manageReviews:
    description: Easily approve or disapprove reviews and decide which reviews will be shown and where.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tagReviews:
    description: Create and use custom tags to filter which reviews are shown in widgets.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  syncReviewsAutomatically:
    description: Once a review source has been added, new reviews will be synced automatically to Trustmary — daily.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  addReviewsManually:
    description: Manually add reviews you don't have available in other review platforms. For example, reviews from your
      email inbox, written reviews on paper etc..
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  importReviewsFromSpreadsheets:
    description: If you can export reviews into a spreadsheet, you can easily import them into Trustmary.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  reviewSchema.orgMarkup:
    description: Review Schema.org markup allows search engines to read the reviews and overall rating on your website
      and display them in search results. It will increase the attractiveness of your website snippet and may improve
      your appearance in search engine results.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  trustMaryAiScore:
    description: Show reviews in widgets based on AI analysis of the quality of the review.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicReviewProfilePage:
    description: All your approved reviews will be shown on your unique profile page. This page can be
      freely used for your needs.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  goalTracking:
    description: Goal tracking automatically scans the conversion goals from your website and tracks how reviews
      affect your goal conversions.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  reviewWidgets:
    description: Embed reviews to your website in a minute with an easy copy-paste script. No coding skills needed.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  formWidgets:
    description: Form widgets allow you to collect leads from your website and ask questions from website visitors.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  badgeWidgets:
    description: Badge widgets enable creating simple badges for your website to display, for example, your overall NPS
      score or star rating average.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  popupWidgets:
    description: Popup widgets allow you to popup reviews, forms and badges on your website with specific rules that
      can be set from the editor.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  ctaWidgets:
    description: CTA (Call to Action) widgets are designed so you can add reviews as close to the CTA buttons as possible
      to boost conversions.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  reviewFiltering:
    description: Easily filter what kind of reviews you want to show and where with comprehensive filter features.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: FILTERING
  freeWidgetInstallationHelp:
    description: Our experts will help you install a widget to your website, if you need assistance.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  chatSupport:
    description: Get assistance for any issues from our in-app chat operating on business days.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  phoneSupport:
    description: Phone support if you prefer discussing over phone.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountManager:
    description: A dedicated person who ensures that you get the best value out of Trustmary and helps you in every turn.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  responsesLimit:
    description: Maximum response per month available
    valueType: NUMERIC
    defaultValue: 5
    unit: response/month
    type: RENEWABLE
  requestsViaEmailLimit:
    description: Maximum requests via email per month available
    valueType: NUMERIC
    defaultValue: 0
    unit: request/month
    type: RENEWABLE
  viewsLimit:
    description: Maximum views per month available
    valueType: NUMERIC
    defaultValue: 200
    unit: view/month
    type: RENEWABLE
  reviewPlatformConnectionsLimit:
    description: Maximum review platform connections available
    valueType: NUMERIC
    defaultValue: 1
    unit: connection
    type: NON_RENEWABLE
    linkedFeatures:
    - reviewPlatform
plans:
  SOLO:
    description: Essentials to get more reviews and feedback
    price: 0
    unit: /month
    features: null
    usageLimits: null
  STARTER:
    description: For smaller teams, more responses and automations
    price: 29
    unit: /month
    features:
      automations:
        value: true
      zapierIntegration:
        value: true
    usageLimits:
      responsesLimit:
        value: 25
      requestsViaEmailLimit:
        value: 500
      viewsLimit:
        value: 5000
      reviewPlatformConnectionsLimit:
        value: 3
  BUSINESS:
    description: The best Collect plan for growing companies
    price: 79
    unit: /month
    features:
      automations:
        value: true
      zapierIntegration:
        value: true
      hubspotIntegration:
        value: true
      pipedriveIntegration:
        value: true
      removeTrustmaryBranding:
        value: true
      phoneSupport:
        value: true
    usageLimits:
      responsesLimit:
        value: 100
      requestsViaEmailLimit:
        value: 2000
      viewsLimit:
        value: 25000
      reviewPlatformConnectionsLimit:
        value: 10
  SCALE:
    description: For experts, loads of responses plus all the features
    price: 189
    unit: /month
    features:
      automations:
        value: true
      zapierIntegration:
        value: true
      hubspotIntegration:
        value: true
      pipedriveIntegration:
        value: true
      removeTrustmaryBranding:
        value: true
      phoneSupport:
        value: true
      dedicatedAccountManager:
        value: true
    usageLimits:
      responsesLimit:
        value: 500
      requestsViaEmailLimit:
        value: 10000
      viewsLimit:
        value: 100000
      reviewPlatformConnectionsLimit:
        value: 25
addOns: null
