        value: true
      emailSending:
        value: true
      smsSending:
        value: true
      customerSuccess:
        value: true
    usageLimits:
      publishedReviewsLimit:
        value: .inf
      activeWidgetsLimit:
        value: .inf
      usersLimit:
        value: .inf
  PRO:
    description: ''
    price: 590
    unit: /month
    features:
      embedReviews:
        value: true
      qrReviews:
        value: true
      urlReviews:
        value: true
      widgetWhiteLabeling:
        value: true
      abTesting:
        value: true
      zapierIntegrations:
        value: true
      hubspotIntegration:
        value: true
      pipedriveIntegration:
        value: true
      automations:
        value: true
      emailSending:
        value: true
      smsSending:
        value: true
      customerSuccess:
        value: true
      comprehensiveSurveyTool:
        value: true
      surveyTemplateLibrary:
        value: true
      npsForms:
        value: true
      csatForms:
        value: true
      cesForms:
        value: true
      customizableSurveys:
        value: true
      conditionalSurveyQuestions:
        value: true
      customerFeedbackConvertedIntoReviews:
        value: true
      crmIntegrations:
        value: true
    usageLimits:
      publishedReviewsLimit:
        value: .inf
      activeWidgetsLimit:
        value: .inf
      usersLimit:
        value: .inf
