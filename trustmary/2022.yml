syntaxVersion: '2.1'
saasName: Trustmary
createdAt: '2022-11-29'
version: '2022-11-29'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20221130180437/https://trustmary.com/pricing/
features:
  reviews:
    description: Analyze feedback and reviews
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  reviewForms:
    description: Collect revies with forms
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  widgets:
    description: Create as many widgets as you want.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  importTestimonials:
    description: 'Import testimonials from other platforms, such as: G2, Capterra,
      Google, Facebook, Tripadvisor, Yelp, Trustpilot'
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  embedReviews:
    description: Embed revies on websites
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  qrReviews:
    description: Distribute forms via QR code
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  urlReviews:
    description: Distribute forms via share link
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  widgetWhiteLabeling:
    description: Widget whiteLabeling. Remove Trustmary brand inside the widget.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  abTesting:
    description: A/B testing
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  zapierIntegrations:
    description: Zapier allows you to automate collection from +5,000 different software platforms.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://zapier.com/pricing
  hubspotIntegration:
    description: Request responses automatically from your CRM contacts and push information back to their CRM profiles.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.hubspot.com/pricing/marketing/starter
  pipedriveIntegration:
    description: Request responses automatically from your CRM contacts and push information back to their CRM profiles.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.pipedrive.com/en/pricing
  automations:
    description: Automate your reviews and feedback process with email
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  emailSending:
    description: Distribute your form via email
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  smsSending:
    description: Distribute your form via SMS
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  customerSuccess:
    description: Customer success manager
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  comprehensiveSurveyTool:
    description: Comprehensive Survey tool
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  surveyTemplateLibrary:
    description: Survey template library
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  npsForms:
    description: Net-Promoter-Score is the most used metric for customer loyalty.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  csatForms:
    description: Customer satisfaction score is very commonly used for quick indication of satisfaction on
      specific product/service.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  cesForms:
    description: CES forms
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customizableSurveys:
    description: You can customize all the forms to meet your needs and branding.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  conditionalSurveyQuestions:
    description: Conditional survey questions
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customerFeedbackConvertedIntoReviews:
    description: Customer feedback converted into reviews
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  crmIntegrations:
    description: CRM integrations
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
usageLimits:
  publishedReviewsLimit:
    description: Maximum published reviews available
    valueType: NUMERIC
    defaultValue: 20
    unit: review
    type: NON_RENEWABLE
    linkedFeatures:
    - reviews
  reviewFormsLimit:
    description: Maximum review forms available
    valueType: NUMERIC
    defaultValue: 1
    unit: form
    type: NON_RENEWABLE
    linkedFeatures:
    - reviewForms
  activeWidgetsLimit:
    description: Maximum active widgets available
    valueType: NUMERIC
    defaultValue: 1
    unit: widget
    type: NON_RENEWABLE
    linkedFeatures:
    - widgets
  usersLimit:
    description: Maximum users limit
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
plans:
  SOLO:
    description: ''
    price: 0
    unit: /month
    features: null
    usageLimits: null
  BUSINESS:
    description: ''
    price: 90
    unit: /month
    features:
      embedReviews:
        value: true
      qrReviews:
        value: true
      urlReviews:
        value: true
      widgetWhiteLabeling:
        value: true
    usageLimits:
      publishedReviewsLimit:
        value: .inf
      activeWidgetsLimit:
        value: .inf
  AUTOMATE:
