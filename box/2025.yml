addOns:
  BOX_GOVERNANCE:
    description: Set advanced retention policies, disposals, and legal holds on your content
    availableFor:
      - BUSINESS_PLUS
      - ENTERPRISE
    price: Contact Sales
    features:
      boxGovernance:
        value: true
  BOX_ZONES:
    description: Helping you comply with multi-regional data residency requirements
    availableFor:
      - BUSINESS_PLUS
      - ENTERPRISE
    price: Contact Sales
    features:
      boxZones:
        value: true
  BOX_KEYSAFE:
    description: Securely manage your own encryption keys
    availableFor:
      - BUSINESS_PLUS
      - ENTERPRISE
      - ENTERPRISE_PLUS
      - ENTERPRISE_ADVANCED
    price: Contact Sales
    features:
      boxKeySafe:
        value: true
  BOX_SHIELD:
    description: Prevent data breaches with classification-based security controls and intelligent threat detection
    availableFor:
      - ENTERPRISE
    price: Contact Sales
    features:
      boxShield:
        value: true
  GxP_Compliance_With_21_CFR_Part11:
    description: FDA 21 CFR Part 11 compliance
    price: Contact Sales
    availableFor:
      - ENTERPRISE_PLUS
      - ENTERPRISE_ADVANCED
    features:
      gxPComplianceWith21CfrPart11:
        value: true