syntaxVersion: '2.1'
saasName: Deskera - ERP
createdAt: '2025-03-05'
version: '2025'
currency: USD
features:
  estimates:
    description: Monitor budget performance and forecasts in real-time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  salesOrder:
    description: You can create, edit and delete a sales order by using the Deskera ERP's Sales Order feature.
      A Sales Order is the next step, following the prospective customer's acceptance of the Customer Quotation and
      has shared the Purchase Order (PO) with the seller. Generated by the company itself, a Sales Order
      is used as an acknowledgement of the PO shared by the prospective customer before delivering the finished good(s).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  invoices:
    description: Create and send invoices quickly and efficiently.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  purchaseRequisitions:
    description: Automate your purchasing process with Requisitions. Easily create, submit,
      track, and approve purchase requests from a single, centralized location. Gain visibility
      into spending and improve reporting accuracy.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  purchaseOrders:
    description: Create, track and approve Purchase Orders quickly and easily. Streamline the process of
      ordering goods and services by creating purchase orders in a few clicks. Automatically generate a
      summary of all purchase orders and track them to ensure timely delivery.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  bills:
    description: Generate bills for purchases.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  expenses:
    description: Take a picture and submit the expense
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  documentTemplateDesigner:
    description: Deskera ERP's Document Designer allows an option to create custom templates as per organizational needs.
      The features are easy-to-use and similar to creating a table in MS Word.  Add columns and rows, add formula,
      tag fields for the data to auto populate, add logo and headings and the template is ready to use!
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  paymentMilestones:
    description: Create payment milestones to streamline accounts payable, set custom payments with
      specific dates and amounts, ensure timely payments by setting reminders and notifications.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customers:
    description: Create, edit and delete customers
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  vendors:
    description: Create, edit and delete vendors
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  products:
    description: Create, edit and delete products
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  services:
    description: Create, edit and delete services
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  priceLists:
    description: Define prices for items your company sells.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  inventoryTracking:
    description: Deskera's inventory management software updates your stocks in real-time and allows
      you to view the stock availability in each warehouse in seconds.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  orderFulfillment:
    description: Deskera Order Fulfillment provides inventory managers with a comprehensive
      suite of tools to facilitate the entire order fulfillment process.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  goodsReceipt:
    description: Edit, download and print goods receipt
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  inventoryReorder:
    description: Replenish inventory quickly and easily. Schedule re-order points and receive
      alerts when stock runs low. Automatically generate purchase orders to ensure continuous supply.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  productVariants:
    description: Create variants of a product with different characteristics. For example, image you are selling
      a T-shirt with different sizes (S, M and L) and colors (blue or red).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  inventoryBarcoding:
    description: Easily generate barcodes and quickly scan them for efficient inventory management.
      Automatically sync data with the inventory database for up-to-date records. Monitor stock levels
      and track products with a reliable barcode scanning system.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  uomSchemas:
    description: Create uniformity in operational workflow. Easily convert between UOMs with the click of
      a button and configure UOMs at a granular level. Benefit from the flexibility of custom UOMs and achieve
      efficiency in all your business operations.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiWarehouse:
    description: Assign stock to each location and keep track of inventory across all warehouses.
      Automate inventory tracking, stock allocation, and shipping processes across different warehouses.
      Access real-time inventory reports to maintain optimal stock levels.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  rowRackBin:
    description: Organize warehouse stock with Row, Rack, Bin. Easily assign inventory to specific storage
      locations, view the exact location of every item in the warehouse, and track and monitor stock levels at a glance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  warehouseRoles:
    description: Empower your warehouse team with Role Based Access Control, allowing tailored access
      and enhanced data security. Streamline operations by assigning specific permissions to users,
      ensuring efficient management and safeguarding sensitive information.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  stockAdjustments:
    description: Easily manage stock adjustments between warehouses and locations
      with a single click. Monitor inventory levels in real-time and track them across multiple warehouses.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  stockTransfers:
    description: Easily manage stock transfers between warehouses and locations
      with a single click. Monitor inventory levels in real-time and track them across multiple warehouses.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  lotTracking:
    description: Easily identify and trace specific items with custom lot numbers.
      Quickly locate current and past inventory details with real-time visibility. Streamline inventory
      processes and maximize efficiency.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  batchTracking:
    description: Easily identify and trace specific items with custom batch numbers.
      Quickly locate current and past inventory details with real-time visibility. Streamline inventory
      processes and maximize efficiency.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  serialTracking:
    description: Easily identify and trace specific items with custom serial numbers.
      Quickly locate current and past inventory details with real-time visibility. Streamline inventory
      processes and maximize efficiency.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  billOfMaterials:
    description: Create a bill of materials (BoM) for your parts, components, stored in Deskera. A BoM comprises guidelines needed
      for gathering and utilizing the mentioned materials.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  pickPackShip:
    description: Pick, Pack, Ship is the optimal solution for streamlining order fulfillment. It enables
      efficient management of the entire order process from order placement to delivery.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  landedCost:
    description: Track landed costs. Landed cost is the total cost to have goods produced and delivered from one point to another.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  bankFeeds:
    description: Set up bank feeds to automatically import transactions into the ERP system
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  importBankTransactions:
    description: Import bank transactions into Deskera ERP
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  bankRules:
    description: Set up rules to reconcile transactions automatically and reduce manual effort.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  chartOfAccounts:
    description: Chart of Acconts in Deskera ERP. All accounting entries need to be tagged to general ledger accounts. A chart of accounts (COA) is a
      list of all such general ledger accounts. It contains details of each individual general ledger account including
      'Account Code', 'Account Name', 'Account Type', and 'Account Balance'.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  journalEntries:
    description: Track financial transactions and create accurate reports with journal entries.
      Record complex entries with multiple debits and credits quickly. Automatically generate supporting
      documents to back up journal entries.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  deposits:
    description: Easy-to-use Online Deposit Software. Keep up to date with advance payments and cash deposits in a single view.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  creditNotes:
    description: Record, Manage and track credit notes on Deskera Books with a single accounting system. These can be
      edited and re-issued to clients with ease. With Deskera Books, you can easily amend your invoice document with
      a credit note, without deleting the record from your system.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  debitNotes:
    description: Create debit notes to the seller.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  budgeting:
    description: Use Budgeting to create a financial plan for your business.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  financialYearClosing:
    description: Year end closing, or closing of books, is an important accounting action to be carried at
      the end of the year. Once the books are closed, the financial data for the year is locked. The attached
      pdf document explains how accounting year end closing works in Deskera and how the user can carry it out
      themselves, provided they have the necessary access rights.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  class:
    description: Create a class inside Deskera ERP
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  department:
    description: Create a department inside Deskera ERP
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  location:
    description: Create warehouse location inside Deskera ERP
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customFields:
    description:  Create custom fields in Deskera.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiBookAccounting:
    description: Access to mult book accouting in Deskera. Multi-book accounting refers to the practice of maintaining and reporting
      financial information using multiple sets of accounting books or reporting standards.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiEntityConsolidation:
    description: For organizations with multiple entities, results are consolidated and intercompany
      transactions eliminated to present a unified financial view.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  interCompanyEliminations:
    description: Intercompany eliminations remove internal transactions between related entities
      in a corporate group, ensuring consolidated financial statements reflect only external activity.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  revaluations:
    description: Revalue business real value
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiCurrencyAccounting:
    description: Apply multi-currency in Deskera, enabling working with multiple currency.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  revenueRecognition:
    description: Automatically record revenue when it is earned in accordance with applicable rules, and report
      on current and past revenue to help inform future decisions. Monitor and adjust revenue recognition and
      ensure up-to-date financial reporting.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  expenseAmortization:
    description: Calculate expense amortization in advance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  reclassification:
    description: Use accouting reclassification in Deskera ERP. Reclassification accounting refers to the process of changing the classification of certain
      financial items or transactions in an organization's financial statements.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  approvalFlows:
    description: Create, assign, and manage approval requests in a fraction of the time. Automatically route
      requests to the right people for approval and get real-time notifications for faster decision-making. Track and audit approvals to ensure compliance and accuracy.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  workflowAutomation:
    description: Create, assign, and manage approval requests in a fraction of the time. Automatically route
      requests to the right people for approval and get real-time notifications for faster decision-making. Track and audit approvals to ensure compliance and accuracy.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  financialReports:
    description: Generate insights into financial performance with Financial Reports. Get real-time
      updates on your finances and track your cash flow movements with customizable reports. Quickly identify
      areas of improvement and make informed decisions with detailed financial data.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  salesReports:
    description: Deskera Books offers Sales reports.  These reports highlight important aspects of your
      business and help you make strategic decisions. You can fetch the same details for your Sales side.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  purchaseReports:
    description: Deskera Books offers multiple Purchase reports.  These reports highlight important aspects of your business
      and help you make strategic decisions. For instance you can get information on the pending products and their
      quantity for all Purchase orders.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  invetoryReports:
    description: Generate detailed, accurate inventory reports, easily keep track of stock levels, identify stock deficiencies,
      and monitor inventory movements with customizable report templates. Take the guesswork out of inventory management.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  warehouseReports:
    description: Deskera's Warehouse Management provides you with the ability to forecast inventory needs,
      create automated replenishment plans, and generate real-time inventory reports.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  reportBuilder:
    description: Include or exclude each field in a report.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  accountManagement:
    description: Create, edit and view customer accounts with ease, and track customer details such as
      contact and billing information. Quickly access customer data and manage customer accounts with a few clicks.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  contactDatabase:
    description: Create, edit and delete contacts in your sales contact database
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  deals:
    description: Create, retrieve, update and delete deals in Deskera CRM.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  opportunities:
    description:  Create, retrieve, update and delete opportunities in Deskera CRM.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  salesPipelines:
    description: A sales pipeline is a visual representation of where each prospect is in the sales process
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tasks:
    description: Actionable to-do items—such as calls, emails, or meetings—linked to contacts, companies,
      or deals to ensure follow-up and accountability
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  activities:
    description: Schedule activities in the calendar.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  forms:
    description: Create forms with customized fields (Text, Number, Email, Date, Select, Multi-Select) to gather data
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  landingPages:
    description: Design fast, responsive landing pages in minutes without writing a single line of code.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  emailBroadcasts:
    description: Design and manage email campaigns, but also to track and manage all kind of campaigns
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dripEmailSequence:
    description: Create drip sequences for email campaigns.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  salesAutomation:
    description: React to events when certain actions are taken during Sales workflow
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  marketingAutomation:
    description: React to events when certain actions are taken during Marketing workflow
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  crmReports:
    description: Get a general overview of Deskera CRM
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  recruitmentManagement:
    description: Access employee information anytime from anywhere.
      Offer personalized candidate experience with automated communication.
      Assess candidates using automated scoring and tracking.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  employeeDatabase:
    description: Create an up-to-date employee database in one place. Access employee information anytime from anywhere.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  payrollIntegration:
    description: Generate accurate payrolls with the click of a button.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  timeOffs:
    description: Record and manage leaves taken by employees.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  employeeExpenses:
    description: Track employee expenses in real-time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  timesheetTracking:
    description: Review tasks and working hours in the employees' timesheets and subsequently approve or reject them.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  shiftManagement:
    description: Assign shifts to employees in Deskera
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  attendanceTracking:
    description: Monitor employees' hours worked.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  geoFencing:
    description: Ensure employees mark attendance only when they are physically present at an approved location
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  performanceAppraisals:
    description: Performance Appraisal module streamlines, improves, and automates the complete performance management process
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apisIntegration:
    description: Integrate other app with Deskera by exposing their APIs
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  amazonIntegration:
    description: Integrate Deskera with Amazon Business
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://amazon.com/
  paypalIntegration:
    description: Deskera Books and Paypal integration enable you to accept online payments from your
      customers and automatically view, reconcile transactions in Deskera Books. Your customers can
      just click on the payment link in the invoice and pay online within seconds.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://paypal.com/
  shipstationIntegration:
    description: Integrate Deskera with ShipStation. ShipStation is a platform streamlines your warehouse,
      inventory and shipping workflows.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://shipstation.com/
  shopifyIntegration:
    description: "- Shopify App posts Shopify store sales automatically to Deskera Books, and reconciles your payouts so that you know everything has been accounted for correctly.\n
      - Set it and forget it - It takes two minutes to set up, then the App generates payout summaries that reconcile each time a payout hits your bank account.\n
      - Shopify Plus, multi-store & multi-currency all supported - the App for Shopify automates accounting for all your Shopify stores, in any currency, including
      multi-currency stores and stores offering more than one method of payment."
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://shopify.com/
  squareIntegration:
    description: The square app allows you to connect your square application with Deskera Books.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://square.com/
  stripeIntegration:
    description: Deskera Books and Stripe integration allows you to receive online payments from your
      customers and view, reconcile payment transactions in Deskera Books. Your customers can simply
      click on the 'Pay Now' link in the invoice and make payment online.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://stripe.com/
  wooCommerceIntegration:
    description: Deskera Books and WooCommerce integration enables you to sync all the data
      related to Contacts, Products, and Orders from your WooCommerce account to your Deskera Books account.
      The built-in compliance in Deskera Books helps you to generate accounting and tax reports confidently and with ease.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://woocommerce.com/
  mobileApp:
    description: Deskera Mobile is an always-on mobile application designed for the needs of today's workforce.
      Deskera Mobile gives you all the key accounting functions you need to track your financial health easily and accurately at any time.
      Every time you create a financial document we automatically record it for the books and it'll be available everywhere.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  roleBasedAccess:
    description:  Deskera ERP allows administrators to define user roles and permissions,
      ensuring that only authorized individuals have access to specific financial data and
      functionalities. This helps prevent unauthorized changes to financial records and transactions.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  auditLog:
    description: Allow site administrators to view actions performed by users and administrators
      or by end-users to their own accounts
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  customIntegrations:
    description: Add more features to Deskera by enabling modules to Deskera.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  customReports:
    description: Custom Report function helps create custom reports for different applications to suit the users' needs.
      It allows users to create, edit and delete reports that can be shared so that employee details can be reviewed and managed.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  customDashboards:
    description: View all data in one place with modern visualization. Customize dashboards with required features and data.
      Get dynamic visualizations that update in real time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
