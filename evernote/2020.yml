syntaxVersion: '2.1'
saasName: Evernote
createdAt: '2020-11-30'
version: '2020-11-30'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20201130010053/https://evernote.com/compare-plans
features:
  syncAcrossDevices:
    description: Sync your data automatically across devices
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  notes:
    description: Take great notes
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  offlineAccess:
    description: Evernote is designed to sync all of your notes and notebooks across all your devices when you have an internet connection.
    valueType: TEXT
    defaultValue: Desktop
    type: DOMAIN
  scanHadWrittenNotes:
    description: Scan handwritten notes
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scanWhiteboards:
    description: Effortlessly scan and save whiteboard notes with seamless integration, enhancing
      classroom and office productivity with ease.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scanReceipts:
    description: Scanning receipts keeps your records organized and reduces paper clutter. It also
      simplifies tax preparation and helps track expenses for small businesses.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scanMore:
    description: Scan more
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  webClipper:
    description: Clip, organize, and share web pages with Web Clipper
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  attachFilesToNotes:
    description: Attach photos, PDFs, spreadsheets, Google Docs, and other files to your notes
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  richFormatting:
    description: Use a variety of fonts, highlight colors, and formatting tools
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  recordAudioNotes:
    description: You can record or upload audio directly in Evernote to capture ideas, conversations,
      or meetings without leaving your notes. This makes it easy to store, replay, and organize everything
      in one place — whether you're documenting a class, brainstorming, or taking meeting notes.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  toDoLists:
    description: Stay on top of it all by creating to-dos in your notes and managing them your way.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  annotateImages:
    description: Annotate on images
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  applyTemplatesToNotes:
    description: Apply templates to your notes from a wide variety of options
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  annotatePdfs:
    description: Annotate PDFs
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  createCustomTemplates:
    description: Create your own custom templates
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  saveCustomTemplates:
    description: Save your own custom templates
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  scanAndDigitalizeBusinessCardsToCreateContacts:
    description: Scan and digitize business cards to create a personal database of contacts
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  forwardEmailsIntoEvernote:
    description: Forward emails directly into your Evernote account
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  addRemindersToNotes:
    description: Add reminders to your notes
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  createOwnFilingSystem:
    description: Create your own filing system with notebooks and keyword tags
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  searchNotes:
    description: Find any note using search filters and get suggestions as you type
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  connectWithSlack:
    description: Connect Slack to save conversations and track decisions
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  connectWithTeams:
    description: Connect MS Teams to save conversations and track decisions
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.microsoft.com/en-us/microsoft-365/microsoft-teams/group-chat-software
  connectWithGmail:
    description: Connect your Gmail account to save important emails in Evernote
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://workspace.google.com/pricing
  searchTextInsideImages:
    description: Search text inside images with Optical character regcognition technology.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  searchTextInsideHandwrittenNotes:
    description: Search for text inside handwritten notes
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  connectWithOutlook:
    description: Connect your Outlook account to Evernote
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.microsoft.com/en-us/microsoft-365/outlook/email-and-calendar-software-microsoft-outlook
  searchTextInsideOfficeDocs:
    description: Search text inside Office Docs
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  searchTextInsidePdfs:
    description: Search text inside PDFs
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  versionHistoryOfNotes:
    description: See a version history of your notes
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  restoreNotesFromOlderVersions:
    description: Restore notes to older versions
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  shareNotesWithPeople:
    description: Share notes with one or more people
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  shareNotebooksWithPeople:
    description: Share notebooks with one or more people
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  setPermissionsForEdittingNotes:
    description: Control permissions for others to edit notes
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  setPermissionsForEdittingNotebooks:
    description: Control permissions for others to edit notebooks
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  setPermissionsForViewingNotes:
    description: Control permissions for others to view notes
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  setPermissionsForViewingNotebooks:
    description: Control permissions for others to edit notebooks
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  sharedSpaces:
    description: Add an extra layer of organization with Spaces
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  twoStepVerification:
    description: Two-step verification, also known as two-factor authentication, adds an additional layer of
      security to the login process, requiring you to enter a verification code from your phone in addition to
      your regular username and password. The goal of this extra step is to combine something you know (your password)
      with something only you would have access to (your phone).
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  forumSupport:
    description: Get help with the support forum
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  emailSupport:
    description: Get help via email
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  chatSupport:
    description: Get help via chat
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  centralizedAccountAdministration:
    description: Access information on billing, users, and permissions
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  userManagement:
    description: Access information on users,
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  singleSignOn:
    description: Evernote uses the secure and widely adopted industry standard Security Assertion Markup Language 2.0 (SAML 2.0).
      This means that our implementation of SSO integrates easily with any large identity provider that support SAML 2.0.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  activityHistory:
    description: Activity History is a tool for account admins to monitor changes occurring in their
      accounts. It provides detailed logs of activity in an account for the past 18 months,
      and reports can be generated containing up to 90 days worth of data at a time. Activity History is searchable
      and includes records of user actions like creating or deleting a note. It also includes the name and email address
      of the user who performed the action, along with IP address, approximate location, version of Evernote, and operating
      system used
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  businessDataOwnership:
    description: Control the information in your account
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  syncDevicesLimit:
    description: Maximum devices on account
    valueType: NUMERIC
    defaultValue: 2
    unit: device
    type: NON_RENEWABLE
    linkedFeatures:
    - syncAcrossDevices
  maximumNoteSize:
    description: Maximum size for notes
    valueType: NUMERIC
    defaultValue: 25
    unit: MB/note
    type: NON_RENEWABLE
    linkedFeatures:
    - notes
  globalMonthlyUploadLimit:
    description: Maximum upload limit of the account
    valueType: NUMERIC
    defaultValue: 60
    unit: MB
    type: RENEWABLE
  monthlyUploadLimitByUser:
    description: Maximum month upload limit by user
    valueType: NUMERIC
    defaultValue: 0
    unit: MB
    type: RENEWABLE
  users:
    description: Maximum number of users in one account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
plans:
  BASIC:
    description: TAKE GREAT NOTES.
    price: 0
    unit: /month
    features: null
    usageLimits: null
  PREMIUM:
    description: BE MORE PRODUCTIVE.
    price: 7.99
    unit: /month
    features:
      annotatePdfs:
        value: true
      createCustomTemplates:
        value: true
      saveCustomTemplates:
        value: true
      scanAndDigitalizeBusinessCardsToCreateContacts:
        value: true
      forwardEmailsIntoEvernote:
        value: true
      connectWithOutlook:
        value: true
      searchTextInsideOfficeDocs:
        value: true
      searchTextInsidePdfs:
        value: true
      versionHistoryOfNotes:
        value: true
      emailSupport:
        value: true
      chatSupport:
        value: true
      restoreNotesFromOlderVersions:
        value: true
    usageLimits:
      syncDevicesLimit:
        value: 1000000
      maximumNoteSize:
        value: 200
      globalMonthlyUploadLimit:
        value: 10240
  BUSINESS:
    description: COLLABORATE ACROSS YOUR COMPANY.
    price: 14.99
    unit: user/month
    features:
      annotatePdfs:
        value: true
      createCustomTemplates:
        value: true
      saveCustomTemplates:
        value: true
      scanAndDigitalizeBusinessCardsToCreateContacts:
        value: true
      forwardEmailsIntoEvernote:
        value: true
      connectWithOutlook:
        value: true
      searchTextInsideOfficeDocs:
        value: true
      searchTextInsidePdfs:
        value: true
      versionHistoryOfNotes:
        value: true
      sharedSpaces:
        value: true
      emailSupport:
        value: true
      chatSupport:
        value: true
      centralizedAccountAdministration:
        value: true
      userManagement:
        value: true
      singleSignOn:
        value: true
      activityHistory:
        value: true
      businessDataOwnership:
        value: true
      restoreNotesFromOlderVersions:
        value: true
    usageLimits:
      syncDevicesLimit:
        value: 1000000
      maximumNoteSize:
        value: 200
      globalMonthlyUploadLimit:
        value: 20480
      monthlyUploadLimitByUser:
        value: 2048
addOns:
  extraBusinessUser:
    description: Add an extra team user to your plan.
    price: 14.99
    unit: user/month
    features: null
    usageLimits: null
    usageLimitsExtensions:
      users:
        value: 1
    availableFor:
    - BUSINESS
    dependsOn: []
    excludes: []
