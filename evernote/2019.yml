    valueType: NUMERIC
    defaultValue: 2
    unit: device
    type: NON_RENEWABLE
  users:
    description: Maximum number of users in one account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
