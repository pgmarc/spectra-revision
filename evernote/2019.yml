  globalMonthlyUploadLimit:
    description: Maximum upload limit of the account
    valueType: NUMERIC
    defaultValue: 60
    unit: MB
    type: RENEWABLE
  monthlyUploadLimitByUser:
    description: Maximum month upload limit by user
    valueType: NUMERIC
    defaultValue: 0
    unit: MB
    type: RENEWABLE
  maximumNoteSize:
    description: Maximum size of notes
    valueType: NUMERIC
    defaultValue: 25
    unit: MB/note
    type: NON_RENEWABLE
