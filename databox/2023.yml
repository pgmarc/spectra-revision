syntaxVersion: '2.1'
saasName: Databox
createdAt: '2023-12-12'
version: '2023-12-12'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20231212010418/https://databox.com/pricing
features:
  dataSources:
    description: Data Sources are platforms or applications that store your data.
      Connect your Data Sources with Databox to establish Data Source Connections.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dataSyncFrequency:
    description: The sync frequency of your Data Source Connections.
    valueType: TEXT
    defaultValue: daily
    type: GUARANTEE
  15minPriorityConnections:
    description: Are hourly data syncs just not enough? Get more frequent data updates
      with the 15-minute priority sync add-on for up to 5 Data Source Connections.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  historicalData:
    description: The maximum amount of historical data that's available in your Databox Account.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  warehouseDataStorage:
    description: The maximum amount of data that will be stored by Databox.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databoxInteractions:
    description: Connect HubSpot, Google Analytics, Facebook Ads, and more using a pre-built, one-click integration.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  thirdPartyIntegrations:
    description: Visualize performance from 2,000+ third-party integrations using Zapier and Make.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  pushCustomDataToAPI:
    description: Pull data from anywhere and push it into Databox using our secure and simple API.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  customApiIntegrations:
    description: Pull data from anywhere and push it into Databox using our secure and easy-to-use custom API integrations.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  sqlIntegrations:
    description: Visualize your data from PostgreSQL, MySQL, AWS Redshift, Microsoft SQL Azure,
      Microsoft SQL Service, Google BigQuery and Snowflake in Databox.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  spreadsheetsIntegration:
    description: Use Databox to visualize your Google Sheets and Excel data.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  databoards:
    description: Databoards are Databox dashboards.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databoardTemplates:
    description: Instantly visualize your performance using one of over 300
      pre-built dashboard Templates created by our community of experts.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databoardDesigner:
    description: Visualize KPIs in a variety of ways, and build meaningful dashboards-no code or design skills necessary.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customAccountDataboardTemplates:
    description: Create and use custom dashboard templates in your Account to streamline your reporting process.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  databoardLoops:
    description: Loop multiple dashboards together to create a comprehensive presentation of performance data.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  metricBuilder:
    description: Use Metric Builder to create Custom Metrics and get a more granular view of your performance.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  customMetrics:
    description: Build Custom Metrics to monitor custom data, events, goals and more with just a few clicks.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dataCalculations:
    description: Data Calculations enable you to create on-the-fly calculations, regardless
      of whether the metrics originate from a single data source or different data
      sources.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customDateRanges:
    description: Define your own Date Ranges and Comparison Periods by selecting the
      start and end dates, custom rolling periods, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  removableBrandingOnDataboards:
    description: Remove “Powered by Databox” and the Databox logo from dashboards in your Account.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  fiscalCalendars:
    description: Monitor, visualize, and report on all of your business data based on your fiscal calendar.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  personalizedPerformanceScreen:
    description: Keep an eye on what matters most, from critical KPIs to emerging trends.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  metricsScreen:
    description: Monitor all of your key metrics from one screen to see how performance is trending at a glance.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  slackIntegration:
    description: Get dashboards, alerts, scorecards, and more delivered directly to Slack.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  streamToTv:
    description: Easily stream your Databoards to any Smart TV using your own unique streaming code.
      that matter front and center.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  mobileAppAccess:
    description: Monitor your performance data anytime, anywhere using the Databox Mobile app (available for iOS and Android).
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  goals:
    description: Set, assign, and monitor progress toward S.M.A.R.T. Goals in Databox.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  shareableDataboardLinks:
    description: A unique URL used for sharing and viewing your dashboards outside of the Databox app.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scheduleDataboardSnapshots:
    description: Schedule regular exports of dashboards to be delivered via email as JPGs or a PDF.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  scorecards:
    description: Receive regular Scorecard updates on your most important KPIs
      through email, mobile push notification, and/or Slack.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  weeklyDigest:
    description: Receive detailed metric performance updates directly in your inbox each week.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  databoardEmbedding:
    description: Use the simple embed code to share and publish live dashboards on any web page.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  annotations:
    description: Add additional context and insights as a comment directly on a data point in a visualization.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  alerts:
    description: Automatically and proactively monitor your most important KPIs and
      stay up-to-date on performance trends using Alerts.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  basicReporting:
    description: Easily build and customize report presentation decks without leaving Databox.
      Includes Cover slides and Databoard slides.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  scheduleReports:
    description: Schedule Reports to be sent on a daily, weekly, monthly, or quarterly basis.
      Add an automated reminder to be delivered to your inbox ahead of the scheduled send.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  publicReportTemplates:
    description: Instantly create Reports using pre-built Report Templates created by our community of experts.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  reportAccountTemplates:
    description: Create and use custom Report Templates in your Account to streamline your reporting process.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  shareReportPDFs:
    description: Send Report PDFs directly via email.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  downloadReportPDFs:
    description: Download Report PDFs directly in Databox.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  archiveReports:
    description: Access, view, and retrieve all of your Account's Report PDFs.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  removableBrandingOnReports:
    description: Remove “Powered by Databox” and the Databox logo from Reports in your Account.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedSlideTypes:
    description: Use Side-by-side slides, Image slides, Text slides, and Data story slides to enhance your Reports.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  reportsApprovalProcess:
    description: Initiate an approval process for Reports to ensure accuracy and consistency in Reports before they are shared.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  metricForecast:
    description: Predict future performace for your KPIs, optimize your strategy, and stay ahead of your competition.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  generativeAI:
    description: Artificial intelligence will assist you in discovering connections, patterns, and emerging trends in your data.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  anomalyDetection:
    description: Identify unusual patterns or outliers in data, which may indicate potential anomalies or areas of opportunity.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  advancedBenchmarks:
    description: Instantly compare your performance against other similar companies to
      recognize areas of opportunity and sell/ upsell/ retain clients.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  metricCorrelations:
    description: Quickly identify relationships between metrics to understand how they
      impact one another and how you can influence your overall performance.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  clientAccounts:
    description: Use Client Accounts to create a secure, repeatable, organized, and
      valuable reporting process for both your Agency and Clients.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  clientPerformanceOverview:
    description: View every client's top KPIs in one screen. Eliminate the work required for internal review of client performance.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  clientGoalsOverview:
    description: View every client's goals in one screen. Eliminate the work required for internal review of goal achievement.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  whiteLabeling:
    description: Create an on-brand experience in your Databox Account. Allow users to login, view dashboards,
      and receive emails with your company's branding. Perfect if you plan to resell Databox to your clients.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  chatSupport:
    description: Support via chat
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  emailSupport:
    description: Support via email
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  prioritySupport:
    description: Move your cases to the top of our chat and email support queues.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  guidedOnboarding:
    description: Personalized guidance as you set up and roll out Databox to your company.
      Includes 6 calls of one-on-one or team support, as well as priority support for 3 months.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAnalyst:
    description: Meet with a Databox expert and business analyst twice a month to discuss your goals,
      develop a plan for success, and assist with the creation of dashboards and reports.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  outsourcedAnalyst:
    description: Get ongoing assistance with your analysis and reporting process from a Databox expert.
      We'll produce one report and have up to 2 calls per month.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  userManagement:
    description: Add and manage permissions for your team and clients in Databox.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  twoFactorAuthentication:
    description: Add an additional layer of security to your account by requiring more than just a password to log in.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  singleSignOn:
    description: We support Single Sign-on (SSO) over SAML 2.0 open authentication standard.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  quickstartOnboarding:
    description: Setup of your initial set of metrics, dashboards, and reports along with
      training on core Databox features and functionality.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  auditLog:
    description: Monitor activity in your Account from one screen.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  force2FA:
    description: Force users to use an additional layer of security when signing in.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  forceSSO:
    description: Force users to use an additional layer of security when signing in.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  includedDataSources:
    description: Maximum number of data sources. Data Sources are platforms or applications that store your data.
      Connect your Data Sources with Databox to establish Data Source Connections.
    valueType: NUMERIC
    defaultValue: 3
    unit: data source
    type: NON_RENEWABLE
    linkedFeatures:
    - dataSources
  dataSourcesLimit:
    description: Maximun number of datasources
    valueType: NUMERIC
    defaultValue: 3
    unit: data source
    type: NON_RENEWABLE
    linkedFeatures:
    - dataSources
  historicalDataThreshold:
    description: Data update interval for each plan
    valueType: NUMERIC
    defaultValue: 11
    unit: month
    type: NON_RENEWABLE
    linkedFeatures:
    - historicalData
  warehouseStorageLimit:
    description: Maximun number of disk space for a warehouse
    valueType: NUMERIC
    defaultValue: 5
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - warehouseDataStorage
  usersLimit:
    description: Users can log in to your Databox Account and view or edit different
      features according to their user role and permissions.
    valueType: NUMERIC
    defaultValue: 3
    unit: user
    type: NON_RENEWABLE
  guidedOnboardingLimit:
    description: Maximun number of hours of onboarding.
    valueType: NUMERIC
    defaultValue: 0
    unit: hour
    type: NON_RENEWABLE
    linkedFeatures:
    - guidedOnboarding
  dedicatedAnalystLimit:
    description: Maximum number of hours per month of a dedicated analyst.
    valueType: NUMERIC
    defaultValue: 0
    unit: hour/month
    type: RENEWABLE
    linkedFeatures:
    - dedicatedAnalyst
  outsourcedAnalystLimit:
    description: Maximum number of hours per month of a outsourced analyst.
    valueType: NUMERIC
    defaultValue: 0
    unit: hour/month
    type: RENEWABLE
    linkedFeatures:
    - outsourcedAnalyst
  15minPriorityConnectionsLimit:
    description: Maximun number of priority connections.
    valueType: NUMERIC
    defaultValue: 0
    unit: connection
    type: RENEWABLE
    linkedFeatures:
    - 15minPriorityConnections
