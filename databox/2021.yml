syntaxVersion: '2.1'
saasName: Databox
createdAt: '2021-11-23'
version: '2021-11-23'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20211123145205/https://databox.com/pricing
features:
  dataSources:
    description: Data sources are the locations or repositories from which Databox obtains
      data for you to visualize, analyze, enhance, and derive insights.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dataSyncFrequency:
    description: The sync frequency of your Data Source Connections.
    valueType: TEXT
    defaultValue: daily
    type: GUARANTEE
  15minPriorityConnections:
    description: Are hourly data syncs just not enough? Get more frequent data updates
      with the 15-minute priority sync add-on for up to 5 Data Source Connections.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  historicalData:
    description: The maximum amount of historical data that you can access in your
      Databox Account.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  warehouseDataStorage:
    description:  The maximum amount of data that will be stored by Databox.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databoxInteractions:
    description: Choose between 60+ integrations
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  sqlIntegrations:
    description: Choose between 7 SQL integrations
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  googleSheetsIntegration:
    description:  Use Databox to visualize your Google Sheets data.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  thirdPartyIntegrations:
    description: Choose between 2000+ integrations
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  pushCustomDataToAPI:
    description:  Pull data from anywhere and push it into Databox using our secure and simple API.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  databoards:
    description: Databoards are Databox dashboards.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databoardDesigner:
    description: Create Databoards, no coding required. Use the Designer by starting
      with a blank Databoard or choosing, then customizing a template. Use pre-built
      datablocks or start with blank visualizations and choose vour datasource, metric,
      time intervals and more. Re-arrange, resize, move and delete datablocks.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  queryBuilder:
    description:  Use Query Builder to create Custom Metrics and get a more granular view of your performance.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  dataCalculations:
    description: Data Calculations enable you to create on-the-fly calculations, regardless
      of whether the metrics originate from a single data source or different data
      sources.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customDateRanges:
    description: Define your own Date Ranges and Comparison Periods by selecting
      the start and end dates, custom rolling periods, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  databoardTemplates:
    description: Instantly use pre-built templates created by experts. Browse the
      available templates on our website or inside our application.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customAccountDataboardTemplates:
    description: Create custom dashboard templates to use in your Account.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fiscalCalendars:
    description:  Visualize all of your data based on your fiscal calendar.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  goals:
    description: Set a daily, weekly, monthly or annual goal for any metric you're
      tracking. Assign the goal to someone on your team and receive alerts when you
      hit thegoal or if you are at risk of missing it. View progress to all your Company's
      goals on one screen.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  scorecards:
    description:  Receive regular Scorecard updates on your most important KPIs through
      email, mobile push notification, and/or Slack.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  alerts:
    description: Receive alerts via the mobile app. Slack or via email for any metric
      you want to monitor more closely. Alerts can be triggered when numbers go above
      or below any number or change by a set percentage over a specified time interval.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  shareableDataboardLinks:
    description:  A unique URL outside of the Databox app where your Databoards are displayed
      with the same visualizations and data sync frequency as you have set in the Databox Account.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  databoardLoops:
    description:  Loop multiple dashboards together to create a comprehensive presentation of performance data.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scheduleDataboardSnapshots:
    description:  Schedule regular exports of dashboards to be delivered via email as JPGs or a PDF.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  slackIntegration:
    description: Receive alerts in Slack. Share Databoards and datablocks in Slack.
      Use the Databox Slackbot to ask questions about your data.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  streamToTv:
    description: View any of your Databoards on a wall-mounted TV in your office.
      Broadcast your data in the office to motivate your team and keep the metrics
      that matter front and center.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  databoardEmbedding:
    description: Use the simple embed code to share and publish live dashboards on any web page.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  mobileAppAccess:
    description: View all your Databoards, goals and receive alerts and scorecards
      on your mobile device in our app. IOS and Android native apps available.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  removeDataboxBrandingOnDataboards:
    description: Remove “Powered by Databox” and the Databox logo from dashboards in your Account.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  whiteLabeling:
    description: Provide fully-branded reports, performance alerts, log in access, and more to your team and/or clients.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  singleSignOn:
    description:  We support Single sign-on (SSO) over SAML 2.0 open authentication standard.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  prioritySupport:
    description: Move your cases to the top of our chat and email support queues and
      connect with a Databox expert for one hour of phone support each month.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  dataSourcesLimit:
    description: Maximun number of datasources
    valueType: NUMERIC
    defaultValue: 4
    unit: data source
    type: NON_RENEWABLE
    linkedFeatures:
    - dataSources
  historicalDataThreshold:
    description: Data update interval for each plan
    valueType: NUMERIC
    defaultValue: 11
    unit: month
    type: NON_RENEWABLE
    linkedFeatures:
    - historicalData
  warehouseStorageLimit:
    description: Maximun number of disk space for a warehouse
    valueType: NUMERIC
    defaultValue: 5
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - warehouseDataStorage
  databoardsLimit:
    description: Maximun number of databoards
    valueType: NUMERIC
    defaultValue: 1
    unit: /connection
    type: NON_RENEWABLE
    linkedFeatures:
    - databoards
  queryBuilderLimit:
    description: Maximun number of queries to build
    valueType: NUMERIC
    defaultValue: 0
    unit: metrics
    type: NON_RENEWABLE
    linkedFeatures:
    - queryBuilder
  usersLimit:
    description: Maximun number of user to use the Databox account
    valueType: NUMERIC
    defaultValue: 5
    unit: user
    type: NON_RENEWABLE
  15minPriorityConnectionsLimit:
    description: Maximun number of priority connections
    valueType: NUMERIC
    defaultValue: 0
    unit: connection
    type: RENEWABLE
    linkedFeatures:
    - 15minPriorityConnections
plans:
  FREE:
    description: Create a free-forever account with 3 Data Source Connections, all
      standard features and 60+ Databox Integrations.
    price: 0
    unit: account
    features:
      warehouseDataStorage:
        value: false
      thirdPartyIntegrations:
        value: false
      pushCustomDataToAPI:
        value: false
    usageLimits:
      dataSourcesLimit:
        value: 3
      warehouseStorageLimit:
        value: 0
  STARTER:
    description: Daily monitoring and reporting of high-level metrics for small teams.
    price: 91
    unit: connection/month
    features: null
    usageLimits: null
  PROFESSIONAL:
    description: Hourly monitoring and analysis for small and mid-sized businesses.
    price: 169
    unit: connection/month
    features:
      dataSyncFrequency:
        value: hourly
      sqlIntegrations:
        value: true
      googleSheetsIntegration:
        value: true
      queryBuilder:
        value: true
      dataCalculations:
        value: true
      customDateRanges:
        value: true
      removeDataboxBrandingOnDataboards:
        value: true
    usageLimits:
      historicalDataThreshold:
        value: 24
      warehouseStorageLimit:
        value: 20
      databoardsLimit:
        value: 3
      queryBuilderLimit:
        value: 300
      usersLimit:
        value: 25
      dataSourcesLimit:
        value: 3
  PERFORMER:
    description: On-demand monitoring for companies serious about improving performance.
    price: 289
    unit: connection/month
    features:
      dataSyncFrequency:
        value: hourly & priority
      sqlIntegrations:
        value: true
      googleSheetsIntegration:
        value: true
      queryBuilder:
        value: true
      dataCalculations:
        value: true
      customDateRanges:
        value: true
      fiscalCalendars:
        value: true
      removeDataboxBrandingOnDataboards:
        value: true
      singleSignOn:
        value: true
    usageLimits:
      historicalDataThreshold:
        value: 1000000000
      warehouseStorageLimit:
        value: 20
      queryBuilderLimit:
        value: 1000
      usersLimit:
        value: 1000000000
      dataSourcesLimit:
        value: 3
      databoardsLimit:
        value: .inf
addOns:
  brandingAndWhiteLabelling:
    availableFor:
    - PROFESSIONAL
    - PERFORMER
    price: 250
    unit: /month
    features:
      whiteLabeling:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
  priorityDataUpdate:
    availableFor:
    - PROFESSIONAL
    - PERFORMER
    price: 150
    unit: /month
    features:
      dataSyncFrequency:
        value: 15 mins
      prioritySupport:
        value: true
      15minPriorityConnections:
        value: true
    usageLimits:
      15minPriorityConnectionsLimit:
        value: 5
    usageLimitsExtensions: null
  additionalDataSourceForStarter:
    description: Additional Data Source Connections for the Starter plan.
    price: 2
    unit: connection
    features: null
    usageLimits: null
    availableFor:
    - STARTER
    dependsOn: []
    excludes: []
    usageLimitsExtensions:
      dataSourcesLimit:
        value: 1
  additionalDataSourceForProfessional:
    description: Additional Data Source Connections for the Professional plan.
    price: 4
    unit: connection
    features: null
    usageLimits: null
    availableFor:
    - PROFESSIONAL
    dependsOn: []
    excludes: []
    usageLimitsExtensions:
      dataSourcesLimit:
        value: 1
  additionalDataSourceForPerformer:
    description: Additional Data Source Connections for the Performer plan.
    price: 6
    unit: connection
    features: null
    usageLimits: null
    availableFor:
    - PERFORMER
    dependsOn: []
    excludes: []
    usageLimitsExtensions:
      dataSourcesLimit:
        value: 1
