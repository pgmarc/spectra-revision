  concurrentJobRuns:
    description: Jobs that run simultaneously, without queuing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  selfHostedRunners:
    description: Run jobs on your own infrastructure
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dockerLayerCatching:
    description: "Cache the individual layers of any Docker image built during your jobs. Usage cost: 200 credits per job run"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  ipRanges:
    description: Usage for IP ranges is billed at 450 credits/GB per job.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  flakyTestDetection:
    description: Provide visibility into the most failed, slowest, and flakiest tests in a given test suite
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  privateOrbs:
    description: Create reusable packages of YAML config, called orbs, to be used exclusively by your
      organization
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  releases:
    description: deploy to any target and manage your deployments in the CircleCI web app.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  singleSignOn:
    description: Single sign-on (SSO) for CircleCI allows organization administrators to control access
      for their CircleCI organization using an Identity Provider (IdP).
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  configPolicies:
    description: Use config policies to create organization-level policies to impose rules
      and scopes to govern which configuration elements are required, allowed, not allowed etc.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  communitySupport:
    description: Access to our 24/7 community support forum.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  ticketBasedGlobalSupport:
    description: Our team of expert support engineers, based around the world.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  8x5SLA:
    description: 8x5 response times
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  12x5SLA:
    description: 12x5 response times
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x5SLA:
    description: 24x5 response times
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x7SLA:
    description: 24x7 response times
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  maxUsers:
    description: "Maximun number of users permited. User definition: Any user who
      commits code changes on a project building on CircleCI."
    valueType: NUMERIC
    defaultValue: 5
    unit: user
    type: NON_RENEWABLE
  creditsLimit:
    description: Maximun number of credits of your CircleCI account. Credits are used to pay for your
      team's usage based on number of active users, machine type and size and premium features
    valueType: NUMERIC
    defaultValue: 30000
    unit: credit/month
    type: RENEWABLE
  networkLimit:
    description: Maximun number of self hosted request in GB.
    valueType: NUMERIC
    defaultValue: 1
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - network
  storageLimit:
    description: Maximun number of disk space of your CircleCI account.
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
  concurrentJobRunsLimitNonMacOs:
    description: Maximun number of concurrent jobs. macOS not included.
    valueType: NUMERIC
    defaultValue: 30
    unit: job
    type: NON_RENEWABLE
    linkedFeatures:
    - concurrentJobRuns
  concurrentJobRunsLimitMacOs:
    description: Maximun number of concurrent jobs using macOS.
    valueType: NUMERIC
    defaultValue: 1
    unit: job
    type: NON_RENEWABLE
    linkedFeatures:
    - concurrentJobRuns
  selfHostedRunnersLimit:
    description: Maximun number of self hosted runners to install on your account.
    valueType: NUMERIC
    defaultValue: 5
    unit: runner
    type: NON_RENEWABLE
    linkedFeatures:
    - selfHostedRunners
  flakyTestDetectionLimit:
    description: Maximun number of flaky tests detections.
    valueType: NUMERIC
    defaultValue: 5
    unit: test
    type: NON_RENEWABLE
    linkedFeatures:
    - flakyTestDetection
plans:
  FREE:
    description: All our premium features. For free.
    price: 0
    unit: /month
    features: null
    usageLimits: null
  PERFORMANCE:
    description: Our most flexible plan. Pay only for what you use.
    price: 15
    unit: /month
    features:
      xLargeX86DockerVM:
        value: true
      xLargeArmDockerVM:
        value: true
      xLargeLinuxVM:
        value: true
      xlargeArmVM:
        value: true
      xLargeWindowsVM:
        value: true
      m2ProMediumMacOsVM:
        value: true
      m1LargeMacOsVM:
        value: true
      m2ProLargeMacOsVM:
        value: true
      ipRanges:
        value: true
      ticketBasedGlobalSupport:
        value: true
    usageLimits:
      networkLimit:
        value: 5
      storageLimit:
        value: 2
      concurrentJobRunsLimitNonMacOs:
        value: 80
      concurrentJobRunsLimitMacOs:
        value: 15
      selfHostedRunnersLimit:
        value: 20
      flakyTestDetectionLimit:
        value: .inf
  SCALE:
    description: Enterprise-level power. Talk to us to build your plan.
    price: "Contact us"
    unit: /month
    features:
      xLargeX86DockerVM:
        value: true
      2xLargeX86DockerVM:
        value: true
      2xLargePlusX86DockerVM:
        value: true
      xLargeArmDockerVM:
        value: true
      2xLargeArmDockerVM:
        value: true
      xLargeLinuxVM:
        value: true
      2xLargeLinuxVM:
        value: true
      2xLargePlusLinuxVM:
        value: true
      xlargeArmVM:
        value: true
      2xlargeArmVM:
        value: true
      xLargeWindowsVM:
        value: true
      2xLargeWindowsVM:
        value: true
      m2ProMediumMacOsVM:
        value: true
      m1LargeMacOsVM:
        value: true
      m2ProLargeMacOsVM:
        value: true
      smallGpuNvidia:
        value: true
      smallMultiGpuNvidia:
        value: true
      smallGen2GpuNvidia:
        value: true
      mediumGpuNvidia:
        value: true
      mediumMultiGpuNvidia:
        value: true
      mediumWindowsGpuNvidia:
        value: true
      largeGpuNvidia:
        value: true
      ipRanges:
        value: true
      singleSignOn:
        value: true
      configPolicies:
        value: true
      ticketBasedGlobalSupport:
        value: true
    usageLimits:
      maxUsers:
        value: .inf
      creditsLimit:
        value: .inf
      networkLimit:
        value: 50
      storageLimit:
        value: 200
      concurrentJobRunsLimitNonMacOs:
        value: .inf
      concurrentJobRunsLimitMacOs:
        value: .inf
      selfHostedRunnersLimit:
        value: .inf
      flakyTestDetectionLimit:
        value: .inf
addOns:
  extraUsers:
