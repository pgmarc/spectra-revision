syntaxVersion: '2.1'
saasName: CircleCI
createdAt: '2019-11-01'
version: '2019'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20191101031017/https://circleci.com/pricing/
features:
  parallelJobRuns:
    description: Jobs that run simultaneously, without queuing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  smallLinux:
    description: "Includes 1 vCPU and 2 GB RAM. Usage cost: 5 Credit/Min"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mediumLinux:
    description: "Includes 2 vCPU and 4 GB RAM. Usage cost: 10 Credit/Min"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mediumPlusLinux:
    description: "Includes 3 vCPU and 6 GB RAM. Usage cost: 15 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  largeLinux:
    description: "Includes 4 vCPU and 8 GB RAM. Usage cost: 20 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  xLargeLinux:
    description: "Includes 8 vCPU and 16 GB RAM. Usage cost: 40 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  2xLargeLinux:
    description: "Includes 16 vCPU and 32 GB RAM. Usage cost: 80 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  2xLargePlusLinux:
    description: "Includes 20 vCPU and 40 GB RAM. Usage cost: 100 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  mediumWindows:
    description: "Includes 4 vCPU and 15 GB RAM. Usage cost: 40 Credit/Min"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mediumMacOs:
    description: "Includes 4 vCPU and 8 GB RAM. Usage cost: 50 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  largeMacOs:
    description: "Includes 8 vCPU and 16 GB RAM. Usage cost: 100 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  smallGpu:
    description: "Includes 16 vCPU and 122 GB RAM. Usage cost: 80 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  mediumGpu:
    description: "Includes 32 vCPU and 244 GB RAM. Usage cost: 160 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  largeGpu:
    description: "Includes 64 vCPU and 488 GB RAM. Usage cost: 320 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dockerLayerCatching:
    description: "Cache the individual layers of any Docker image built during your jobs. Usage cost: 200 credits per job run"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  flexibleBillingOptions:
    description: Pay by credit card, or request invoices.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  communitySupport:
    description: Access to our 24/7 community support forum.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  supportPortal:
    description: Access to support knowledge base of CircleCI
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  ticketBasedGlobalSupport:
    description: Our team of expert support engineers, based around the world.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  8x5SLA:
    description: Part of Silver support plan. 8x5 response times
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x5SLA:
    description: Part of Gold support plan. Tickets and issues triaged 24 hours, 5 days a week with response times
      in your local timezone.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x7SLA:
    description: Part of Platinum support plan. Tickets triaged around the clock, including 30 minute response
      SLAs for critical blockers.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountManager:
    description: One-on-one interaction support with an expert.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedSuccessManager:
    description: One-on-one interaction with a dedicated expert to provide maximun value of CircleCI.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedSuccessEngineer:
    description: One-on-one interaction with a dedicated expert to implement sucessfully CircleCI into your workflow.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  checklistProjectPlanning:
    description: Part of Silver support plan. We will help you get started with CircleCI based on our implementation best practices.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  standardProjectPlanning:
    description: Part of Gold support plan. We will help you get started with CircleCI based on our implementation best practices.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  tailoredProjectPlanning:
    description: Part of Platinum support plan. We will help you get started with CircleCI based on our implementation best practices.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  documentedResourcesTraining:
    description: Part of Silver support plan. Use knowledge base portal to train you team.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  cseLedTraining:
    description: Get our customer success engineer (CSE)-led training sessions with the Gold and Platinum plans.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  emailSupport:
    description: Request support via email.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  regularRecurringMeetingsWithYourSuccessTeam:
    description: Meet with our sucess team to get the most out of CircleCI
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  goldLevelCommunications:
    description: Most fluent communications with the support team.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedSlackChannel:
    description: Dedicated slack channel to contact the support team
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  valueAddedServices:
    description: "Choose between these services annually:\n- Configuration migration assitance
      (from alternate CI/CD)\n-Configuration review\nProduct roadmap session\n- New release training\n- General developer training
      \n(Server only) health check\n- (Server only) assisted server migration & upgrade. Gold support plan chooses 3 annually.
      Platinum support plan chooses 5 annually."
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  urgentSeverityLevel:
    description: "Highest priority, includes: fatal system failure such as a server that is down or
      unresponsive, outage that impacts critical system operations, security breach or expired license."
    valueType: TEXT
    defaultValue: ""
    type: SUPPORT
  highSeverityLevel:
    description: High severity tickets are bug reports for critical parts of the
      product that impact your business operations
    valueType: TEXT
    defaultValue: ""
    type: SUPPORT
  normalSeverityLevel:
    description: Technical requests including configuration changes and third-party integrations.
      Normal severity tickets are bug reports for non-critical parts of the product.
    valueType: TEXT
    defaultValue: ""
    type: SUPPORT
  lowSeverityLevel:
    description: Non-technical requests such as general how-to questions and feature requests,
      purchase requests, training requests or health checks.
    valueType: TEXT
    defaultValue: ""
    type: SUPPORT
usageLimits:
  maxUsers:
    description: ''
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  renewableCredits:
    description: ''
    valueType: NUMERIC
    defaultValue: 2500
    unit: credit/week
    type: RENEWABLE
  nonRenewableCredits:
    description: ''
    valueType: NUMERIC
    defaultValue: 0
    unit: credit/week
    type: NON_RENEWABLE
  parallelJobRunsLimit:
    description: ''
    valueType: NUMERIC
    defaultValue: 1
    unit: job
    type: NON_RENEWABLE
    linkedFeatures:
    - parallelJobRuns
  amountOfValueAddedServices:
    description: ''
    valueType: NUMERIC
    defaultValue: 0
    unit: service
    type: RENEWABLE
    linkedFeatures:
    - valueAddedServices
plans:
  FREE:
    description: Start here, grow over time.
    price: 0
    unit: /month
    features: null
    usageLimits: null
  PERFORMANCE:
    description: Fast pipelines that scale.
    price: 15
    unit: /month
    features:
      mediumPlusLinux:
        value: true
      largeLinux:
        value: true
      xLargeLinux:
        value: true
      mediumMacOs:
        value: true
      dockerLayerCatching:
        value: true
      ticketBasedGlobalSupport:
        value: true
    usageLimits:
      maxUsers:
        value: 3
      nonRenewableCredits:
        value: 25000
      parallelJobRunsLimit:
        value: .inf
  CUSTOM:
    description: Enterprise power & support.
    price: "Contact us"
    unit: /month
    features:
      mediumPlusLinux:
        value: true
      largeLinux:
        value: true
      xLargeLinux:
        value: true
      2xLargeLinux:
        value: true
      2xLargePlusLinux:
        value: true
      mediumMacOs:
        value: true
      largeMacOs:
        value: true
      smallGpu:
        value: true
      mediumGpu:
        value: true
      largeGpu:
        value: true
      dockerLayerCatching:
        value: true
      flexibleBillingOptions:
        value: true
      ticketBasedGlobalSupport:
        value: true
    usageLimits:
      maxUsers:
        value: .inf
      nonRenewableCredits:
        value: .inf
      parallelJobRunsLimit:
        value: .inf
addOns:
  extraUsers:
    description: Give access to more user inside your CircleCI account.
    availableFor:
      - PERFORMANCE
    price: 15
    unit: /month
    usageLimitsExtensions:
      maxUsers:
        value: 1
  extraCredits:
    description: Contract extra credits for your CircleCI account.
    availableFor:
      - PERFORMANCE
    price: 15
    unit: /month
    usageLimitsExtensions:
      nonRenewableCredits:
        value: 25000
  silverPremiumSupport:
    description: "https://web.archive.org/web/20191101031017/https://circleci.com/support/premium-support/"
    excludes:
      - goldPremiumSupport
      - platinumPremiumSupport
    availableFor:
      - PERFORMANCE
      - CUSTOM
    price: "Contact us"
    unit: /month
    features:
      communitySupport:
        value: true
      supportPortal:
        value: true
      ticketBasedGlobalSupport:
        value: true
      8x5SLA:
        value: true
      dedicatedAccountManager:
        value: true
      dedicatedSuccessManager:
        value: true
      checklistProjectPlanning:
        value: true
      documentedResourcesTraining:
        value: true
      emailSupport:
        value: true
      urgentSeverityLevel:
        value: "2 business hours"
      highSeverityLevel:
        value: "4 business hours"
      normalSeverityLevel:
        value: "1 business day"
      lowSeverityLevel:
        value: "Prompt response"
  goldPremiumSupport:
    description: "https://web.archive.org/web/20191101031017/https://circleci.com/support/premium-support/"
    excludes:
      - silverPremiumSupport
      - platinumPremiumSupport
    availableFor:
      - CUSTOM
    price: "Contact us"
    unit: /month
    features:
      communitySupport:
        value: true
      supportPortal:
        value: true
      ticketBasedGlobalSupport:
        value: true
      24x5SLA:
        value: true
      dedicatedAccountManager:
        value: true
      dedicatedSuccessManager:
        value: true
      dedicatedSuccessEngineer:
        value: true
      checklistProjectPlanning:
        value: true
      standardProjectPlanning:
        value: true
      documentedResourcesTraining:
        value: true
      cseLedTraining:
        value: true
      regularRecurringMeetingsWithYourSuccessTeam:
        value: true
      valueAddedServices:
        value: true
      emailSupport:
        value: true
      urgentSeverityLevel:
        value: "1 hour 24x5"
      highSeverityLevel:
        value: "2 hours 24x5"
      normalSeverityLevel:
        value: "8 hours 24x5"
      lowSeverityLevel:
        value: "Prompt response"
    usageLimits:
      amountOfValueAddedServices:
        value: 3
  platinumPremiumSupport:
    description: "https://web.archive.org/web/20191101031017/https://circleci.com/support/premium-support/"
    excludes:
      - silverPremiumSupport
      - goldPremiumSupport
    availableFor:
      - CUSTOM
    price: "Contact us"
    unit: /month
    features:
      communitySupport:
        value: true
      supportPortal:
        value: true
      ticketBasedGlobalSupport:
        value: true
      24x7SLA:
        value: true
      dedicatedAccountManager:
        value: true
      dedicatedSuccessManager:
        value: true
      dedicatedSuccessEngineer:
        value: true
      checklistProjectPlanning:
        value: true
      standardProjectPlanning:
        value: true
      tailoredProjectPlanning:
        value: true
      documentedResourcesTraining:
        value: true
      cseLedTraining:
        value: true
      regularRecurringMeetingsWithYourSuccessTeam:
        value: true
      goldLevelCommunications:
        value: true
      dedicatedSlackChannel:
        value: true
      valueAddedServices:
        value: true
      emailSupport:
        value: true
      urgentSeverityLevel:
        value: "30 minutes 24x5"
      highSeverityLevel:
        value: "1 hours 24x5"
      normalSeverityLevel:
        value: "2 hours 24x5"
      lowSeverityLevel:
        value: "Prompt response"
    usageLimits:
      amountOfValueAddedServices:
        value: 5
