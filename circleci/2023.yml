    type: DOMAIN
  mediumGpuNvidia:
    description: "Run with Nvidia Testla T4 model. Includes 8 vCPU and 30 GB RAM. Usage cost: 240 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  largeGpuNvidia:
    description: "Run with Nvidia Testla V100 model. Includes 8 vCPU and 30 GB RAM. Usage cost: 1000 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  mediumWindowsGpuNvidia:
    description: "Run with Nvidia Testla T4 model. Includes 16 vCPU and 60 GB RAM. Usage cost: 500 Credit/Min"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  concurrentJobRuns:
    description: Jobs that run simultaneously, without queuing.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  concurrentJobRunsMacOs:
    description: Jobs that run simultaneously, without queuing. On macOS VMs.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  selfHostedRunners:
    description: Run jobs on your own infrastructure
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dockerLayerCatching:
    description: "Cache the individual layers of any Docker image built during your jobs. Usage cost: 200 credits per job run"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  ipRanges:
    description: Usage for IP ranges is billed at 450 credits/GB per job.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  flakyTestDetection:
    description: Provide visibility into the most failed, slowest, and flakiest tests in a given test suite
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  privateOrbs:
    description: Create reusable packages of YAML config, called orbs, to be used exclusively by your
      organization
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  paymentOptions:
    description: Pay by credit card, or request invoices.
    valueType: TEXT
    defaultValue:
      - CARD
    type: PAYMENT
  communitySupport:
    description: Access to our 24/7 community support forum.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  supportPortal:
    description: Access to support knowledge base of CircleCI
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  ticketBasedGlobalSupport:
    description: Our team of expert support engineers, based around the world.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  slackChannel:
    description: Dedicated slack channel to contact the support team
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  8x5SLA:
    description: Part of Silver support plan. 8x5 response times
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x5SLA:
    description: Part of Gold support plan. Tickets and issues triaged 24 hours, 5 days a week with response times in
      your local timezone.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x7SLA:
    description: Part of Platinum support plan. Tickets triaged around the clock, including 30 minute response
      SLAs for critical blockers.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  availableAccountTeam:
    description: An available account team help you to manage and succeed with the product.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  dedicatedAccountTeam:
    description: Exclusive dedicated team for your organization to help you manage and succeed with the
      product.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  standardOnboardingAssistance:
    description: Standard assistance to get up and running on CircleCI.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  advancedOnboardingAssistance:
    description: Advanced assitance to get up and running on CircleCI.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  premiumOnboardingAssistance:
    description: Get up and running on CircleCI quickly with support from our team of experts.
      We'll work with you to establish a project plan and timeline, define who is responsible
      for each part of the plan, and provide technical training to get you started on the platform.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  installationAssistance:
    description: Field engineer ensures an efficient process for installing a new instance of CircleCI Server
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  premiumServices:
    description: Proactive, expert help to improve your experience with CircleCI.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  migraionAssistance:
    description: A field engineer helps migrate projects to CircleCI with minimal disruption.
      A field engineer works with you on a customized migration journey that includes configuration
      translations, best practice adoption, developer training, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  successPlanning:
    description: Build a DevOps roadmap with success plans tailored to your goals.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  outcomePlanning:
    description: Drive better business outcomes with expert insights and guidance.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  performanceMonitoring:
    description: A field engineer helps your projects to monitor you runs on CircleCI.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  performanceOptimization:
    description: A field engineer helps your projects run optimally on CircleCI.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  priorityFeatureEscalation:
    description: Your feature requests are analyzed before others.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  priorityBugEscalation:
    description: Your bug reports are prioritized and escalated faster than others.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  engineerLedTraining:
    description: Instructor-led training session delivered by a CircleCI engineer
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  maxUsers:
    description: "Maximun number of users permited. User definition: Any user who
      commits code changes on a project building on CircleCI."
    valueType: NUMERIC
    defaultValue: 5
    unit: user
    type: NON_RENEWABLE
  creditsLimit:
    description: Maximun number of credits of your CircleCI account. Credits are used to pay for your
      team's usage based on number of active users, machine type and size and premium features
    valueType: NUMERIC
    defaultValue: 30000
    unit: credit/month
    type: RENEWABLE
  networkLimit:
    description: Maximun number of self hosted request in GB.
    valueType: NUMERIC
    defaultValue: 1
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - network
  storageLimit:
    description: Maximun number of disk space of your CircleCI account.
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
  concurrentJobRunsLimitNonMacOs:
    description: Maximun number of concurrent jobs. macOS not included.
    valueType: NUMERIC
    defaultValue: 30
    unit: job
    type: NON_RENEWABLE
    linkedFeatures:
    - concurrentJobRuns
  concurrentJobRunsLimitMacOs:
    description: Maximun number of concurrent jobs using macOS.
    valueType: NUMERIC
    defaultValue: 1
    unit: job
    type: NON_RENEWABLE
    linkedFeatures:
    - concurrentJobRunsMacOs
  selfHostedRunnersLimit:
    description: Maximun number of self hosted runners to install on your account.
    valueType: NUMERIC
    defaultValue: 5
    unit: runner
    type: NON_RENEWABLE
    linkedFeatures:
    - selfHostedRunners
  flakyTestDetectionLimit:
    description: Maximun number of flaky tests detections.
    valueType: NUMERIC
    defaultValue: 5
    unit: test
    type: NON_RENEWABLE
    linkedFeatures:
    - flakyTestDetection
plans:
  FREE:
    description: Do more with your minutes. Give your team the best CI/CD.
    price: 0
    unit: /month
    features: null
    usageLimits: null
  PERFORMANCE:
    description: Pay for what you use. Build with the flexibility your business requires.
    price: 15
    unit: /month
    features:
      xLargeX86DockerVM:
        value: true
      xLargeArmDockerVM:
        value: true
      xLargeLinuxVM:
        value: true
      xlargeArmVM:
        value: true
      xLargeWindowsVM:
        value: true
      m1MediumMacOsVM:
        value: true
      m1LargeMacOsVM:
        value: true
      ipRanges:
        value: true
      ticketBasedGlobalSupport:
        value: true
    usageLimits:
      maxUsers:
        value: 5
      creditsLimit:
        value: 30000
      networkLimit:
        value: 5
      storageLimit:
        value: 2
      concurrentJobRunsLimitNonMacOs:
        value: 80
      concurrentJobRunsLimitMacOs:
        value: 15
      selfHostedRunnersLimit:
        value: 20
      flakyTestDetectionLimit:
        value: .inf
  SCALE:
    description: Enterprise-level confidence and support for teams who deliver.
    price: "Contact us"
    unit: /month
    features:
      xLargeX86DockerVM:
        value: true
      2xLargeX86DockerVM:
        value: true
      2xLargePlusX86DockerVM:
        value: true
      xLargeArmDockerVM:
        value: true
      2xLargeArmDockerVM:
        value: true
      xLargeLinuxVM:
        value: true
      2xLargeLinuxVM:
        value: true
      2xLargePlusLinuxVM:
        value: true
      xlargeArmVM:
        value: true
      2xlargeArmVM:
        value: true
      xLargeWindowsVM:
        value: true
      2xLargeWindowsVM:
        value: true
      m1MediumMacOsVM:
        value: true
      m1LargeMacOsVM:
        value: true
      smallGpuNvidia:
        value: true
      mediumGpuNvidia:
        value: true
      largeGpuNvidia:
        value: true
      mediumWindowsGpuNvidia:
        value: true
      ipRanges:
        value: true
      paymentOptions:
        value:
          - INVOICE
      ticketBasedGlobalSupport:
        value: true
    usageLimits:
      maxUsers:
        value: .inf
      creditsLimit:
        value: .inf
      networkLimit:
        value: 50
      storageLimit:
        value: 200
      concurrentJobRunsLimitNonMacOs:
        value: .inf
      concurrentJobRunsLimitMacOs:
        value: .inf
      selfHostedRunnersLimit:
        value: .inf
      flakyTestDetectionLimit:
        value: .inf
