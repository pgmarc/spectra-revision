syntaxVersion: '2.1'
saasName: Quip
version: '2023-11-30'
createdAt: '2023-11-30'
currency: USD
url: https://web.archive.org/web/20231130073937/https://quip.com/about/pricing
features:
  documents:
    description: Documents that fuel a culture of action
      
      Quip documents unite your team's work and communication, so you can get everything done in one place.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  spreadsheets:
    description: Spreadsheets that turn numbers into decisions
      
      Create spreadsheets that drive decisions with live Salesforce data, real-time chat, and the ability to
      embed charts in your slides.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  groupChat:
    description: Chat Rooms are channels for ongoing team discussions. You can make a chat room to discuss a topic, share files,
      or get notified about activity in external services like Twitter, Zendesk, and JIRA.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  1to1messages:
    description: One to one messages in Quip
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  desktopAccess:
    description: Desktop app
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  tabletAccess:
    description: Tablet app
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  mobileAccess:
    description: Mobile app
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  customAndAdvancedLiveApps:
    description: Custom and advanced live apps
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  singleSignOn:
    description: Single Sign On (SSO) access to Quip
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  enterpriseAPI:
    description: Enterprise API access
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  customization:
    description: Enterprise Customization
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  integratedChatWithinSalesforce:
    description: Integrated Chat inside Salesforce
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
  spreadsheetsWithLiveSalesforceData:
    description: Spreadsheets with live Salesforce data
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  twoWaySyncWithLiveSalesforceData:
    description: 2-Way Sync with Live Salesforce Data
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://www.salesforce.com/eu/sales/pricing/
  embedDocumentsInAllSalesforceObjects:
    description: Embed Documents in All Salesforce Objects
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTENSION
plans:
  STARTER:
    description: Powerful collaboration for your team or small business.
    price: 12
    unit: user/month
    features: null
    usageLimits: null
  PLUS:
    description: Secure productivity platform for large and complex teams.
    price: 25
    unit: user/month
    features:
      customAndAdvancedLiveApps:
        value: true
      singleSignOn:
        value: true
      enterpriseAPI:
        value: true
      customization:
        value: true
    usageLimits: null
  ADVANCED:
    description: >-
      Real-time alerts and collaboration inside Salesforce for sales and service
      teams.
    price: 100
    unit: user/month
    features:
      customAndAdvancedLiveApps:
        value: true
      singleSignOn:
        value: true
      enterpriseAPI:
        value: true
      customization:
        value: true
      integratedChatWithinSalesforce:
        value: true
      spreadsheetsWithLiveSalesforceData:
        value: true
      twoWaySyncWithLiveSalesforceData:
        value: true
      embedDocumentsInAllSalesforceObjects:
        value: true
    usageLimits: null
