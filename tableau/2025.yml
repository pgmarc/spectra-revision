  editDataFlow:
    description: Edit and modify a data flow (.tfl)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Prepare
  exportData:
    description: Export data (.tde, .hyper or .csv)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Prepare
  publishFlows:
    description: Publish flows
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Prepare
  runFlows:
    description: Run flows
    valueType: BOOLEAN
    defaultValue: false
