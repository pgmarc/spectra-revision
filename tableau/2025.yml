    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Prepare
  monitorFlowHealth:
    description: Monitor flow health
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Prepare
  insightsSummary:
    description: Insights Summaries. Make faster, more informed decisions and take action.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
    tag: Tableau Pulse
  pulseQ&A:
    description: Tableau Pulse helps you explore your data by surfacing insights and suggesting questions for further
      exploration. As you click through the questions about your data, answers are revealed in easy-to-read charts with
      insights about the underlying data.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
    tag: Tableau Pulse
  email&SlackDigests:
    description: Email & Slack Digests
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    tag: Tableau Pulse
  metricsLayer:
    description: A metrics layer allows an organization to standardize its metrics and how they are calculated. It builds a
      single source of truth for all metric or KPI definitions for all data sources in the organization. A metrics layer
      sits on top of the data sources and powers consumption tools for business users.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
    tag: Tableau Pulse
  mobile:
    description: Tableau Pulse is available on Tableau Mobile, empowering every employee to scale data-driven decision
      making through AI-powered insights while on the go.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
    tag: Tableau Pulse
