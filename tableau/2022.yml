syntaxVersion: '2.1'
saasName: Tableau
createdAt: '2022-11-30'
version: '2022-11-30'
billing:
  monthly: 1.0
currency: USD
url: http://web.archive.org/web/20221130132704/https://www.tableau.com/pricing/teams-orgs
features:
  manageUserPermissions:
    description: Manage site roles, content ownership, and user permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  curateDataSources:
    description: A Tableau data source may contain multiple data connections to different databases or files. Connection
      information includes where the data is located (such as a file path or a network location) and details on how to connect
      to your data (such as database log in information).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  shareDataSources:
    description: Share data sources
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  manageContent:
    description: Manage projects and workbooks.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  certifyDataSources:
    description: Manage data sources certification
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  authorFromCuratedData:
    description: Author from curated data
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  viewLineageAndImpact:
    description: View lineage and impact
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  setDataQualityWarnings:
    description: Set data quality warnings
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  advancedServerDeploymentMonitoring:
    description: Advanced server deployment monitoring
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  programmaticContentMigration:
    description: Programmatic Content Migration
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  interactWithVisualizations:
    description: Interact with visualizations
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  interactWithDashboards:
    description: Interact with dashboards
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  createCustomViews:
    description: Create custom views
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  shareCustomViews:
    description: Share custom views
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  downloadVisualizationAsImages:
    description: Download a snapshot of a visualization or dashboard as either a .pdf
      or .png file.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  downloadSummaryData:
    description: Download only the aggregate data used by the visualization or dashboard.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  downloadFullData:
    description: Download the full data set associated with the visualization or dashboard.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  seeDataQualityWarnings:
    description: See data quality warnings
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  consumePredictiveModels:
    description: Consume predictive models from Einstein Discovery
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  commentOnDashboard:
    description: Comment on a dashboard
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  commentOnVisualization:
    description: Comment on a visualization
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  createASubscriptionForYourself:
    description: Create a subscription for yourself
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  receiveDataDrivenAlerts:
    description: Receive data driven alerts
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TRACKING
  createSubscriptionsForOthers:
    description: Create subscription for others
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  createDataDrivenAlerts:
    description: Create data driven alerts
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  editExistingWorkbooks:
    description: Edit existing workbooks
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  editExistingVisualizations:
    description: Edit existing visualizations
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  createAndPublishNewWorkbookFromExistingDataSource:
    description: Create and publish new workbook from existing published data source. Create content starting with
      an existing data source published to Tableau Server or Tableau Cloud.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  askData:
    description: Explore an existing data source published to Tableau Server or Tableau
      Online with Ask Data.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  createAndPublishNewWorkbookFromNewDataSources:
    description: Create and share content by connecting to a new data source, including
      raw data. You're not restricted to existing, published data sources.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  createAndPublishNewDataSources:
    description: Create and publish new data sources
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  createNewWorkbooksBasedOnPreBuiltDashboardStarters:
    description: Dashboard Starters allow you to connect prebuilt dashboards to common
      enterprise applications.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  createNewDataFlows:
    description: Combine, shape and clean data, and save the process as a data flow.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  editDataFlow:
    description: Edit and modify a data flow (.tfl)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  exportData:
    description: Export data (.tde, .hyper or .csv)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  publishFlows:
    description: Publish flows
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  runFlows:
    description: Run flows
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  scheduleFlows:
    description: Schedule flows
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  monitorFlowPerformance:
    description: Monitor flow performance
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  monitorFlowHealth:
    description: Monitor flow health
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
usageLimits:
  flowsLimit:
    description: The maximum number of flows that can be created and run by a user.
    valueType: NUMERIC
    defaultValue: 0
    unit: flow
    type: NON_RENEWABLE
    linkedFeatures:
    - runFlows
plans:
  VIEWER:
    description: View and interact with dashboards and visualizations in a secure,
      easy-to-use platform.
    price: 15
    unit: user/month
    features: null
    usageLimits: null
  EXPLORER:
    description: Explore trusted data and answer your own questions faster with full
      self-service analytics.
    price: 42
    unit: user/month
    features:
      manageUserPermissions:
        value: true
      manageContent:
        value: true
      certifyDataSources:
        value: true
      authorFromCuratedData:
        value: true
      createCustomViews:
        value: true
      shareCustomViews:
        value: true
      downloadFullData:
        value: true
      createSubscriptionsForOthers:
        value: true
      createDataDrivenAlerts:
        value: true
      editExistingWorkbooks:
        value: true
      editExistingVisualizations:
        value: true
      createAndPublishNewWorkbookFromExistingDataSource:
        value: true
    usageLimits: null
  CREATOR:
    description: Discover insights with a powerful suite of products that support
      your end-to-end analytics workflow.
    price: 70
    unit: user/month
    features:
      manageUserPermissions:
        value: true
      curateDataSources:
        value: true
      shareDataSources:
        value: true
      manageContent:
        value: true
      certifyDataSources:
        value: true
      authorFromCuratedData:
        value: true
      createCustomViews:
        value: true
      shareCustomViews:
        value: true
      downloadFullData:
        value: true
      createSubscriptionsForOthers:
        value: true
      createDataDrivenAlerts:
        value: true
      editExistingWorkbooks:
        value: true
      editExistingVisualizations:
        value: true
      createAndPublishNewWorkbookFromExistingDataSource:
        value: true
      createAndPublishNewWorkbookFromNewDataSources:
        value: true
      createAndPublishNewDataSources:
        value: true
      createNewWorkbooksBasedOnPreBuiltDashboardStarters:
        value: true
      createNewDataFlows:
        value: true
      editDataFlow:
        value: true
      exportData:
        value: true
    usageLimits: null
addOns:
  dataManagementViewer:
    availableFor:
    - VIEWER
    price: Contact Sales
    unit: user/month
    features:
      viewLineageAndImpact:
        value: true
      seeDataQualityWarnings:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
  dataManagementExplorer:
    availableFor:
    - EXPLORER
    price: Contact Sales
    unit: user/month
    features:
      viewLineageAndImpact:
        value: true
      setDataQualityWarnings:
        value: true
      seeDataQualityWarnings:
        value: true
      scheduleFlows:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
  dataManagementCreator:
    availableFor:
    - CREATOR
    price: Contact Sales
    unit: user/month
    features:
      viewLineageAndImpact:
        value: true
      setDataQualityWarnings:
        value: true
      seeDataQualityWarnings:
        value: true
      publishFlows:
        value: true
      runFlows:
        value: true
      scheduleFlows:
        value: true
      monitorFlowPerformance:
        value: true
      monitorFlowHealth:
        value: true
    usageLimits:
      flowsLimit:
        value: 1
    usageLimitsExtensions: null
  advancedManagement:
    availableFor:
    - CREATOR
    price: Contact Sales
    unit: user/month
    features:
      advancedServerDeploymentMonitoring:
        value: true
      programmaticContentMigration:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
  einsteinDiscovery:
    availableFor:
    - VIEWER
    - EXPLORER
    - CREATOR
    price: Contact Sales
    unit: user/month
    features:
      consumePredictiveModels:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
