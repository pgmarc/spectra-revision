syntaxVersion: '2.1'
saasName: Zoom - Meetings
createdAt: '2020-11-17'
version: '2020'
billing:
  monthly: 1.0
  annual: 0.83
currency: USD
url: https://web.archive.org/web/20201117002737/https://zoom.us/pricing
features:
  meetings:
    description: Simplified video conferencing and messaging across any device
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  ticketTechnicalSupport:
    description: Ticket technical support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  liveChatTechnicalSupport:
    description: Live chat technical support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  phoneTechnicalSupport:
    description: Phone technical support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  localRecording:
    description: Zoom local recording saves your meeting recordings in MP4 (video), M4A (audio) and text (chat) formats.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  cloudRecording:
    description: Zoom Cloud Recording stores in the Zoom Cloud, where the file can then be downloaded
      and/or streamed from a browser
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  telephoneDialIn:
    description: Join a Zoom meeting via teleconferencing/audio conferencing (using a traditional telephone). Users will
      be charged according to their telephone plan. Try our Audio Conferencing add-on for toll-free dial-in numbers.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  screenSharing:
    description: Desktop and application sharing. Licensed meeting users can choose to allow multiple participants
      to share their screens simultaneously during a meeting they are hosting.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  breakoutRooms:
    description: Video Breakout Rooms allows you to split your Zoom meeting into as many as 50 separate sessions
      for discussion, projects and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  virtualBackground:
    description: When enabled, the virtual background feature allows you to display an image or short video as your
      background during a Zoom meeting, which can provide you with more privacy or a consistent and professional look for a presentation.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  personalMeetingId:
    description: Create your own permanent online meeting room. You can start this meeting at any time or schedule
      it for future use.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateChat:
    description: Chat allows you to easily send group text, files, screen captures, code snippets, voice messages,
      and images. Text can be formatted and users can share GIFs and emojis as well. Presence displays whether
      chat participants are active on desktop or mobile devices, or busy in meetings.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  groupChat:
    description: Chat allows you to easily send group text, files, screen captures, code snippets, voice messages,
      and images. Text can be formatted and users can share GIFs and emojis as well. Presence displays whether
      chat participants are active on desktop or mobile devices, or busy in meetings.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  hostControls:
    description: Host controls enable you, as the meeting host, to manage various aspects of a Zoom meeting, including
      participant management.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  coAnnotationOnScreenShare:
    description: Zoom's in-meeting product features allow you to add annotations on your screen during your video
      calls — a tool for remote teams to easily brainstorm and collaborate. Meeting participants can add annotations
      while screen sharing as a viewer or the one that started sharing their screen. You can also use annotation tools
      when sharing or viewing a whiteboard.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  remoteKeyboardControl:
    description: The remote control feature allows you to take control of another participant's screen in a Zoom meeting when
      they've given you permission. You can either request remote control of another participant's screen or the other
      participant can give control to you. Once given permission, you can control their mouse and keyboard, and even
      copy text from their screen to yours.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  remoteMouseControl:
    description: The remote control feature allows you to take control of another participant's screen in a Zoom meeting when
      they've given you permission. You can either request remote control of another participant's screen or the other
      participant can give control to you. Once given permission, you can control their mouse and keyboard, and even
      copy text from their screen to yours.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  whiteboarding:
    description: Zoom Whiteboard provides customers a set of easy-to-use tools to collaborate together to capture ideas,
      processes, and concepts. With features focused on fostering innovation, Zoom Whiteboard makes it simple for
      hybrid teams to interact in new ways for seamless collaboration.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiShare:
    description: Multiple screens can be shared and viewed in a Zoom Room simultaneously. This content can be screens
      shared by remote participants or screens shared within the room. Each shared screen can be assigned to a display.

      If there is only one screen in the room, you can toggle between which screen is being displayed.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tlsEncryption:
    description: TLS encryption
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  aes256Encryption:
    description: AES-256 Encryption for real-time content
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  waitingRoom:
    description: The Waiting Room feature allows the host to control when a participant joins the meeting. As the meeting
      host, you can admit attendees one by one or all at once. In settings, you can choose who gets put into the Waiting
      Room or gets automatically admitted. Every account has the Waiting Room feature. Hosts can message the Waiting Room.
      You can customize the Waiting Room, if you're on a paid plan.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  builtIntoZoomForHomeDevices:
    description: Zoom for Home is a new offering included with Zoom Meetings user licenses that allows anyone to deploy a
      personal collaboration device for video meetings, phone calls, interactive whiteboarding, and annotation.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  pinMultiplePeople:
    description: The host can grant up to 9 people, the ability to pin videos to create their own custom view.
      So no matter who is speaking, the pinned videos stay visible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  spotlightMultiplePeople:
    description: The host can spotlight up to 9 attendee's videos, so that no matter who is speaking the entire
      meeting sees the spotlighted videos.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  filters:
    description: Bring more fun into happy hours, parties and more with fun color filters or decorative animal stickers.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: FILTERING
  assignMeetingScheduler:
    description: Allows you to assign someone else to set up your meetings for you. Assignee must also have a Pro plan.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  restApi:
    description: Allows account owners, admins, and your developers secure access to Zoom REST API. API Rate Limits
      are applied at the account-level according to Account Type (Pro, Business, Enterprise, etc…) and the API Request
      Type (Light, Medium, Heavy, etc…). Some APIs are access-limited to specific account types. Use the API Rate
      Limits & API Reference Documentation for complete details.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  skypeForBusinessInteroperability:
    description: Allows Lync users 2010, 2013 and Skype for Business users to initiate a Zoom meeting
      from the Lync contact list.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  streaming:
    description: Stream live to Facebook, Youtube or a 3rd party service.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  reporting:
    description: Run usage reports to learn how many meetings are taking place, which days, number of participants,
      number of meeting minutes and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  userManagement:
    description: Owners and Admins can add, delete and assign roles and add-on features.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  adminPortal:
    description: Manage users in your company on one account for simplified billing, advanced user management
      settings, and comprehensive usage insights all in the Zoom Admin Portal.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  ltiIntegration:
    description: Easily add a meeting to any course activity and invite the right students from your learning
      management system (works with Moodle, Canvas, Desire2Learn and Blackboard).
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  cloudRecordingTranscripts:
    description: Cloud recording transcripts are audio transcripts that transcribe the audio of a meeting or webinar that you record to the cloud. Please note this is currently supported for English language.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  branding:
    description: Add your company's branding to your own customized page where your users can join a meeting. Create a branded email template to send invites to participants.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  managedDomains:
    description: Use your company/university email address domain to add users to your account automatically.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  singleSignOn:
    description: Allows you to login using your company credentials. Zoom single sign-on (SSO) is based on SAML 2.0.
      Zoom can also work with other Service Providers such as PingOne, Okta, Centrify, Shibboleth, Gluu, OneLogin,
      Fugen, Symplified and Azure AD (including support for user provisioning)
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  languageInterpretations:
    description: Allows the meeting host to designate interpreters in their meetings and webinar. Upon starting the
      meeting or webinar, the meeting host can start the interpretation feature, which will give the interpreters
      access to their own audio channels. Participants can select an audio channel to hear their language of choice.
      Participants will hear the translated audio and can choose if they want to hear the original audio at a lower volume.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customerSuccessManager:
    description: Customer success manager
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  executiveBusinessReviews:
    description: Detailed trending adoption analysis, ROI tracking, product roadmap discussions.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  bundleDiscounts:
    description: Bundle discounts
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  callOutDialIn:
    description: While in a meeting or webinar, you can call others to join the meeting or webinar
      by phone (also known as "call out").
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  globalTollFreeDialIn:
    description: As an account administrator or a meeting organizer, you can choose one or more countries from which
      you commonly invite attendees that dial in to your meetings. The dial-in numbers for the countries that you
      choose appear by default in the meeting invitation that you send to participants. The dial-in numbers that
      appear in the invitation can be overridden when you schedule a specific meeting.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  localDialInForPremiumCountries:
    description: Local dial in for Premium countries
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
usageLimits:
  maxParticipants:
    description: A Participant is an invitee in a meeting scheduled by someone with a Host license. Participants can
      join your meeting for free from their phone, desktop, mobile and tablet devices. A participant does not require a
      Zoom account in order to join a meeting.
    valueType: NUMERIC
    defaultValue: 100
    unit: participant
    type: NON_RENEWABLE
    linkedFeatures:
    - meetings
  minLicenses:
    description: Minimum licenses to purchase
    valueType: NUMERIC
    defaultValue: 1
    unit: license
    type: NON_RENEWABLE
    linkedFeatures: null
  maxLicenses:
    description: Maximum licenses to purchase
    valueType: NUMERIC
    defaultValue: 1
    unit: license
    type: NON_RENEWABLE
    linkedFeatures: null
  maxMeetingDuration:
    description: Maximum meeting duration available
    valueType: NUMERIC
    defaultValue: 40
    unit: min
    type: NON_RENEWABLE
    linkedFeatures:
    - meetings
  maxBreakoutRooms:
    description: Maximum breakout rooms available
    valueType: NUMERIC
    defaultValue: 50
    unit: room
    type: NON_RENEWABLE
    linkedFeatures:
    - breakoutRooms
  maxCloudRecordingSize:
    description: Maximum cloud recording file size
    valueType: NUMERIC
    defaultValue: 0
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - cloudRecording
