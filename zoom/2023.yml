    integrationType: EXTERNAL_DEVICE
    tag: Phone
  callPark:
    description: Call park allows phone users to place a call on hold and let another phone user resume the call
      from any phone or Zoom client. After parking a call, Zoom Phone generates a retrieval code. Any other phone
      user can use the retrieval code to resume the call. Admins can set routing rules if parked calls are not
      answered after a specified amount of time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  end2EndEncriptionForZoomPhone:
    description: End-to-End Encryption (E2EE) for Zoom Phone calls is available for account owners and admins to
      allow their users to switch their one-on-one calls to E2EE when additional protection is needed. Using
      Zoom Phone E2EE requires the caller and callee to be part of the same Zoom account, to join from the Zoom
      desktop or mobile app, and for automatic call recording to be disabled, or the user is allowed to pause
      automatic call recording if it is enabled.
    valueType: BOOLEAN
