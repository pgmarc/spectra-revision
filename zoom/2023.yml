    integrationType: MARKETPLACE
    tag: Team Chat
  secureFileSharing:
    description: Enhance collaboration with seamless file sharing
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
    tag: Team Chat
  persistentMeetingChat:
    description: Never lose track of meeting conversations. Communicate before, during, and after a meeting in a
      dedicated group chat in Zoom Team Chat for all meeting participants.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Team Chat
  cloudStorage:
    description: Back channels to the Zoom Cloud or a third-party storage provider.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Core Features
  avatars:
    description: Customize your own avatar to bring some fun into meetings and present yourself dynamically
      without needing to be on video.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Fun
  inMeetingsReactions:
    description: Show engagement and quickly communicate with other participants in a non-verbal way.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Fun
  quizzes:
    description: Create single-choice or multiple-choice polling questions for your meetings.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Fun
  appearanceTouchUp:
    description: The touch up my appearance feature gives your picture display a softer focus and enhances your
      digital appearance in real-time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Fun
  originalSoundForMusicians:
    description: The Original sound for musicians and Live performance audio profiles allow for greater preservation of
      audio received from your microphone without using Zoom's echo cancellation and audio filters. These are ideal if
      your microphone or sound equipment has these features built in or if you want to preserve the full range of
      sound from a musical instrument.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Fun
  endToEndEncryptionForZoomMeetings:
    description: When enabled, Zoom's end-to-end encryption (E2EE) for Zoom Meetings means that communications
      between all meeting participants using Zoom clients in a given meeting are encrypted using cryptographic
      keys known only to the devices of those participants. This means that no third party — including Zoom — has access
      to the meeting's private keys.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
    tag: Security
  zoomCustomerManagedKey:
    description: Bring your own encryption keys to protect Zoom data at rest
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Security
  enterpriseGradeSecurityFeatures:
    description: 256-bit AES-GCM encryption for real-time content in transit, advanced chat encryption, passcodes,
      Waiting Rooms, lock a meeting, audio signatures, screen share watermarks, two-factor authentication, and more.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
    tag: Security
