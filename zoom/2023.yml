    description: Dynamically detect user location and report corresponding emergency address to local
      emergency services (US & Canada only) and to internal safety team.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  emergenceResponseCenter:
    description: Enable your internal safety team to be alerted for emergency calls and record/monitor/barge
      into emergency calls to help coordinate the response.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
    tag: Phone
  sharedLineAppearance:
    description: Shared line appearance
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
