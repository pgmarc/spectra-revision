syntaxVersion: '2.1'
saasName: Zoom - One
createdAt: '2023-11-17'
version: '2023'
billing:
  monthly: 1.0
  annual: 0.83
currency: USD
url: https://web.archive.org/web/20231117031501/https://zoom.us/pricing
tags:
  - Core Features
  - Meetings
  - Team Chat
  - Fun
  - Security
  - Phone
  - Support
features:
  meetings:
    description: Simplified video conferencing and messaging across any device
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  localRecording:
    description: Zoom local recording saves your meeting recordings in MP4 (video), M4A (audio) and text (chat) formats.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  cloudRecording:
    description: Zoom Cloud Recording stores in the Zoom Cloud, where the file can then be downloaded
      and/or streamed from a browser
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Core Features
  teamChat:
    description: Chat allows you to easily send group text, files, screen captures, code snippets, voice messages,
      and images. Text can be formatted and users can share GIFs and emojis as well. Presence displays whether
      chat participants are active on desktop or mobile devices, or busy in meetings.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  zoomWhiteBoards:
    description: Zoom Whiteboard provides customers a set of easy-to-use tools to collaborate together to capture ideas,
      processes, and concepts. With features focused on fostering innovation, Zoom Whiteboard makes it simple for
      hybrid teams to interact in new ways for seamless collaboration.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  mail:
    description: Zoom Mail and Calendar in the Zoom app
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  mailService:
    description: Email service with full-time end-to-end encryption for enhanced privacy
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Core Features
  customMailDomain:
    description: Custom Mail Domain with Mail Service
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Core Features
  calendarClient:
    description: Schedule and join meetings in the Zoom app
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  aiCompanion:
    description: Zoom AI Companion, your generative-AI digital assistant, delivers powerful, real-time capabilities
      to help users improve productivity and work together more effectively. Zoom customers can expect to see AI
      Companion throughout the Zoom platform, with features available for products including Meetings, Chat, Mail,
      Phone, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
    tag: Core Features
  calendarService:
    description: Meeting scheduling and appointment booking
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Core Features
  clips:
    description: Effortlessly create, edit, and share shorts videos. Stored clips are easily
      discoverable, boosting engagement.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  notes:
    description: Notes offers a robust personal and collaborative document editor with extensive formatting
      options, accessible both in and out of meetings.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Core Features
  zoomPhone:
    description: Zoom Phone calling features have been designed to give your users a flexible, mobile,
      and powerful cloud phone system.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Core Features
  automatedCaptions:
    description: Zoom has a variety of options for creating virtual closed captioning in your Zoom meetings and
      webinars that provide subtitles for video conferencing. With the automated captions feature, captions are
      generated in real time to offer a more accessible and flexible virtual communication experience for all participants.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
    tag: Core Features
  translatedCaptions:
    description: Zoom translated captions enable users to have the speech in a meeting or webinar automatically
      translated in real-time to captions in another language. For example, if a meeting participant is speaking
      in English, other participants can view captions in German, Italian, Japanese, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
    tag: Core Features
  workspaceReservation:
    description: Workspace will allow you to reserve workspaces in your offices. You can easily book available desks,
      personal Zoom appliances, or meeting spaces. After making a reservation, you can easily check into your reserved
      space using this App.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Core Features
  zoomScheduler:
    description: Zoom Scheduler optimizes scheduling by sharing your availability for others to conveniently books
      appointments. Works seamlessly with your Zoom Meetings and Zoom Mail and Calendar, and integrates with Google
      and Microsoft 365.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
    tag: Core Features
  accessAccrossAnyDevice:
    description: You can be signed in to Zoom on one computer, one tablet, and one phone at a time.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
    tag: Core Features
  telephoneDialIn:
    description: Join a Zoom meeting via teleconferencing/audio conferencing (using a traditional telephone). Users will
      be charged according to their telephone plan. Try our Audio Conferencing add-on for toll-free dial-in numbers.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  screenSharing:
    description: Desktop and application sharing. Licensed meeting users can choose to allow multiple participants
      to share their screens simultaneously during a meeting they are hosting.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  breakoutRooms:
    description: Video Breakout Rooms allows you to split your Zoom meeting into as many as 50 separate sessions
      for discussion, projects and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  virtualBackground:
    description: When enabled, the virtual background feature allows you to display an image or short video as your
      background during a Zoom meeting, which can provide you with more privacy or a consistent and professional look for a presentation.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  personalMeetingId:
    description: Create your own permanent online meeting room. You can start this meeting at any time or schedule
      it for future use.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  hostControls:
    description: Host controls enable you, as the meeting host, to manage various aspects of a Zoom meeting, including
      participant management.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  coAnnotationOnScreenShare:
    description: Zoom's in-meeting product features allow you to add annotations on your screen during your video
      calls — a tool for remote teams to easily brainstorm and collaborate. Meeting participants can add annotations
      while screen sharing as a viewer or the one that started sharing their screen. You can also use annotation tools
      when sharing or viewing a whiteboard.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  remoteKeyboardControl:
    description: The remote control feature allows you to take control of another participant's screen in a Zoom meeting when
      they've given you permission. You can either request remote control of another participant's screen or the other
      participant can give control to you. Once given permission, you can control their mouse and keyboard, and even
      copy text from their screen to yours.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  remoteMouseControl:
    description: The remote control feature allows you to take control of another participant's screen in a Zoom meeting when
      they've given you permission. You can either request remote control of another participant's screen or the other
      participant can give control to you. Once given permission, you can control their mouse and keyboard, and even
      copy text from their screen to yours.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiShare:
    description: Multiple screens can be shared and viewed in a Zoom Room simultaneously. This content can be screens
      shared by remote participants or screens shared within the room. Each shared screen can be assigned to a display.

      If there is only one screen in the room, you can toggle between which screen is being displayed.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  waitingRoom:
    description: The Waiting Room feature allows the host to control when a participant joins the meeting. As the meeting
      host, you can admit attendees one by one or all at once. In settings, you can choose who gets put into the Waiting
      Room or gets automatically admitted. Every account has the Waiting Room feature. Hosts can message the Waiting Room.
      You can customize the Waiting Room, if you're on a paid plan.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  builtIntoZoomForHomeDevices:
    description: Zoom for Home is a new offering included with Zoom Meetings user licenses that allows anyone to deploy a
      personal collaboration device for video meetings, phone calls, interactive whiteboarding, and annotation.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
    tag: Meetings
  pinMultiplePeople:
    description: The host can grant up to 9 people, the ability to pin videos to create their own custom view.
      So no matter who is speaking, the pinned videos stay visible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Meetings
  spotlightMultiplePeople:
    description: The host can spotlight up to 9 attendee's videos, so that no matter who is speaking the entire
      meeting sees the spotlighted videos.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Meetings
  filters:
    description: Bring more fun into happy hours, parties and more with fun color filters or decorative animal stickers.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: FILTERING
    tag: Meetings
  polling:
    description: When enabled, hosts can create poll questions for meetings. You can launch the poll during your
      meeting and gather responses from your participants. Hosts have the option to download a polling report
      after the meeting. Polls can be conducted anonymously if you prefer not to collect participant information
      with the results.

      Polling reports contain full details of the results, such as each participant's answers and submission times.
      These reports are available after the meeting by default, with an option to access them during the live session.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  coHost:
    description: Hosts can share hosting privileges with additional users during a meeting, allowing the co-hosts to
      manage the administrative side of the meeting, such as managing participants or starting/stopping the recording.
      The host is the only user who can assign a co-host during a meeting. There is no limitation on the number of
      co-hosts you can have in a meeting or webinar.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  alternateHost:
    description: Hosts can share hosting privileges with additional users during a meeting, allowing the co-hosts to
      manage the administrative side of the meeting, such as managing participants or starting/stopping the recording.
      The host is the only user who can assign a co-host during a meeting. There is no limitation on the number of
      co-hosts you can have in a meeting or webinar.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  assignMeetingScheduler:
    description: Allows you to assign someone else to set up your meetings for you. Assignee must also have a Pro plan.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
    tag: Meetings
  restApi:
    description: Allows account owners, admins, and your developers secure access to Zoom REST API. API Rate Limits
      are applied at the account-level according to Account Type (Pro, Business, Enterprise, etc…) and the API Request
      Type (Light, Medium, Heavy, etc…). Some APIs are access-limited to specific account types. Use the API Rate
      Limits & API Reference Documentation for complete details.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
    tag: Meetings
  skypeForBusinessInteroperability:
    description: Allows Lync users 2010, 2013 and Skype for Business users to initiate a Zoom meeting
      from the Lync contact list.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    tag: Meetings
  streaming:
    description: Stream live to Facebook, Youtube or a 3rd party service.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
    tag: Meetings
  reporting:
    description: Run usage reports to learn how many meetings are taking place, which days, number of participants,
      number of meeting minutes and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Meetings
  userManagement:
    description: Owners and Admins can add, delete and assign roles and add-on features.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Meetings
  adminPortal:
    description: Manage users in your company on one account for simplified billing, advanced user management
      settings, and comprehensive usage insights all in the Zoom Admin Portal.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Meetings
  ltiIntegration:
    description: Easily add a meeting to any course activity and invite the right students from your learning
      management system (works with Moodle, Canvas, Desire2Learn and Blackboard).
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
    tag: Meetings
  recordingTranscripts:
    description: Cloud recording transcripts are audio transcripts that transcribe the audio of a meeting or webinar that you record to the cloud. Please note this is currently supported for English language.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
    tag: Meetings
  branding:
    description: Add your company's branding to your own customized page where your users can join a meeting. Create a branded email template to send invites to participants.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  managedDomains:
    description: Use your company/university email address domain to add users to your account automatically.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Meetings
  languageInterpretations:
    description: Allows the meeting host to designate interpreters in their meetings and webinar. Upon starting the
      meeting or webinar, the meeting host can start the interpretation feature, which will give the interpreters
      access to their own audio channels. Participants can select an audio channel to hear their language of choice.
      Participants will hear the translated audio and can choose if they want to hear the original audio at a lower volume.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  executiveBusinessReviews:
    description: Detailed trending adoption analysis, ROI tracking, product roadmap discussions.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Meetings
  webinar500:
    description: Include Webinar 500
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Meetings
  directChat:
    description: Easily communicate in 1 on 1 messages
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
