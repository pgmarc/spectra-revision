  unlimitedAutoAttendants:
    description: Unlimited auto attendants. An auto attendant is an automated system that guides callers through
      a menu using voice commands or keypad inputs, enabling them to select the options that best match their needs.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  dialByNameDirectory:
    description: A dial-by-name directory allows callers to search a site's phone users by entering a first or last name.
      After performing a search, the caller can route to the phone user. You must route to the dial-by-name directory
      from an IVR system. The dial-by-name directory only supports British and American English.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  automaticCallDistributionGroups:
    description: Automatic call distribution groups (ACD) with call queueing
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  barge:
    description: "Call monitoring. Barge: Join a call and speak to all parties. The call will become a 3-way call."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  monitor:
    description: If your admin assigned you as a monitor with call monitoring privileges, you can listen,
      whisper, barge, or take over calls. You admin has control over which monitoring privileges you can use.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
    tag: Phone
  whisper:
    description: "Call monitoring. Whisper: Speak to a phone user in a call without other parties being aware."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Phone
  takeover:
    description: "Call monitoring. Take over: Take over the call from a Zoom Phone user."
    valueType: BOOLEAN
