syntaxVersion: '2.1'
saasName: Zenhub
createdAt: '2023-11-17'
version: '2023'
billing:
  monthly: 1.0
  annual: 0.66
currency: USD
url: https://web.archive.org/web/20231117060409/https://www.zenhub.com/pricing
tags:
  - Security
  - Configuration
  - GitHub
  - Features
  - Integrations
  - Support
features:
  signUpWithEmail:
    description: Sign up to Zenhub via email
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Security
  emailDomainVerification:
    description: Zenhub automatically sets up your organization based on your email domain. Company email domains may
      show existing organizations you can join, helping teams avoid duplicate setups. Common email providers like Gmail
      trigger automatic organization creation, named after your email address (customizable later).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Security
  googleSSO:
    description: Sign in with Github using Google SSO
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
    tag: Security
  cloudHosted:
    description: Zenhub is cloud hosted so you don't have to worry about system mantainance.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    tag: Security
  soc2CompliantCloudEnvironment:
    description: SOC-2 Compliant Cloud Environment
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
    tag: Security
  selfHostedOnPremise:
    description: Zenhub on-premise supports full SOC2 Type 2 compliance, role-based access control, audit logging,
      and horizontal scalability for mid-size to global enterprises. Deploy in your own environment to meet data
      residency, confidentiality, and throughput requirements. SOC 2 Type 2 is a rigorous third-party audit that
      validates security, availability, and privacy controls operate effectively over time, not just on paper.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    tag: Security
  companyOrganizations:
    description: A Zenhub organization is the top-level container for your company or team. It holds your billing, user access,
      and admin settings, and it's where you manage things like organization name, allowed domains, members, and issue
      types. From there, you create workspaces for each team or project. If your company uses an email domain, Zenhub can
      also show existing organizations you can join, and some email providers may create an organization automatically.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
    tag: Configuration
  teamWorkspaces:
    description: A Workspace is how you organize GitHub repositories and issues in Zenhub. Think of it as a customized
      project view that brings together all the repositories your team needs to work effectively. With Workspaces, you
      can connect multiple GitHub repositories—even across different organizations—into a single, unified view.

      Workspaces provide a centralized view of issues across multiple repositories, allowing teams to see all their work in
      one place. Each team can maintain their own pipelines and workflows without disrupting other teams working from the
      same repositories. You'll also get shared reporting and analytics across all connected repositories, plus flexible
      permissions to control collaboration levels.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Configuration
  connectedTeams:
    description: Connect multiple Github organizations into Zenhub
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Configuration
  githubIntegration:
    description: Work directly within GitHub, with no context switching. Zenhub overlays advanced project management
      onto your existing workflow.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://github.com/pricing
    tag: GitHub
  zenhubExtensionForGithub:
    description: Access all of Zenhub's project management functionalities — including multi-repository Kanban boards,
      Planning Poker and automations — within GitHub's UI.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
    tag: GitHub
  githubInsights:
    description: "GitHub Insights gives you a productivity dashboard for your team's GitHub activity. It tracks six metrics:
      issue completion, issue lead time, issue completion ratio, PR throughput, code review time, and PR merge ratio.
      It also shows a productivity score as a percentile ranking and provides actionable recommendations for issue hygiene
      and PR hygiene."
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
    tag: GitHub
  nonGithubUsersCanViewGithubIssues:
    description: Non-Github users can view Github issues
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: GitHub
  automatedSprintPlanning:
    description: Zenhub can automate sprint planning by creating new sprints based on your team's velocity
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Features
  planningPoker:
    description: Planning poker enables you to request estimates from select team members and have estimates automatically
      applied when a consensus is reached.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  estimates:
    description: Story points help with sprint planning and capacity tracking. Use the Fibonacci sequence (1, 2, 3, 5, 8, 13, 21)
      to indicate relative complexity and effort. You can set initial estimates during creation, focusing on consensus-based
      estimation rather than individual time predictions.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  zenhubProjects:
    description: Zenhub Projects issues are cohesive efforts with defined objectives and deliverables that
      lasts several months. Its the sencod type of issue that you can create in the hierachy of Zenhub issues.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  epics:
    description: Epics are themes of work grouping related issues around specific features. Its typical timeframe ranges from
      weeks to months.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  issues:
    description: "Create Zenhub issues. Choose Zenhub Issues when:
      - The work is project management or planning focused
      - You're coordinating across multiple repositories
      - The task doesn't require code changes (design, documentation, planning)
      - You want to keep strategic work separate from development execution
      - You need Zenhub-specific organizational features"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  burndownReports:
    description: Sprint Burndown provides a visual representation of your team's progress through a sprint, showing how
      much work has been completed and how much remains. The chart helps teams stay on track to meet sprint commitments
      by providing early indicators when progress falls behind the ideal pace.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
    tag: Features
  velocityReport:
    description: Understand your team's capacity with Velocity Reports. Analyze trends and filter by labels,
      sprints, and assignees for more detailed insights.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
    tag: Features
  sprintInsights:
    description: See several information about a Sprint with a Sprint Burndown chart, a Sprint Summary report and more...
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Features
  leadTimeInsights:
    description: The Lead/Cycle Time report helps you understand how long issues take to complete and identify
      bottlenecks in your development process. Whether your team uses estimation or not, this report provides
      valuable insights for predicting completion times and improving workflow efficiency.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Features
  cycleTimeInsights:
    description: The Lead/Cycle Time report helps you understand how long issues take to complete and identify
      bottlenecks in your development process. Whether your team uses estimation or not, this report provides
      valuable insights for predicting completion times and improving workflow efficiency.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Features
  cumulativeFlowInsights:
    description: "Cumulative Flow Diagrams provide teams with critical insights into how different areas of their
      workflow are changing over time. With Cumulative Flow Diagrams, teams have the ability to:
      
      - Understand the throughput of Issues through pipelines on the Board
      - Identify bottlenecks and areas where Issues are piling up in pipelines
      - Proactively make process improvements to streamline development"
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
    tag: Features
  slackIntegration:
    description: Create and update issues directly from Slack. Turn existing Slack threads into Zenhub issues.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://slack.com/pricing
    tag: Integrations
  miro:
    description: Paste a share link to a Miro board and have the content embedded within a Zenhub Issue, Zenhub Epic or
      Zenhub Comment. This embedded view is fully interactive and even include the ability to view the embed in full screen!
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://miro.com/pricing/
    tag: Integrations
  figma:
    description: Paste a share link to a Figma design and have the content embedded within a Zenhub Issue, Zenhub Epic or
      Zenhub Comment. This embedded view is fully interactive and even include the ability to view the embed in full screen!
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
      - https://figma.com/pricing
    tag: Integrations
  communitySupport:
    description: Community support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
    tag: Support
  emailSupport:
    description: Support via email
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
    tag: Support
  prioritySupport:
    description: Priority support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
    tag: Support
  sharedSlackChannelWithZenhubTeam:
    description: Shared Slack channel with Zenhub team
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
    tag: Support
  liveGuidedOnboardingForYourTeam:
    description: Live guided onboarding for your teams
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
    tag: Support
usageLimits:
  companyOrganizationsLimit:
    description: Maximum company organizations available
    valueType: NUMERIC
    defaultValue: 1
    unit: company
    type: NON_RENEWABLE
    linkedFeatures:
      - companyOrganizations
  teamWorkspacesLimit:
    description: Team workspaces available
    valueType: NUMERIC
    defaultValue: 10
    unit: workspace
    type: NON_RENEWABLE
    linkedFeatures:
      - teamWorkspaces
  connectedTeamsLimit:
    description: Maximum connected teams available
    valueType: NUMERIC
    defaultValue: 10
    unit: team
    type: NON_RENEWABLE
    linkedFeatures:
      - connectedTeams
  usersLimit:
    description: Maximum users in your Zenhub account
    valueType: NUMERIC
    defaultValue: 50
    unit: user
    type: NON_RENEWABLE
    linkedFeatures: null
  maxConnectedGithubOrganizations:
    description: Maximum Github connected organizations available
    valueType: NUMERIC
    defaultValue: 1
    unit: organization
    type: NON_RENEWABLE
    linkedFeatures:
      - githubIntegration
  maxConnectedGithubRepositories:
    description: Maximum Gihtub connected repositories available
    valueType: NUMERIC
    defaultValue: 75
    unit: repo
    type: NON_RENEWABLE
    linkedFeatures:
      - githubIntegration
plans:
  FREE:
    description: 14-Day Free Trial. Get full unlimited access to all of Zenhub.
    price: 0
    unit: /month
    features: null
    usageLimits:
      teamWorkspacesLimit:
        value: .inf
      connectedTeamsLimit:
        value: .inf
      usersLimit:
        value: .inf
  TEAMS:
    description: For teams looking for advanced collaboration and support
    price: 12.5
    unit: user/month
    features:
      googleSSO:
        value: true
      sprintInsights:
        value: true
      leadTimeInsights:
        value: true
      cycleTimeInsights:
        value: true
      cumulativeFlowInsights:
        value: true
      slackIntegration:
        value: true
    usageLimits: null
  ENTERPRISE:
    description: For organizations that need additional security, control, and support
    price: Contact us
    unit: user/month
    features:
      googleSSO:
        value: true
      soc2CompliantCloudEnvironment:
        value: true
      selfHostedOnPremise:
        value: true
      nonGithubUsersCanViewGithubIssues:
        value: true
      sprintInsights:
        value: true
      leadTimeInsights:
        value: true
      cycleTimeInsights:
        value: true
      cumulativeFlowInsights:
        value: true
      slackIntegration:
        value: true
      prioritySupport:
        value: true
      sharedSlackChannelWithZenhubTeam:
        value: true
      liveGuidedOnboardingForYourTeam:
        value: true
    usageLimits:
      companyOrganizationsLimit:
        value: 10
      teamWorkspacesLimit:
        value: .inf
      connectedTeamsLimit:
        value: .inf
      usersLimit:
        value: .inf
      maxConnectedGithubOrganizations:
        value: 10
      maxConnectedGithubRepositories:
        value: .inf
addOns: null