syntaxVersion: '2.1'
saasName: Zenhub
createdAt: '2020-12-03'
version: '2020'
billing:
  monthly: 1.0
  annual: 0.8
currency: USD
url: https://web.archive.org/web/20201203043633/https://www.zenhub.com/pricing
features:
  apiAccess:
    description: API access
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  burnDownCharts:
    description: Sprint Burndown provides a visual representation of your team's progress through a sprint, showing how
      much work has been completed and how much remains. The chart helps teams stay on track to meet sprint commitments
      by providing early indicators when progress falls behind the ideal pace.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  estimates:
    description: Story points help with sprint planning and capacity tracking. Use the Fibonacci sequence (1, 2, 3, 5, 8, 13, 21)
      to indicate relative complexity and effort. You can set initial estimates during creation, focusing on consensus-based
      estimation rather than individual time predictions.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  epics:
    description: Epics are themes of work grouping related issues around specific features. Its typical timeframe ranges from
      weeks to months.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  unlimitedRepositories:
    description: "Public repos: Unlimited free users"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiRepoBoard:
    description: The new ZenHub Boards can display issues from several repos in one place. Connecting Task Boards
      provides total visibility to your projects, making sprint planning and prioritization more transparent and efficient.
      You can filter the Board to see only what you need.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  slackIntegration:
    description: Create and update issues directly from Slack. Turn existing Slack threads into Zenhub issues.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  cloudHosted:
    description: Zenhub is cloud hosted so you don't have to worry about system mantainance.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  unlimitedPrivateRepos:
    description: Unlimited private repositories
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  onPremisesHosting:
    description: Zenhub on-premise supports full SOC2 Type 2 compliance, role-based access control, audit logging,
      and horizontal scalability for mid-size to global enterprises. Deploy in your own environment to meet data
      residency, confidentiality, and throughput requirements. SOC 2 Type 2 is a rigorous third-party audit that
      validates security, availability, and privacy controls operate effectively over time, not just on paper.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  prioritySupport:
    description: Priority support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  billing:
    description: Invoiced billing
    valueType: TEXT
    defaultValue:
      - CARD
    type: PAYMENT
  accessToBetaProgram:
    description: Access to beta program (cloud hosted only)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dedicatedCustomerSuccessManager:
    description: Dedicated customer success manager
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  onlyForPublicRepos:
    description: Only for public repositories feature switch
    valueType: BOOLEAN
    defaultValue: true
    type: NON_RENEWABLE
    linkedFeatures:
      - apiAccess
      - burnDownCharts
      - estimates
      - epics
      - unlimitedRepositories
      - multiRepoBoard
      - slackIntegration
      - cloudHosted
plans:
  FREE:
    description: For public, personal, and academic repositories
    price: 0
    unit: /month
    features: null
    usageLimits: null
  GROWTH:
    description: For small teams getting started
    price: 10
    unit: user/month
    features:
      unlimitedPrivateRepos:
        value: true
    usageLimits:
      onlyForPublicRepos:
        value: false
  ENTERPRISE:
    description: For organizations looking to scale
    price: 12.5
    unit: 'user/month'
    features:
      unlimitedPrivateRepos:
        value: true
      onPremisesHosting:
        value: true
      prioritySupport:
        value: true
      billing:
        value:
          - CARD
          - INVOICE
      accessToBetaProgram:
        value: true
      dedicatedCustomerSuccessManager:
        value: true
    usageLimits:
      onlyForPublicRepos:
        value: false
addOns: null