syntaxVersion: '2.1'
saasName: Trello
createdAt: '2019-11-22'
version: '2019-11-22'
billing:
  monthly: 1.0
  annual: 0.7792
currency: USD
url: https://web.archive.org/web/20191122220501/https://trello.com/pricing
tags:
- Standard Features
- Team Features
- Power-Ups
- Automation by Butler
- Admin and Security Features
features:
  personalBoards:
    description: Private board to see your pending tasks
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Standard Features
  cards:
    description: The smallest, but most detailed unit of a board is a card (C). Cards are used to represent tasks and ideas.
      A card can be something that needs to get done, like a blog post to be written, or something that needs to be remembered,
      like company vacation policies.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Standard Features
  lists:
    description: Lists keep tasks organized on your board. You can use lists to move cards along each step of a process or
      to categorize ideas and information.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Standard Features
  fileAttachments:
    description: Card attachments are files uploaded to cards.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Standard Features
  prioritySupport:
    description: Customers with Business Class or Enterprise get priority email support, meaning we'll make sure your
      questions get answered within one business day, guaranteed.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
    tag: Standard Features
  observers:
    description: Observers are a Business Class security setting that limit a
      user's actions within a board.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Standard Features
  customBackgrounds:
    description: You can change the color or add a custom image to a board by changing your board's background. Once you've
      changed the board background, all other users that view that board will also see that same background. Choose between
      six different colours or beautiful photos to express yourself and also make navigating your board's page much easier.
      Paid subscribers can also upload their own background images.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Standard Features
  customStickers:
    description: Stickers are a simple yet fun way to add visual flair to your Trello cards. They can communicate a card's
      status or add a little bit of whimsy.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Standard Features
  teamBoards:
    description: Collaborate with your team by creating boards that will be available
      to all members
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Team Features
  boardCollections:
    description: Business Class and Enterprise teams can use Board Collections to easily group boards together whether by
      team, department, or major project.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Team Features
  teamBoardTemplates:
    description: We've got you covered with team management templates. These templates will help cultivate team culture,
      run effective meetings, build empathy...
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Team Features
  powerUps:
    description: Enable calendars, custom fields, automation, 3rd party reporting and much
      more to solve your business needs
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Power-Ups
  customFields:
    description: Bring additional structure to cards with custom fields
      like text, numbers, checkboxes, dates, and dropdown lists
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  listLimits:
    description: Easily identify bottlenecks in your team's workflow
      by setting limits on your board's lists
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  cardRepeater:
    description: Automate repeated tasks and bring process to workflows
      by creating duplicate copies of Trello cards at set intervals
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  calendarView:
    description: Visualize Trello cards with due dates in a calendar view
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  mapView:
    description: Add locations to cards and view them on a map
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  voting:
    description: Crowdsource opinions and get team input when
      prioritizing ideas and projects by enabling voting on cards
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  appIntegrations:
    description: Bring the apps and tools your team depends on
      like Slack, Google Drive, Salesforce, Dropbox and more directly into your Trello boards
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Power-Ups
  butler:
    description: Butler brings powerful board automations and actions all
      easily created with simple natural language programming.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerCommandsCardButton:
    description: Make things happen when a button is pressed on the card back. For example, a button that assigns a
      card, then sets a due date for next week and adds a specific label.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerCommandsBoardButton:
    description: Make things happen when a button is pressed in the board header. For example, a button that
      reorders or moves all cards in a list that match a specific criteria.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerCommandsRules:
    description: Make things happen whenever specific conditions are met. For example, a rule that assigns a
      card and moves it to the top of a list whenever a new card is added to the board.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerCommandsRunUser:
    description: Run automations as another user
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerCommandsRunTeam:
    description: Run automation as a team profile
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerScheduledCommands:
    description: Make things happen automatically on a set schedule. For example, sort a particular list by due date every day.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerCommandAdministration:
    description: Business Class or Enterprise administrators can enable/disable
      commands on behalf of other users, and perform other command maintenance.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerEmailNotifications:
    description: Email notifications means the ability to send a
      custom email notification from within a Butler command
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  butlerHttpRequests:
    description: HTTP requests means the ability to issue HTTP request
      to an external service from within a Butler command.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
    tag: Automation by Butler
  2factorAuthentication:
    description: Add another layer of verification to the login process
      to keep external parties out of your Trello account.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
    tag: Admin and Security Features
  advancedAdminPermissions:
    description: Set the team-level permissions for members,
      boards and invitation restrictions all from one place
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  domainRestrictedInvites:
    description: Restrict who can be added to your Trello
      teams by email domain or individual address
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  deactivateMembers:
    description: Employees who leave the company can have their
      account deactivated in your team, without removing their work or history
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  googleAppsSignOn:
    description: Easily add members from your Google Apps account
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  simpleDataExport:
    description: Export your team's data all at once, in JSON or CSV
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  singleSignOn:
    description: Provides easy and secure access to Trello for employees by
      integrating directly with top identity providers including Microsoft Azure, OneLogin, Okta, and G Suit
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
    tag: Admin and Security Features
  powerUpAdministration:
    description: Admins can control which third party power-ups and attachment types can be used on a board
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  attachmentRestrictions:
    description: Admins can control which third party power-ups and attachment types can be used on a board
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  organizationWidePermissions:
    description: Admins can set permissions at a company level, which cascade to all team members within the company
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  organizationVisibleBoards:
    description: Organization visibility introduces a new level of board visibility for Enterprise users. When a board is
      Organization visible, managed users and Enterprise Workspace members (on any Workspace that is owned by the Enterprise)
      can view the board, regardless of the Workspace the board is in.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  personalizedOnboarding:
    description: Personalized onboarding program
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
  publicBoardManagement:
    description: Admins can see and change the visibility on all of your company’s
      public boards, and can view public boards in private spaces
      of users whose accounts are owned by the company.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
    tag: Admin and Security Features
usageLimits:
  fileAttachmentsLimit:
    description: Maximum size for file attachments
    valueType: NUMERIC
    defaultValue: 10
    unit: MB/file
    type: NON_RENEWABLE
    linkedFeatures:
    - fileAttachments
  teamBoardsLimit:
    description: Maximum team board available
    valueType: NUMERIC
    defaultValue: 10
    unit: board
    type: NON_RENEWABLE
    linkedFeatures:
    - teamBoards
  powerUpsLimit:
    description: Maximum power up available
    valueType: NUMERIC
    defaultValue: 1
    unit: Power-up/board
    type: NON_RENEWABLE
    linkedFeatures:
    - powerUps
  butlerCommandsCardButtonLimit:
    description: Maximum butler commands card button available
    valueType: NUMERIC
    defaultValue: 1
    unit: command
    type: NON_RENEWABLE
    linkedFeatures:
    - butlerCommandsCardButton
  butlerCommandsBoardButtonLimit:
    description: Maximum butler commands board buttons available
    valueType: NUMERIC
    defaultValue: 1
    unit: command
    type: NON_RENEWABLE
    linkedFeatures:
    - butlerCommandsBoardButton
  butlerCommandsRulesLimit:
    description: Maximum bulter commands rules available
    valueType: NUMERIC
    defaultValue: 1
    unit: command
    type: NON_RENEWABLE
    linkedFeatures:
    - butlerCommandsRules
  butlerCommandsRunTeamLimit:
    description: Maximum butler commands run as team available
    valueType: NUMERIC
    defaultValue: 50
    unit: run/team
    type: NON_RENEWABLE
    linkedFeatures:
    - butlerCommandsRunTeam
  butlerCommandsRunUserLimit:
    description: Maximum butler commands run as user available
    valueType: NUMERIC
    defaultValue: 50
    unit: run/user
    type: NON_RENEWABLE
    linkedFeatures:
    - butlerCommandsRunUser
  maxCommandsRunTeamQuota:
    description: Maximum commands run available for a team
    valueType: NUMERIC
    defaultValue: 50
    unit: run/month
    type: NON_RENEWABLE
    linkedFeatures:
    - butlerCommandsRunTeam
