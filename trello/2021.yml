syntaxVersion: '2.1'
saasName: Trello
createdAt: '2021-11-28'
version: '2021-11-28'
billing:
  monthly: 1.0
  annual: 0.7792
currency: USD
url: https://web.archive.org/web/20211128161053/https://trello.com/pricing
features:
  customBackgrounds:
    description: You can change the color or add a custom image to a board by changing your board's background. Once you've
      changed the board background, all other users that view that board will also see that same background. Choose between
      six different colours or beautiful photos to express yourself and also make navigating your board's page much easier.
      Paid subscribers can also upload their own background images.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customStickers:
    description: Stickers are a simple yet fun way to add visual flair to your Trello cards. They can communicate a card's
      status or add a little bit of whimsy.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  singleBoardGuests:
    description: Invite a person as a guest in one single board
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  savedSearches:
    description: Paid subscribers have the ability to save searches in Trello's advanced search section. Saved search can
      be used to quickly search for more complex searches that you use regularly.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiBoardGuests:
    description: Multi-board guest is someone that is not a member of a Standard or Premium Workspace but has been invited
      to more than one Workspace board, and has therefore become billable in the Workspace.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  cards:
    description: The smallest, but most detailed unit of a board is a card (C). Cards are used to represent tasks and ideas.
      A card can be something that needs to get done, like a blog post to be written, or something that needs to be remembered,
      like company vacation policies.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  builtinAutomation:
    description: Powerful no-code automation is built into every Trello board
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  assigneeDates:
    description: Assign a person to checklist items
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dueDates:
    description: Set a due date to checklist items
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  iosApp:
    description: iOS app
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  androidApp:
    description: Android App
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  desktopApp:
    description: Desktop app
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  activityLogs:
    description: Unlimited activity logs
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  trelloTemplates:
    description: Give your team a blueprint for success with tried-and-true templates from the Trello community
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  2factorAuthentication:
    description: Two-Factor Authentication (also known as 2FA), allows you to add another layer of verification to the login
      process, requiring a second piece of information in addition to your email address and password in order to log in to
      Trello. The purpose of 2FA is to make it more difficult for an attacker to gain control of your account by requiring a
      code that is only accessible via a second authentication device.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  mobileDeviceManagement:
    description: Enforce security controls on mobile app usage through
      built-in mobile device management (MDM) support for iOS and Android.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  powerUps:
    description: "Integrate with more than 200+ apps and tools your team depends on
      like Slack, Google Drive, Salesforce, Dropbox and more directly into your Trello boards.
      (Note: Some Power-Ups by our partners require an additional subscription fee.)"
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  boards:
    description: Create as many Trello boards as your team sees fit; from onboarding
      new hires, to sprint planning, and every team meeting agenda in between.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedChecklists:
    description: Break down projects into byte-sized tasks and get granular
      by assigning members and due dates to individual tasks.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customFields:
    description: Bring process and formality to your workflow by structuring
      information on Trello cards to the task at hand with Custom Fields.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dashboardView:
    description: Trello's reporting tool lets you access real-time insights and
      communicate your team's progress in a visual and meaningful way.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  timelineView:
    description: Plan your project, stay on top of every sprint, and see how
      all of the moving parts fit together over time with Timeline.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  workspaceTableView:
    description: See your projects and tasks across Workspaces and boards in a
      spreadsheet-style list that can be sorted and filtered to drill down
      to exactly the cards you need to see
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  calendarView:
    description: Calendar displays start dates, due dates, and advanced checklist
      items so you can see what lies ahead for your project and stay on top of today’s to-dos
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  mapView:
    description: Plan an offsite, scout new office locations, or manage product
      distribution points by adding locations to your cards and visualizing them geographically on a map
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  workspaceLevelTemplates:
    description: While everyone can create free public templates, Premium and Enterprise workspaces can create private and
      Workspace visible templates that are not visible publicly to the entire internet.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  commandRunAdministration:
    description: Premium or Enterprise administrators can disable commands on
      behalf of other users, and perform other command maintenance
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  fileAttachments:
    description: Card attachments are files uploaded to cards.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  boardCollections:
    description: Premium and Enterprise teams can use Board Collections to
     easily group boards together whether by Workspace, department, or major projec
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  prioritySupport:
    description: Customers with Premium or Enterprise get priority email support,
      meaning we'll make sure your questions get answered within one business day
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  observers:
    description: Observers are a Premium security setting that limit a user’s actions within a board.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  domainRestrictedInvites:
    description: This setting allows Enterprise Admins to restrict email domains for Workspace-members across all Workspaces
      on the Enterprise. This will prevent Workspace admins from adding users whose accounts are not registered to an email
      address under one of the domains on the allowlist.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  deactivateMembers:
    description: A deactivated user is someone who has either been deactivated in the Trello Workspace, or whose entire
      Atlassian account is deactivated.

      Users who have been deactivated in a Trello Workspace can still access non-Workspace content that their account had access
      to (such as content on other Workspaces, or their own private boards).
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  simpleDataExport:
    description: Simple data export
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  enforce2FA:
    description: Enforce 2FA authentication
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  singleSignOn:
    description: Atlassian Access is a separate subscription that your company
      can enable across all your Atlassian products and starts at $3/month/user
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  commandsRun:
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  workspaces:
    description: "Workspaces are your teams' navigation hub—a place where you can easily find, share, and collaborate on
      any board. Think of it like a digital office: everything and everyone in the right place."
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  powerUpAdministration:
    description: Enterprise Power-Up Administration allows administrators to control which Power-Ups are allowed to be added
      to boards within the Enterprise. This feature also gives visibility into which Power-Ups are currently in-use within
      the Enterprise and how many boards they're used on.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  attachmentRestrictions:
    description: Attachment restrictions
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  organizationWidePermissions:
    description: Organization-wide permissions allow Enterprise admins to enforce settings across all
      Workspaces under the Enterprise.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  organizationVisibleBoards:
    description: Organization visibility introduces a new level of board visibility for Enterprise users. When a board is
      Organization visible, managed users and Enterprise Workspace members (on any Workspace that is owned by the Enterprise)
      can view the board, regardless of the Workspace the board is in.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  publicBoardManagement:
    description: The Public Boards page on the Enterprise Dashboard allows you to view and change visibility of all
      public boards that are within enterprise Workspaces. This means that currently, any public boards within your
      enterprise that are in personal spaces will not appear on this page.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  fileAttachmentsLimit:
    description: Maximum size for file attachments
    valueType: NUMERIC
    defaultValue: 10
    unit: MB/file
    type: NON_RENEWABLE
    linkedFeatures:
    - fileAttachments
  boardsLimit:
    description: Maximum board available
    valueType: NUMERIC
    defaultValue: 10
    unit: board/workspace
    type: NON_RENEWABLE
    linkedFeatures:
    - boards
  powerUpsLimit:
    description: Maximum power up available
    valueType: NUMERIC
    defaultValue: 1_000_000_000
    unit: Power-up/board
    type: NON_RENEWABLE
    linkedFeatures:
    - powerUps
  commandsRunLimit:
    description: Maximum command runs available
    valueType: NUMERIC
    defaultValue: 250
    unit: workspace/run/month
    type: RENEWABLE
    linkedFeatures:
    - commandsRun
  workspacesLimit:
    description: Maximum workspaces available
    valueType: NUMERIC
    defaultValue: 1
    unit: workspace
    type: NON_RENEWABLE
    linkedFeatures:
    - workspaces
plans:
  FREE:
    description: For individuals or teams looking to organize any project.
    price: 0
    unit: user/month
    features: null
    usageLimits: null
  STANDARD:
    description: For small teams that need to manage work and scale collaboration.
    price: 5
    unit: user/month
    features:
      singleBoardGuests:
        value: true
      savedSearches:
        value: true
      advancedChecklists:
        value: true
      customFields:
        value: true
    usageLimits:
      fileAttachmentsLimit:
        value: 250
      boardsLimit:
        value: .inf
      commandsRunLimit:
        value: 1000
  PREMIUM:
    description: For teams that need to track and visualize multiple projects in several ways, including boards, timelines,
      calendars, etc.
    price: 10
    unit: user/month
    features:
      singleBoardGuests:
        value: true
      savedSearches:
        value: true
      advancedChecklists:
        value: true
      customFields:
        value: true
      dashboardView:
        value: true
      timelineView:
        value: true
      workspaceTableView:
        value: true
      calendarView:
        value: true
      mapView:
        value: true
      workspaceLevelTemplates:
        value: true
      commandRunAdministration:
        value: true
      boardCollections:
        value: true
      prioritySupport:
        value: true
      observers:
        value: true
      domainRestrictedInvites:
        value: true
      deactivateMembers:
        value: true
      googleAppsSignOn:
        value: true
      simpleDataExport:
        value: true
      singleSignOn:
        value: true
    usageLimits:
      fileAttachmentsLimit:
        value: 250
      boardsLimit:
        value: .inf
      commandsRunLimit:
        value: .inf
  ENTERPRISE:
    description: For organizations that need to connect work across teams with more security and controls.
    price: 17.50
    unit: user/month
    features:
      singleBoardGuests:
        value: true
      savedSearches:
        value: true
      multiBoardGuests:
        value: true
      advancedChecklists:
        value: true
      customFields:
        value: true
      dashboardView:
        value: true
      timelineView:
        value: true
      workspaceTableView:
        value: true
      calendarView:
        value: true
      mapView:
        value: true
      workspaceLevelTemplates:
        value: true
      commandRunAdministration:
        value: true
      boardCollections:
        value: true
      prioritySupport:
        value: true
      observers:
        value: true
      domainRestrictedInvites:
        value: true
      deactivateMembers:
        value: true
      googleAppsSignOn:
        value: true
      simpleDataExport:
        value: true
      singleSignOn:
        value: true
      powerUpAdministration:
        value: true
      attachmentRestrictions:
        value: true
      organizationWidePermissions:
        value: true
      organizationVisibleBoards:
        value: true
      publicBoardManagement:
        value: true
    usageLimits:
      fileAttachmentsLimit:
        value: 250
      boardsLimit:
        value: .inf
      commandsRunLimit:
        value: .inf
      workspacesLimit:
        value: .inf
addOns:
  ATLASSIAN_ACCESS:
    description: Atlassian Access is a separate subscription that your company
      can enable across all your Atlassian products and starts at $3/month/user.
      Trello is an Atlassian product.
    price: 3
    unit: user/month
    features:
      enforce2FA:
        value: true
      singleSignOn:
        value: true