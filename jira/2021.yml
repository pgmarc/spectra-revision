syntaxVersion: '2.1'
saasName: Jira
createdAt: '2021-09-25'
version: '2021-09-25'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20210925145646/https://www.atlassian.com/software/jira/pricing
features:
  sites:
    description: Split Jira apps into different sites for large organizations
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scrumAndKanbanBoards:
    description: Visualize your team's work on a customizable board, following agile frameworks like
      Scrum, Kanban, or anything in between so you can get better visibility over work that's planned and in progress.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  backlog:
    description: The backlog is like a to-do list for your project. It's a dedicated space for keeping
      track of tasks that you want to do in the future.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  agileReporting:
    description: Get access to more than a dozen out-of-the-box reports with real-time, actionable insights into
      how your team is performing over time.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  customizableWorkflows:
    description: Every team has their own style for moving work from 'to do' to 'done.'
      Create a custom workflow that helps your team work as efficiently as possible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  appsAndIntegrations:
    description: Integrate with multiple apps through the marketplace
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  automation:
    description: "Automate any task or process with just a few clicks. With Global and multi-project automation you can
      automate across as many projects as you need with a single rule.

      Customers on Free and Standard plans have access to a limited monthly trial allotment of global and multi project
      rule executions (100 and 500 per month, respectively).
      
      Premium users have 1000 global and multi-project rule executions per paid user per month. Ex: 200 users
      in Jira Cloud Premium will have 200,000 monthly global/multi-project rule executions per month. This is
      pooled across all Jira tools and all users. Enterprise users have access to unlimited automation executions."
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  basicRoadmaps:
    description: Build big picture plans for your team. Our basic roadmap is designed to enable you to
      build a roadmap for your team. Advanced Roadmaps is designed to help you build plans across multiple teams.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedRoadmaps:
    description: Advanced Roadmaps is a powerful roadmapping solution for big picture planning. You can plan and track
      work across multiple projects and teams. Advanced Roadmaps accesses boards, projects, and filters in Jira Software
      to visualize data in a customizable interface. Functioning as a sandbox environment, you can plan and experiment
      before updating your original data in Jira Software.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  basicDependencyManagement:
    description: Track dependencies within your team and across your organization to ensure projects deliver on time.
      Basic dependency management is designed to help you map dependencies within your team.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedDependencyManagement:
    description:  Advanced dependency management is designed to help you map dependencies across multiple teams.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  capacityPlanning:
    description: Keep your goals on track by accounting for whether your teams have bandwidth to complete the
      work they've scoped. See multiple teams' capacity on a sprint by sprint basis.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  projectArchiving:
    description: Keep your goals on track by accounting for whether your teams have bandwidth to complete the
      work they've scoped. See multiple teams' capacity on a sprint by sprint basis.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  domainVerification:
    description: Domain verification enables an organization admin to centrally manage all of the Atlassian
      accounts that utilize the company's domain.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  accountCapture:
    description: Domain verification enables an organization admin to centrally manage all
      of the Atlassian accounts that utilize the company's domain.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sessionDurationManagement:
    description: Session duration management allows an organization admin to set a session timeout value
      different from the default policy of 30 days. This means admins can control how long a team member
      can stay signed in without interacting with Atlassian.com.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  projectRoles:
    description: Project roles allow you to assign roles to different users, for example administrator or
      end-user. You can assign different permissions to users based on their role. In the Free plan, every user
      is considered a project admin.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedPermissions:
    description: Permissions in Jira Software control whether users can create new projects to what users can do, see,
      and comment on within a project or issue. The Free plan does not allow permission settings for projects or issues.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  adminInsights:
    description: Gain visibility and a better understanding of your product usage with data such as level
      of security and access and activity over time.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  sandbox:
    description: Prepare, test and experiment with products & apps before making changes to your live production environment.
    
      Using a sandbox, you'll get a realistic understanding of what a new feature might look like or how it will work once
      fully released in the product for your users.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  releaseTracks:
    description: Control when and how changes are released to end users with Release Tracks.
      
      With options to control Atlassian cloud releases, your day-to-day management of our cloud
      products becomes more predictable, helping you plan, prepare and ensure success for upcoming product changes.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  atlassianAccess:
    description: "An Atlassian Access subscription enables centralized security and governance across all your
      Atlassian cloud products. Gain peace of mind with enterprise-grade security controls, including:

      - SAML single sign-on (SSO)
      - User provisioning (SCIM)
      - Active Directory sync
      - Organization audit log
      - Organization insights
      - Enforced 2FA"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  passwordPolicies:
    description: Password policies help ensure that users accessing Atlassian cloud products are using
      best practices when creating their passwords - helping to reduce the risk of security breaches.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  encryptionInTransitAndAtRest:
    description: All customer data stored within Atlassian cloud products and services is encrypted in transit over
      public networks using Transport Layer Security (TLS) 1.2+ with Perfect Forward Secrecy (PFS) to protect it from
      unauthorized disclosure or modification.
      
      Data drives on servers holding customer data and attachments in Jira Software Cloud, Jira Service Management Cloud,
      Jira Work Management Cloud, Confluence Cloud, Statuspage, OpsGenie, and Trello use full disk, industry-standard
      AES-256 encryption at rest.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  businessContinuityAndDisasterRecovery:
    description: Our Disaster Recovery Program consists of a few key practices to ensure the appropriate
      levels of governance, oversight, and testing.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  mobileDeviceManagement:
    description: Enforce security controls on mobile app usage through built-in mobile device
      management (MDM) support for iOS and Android.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  auditLogs:
    description: When you need to troubleshoot a problem or keep a record of important events, such as
      changes to global permissions, the audit log allows administrators to look back at changes that
      have been made in your site.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  anonymousAccess:
    description: Anonymous access lets people outside of your organization view and create issues without
      logging in. Jira Software's anonymous access is most commonly used to give customers the ability to
      view and submit bugs and feature requests.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  ipAllowlisting:
    description: Bolster your team's security by limiting your site access to trusted IP ranges.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  dataResidency:
    description: Specify where your data is hosted within Atlassian's global cloud footprint to help meet your
      corporate policies and compliance requirements
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  storage:
    description: Disk storage available in your Jira account
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  communitySupport:
    description: Community support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  localBusinessHoursSupport:
    description: 9-5 standard support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x7Support:
    description: 24/7 support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  enterpriseSupport:
    description: Enterprise support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  uptimeSLA:
    description: Uptime SLA
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  centralizedUserSubscriptions:
    description: Manage billing with an organization level account
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
usageLimits:
  usersLimit:
    description: Maximum limit for users using your Jira account
    valueType: NUMERIC
    defaultValue: 10
    unit: user/site
    type: NON_RENEWABLE
  sitesLimit:
    description: Site Limit restricts number of sites (instances) that can be licensed under a subscription plan. Enterprises
      often setup multiple sites (instances) for below scenarios

      - Offer organizational autonomy to independent brands or acquired entities
      - Segregate data by region or department for security reasons
      - Customize instances based on Marketplace apps, project configurations and more
    valueType: NUMERIC
    defaultValue: 1
    unit: site
    type: NON_RENEWABLE
  storageLimit:
    description: Disk space storage limit for your Jira account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
  projectWithAutomationsLimit:
    description: Enable global and multi-project automation usage limit
    valueType: NUMERIC
    defaultValue: 1
    unit: project
    type: NON_RENEWABLE
    linkedFeatures:
    - automation
plans:
  FREE:
    description: For small teams to plan and track work more efficiently
    price: 0
    unit: user/month
    features: null
    usageLimits: null
  STANDARD:
    description: For growing teams focused on building more together
    price: 7
    unit: user/month
    features:
      projectRoles:
        value: true
      advancedPermissions:
        value: true
      auditLogs:
        value: true
      anonymousAccess:
        value: true
      dataResidency:
        value: true
      localBusinessHoursSupport:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      storageLimit:
        value: 250
  PREMIUM:
    description: For organizations that need to scale how they collaborate and track work
    price: 14
    unit: user/month
    features:
      advancedRoadmaps:
        value: true
      advancedDependencyManagement:
        value: true
      capacityPlanning:
        value: true
      projectArchiving:
        value: true
      projectRoles:
        value: true
      advancedPermissions:
        value: true
      adminInsights:
        value: true
      sandbox:
        value: true
      releaseTracks:
        value: true
      auditLogs:
        value: true
      anonymousAccess:
        value: true
      ipAllowlisting:
        value: true
      dataResidency:
        value: true
      localBusinessHoursSupport:
        value: true
      24x7Support:
        value: true
      uptimeSLA:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      storageLimit:
        value: .inf
      projectWithAutomationsLimit:
        value: .inf
  ENTERPRISE:
    description: For enterprises with global scale, security, and governance needs
    price: Contact Sales
    unit: user/month
    features:
      advancedRoadmaps:
        value: true
      advancedDependencyManagement:
        value: true
      capacityPlanning:
        value: true
      projectArchiving:
        value: true
      projectRoles:
        value: true
      advancedPermissions:
        value: true
      adminInsights:
        value: true
      sandbox:
        value: true
      releaseTracks:
        value: true
      atlassianAccess:
        value: true
      auditLogs:
        value: true
      anonymousAccess:
        value: true
      ipAllowlisting:
        value: true
      dataResidency:
        value: true
      localBusinessHoursSupport:
        value: true
      24x7Support:
        value: true
      enterpriseSupport:
        value: true
      uptimeSLA:
        value: true
      centralizedUserSubscriptions:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      sitesLimit:
        value: .inf
      storageLimit:
        value: .inf
      projectWithAutomationsLimit:
        value: .inf
addOns:
  atlassianAccessAddOn:
    availableFor:
    - FREE
    - STANDARD
    - PREMIUM
    price: Contact Sales
    unit: user/month
    features:
      atlassianAccess:
        value: true
    usageLimits: null
    usageLimitsExtensions: null
