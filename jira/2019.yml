syntaxVersion: '2.1'
saasName: Jira
createdAt: '2019-10-30'
version: '2019-10-30'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20191030002727/https://www.atlassian.com/software/jira/pricing
features:
  advancedPermissions:
    description: Permissions in Jira Software control whether users can create new projects to what users can
      do, see, and comment on within a project or issue. The Free plan does not allow permission settings for projects or issues.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  scrumAndKanbanBoards:
    description: Visualize your team's work on a customizable board, following agile frameworks like Scrum,
      Kanban, or anything in between so you can get better visibility over work that's planned and in progress.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  backlog:
    description: The backlog is like a to-do list for your project. It's a dedicated space for keeping
      track of tasks that you want to do in the future.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  agileReporting:
    description: Get access to more than a dozen out-of-the-box reports with real-time, actionable
      insights into how your team is performing over time.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  customizableWorkflows:
    description: Every team has their own style for moving work from 'to do' to 'done.'
      Create a custom workflow that helps your team work as efficiently as possible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  roadmaps:
    description: Roll up your work in Jira Software into shareable roadmaps that highlight dependencies so you can make
      better business decisions and keep all stakeholders informed. Roadmaps with hierarchy gives deeper visibility into
      issues within epics.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  appsAndIntegrations:
    description: Integrate with multiple apps through the marketplace
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  anonymousAccess:
    description: Anonymous access lets people outside of your organization view and create issues without logging in. Jira
      Software's anonymous access is most commonly used to give customers the ability to view and submit bugs and feature
      requests.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  auditLogs:
    description: When you need to troubleshoot a problem or keep a record of important events, such as changes to
      global permissions, the audit log allows administrators to look back at changes that have been made in your site.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  uptimeSLA:
    description: 99% uptime SLA
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  storage:
    description: Disk storage available in your Jira account
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  communitySupport:
    description: Community support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  localBusinessHoursSupport:
    description: 9-5 standard support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x7Support:
    description: 24/7 support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  samlSingleSignOn:
    description: Secure user authentication using SAML. Built-in for self-managed
      deployments.
    valueType: BOOLEAN
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
    defaultValue: false
  automatedUserProvisioning:
    description: Automates the process of creating and managing user accounts.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
  twoStepVerification:
    description: Adds an extra layer of security requiring a second form of verification
      during login.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
  passwordPolicies:
    description: Enforce specific rules and requirements for user passwords to enhance
      security.
    valueType: BOOLEAN
    type: MANAGEMENT
    defaultValue: false
usageLimits:
  usersLimit:
    description: Maximum limit for users using your Jira account
    valueType: NUMERIC
    defaultValue: 10
    unit: user/site
    type: NON_RENEWABLE
  storageLimit:
    description: Maximum disk storage limit for your Jira account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
  users:
    description: Minimum limit for users using your Jira account
    valueType: NUMERIC
    defaultValue: 10
    unit: user
    type: NON_RENEWABLE
plans:
  FREE:
    description: Forever
    price: 0
    unit: user/month
    features: null
    usageLimits: null
  STANDARD:
    description: $7/ user / month starting price
    price: 7
    unit: user/month
    features:
      advancedPermissions:
        value: true
      anonymousAccess:
        value: true
      auditLogs:
        value: true
      localBusinessHoursSupport:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      storageLimit:
        value: 250
      users:
        value: 1
  PREMIUM:
    description: $14 / user / month starting price
    price: 14
    unit: user/month
    features:
      advancedPermissions:
        value: true
      anonymousAccess:
        value: true
      auditLogs:
        value: true
      uptimeSLA:
        value: true
      localBusinessHoursSupport:
        value: true
      24x7Support:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      storageLimit:
        value: .inf
      users:
        value: 1
addOns:
  atlassianAccess:
    description: Enhances cloud security and user management across all Atlassian
      cloud products. It provides SAML single sign-on, automated user provisioning,
      two-step verification, and password policies. Requires a separate subscription.
    price: Contact Sales
    unit: user
    features:
      samlSingleSignOn:
        value: true
      automatedUserProvisioning:
        value: true
      twoStepVerification:
        value: true
      passwordPolicies:
        value: true
    usageLimits: null
    availableFor:
    - FREE
    - STANDARD
    - PREMIUM
    dependsOn: []
    excludes: []
    usageLimitsExtensions: null
  extraUser:
    description: Increment the users capacity for the Jira account
    price: 7
    unit: user/month
    features: null
    usageLimits: null
    availableFor:
    - STANDARD
    - PREMIUM
    dependsOn: []
    excludes: []
    usageLimitsExtensions:
      usersLimit:
        value: 1
