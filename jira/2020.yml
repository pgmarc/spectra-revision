      globalAndMultiProjectAutomation:
        value: true
      advancedPermissions:
        value: true
      projectArchiving:
        value: true
      auditLogs:
        value: true
      anonymousAccess:
        value: true
      adminInsights:
        value: true
      ipAllowlisting:
        value: true
      sandbox:
        value: true
      releaseTracks:
        value: true
      localBusinessHoursSupport:
        value: true
      24x7Support:
        value: true
      uptimeSLA:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      storageLimit:
        value: .inf
  ENTERPRISE:
    description: Talk to our sales team about pricing for Cloud Enterprise
    price: Contact Sales
    unit: user/month
    features:
      advancedRoadmaps:
        value: true
      globalAndMultiProjectAutomation:
        value: true
      advancedPermissions:
        value: true
      projectArchiving:
        value: true
      atlassianAccess:
        value: true
      auditLogs:
        value: true
      anonymousAccess:
        value: true
      adminInsights:
        value: true
      ipAllowlisting:
        value: true
      sandbox:
        value: true
      releaseTracks:
        value: true
      dataResidency:
        value: true
      localBusinessHoursSupport:
        value: true
      24x7Support:
        value: true
      enterpriseSupport:
        value: true
      uptimeSLA:
        value: true
      orgLevelBilling:
        value: true
    usageLimits:
      usersLimit:
        value: 20000
      sitesLimit:
        value: .inf
      storageLimit:
        value: .inf
