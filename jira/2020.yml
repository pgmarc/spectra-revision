syntaxVersion: '2.1'
saasName: Jira
createdAt: '2020-11-29'
version: '2020-11-29'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20201130205632/https://www.atlassian.com/software/jira/pricing
features:
  sites:
    description: Split Jira apps into different sites for large organizations
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  scrumAndKanbanBoards:
    description: Visualize your team's work on a customizable board, following agile frameworks like
      Scrum, Kanban, or anything in between so you can get better visibility over work that's planned and in progress.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  backlog:
    description: The backlog is like a to-do list for your project. It's a dedicated space for keeping
      track of tasks that you want to do in the future.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  agileReporting:
    description: Get access to more than a dozen out-of-the-box reports with real-time, actionable
      insights into how your team is performing over time.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  customizableWorkflows:
    description: Every team has their own style for moving work from 'to do' to 'done.'
      Create a custom workflow that helps your team work as efficiently as possible.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  appsAndIntegrations:
    description: Integrate with multiple apps through the marketplace
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  roadmaps:
    description: Build big picture plans for your team. Our basic roadmap is designed to enable you to build a
      roadmap for your team. Advanced Roadmaps is designed to help you build plans across multiple teams.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  advancedRoadmaps:
    description: Advanced Roadmaps is a powerful roadmapping solution for big picture planning. You can plan and track
      work across multiple projects and teams. Advanced Roadmaps accesses boards, projects, and filters in Jira Software
      to visualize data in a customizable interface. Functioning as a sandbox environment, you can plan and experiment
      before updating your original data in Jira Software.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  automation:
    description: Automation allows you to focus on the work that matters, removing the need to perform manual,
      repetitive tasks by allowing your teams to automate their tasks, processes, and workflows. With our simple no-code
      rule builder, you can create automation rules to take care of everything from the most simple repetitive tasks
      to the most complex scenarios - all in a few clicks.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  globalAndMultiProjectAutomation:
    description: Create global or multi-project rules to automate across as many projects as you need with a single rule.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  advancedPermissions:
    description: Permissions in Jira Software control whether users can create new projects to what users can
      do, see, and comment on within a project or issue. The Free plan does not allow permission settings for projects or issues.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  projectArchiving:
    description: By archiving a project, you can remove it from Jira and preserve the data it contains in case you need it later. It's
      good practice to archive inactive or completed projects so they don't clutter your Jira instance. Fewer projects
      may also mean better performance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  atlassianAccess:
    description: Atlassian Access provides you with centralized governance, security, and user
      management across all the sites you manage within your organization.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  passwordPolicies:
    description: Enforce specific rules and requirements for user passwords to enhance security.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  domainVerification:
    description: Domain verification enables an organization admin to centrally manage all of the Atlassian
      accounts that utilize the company's domain.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  accountCapture:
    description: Domain verification enables an organization admin to centrally manage all of the Atlassian
      accounts that utilize the company's domain.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sessionDurationManagement:
    description: Session duration management allows an organization admin to set a session timeout value different
      from the default policy of 30 days. This means admins can control how long a team member can stay signed in without
      interacting with Atlassian.com.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  encryptionInTransitAndAtRest:
    description: All customer data stored within Atlassian cloud products and services is encrypted in transit over public
      networks using Transport Layer Security (TLS) 1.2+ with Perfect Forward Secrecy (PFS) to protect it from unauthorized disclosure or modification.

      Data drives on servers holding customer data and attachments in Jira Software Cloud, Jira Service Management Cloud,
      Jira Work Management Cloud, Confluence Cloud, Statuspage, OpsGenie, and Trello use full disk, industry-standard AES-256 encryption at rest.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  businessContinuityAndDisasterRecovery:
    description: Our Disaster Recovery Program consists of a few key practices to ensure the appropriate levels of
      governance, oversight, and testing.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  auditLogs:
    description: When you need to troubleshoot a problem or keep a record of important events, such as changes to
      global permissions, the audit log allows administrators to look back at changes that have been made in your site.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  anonymousAccess:
    description: Anonymous access lets people outside of your organization view and create issues without logging in.
      Jira Software's anonymous access is most commonly used to give customers the ability to view and submit bugs and
      feature requests.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  adminInsights:
    description: In Jira, insights help the team make data-driven decisions without leaving their current context.
      Insights source data from your Jira boards and projects to present aggregated views of your team's historical progress.
      Insights are currently available for scrum metrics in both company-managed and team-managed projects.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  ipAllowlisting:
    description: Bolster your team's security by limiting your site access to trusted IP ranges.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  sandbox:
    description: Prepare, test and experiment with products & apps before making changes to your live production environment.
    
      Using a sandbox, you'll get a realistic understanding of what a new feature might look like or how it will work once
      fully released in the product for your users.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  releaseTracks:
    description: Control when and how changes are released to end users with Release Tracks.
    
      With options to control Atlassian cloud releases, your day-to-day management of our cloud products
      becomes more predictable, helping you plan, prepare and ensure success for upcoming product changes.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dataResidency:
    description: Specify where your data is hosted within Atlassian's global cloud footprint to help meet your
      corporate policies and compliance requirements
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  storage:
    description: Disk storage available in your Jira account
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  communitySupport:
    description: Community support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  localBusinessHoursSupport:
    description: 9-5 standard support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  24x7Support:
    description: 24/7 support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  enterpriseSupport:
    description: Enterprise support
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  uptimeSLA:
    description: Uptime SLA
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  orgLevelBilling:
    description: Manage billing with an organization level account
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
usageLimits:
  usersLimit:
    description: Maximum limit for users using your Jira account
    valueType: NUMERIC
    defaultValue: 10
    unit: user/site
    type: NON_RENEWABLE
  sitesLimit:
    description: Site Limit restricts number of sites (instances) that can be licensed under a subscription plan. Enterprises
      often setup multiple sites (instances) for below scenarios

      - Offer organizational autonomy to independent brands or acquired entities
      - Segregate data by region or department for security reasons
      - Customize instances based on Marketplace apps, project configurations and more
    valueType: NUMERIC
    defaultValue: 1
    unit: site
    type: NON_RENEWABLE
  storageLimit:
    description: Disk space storage limit for your Jira account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
