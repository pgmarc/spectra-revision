syntaxVersion: '2.1'
saasName: Jira
createdAt: '2025-03-06'
version: '2025'
url: https://web.archive.org/web/20250306094538/https://www.atlassian.com/software/jira/pricing
tags:
- Project management essentials
- Bring all your teams into Jira
- Simplify cross-functional work
- Scale on the Atlassian platform
- Manage users & products
- Security & Compliance
- Customer Support
billing:
  monthly: 1.0
  annually: 0.83
currency: USD
features:
  goals:
    description: Create goals to align teams and projects to desired outcomes.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  issues:
    description: In Jira, teams use issues to track individual pieces of work that must be completed.
      Depending on how your team uses Jira, an issue could represent a project task, a helpdesk ticket,
      a leave request form, etc.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  projects:
    description: Align projects and tasks to goals. Collect data with forms.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  forms:
    description: Create dynamic forms with our drag-and-drop, user-friendly form builder so your teams
      can collect the data they need.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  customizableWorkflows:
    description: Every team has their own style for moving work from 'to do' to 'done.'
      Create a custom workflow that helps your team work as efficiently as possible.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  projectTemplates:
    description: Choose from a wide selection of project templates based on your team function or use case.
      Templates include pre-configured issue types, workflows, and other relevant features to help teams
      get started quickly.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  backlogView:
    description: The backlog is a type of to-do list for your Jira project. Backlogs are dedicated
      spaces for keeping track of tasks that you want to do in the future.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  listView:
    description: List view combines the intuitive nature of spreadsheets with the power of Jira.
      Add, update, sort, filter, group, and rank items with blazing speed using inline editing.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  boardView:
    description: Board view helps you track work all the way to completion through your team's
      custom workflow. See assignees, statuses, and due dates at a glance.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  timelineView:
    description: Timeline view allows you to plan work, track progress, and map dependencies at a
      granular level within a single team or project.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  calendarView:
    description: Calendar view allows you to manage tasks across schedules to meet your deadlines.
      You can also see the duration of calendar items from start date to end date.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  summaryView:
    description: Summary view gives you an overall snapshot of your team's work, including status overviews,
      workloads, and more.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  dashboards:
    description: Dashboards visualize data from across any Jira product and project in a single place.
      Choose from dozens of pre-configured options or build your own custom dashboard.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: DOMAIN
  reportingAndInsights:
    description: Access out-of-the-box reports with real-time, actionable insights on how your team is performing over time.

      Bring reports into a dashboard to have all your data in a single view for fast, informed decision-making.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: INFORMATION
  appsAndIntegrations:
    description: Seamlessly connect Jira to the tools you use. Improve your team's workflow with
      thousands of integrations, apps, and more with any integration that works for Jira Cloud.
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: INTEGRATION
    integrationType: MARKETPLACE
  iosAndAndroidApps:
    description: Track and manage all aspects of your team's work in real time from the convenience of your
      favorite device with Jira Cloud mobile (iOS and Android).
    valueType: BOOLEAN
    defaultValue: true
    tag: Project management essentials
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  sites:
    description: Split Jira apps into different sites for large organizations
    valueType: BOOLEAN
    defaultValue: true
    tag: Bring all your teams into Jira
    type: DOMAIN
  storage:
    description: Products in the Jira suite and Confluence all come with their own file storage space.
    valueType: BOOLEAN
    defaultValue: true
    tag: Bring all your teams into Jira
    type: DOMAIN
  emailNotifications:
    description: Our Free plan for Jira lets you send a maximum of 100 email notifications each day. After
      100 emails, your notifications will be paused until the following day. Upgrade to a paid plan to
      send unlimited email notifications.
    valueType: BOOLEAN
    defaultValue: true
    tag: Bring all your teams into Jira
    type: INTEGRATION
    integrationType: WEB_SAAS
  userRolesAndPermissions:
    description: Assign roles to different users, like administrator or end-user. In the Free plan, every user
      is a project admin. Different permissions apply to users depending on their role.

      Set permissions to control which users can create new projects and what users can do, see, and comment
      on within a project or issue. Permission settings for projects or issues are only available on paid plans.
    valueType: BOOLEAN
    defaultValue: false
    tag: Bring all your teams into Jira
    type: MANAGEMENT
  anonymousAccess:
    description: Anonymous access lets people outside of your organization view and create issues without
      logging in. Allow external partners to see work in progress on joint projects or give customers the
      ability to submit bugs and feature requests.
    valueType: BOOLEAN
    defaultValue: false
    tag: Bring all your teams into Jira
    type: MANAGEMENT
  advancedPlanning:
    description: Plans allow you to plan and track work across multiple teams and projects. Designed for
      cross-functional visibility and collaboration, advanced planning brings people, work, and goals into
      a shared space where deliverables are balanced against capacity, dependencies are flagged early on,
      and real-time updates are readily available to stakeholders.
    valueType: BOOLEAN
    defaultValue: false
    tag: Simplify cross-functional work
    type: DOMAIN
  singleProjectDependencyManagement:
    description: Dependencies show the relationship between issues in a project or plan. Dependencies
      within a single team or project can be visualized in the timeline view of a project.
    valueType: BOOLEAN
    defaultValue: true
    tag: Simplify cross-functional work
    type: DOMAIN
  crossProjectDependencyManagement:
    description: Dependencies across multiple teams and projects can be visualized in a plan using the
      pre-configured dependency management view or Dependencies tab.
    valueType: BOOLEAN
    defaultValue: false
    tag: Simplify cross-functional work
    type: DOMAIN
  capacityManagement:
    description: Capacity management is available to teams scheduling work within a plan. Assign work based
      on capacity and timeframe to create a realistic plan for your teams and set the right expectations with stakeholders.
    valueType: BOOLEAN
    defaultValue: false
    tag: Simplify cross-functional work
    type: DOMAIN
  expandableIssueHierarchy:
    description: In Jira, issue hierarchy levels show the relationship between issue types, from big units of
      work to small. Expandable issue hierarchy allows you to custom create additional issue levels to visualize
      everything from quarterly goals down to daily tasks within a plan.
    valueType: BOOLEAN
    defaultValue: false
    tag: Simplify cross-functional work
    type: DOMAIN
  scenarioModelling:
    description: Scenarios allow you to explore alternative paths for your plan, such as best case and worst case.
      This allows you to quickly assess the downstream impact and tradeoffs before committing to changes.
    valueType: BOOLEAN
    defaultValue: false
    tag: Simplify cross-functional work
    type: DOMAIN
  approvals:
    description: Add approval steps to your workflows to ensure that reviewers sign off on tasks before
      they're advanced to the next stage.
    valueType: BOOLEAN
    defaultValue: false
    tag: Simplify cross-functional work
    type: DOMAIN
  atlassianIntelligence:
    description: Get more done with AI-powered summaries, generative AI editing, and natural language to build
      automations or search issues.
    valueType: BOOLEAN
    defaultValue: false
    tag: Scale on the Atlassian platform
    type: AUTOMATION
    automationType: BOT
  communication:
    description: Share status updates on how projects and goals are progressing.
    valueType: BOOLEAN
    defaultValue: true
    tag: Scale on the Atlassian platform
    type: DOMAIN
  employeeDirectory:
    description: Know who you're working with and what they're working on.
    valueType: BOOLEAN
    defaultValue: true
    tag: Scale on the Atlassian platform
    type: DOMAIN
  automation:
    description: Automate any task or process in a few clicks. Set automation rules within a single project,
      across multiple projects or across all projects on your site to help you scale. Save time and keep your
      team focussed with Jira's no-code automation engine.

      Free plan comes with 100 rule runs per month while Standard plan has 1700. Premium has 1000 rule runs per
      paid user per month. For example, 200 users on Premium plan would have 200,000 rules per month for for
      Jira Software pooled across users.

      The Enterprise plan allows unlimited rule runs on Jira Software

      You only pay for what you use- only automations that successfully perform an action count towards your limit.
    valueType: BOOLEAN
    defaultValue: true
    tag: Scale on the Atlassian platform
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  atlassianAnalytics:
    description: Build interactive, customizable charts, and dashboards across products and instances
      with a low- to no-code editor.
    valueType: BOOLEAN
    defaultValue: false
    tag: Scale on the Atlassian platform
    type: INFORMATION
  atlassianDataLake:
    description: Access fully modeled data across your Atlassian tools in one place.
    valueType: BOOLEAN
    defaultValue: false
    tag: Scale on the Atlassian platform
    type: DOMAIN
  dataConnectors:
    description: Data connectors let you query your preferred non-Atlassian data source
      alongside Atlassian data for holistic insights.
    valueType: BOOLEAN
    defaultValue: false
    tag: Scale on the Atlassian platform
    type: INTEGRATION
    integrationType: MARKETPLACE
  domainVerification:
    description: Domain verification lets an organization admin centrally manage all of the Atlassian accounts
      that use the company's domain.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage users & products
    type: DOMAIN
  accountCapture:
    description: Domain verification lets an organization admin centrally manage all of the Atlassian accounts
      that use the company's domain.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage users & products
    type: DOMAIN
  sessionDurationManagement:
    description: Session duration management allows an organization admin to set a session timeout value
      different from the default policy of 30 days. This means admins can control how long a team member
      can stay signed in without interacting with Atlassian.com.
    valueType: BOOLEAN
    defaultValue: true
    tag: Manage users & products
    type: MANAGEMENT
  adminInsights:
    description: Gain visibility and a better understanding of your product usage with data such as
      level of security and access and activity over time.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: INFORMATION
  sandbox:
    description: Prepare, test and experiment with products & apps before making changes to your live production environment.

      The sandbox gives you a realistic understanding of what your new feature might look like or how
      it works when released for your users.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: DOMAIN
  releaseTracks:
    description: Control when and how you release changes to users with release tracks.
      
      With options to control Atlassian cloud releases, release tracks make your daily management of
      our cloud products more predictable. This helps you plan, prepare, and ensure success for upcoming product changes.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: DOMAIN
  projectArchiving:
    description: Archive projects and their associated issues when they're no longer active
      to keep projects tidy, helping ensure everyone on your team has the most updated information.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: DOMAIN
  userCounts:
    description: User counts gives Atlassian admins visibility into how many users they are able to add to
      an Enterprise product; and conversely, user counts indicate if a product is at-or-near capacity.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: INFORMATION
  centralizedUserSubscriptions:
    description: With centralized user subscriptions, you can give a user entry into all sites (also called "instances")
      with a single license. This is a subscription model.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: PAYMENT
  productRequests:
    description: Enable admins to manage how and when managed users create Atlassian products.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: DOMAIN
  siteOptimizer:
    description: Site Optimizer gives you a central hub to monitor and improve the
      performance and health of your Jira data with actions like issue archival, custom-field
      clean up, and the removal of unused project role permissions.
    valueType: BOOLEAN
    defaultValue: false
    tag: Manage users & products
    type: DOMAIN
  atlassianGuard:
    description: Enforced single sign-on, external user security, mobile app management, org
      insights, admin-initiated audit logs.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: DOMAIN
  passwordPolicies:
    description: Password policies help ensure best practices for user-created passwords in Atlassian
      cloud products. This helps reduce the risk of security breaches.
    valueType: BOOLEAN
    defaultValue: true
    tag: Security & Compliance
    type: MANAGEMENT
  encryptionInTransitAndAtRest:
    description: All customer data stored within Atlassian cloud products and services is encrypted in transit over
      public networks using Transport Layer Security (TLS) 1.2+ with Perfect Forward Secrecy (PFS) to protect it
      from unauthorized disclosure or modification.

      Data drives on servers holding customer data and attachments in Jira Software Cloud, Jira Service Management
      Cloud, Jira Work Management Cloud, Confluence Cloud, Statuspage, Opsgenie, and Trello use full disk, industry-standard
      AES-256 encryption at rest.
    valueType: BOOLEAN
    defaultValue: true
    tag: Security & Compliance
    type: GUARANTEE
  businessContinuityAndDisasterRecovery:
    description: Our Disaster Recovery Program consists of a few key practices to ensure the appropriate levels of
      governance, oversight, and testing.
    valueType: BOOLEAN
    defaultValue: true
    tag: Security & Compliance
    type: GUARANTEE
  mobileDeviceManagement:
    description: Enforce security controls on mobile app usage through built-in mobile device management (MDM)
      support for iOS and Android.
    valueType: BOOLEAN
    defaultValue: true
    tag: Security & Compliance
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  auditLogs:
    description: Audit logs let administrators look at changes made to your site. This is useful when
      you need to troubleshoot a problem or keep a record of important events, like changes to global permissions.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: INFORMATION
  dataResidency:
    description: Specify where you want your data hosted in Atlassian's global cloud footprint. This can help meet your
      corporate policies and compliance requirements.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: GUARANTEE
  issueLevelsecurity:
    description: Safe for every type of sensitive work, lock down issues so only specific users or user groups
      can see and edit information.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: MANAGEMENT
  ipAllowlisting:
    description: Bolster your team's security by limiting your site access to trusted IP ranges.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: MANAGEMENT
  multipleIdp:
    description: Support multiple identity providers for a single organization.
    
      Customers can now connect multiple identity providers to implement SAML SSO and SCIM user
      provisioning to their Atlassian Cloud organization.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: DOMAIN
  auditLogsForUsersActivity:
    description: Comprehensive audit logging of user-initiated activity in Jira, including permission changes.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: INFORMATION
  byokEncryption:
    description: Early access to encrypt Jira standard and custom issue field data with a key you manage in your
      own instance of AWS KMS.
    valueType: BOOLEAN
    defaultValue: false
    tag: Security & Compliance
    type: GUARANTEE
  communitySupport:
    description: Community support
    valueType: BOOLEAN
    defaultValue: true
    tag: Customer Support
    type: SUPPORT
  localBusinessHoursSupport:
    description: 9-5 standard support
    valueType: BOOLEAN
    defaultValue: false
    tag: Customer Support
    type: SUPPORT
  24x7Support:
    description: 24/7 support
    valueType: BOOLEAN
    defaultValue: false
    tag: Customer Support
    type: SUPPORT
  enterpriseSupport:
    description: Enterprise support
    valueType: BOOLEAN
    defaultValue: false
    tag: Customer Support
    type: SUPPORT
  uptimeSLA:
    description: Uptime SLA
    valueType: BOOLEAN
    defaultValue: false
    tag: Customer Support
    type: GUARANTEE
usageLimits:
  usersLimit:
    description: This is the maximum number of users or user licenses you can add to each of your Jira Software sites.
    valueType: NUMERIC
    defaultValue: 10
    unit: user/site
    type: NON_RENEWABLE
  sitesLimit:
    description: "This is the number of sites (also called “instances”) you can license based on the subscription plan you choose. One site is typically enough for most small to medium organizations.
    
      Enterprise subscribers often opt for multiple sites, up to 150 per product, to:

      - Offer organizational autonomy to independent brands
      - Improve security through separating data by region or department
      - Customize instances based on Marketplace apps, project configurations, and more"
    valueType: NUMERIC
    defaultValue: 1
    unit: site
    type: NON_RENEWABLE
  totalAutomationLimit:
    description: Maximum number of automations in Jira account
    valueType: NUMERIC
    defaultValue: 100
    unit: rule/month
    type: RENEWABLE
    linkedFeatures:
    - automation
  perUserAutomationLimit:
    description: Maximum number of automation per user
    valueType: NUMERIC
    defaultValue: 1000
    unit: rule/month
    type: RENEWABLE
    linkedFeatures:
    - automation
  storageLimit:
    description: Disk space storage limit for your Jira account
    valueType: NUMERIC
    defaultValue: 2
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
  emailNotificationsLimit:
    description: Maximum email notification available in your Jira account
    valueType: NUMERIC
    defaultValue: 100
    unit: email/day
    type: RENEWABLE
    linkedFeatures:
    - emailNotifications
