syntaxVersion: '2.1'
saasName: Dropbox
createdAt: '2022-11-16'
version: '2022-11-16'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20221116040240/https://www.dropbox.com/plans
features:
  storage:
    description: The amount of space you receive by default
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  bestInClassSyncTechnology:
    description: Faster sync using our delta, LAN, and streaming sync technology
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  anytimeAccess:
    description: Access your Dropbox account from any Windows, Mac, Linux, iOS, or Android device.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  anywhereAccess:
    description: Access your Dropbox account from any Windows, Mac, Linux, iOS, or Android device.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  easyAndSecureSharing:
    description: No matter who you're working with, or what you're working on, we have easy ways to share files and folders.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  256BitAES:
    description: Dropbox uses 256-bit AES for files at rest.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  SSL/TLSEncryption:
    description: Dropbox uses SSL/TLS for data in transit, so your files are protected.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  eSignatures:
    description: Add legally binding eSignatures to your documents without ever leaving your Dropbox account.
      Tamper-proof individual documents within a signature request and protect your documents with AES 256-bit encryption
      for files at rest.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: WEB_SAAS
  dropboxBackup:
    description: Automatically back up computers —and connected external drives— directly to the cloud. And quickly recover your content
      if something ever goes wrong.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fileRecovery:
    description: Restore deleted files
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  versionHistory:
    description: Recover older versions
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dropboxRewind:
    description: Recover from accidents or ransomware by reversing all changes to your content at the folder or account level
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  sharedLinkControls:
    description: Manage visibility and access to shared files with password protection, download permissions, and expiration dates.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  externalSharingControls:
    description: Require a password and
      expiration date for externally shared links. And easily revoke access when needed.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  externalSharingReporting:
    description: View all files and folders shared outside of your team in a centralized dashboard.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  dataClassification:
    description: Stay comliant with privacy and security policies. Automatically track and report on sensitive or confidential info
      stored in your Dropbox.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  ransomwareDetectionAndRecovery:
    description: Stay compliant with privacy and security policies. Automatically track and report on sensitive or confidential
      into stored in your Dropbox.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  alertsAndNotifications:
    description: "Get immediately alerted to suspicious behaviour like:\n\n- Ransomware attacks\n- Mass file delections or moves\n
      - Too many sign-in attempts\n- Sign-in attemps from high-risk contries"
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  dropboxPasswords:
    description: Store and sync your passwords across devices to seamlessly sign in to websites and apps.
      Only you can access your passwords, not even Dropbox can.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  dropboxVault:
    description: Secure and organize your most sensitive documents in the cloud so only you and your loved ones have
      access.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  watermarking:
    description: Protect your best ideas. Add a digital watermark to any file before sharing with collaborators or clients.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  accountTransferTool:
    description: Easy transfer files from one user to another when responsabilites change.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  enableMultiFactorAuthentication:
    description: Require six-digit security code or key in addition to a password to access to your account.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  enableHIPAACompliance:
    description: We're committed to helping customers subject to HIPAA/HITECH regulations safeguard protected health information (PHI).
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  remoteDeviceWipe:
    description: Clear files from lost or stolen devices to keep company data in the right hands.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  deviceApprovals:
    description: Admin can control the number of connected devices and what happens to disconnected devices.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  familyRoom:
    description: One central place for your and your family to easily share and access content in a secure folder.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dropboxPaper:
    description: Paper s a single space for your team to create and share work,
      it beautifully displays everything from video and images to code and sound.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dropboxCapture:
    description: Create and share screen recordings, video messages, GIFs and screenshots.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  dropboxTransfer:
    description: Securely send large files —up to 100 GB— to any recipient, even if they don't have Dropbox.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fileLocking:
    description: Lock files when editing to prevent unwanted changes and avoid conflicting copies.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  integratedCloudContent:
    description: Work with any type of content —like Google Docs, Sheets, and Slides, or Microsoft Office files— right from Dropbox.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  brandedSharing:
    description: Present shared files with your logo, company name, and a background image.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  webPreviews:
    description: Preview files on the web.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  webComments:
    description: Leave comments directly on specific parts of the file.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  plusButton:
    description: Create new Microsoft Office files, upload photos, and scan documents straight from the Dropbox app on your
      iPhone.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fileRequests:
    description: Collect files from multiple people, even those without a Dropbox account,
      while keeping file submissions visible only to you.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  fullTextSearch:
    description: Easily search the content of all your files, including docs scanned with the Dropbox mobile app.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  viewerHistory:
    description: See who has previously viewed your files and when.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  adminConsole:
    description: Monitor team activity, view connected devices, and audit sharing activity.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  multiTeamAdminLogin:
    description: Manage multiple Dropbox teams with a single admin login.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  centralizedBilling:
    description: Manage and pay for all employees' accounts with a single bill.
    valueType: BOOLEAN
    defaultValue: false
    type: PAYMENT
  companyManagedGroups:
    description: Allow admins to create authoritative groups that users cannot modify.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiAccessToSecurityPlatformPartners:
    description: Get unlimited API access to SIEM, DLP & CASB, Network Security, Identity & Access Management, Enterprise
      Mobility Management, and Legal Hold partners.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  apiAccessToProductivityPlatformPartners:
    description: Get unlimited access to our productivity partner ecosystem, with app integrations for Communication, Workflow,
      Project Management, CRM, Productivity, Education, Media & Design, Finance, eSignature, and Marketing solutions.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  apiAccessToDataTransportPlatformPartners:
    description: Transfer data from your existing solutions with 1 billion included API calls per month to data transport
      partners. For additional data transport needs, contact support.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  tieredAdminRoles:
    description: Allows teams to have multiple admin roles, each with a different set of permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  signInAsUser:
    description: Allows team admins to sign in to the Dropbox accounts of members of their teams.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  auditLogsWithFileEventTracking:
    description: Monitor the file-level actions your team members are taking.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  singleSignOn:
    description: Easily integrate Dropbox with any large identity provider.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  inviteEnforcement:
    description: Force invited users with a Dropbox account on your domain to join the team account.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  priorityEmailSupport:
    description: Get priority over other support request via email
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  liveChatSupport:
    description: Get priority over other support request via live chat
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  phoneSupportDuringBusinessHours:
    description: During business hours you can call the support team
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  enterpriseGradeSecurityAndVisibilityTools:
    description: Enterprise-grade security and visibility tools
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  integrationsWithBestInClassSecuritySolutions:
    description: Integrations with best-in-class security solutions
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  dedicatedCustomerSuccessManager:
    description: Dedicated customer success manager for long term results with Dropbox
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
usageLimits:
  storageLimit:
    description: Maximun disk space available in your account
    valueType: NUMERIC
    defaultValue: 2000
    unit: GB
    type: NON_RENEWABLE
    linkedFeatures:
    - storage
  usersLimit:
    description: Maximun number of users associated with your plan.
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  users:
    description: Minimun number of users associated with your plan.
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  fileRecoveryAndVersionHistoryThreshold:
    description: Maximun period of file recovery and version history
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - fileRecovery
    - versionHistory
  dropboxRewindThreshold:
    description: Maximun period of Dropbox rewind feature
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - dropboxRewind
  dropboxCaptureRecordingTimeLimit:
    description: Maximun time of capture recording
    valueType: NUMERIC
    defaultValue: 120
    unit: min
    type: TIME_DRIVEN
    linkedFeatures:
    - dropboxCapture
  dropboxCaptureFullHDQuality:
    description: Wether to capture with full hd quality
    valueType: BOOLEAN
    defaultValue: true
    type: NON_RENEWABLE
    linkedFeatures:
    - dropboxCapture
  dropboxCapture4kQuality:
    description: Wether to capture with 4k quality
    valueType: BOOLEAN
    defaultValue: true
    type: NON_RENEWABLE
    linkedFeatures:
    - dropboxCapture
  dropboxCaptureAdvancedVideoEditing:
    description: Enable advanced video editing in Dropbox Capture.
    valueType: BOOLEAN
    defaultValue: true
    type: NON_RENEWABLE
    linkedFeatures:
    - dropboxCapture
  dropboxTransferLimit:
    description: Maximun Dropbox file transfer size
    valueType: NUMERIC
    defaultValue: 2
    unit: GB/transfer
    type: NON_RENEWABLE
    linkedFeatures:
    - dropboxTransfer
  includeCustomizationOptionsInDropboxTransfer:
    description: Wether to include customization options in Dropbox transfer
    valueType: BOOLEAN
    defaultValue: true
    type: NON_RENEWABLE
    linkedFeatures:
    - dropboxTransfer
  eSignaturesLimit:
    description: Maximun number of eSignatures per month
    valueType: NUMERIC
    defaultValue: 3
    unit: signature/month
    type: RENEWABLE
    linkedFeatures:
    - eSignatures
  apiAccessToDataTransportPlatformPartnersLimit:
    description: Maximun number of request per month for data platform partners
    valueType: NUMERIC
    defaultValue: 0
    unit: request/month
    type: RENEWABLE
    linkedFeatures:
    - apiAccessToDataTransportPlatformPartners
