syntaxVersion: '2.1'
saasName: slack
createdAt: '2024-07-02'
version: '2024-07-02'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20240626115756/https://slack.com/pricing
features:
  messagesAccess:
    description: The more you use Slack, the more useful it becomes. With all your organization's messagess available in
      search, you can find context from past decisions or get new team members up to speed faster.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  voiceAndVideoCalls:
    description: Take a break from typing and start a live audio conversation
      (with video, screen sharing, a message thread, and fun reactions/effects)
      in a channel or direct message. Brainstorm, make decisions, or just catch up-all
      the filp of a switch.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  audioAndVideoClips:
    description: Use audio and video to bring your work to life. Record a quick idea with an audio clip, or share your screen
      in a video clip, all without leaving Slack. Coworkers can respond whenever they'd like.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  slackConnect:
    description: Collaborate seamlessly across organizational boundaries with Slack Connect. Separate organizations can
      work together from within their own Slack workspaces.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  canvas:
    description: Get your whole team on the same page with canvases, the collaborative surface for organizing
      your most important documentation for a channel, direct message or project. Create action item checklists, channel
      FAQs, onboarding guides and more. You can even embed workflows right into a canvas!
    valueType: TEXT
    defaultValue: LIMITED
    type: DOMAIN
  # Slack lists
  lists:
    description: Lists bring work management to where teams are already
      collaborating. You can visualize and organize tasks from your conversations so you can track
      cross-functional projects, requests, approvals, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  customTemplates:
    description: Steamline and standarize collaborative processes in Slack canvas with custom templates.
      Create and share ready-to-use templates with powerful automation already built-in. Anyone at your orga can use
      them at the click of a button.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customizableSections:
    description: Keep your projects, teams, and priorities straight, by organizing your channels and conversations into
      custom, collapsible sections in your sidebar.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  atlas:
    description: Find the right person to help move work forward.
      Search for people and keywords within the directory, review team members' profiles,
      and get all the context you need to reach out.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  appsAndServices:
    description: Choose from over 2,600 apps in the Slack App Directory to support whatever work you do  — from Salesforce,
      Jira, Google Drive, ChatGPT, and more.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  workflowBuilder:
    description: Automate routine tasks and processes right in Slack, no code needed. Workflows can be as simple or
      as complex as you'd like, and can even be connected to other apps and tools you use to get work done.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customWorkflowSteps:
    description: Custom workflow steps allow you to bring systems and business logic unique to your
      organization into a workflow. They are built by developers using Slack APIs.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  deployApps:
    description: Developers can deploy custom functions to Slack's secure, managed infrastructure at no additional cost.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  standardWorkflows:
    description: Standard workflows are built using Slack steps and up to one connector step.
      With a connector step, you can bring other tools into your workflow — Salesforce, Google Sheets, Jira, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  premiumWorkflows:
    description: Premium workflows include at least one custom
      step or two or more connector steps. With connector steps, you can bring
      other tools into your workflow — Salesforce, Google Sheets, Jira, and more.
      Paid Slack plans include 1000-5000 runs/month, depending on the plan. It costs $0.05 per
      premium workflow run beyond that allotment.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  singleSignOn:
    description: Sign in to Slack through an IDP of your choice for additional security and convenience. Choose from up to
      12 SSO configurations, including OneLogin, Ping, Microsoft Azure and Okta.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  dataCypher:
    description: By default, Slack encrypts data at rest and in transit as part of our foundational security controls.
    valueType: BOOLEAN
    defaultValue: true
    type: GUARANTEE
  twoFactorAuthentication:
    description: Add an additional layer of security to your account so you never have to worry about your password being
      compromised.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  oAuthGoogle:
    description: Using Google for Open Authorization makes it possible for your team members to securely sign in to Slack using
      thier Google accounts. That's one less password to rememmber.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  complianceHIPAA:
    description: Slack can be configured to support protected health information (PHI) within uploaded files and message content.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  dataResidence:
    description: For teams distributed across the globe, choose the region where certain types of data at rest will be stored.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  # Slack Enterprise Key Management
  adminSlackEnterpriseKeys:
    description: Slack EKM enhances the ability of organizations to share sensitive conversations and files while meeting
      security requirements. Use your own encryption keys and view detailed activity logs in Amazon's AWS KMS.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://docs.aws.amazon.com/en_us/kms/latest/developerguide/overview.html
  # Integration with Enterprise Mobility Management (EMM)
  enterpriseMobilitySecurity:
    description: Take control of how your data is used on mobile devices with EMM. Some EMM providers we work with include
      VMWare AirWatch, Ivanti MobileIron and Blackberry UEM.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  auditLogs:
    description: Audit logs provide a record of changes and usage on
      Enterprise Grid. You can view audit logs right in Slack, export
      them as CSV, and use the Audit Logs API to create custom monitoring tools.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  identityProvidersGroups:
    description: Sync the groups you've created in your IDP to workspaces and channels within your Enterprise Grid organization.
      If your IDP does not support syncing groups, you can use our SCIM API to do it manually.
      manually.'
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customRules:
    description: Custom message and file retention policies.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  exportMessages:
    description: Workspace owners and admins can export data from all channels and conversations, including private
      channels and direct messages, as needed and permitted by law.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  slackConnectLostPrevention:
    description: Data loss prevention in Slack Connect scan messages and files sent by members of your organization
      to reduce the risk of sharing confidential, malicious or personally identifiable content with external orgs.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  informationBarriers:
    description: Create information barriers between IDP groups to prevent specific members from sending DMs or starting
      huddles with each other, avoiding conflicts of interest and safeguarding sensitive information.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  legalRetentionHold:
    description: In an Enterprise Grid organization, you can place
      a legal hold on specific members to preserve their messages and files in
      Slack. This means that messages and files sent by all members in a conversation will be
      saved regardless of retention settings or if members edit or delete any content.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  workspaces:
    description: Like a virtual office, a workspace is where work happens in Slack. All your channels,
      direct messages and tools live in a workspace.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  domainName:
    description: If your company owns or operates under multiple web domains, Slack can help you claim them.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customSLAs:
    description: Org owners and admins can outline the rules to join and use their Slack org.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  privilegesGeneralChannelManagement:
    description: 'Manage posting permissions in the #general channel.'
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  privilegesPrivateChannelManagement:
    description: Manage posting permissions for an unlimited number of channels.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customUserGroups:
    description: Make it easier to send notifications and communicate with entire teams, departments, or groups.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  usersManagementSCIM:
    description: Slack supports member provisioning with the System for Cross-domain Identity Management (SCIM) standard.
      To set up provisioning, you'll need to use a connector app alongside a supported identity provider.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
  extraCompatibility:
    description: Compatibility with data loss prevention (DLP), eDiscovery, and offline
      backup providers.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  support:
    description: We're here to help you get the most out of Slack with support for your team, every step of the way.
    valueType: TEXT
    defaultValue: Standard support
    type: SUPPORT
  granularRoles:
    description: Assign system roles to individual members or identity
      provider groups, or assign members to multiple system roles. Granular controls
      allow you to choose whether members can manage administrative tasks across all
      workspaces or only some in your Enterprise Grid organization.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  adminAnalyticsAPI:
    description: Retrieve analytics data for a given date, presented as a compressed JSON file.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  adminAnalyticsDashboard:
    description: The Slack data analytics dashboard grants you insight into how your organization uses Slack.
      Easily find and sort information to undestand more about the messages, channels, and members in your workspace
      or Enterprise Grid organization.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  messageActivityAnalytics:
    description: With message activity analytics, owners, adminis and members with permission can see
      how many people have interacted with a given message in Slack. You can use message activity to measure the
      impact of announcements and internal communications campaigns for your organization.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  slackAI:
    description: Slack AI is a simple, intuitive AI experience embedded in your flow of work in Slack.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
usageLimits:
  useMessagesAccess:
    description: The number of days you can access message and file information.
    valueType: NUMERIC
    defaultValue: 90
    unit: message
    type: NON_RENEWABLE
    linkedFeatures:
    - messagesAccess
  useAppsAndServices:
    description: The limits of apps and services that can be integrated.
    valueType: NUMERIC
    defaultValue: 10
    unit: app
    type: NON_RENEWABLE
    linkedFeatures:
    - appsAndServices
  useVoiceAndVideoCalls:
    description: The number of people who can join your voice and video calls.
    valueType: NUMERIC
    defaultValue: 1
    unit: people
    type: NON_RENEWABLE
    linkedFeatures:
    - voiceAndVideoCalls
  useWorkspaces:
    description: The number of workspaces you can use.
    valueType: NUMERIC
    defaultValue: 1
    unit: workspace
    type: NON_RENEWABLE
    linkedFeatures:
    - workspaces
  useWorkflowsPremium:
    description: The number of premium workflow executions per month.
    valueType: NUMERIC
    defaultValue: 0
    unit: execution/month
    type: RENEWABLE
    linkedFeatures:
    - premiumWorkflows
  useWorkflows:
    description: The number of workflows that can be published, both standard and
      premium.
    valueType: NUMERIC
    defaultValue: 0
    unit: workflow
    type: NON_RENEWABLE
    linkedFeatures:
    - standardWorkflows
    - premiumWorkflows
  useSlackConnect:
    description: The number of people from other organizations you can collaborate
      with on Slack Connect.
    valueType: NUMERIC
    defaultValue: 1
    unit: persons
    type: NON_RENEWABLE
    linkedFeatures:
    - slackConnect
