syntaxVersion: '2.1'
saasName: Postman
createdAt: '2023-11-04'
version: '2023-11-04'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20231109225552/https://www.postman.com/pricing/
features:
  apiClient:
    description: "Postman supports sending requests across several protocols: HTTP, GraphQL, gRPC, WebSocket, and MQTT."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collections:
    description: Postman Collections are portable sets of API requests that you can reuse, automate, and share with others.
      You can use a collection to save important details for each API request, such as the authorization type, parameters
      and headers, request bodies, scripts and variables, and documentation.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicApiDocumentation:
    description: Publishing your documentation makes it publicly available to anyone with the link to the documentation.
      Publish your documentation to help people around the world learn how to use your collection or interact with your
      public API.

      Public documentation automatically includes details for each request or endpoint in the published collection, along
      with sample code in various client languages. As you update your collection, the published documentation automatically
      stays in sync with your latest changes. There's no need to publish the documentation again after making changes.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  privateApiDocumentation:
    description: To view API documentation, open an API in Postman, or search for APIs on your Private API Network.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  personalWorkspaces:
    description: Collaborative spaces for API development + consumption (individual visibility)
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  teamWorkspaces:
    description: Collaborative spaces for API development + consumption (org-wide visibility)
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicWorkspaces:
    description: Workspaces enable you to organize your Postman work and collaborate with teammates. You can group your
      projects together, with workspace acting as the single source of truth for related APIs, collections, environments,
      mocks, monitors, and other linked elements. By collaborating in a workspace, your edits sync with your team in real time.
      Public workspaces enable you to collaborate on elements with anyone across the world.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateWorkspaces:
    description: Workspaces enable you to organize your Postman work and collaborate with teammates. You can group your
      projects together, with workspace acting as the single source of truth for related APIs, collections, environments,
      mocks, monitors, and other linked elements. By collaborating in a workspace, your edits sync with your team in real time.
      Private workspaces are visible to you and to any team members you invite to them (Professional and Enterprise plans).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  partnerWorkspaces:
    description: Partner APIs are privately available APIs used for collaboration among strategic partners. They can
      be used to integrate data processing and syndication, in industries such as banking, healthcare, and media. Partner
      Workspaces enable you to collaborate with external partners directly in Postman.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  postmanApi:
    description: The Postman API enables you to programmatically access data stored in your Postman account.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  thirdPartyIntegrations:
    description: You can connect Postman to your API workflows with integrations for popular third-party solutions.
      Use integrations to automatically share data between Postman and the other tools you rely on for API development.
      Sync your collections and API definitions to a source control repository. Send monitor alerts to your monitoring
      service or team messaging app. Or view your continuous integration (CI) builds from within Postman.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: MARKETPLACE
  customDomains:
    description: You can create custom domains for your API documentation. Each custom domain can be a full domain or a
      subdomain (e.g., example.com or api.example.com).
      
      Additional custom domains available as add-ons for Basic plans or higher.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  collectionRunner:
    description: Send some or all of the API requests in a Postman Collection in the order you choose with the Collection
      Runner. The Collection Runner logs the test results for each request, and it can use scripts to pass data between
      requests and change the request workflow.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  localPerformanceTesting:
    description: Test the performance of your APIs with the Postman desktop app. Simulate user traffic by automatically
      sending requests in the app. You can observe how your API behaves under load and identify potential issues or
      bottlenecks that affect performance.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  monitoringCalls:
    description: Postman Monitors enable you to continuously check the health and performance of your APIs. You can
      create monitors that run requests in selected collections. Requests can run API test scripts, chain together
      multiple requests, and more. You can also schedule how often Postman runs monitored collections.

      You'll be alerted to any test failures once the monitor is running, so you can identify and address issues before
      your API's consumers are affected.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  mockServersCalls:
    description: Get started fast by creating a mock from a collection, a spec, or your request history.
      Postman matches incoming requests to your saved examples by URL, method, body, and headers.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiGovernance:
    description: Postman's built-in API Governance empowers teams to define and enforce API design rules directly within the
      development environment. With the introduction of Spec Hub, teams can now collaboratively create and manage OpenAPI 2.0,
      3.0, and 3.1 specifications and AsyncAPI 2.0 specifications, ensuring adherence to industry standards and organizational
      guidelines. In addition, you can add data types, formats, required fields, and constraints to your request parameters,
      headers, and bodies to Postman Collections, enabling early validation, stronger collaboration, and more accurate testing.
      This integrated approach promotes consistent, high-quality APIs and enhances collaboration between development and design
      leaders.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  privateApiNetwork:
    description: Central directory of workspaces, collections, and APIs your team uses internally.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  apiBuilder:
    description: Standardize your API designs and get complete API life cycle management capabilities for all your APIs
      with API Builder.

      - Design and build unlimited APIs with the API Builder.
      - Connect APIs with Git repositories, ensuring that collections and specifications always remain in sync with source code.
      - Enable exclusive access to specific consumers by publishing APIs to the Private API Network, ensuring confidentiality and compliance.
      - Utilize the built-in governance rule library, create custom rules via Spectral Rule Builder, and access insightful reports to ensure API conformance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  nativeGitSupport:
    description: With Postman's file system support (Native Git), API iterations are authored and iterated locally in Git,
      alongside code, and intentionally not synced to Postman Cloud until the API reaches a stable, deployable state.

      In Postman, you can open the local instance of your remote Git repository where your API is implemented. The
      collections, specifications, and environments you work on in Postman are saved as a folder inside the source code
      folder. You keep your collection and project files in sync, then commit your local changes to Postman Cloud.
    valueType: TEXT
    defaultValue: ''
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://github.com/pricing
    - https://about.gitlab.com/pricing/
  rolesAndPermissions:
    description: Roles define user permissions within a Postman team and a user's level of access to a Postman element,
      like a collection or an API.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  singleSignOn:
    description: Single sign-on support includes Google Workspace, Microsoft AD FS, Microsoft Entra ID,
      Custom SAML, Duo, Okta, OneLogin, and Ping Identity.
    valueType: TEXT
    defaultValue: ''
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userProvisioning:
    description: Postman supports SCIM (System for Cross-domain Identity Management), allowing you to automate user
      provisioning and de-provisioning for your team.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userGroups:
    description: With Postman user groups, you can organize your team members into functional groups that mimic
      your organizational structure.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  domainCapture:
    description: Verify a domain to view all user accounts in Postman that have been created with your organization's
      domains and subdomains. Enable domain capture to manage all of these user accounts in Postman. With domain capture,
      you can merge all of your organization's Postman users into a single Postman team and ensure that any new users who
      sign up for Postman with your domain are automatically added.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  collectionRecovery:
    description: If you delete a collection and want to recover it, go to the trash. Then, hover over the collection
      you want to restore and select the arrow [restore] icon to retrieve it.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  history:
    description: To access the requests you've made, click the History icon History tab above the sidebar. When you're
      signed in to Postman, your history syncs across your devices.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  auditLogs:
    description: "Audit logs display events related to your team, users, and billing. Team Admins can review audit
      logs to get information about:

      - When users were added to, removed from, or invited to your team
      - Which user performed a specific action and when they did so"
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  secretScanner:
    description: The Postman Secret Scanner scans public workspaces and published documentation to detect exposed
      secrets on all Postman plans. The Secret Scanner monitors the collections, global variables, environment variables,
      API schemas, and documentation in public workspaces. It safeguards your organization from potential threats and
      malicious users attempting to access any exposed secrets. It also scans the documentation your team has published,
      regardless of the type of workspace it's found in.
    valueType: TEXT
    defaultValue: Public Workspaces and Public Documentation
    type: AUTOMATION
    automationType: TRACKING
  superAdminRole:
    description: Manages everything within a team, including team settings, members, roles, and resources.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  deploymentControl:
    description: Postman's Enterprise app is a variant of Postman's Desktop app that offers greater control to administrators
      looking to deploy Postman at an enterprise level. It's available as an MSI package for Windows and PKG package for macOS,
      and supports silent installation, system-wide installation, and additional configurations to control how Postman is
      installed on users' devices.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  reportingAndAnalytics:
    description: Postman Reporting gives you visibility at both the API and team levels, providing you with key insights
      into what's happening across operations.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  support:
    description: Get support via email, higher tier plans gets priority.
    valueType: TEXT
    defaultValue: Email
    type: SUPPORT
  customerSuccess:
    description: Get a customer success manager from our Postman team
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  paymentOptions:
    description: Postman provides a self-serve billing process. Refer to the following sections for guidance on
      managing your account, plan, and payment.
    valueType: TEXT
    defaultValue:
    - CARD
    type: PAYMENT
  integrationWithCiCdTools:
    description: With continuous integration and continuous delivery (CI/CD), the goal is to deliver frequent software
      updates that provide value for users. At the same time, it’s important to maintain software quality. Running API
      tests automatically during the build process helps ensure that every code change is ready for production.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  postmanFlows:
    description: Postman Flows is an easy to use visual editor that helps you create API automations, integrations,
      and demonstrations, with no-code transformations and built-in visualizations.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  flowsRoleManagement:
    description: Limit access to flows and separate responsibilities between flow editors, runners and viewers.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  postbot:
    description: Supercharge your API development with Postbot, our AI-powered assistant, using natural language input
      and contextual suggestions.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
usageLimits:
  callsToPostmanApi:
    description: Maximum calls to Postman API
    valueType: NUMERIC
    defaultValue: 10000
    unit: calls/month
    type: RENEWABLE
    linkedFeatures:
    - postmanApi
  numberOfIntegrations:
    description: Maximum number of third party integrations
    valueType: NUMERIC
    defaultValue: 10
    unit: integration
    type: NON_RENEWABLE
    linkedFeatures:
    - thirdPartyIntegrations
  collectionViewers:
    description: Viewers are counted on a per-team basis.
    valueType: NUMERIC
    defaultValue: 10
    unit: viewer/team
    type: NON_RENEWABLE
    linkedFeatures:
    - collections
  customDomainsLimit:
    description: Maximum number of custom domains
    valueType: NUMERIC
    defaultValue: 1
    unit: domain
    type: NON_RENEWABLE
    linkedFeatures:
    - customDomains
  localCollectionRunnerLimit:
    description: Maximum number of collection runs per month
    valueType: NUMERIC
    defaultValue: 25
    unit: runs/month
    type: RENEWABLE
    linkedFeatures:
    - collectionRunner
  localPerformanceTestingUserLimit:
    description: Maximum number of virtual users for local performance testing
    valueType: NUMERIC
    defaultValue: 100
    unit: virtual user
    type: NON_RENEWABLE
    linkedFeatures:
    - localPerformanceTesting
  localPerformanceTestingRunsLimit:
    description: Maximum number of tests runs for local performace testing
    valueType: NUMERIC
    defaultValue: 25
    unit: run
    type: NON_RENEWABLE
    linkedFeatures:
    - localPerformanceTesting
  monitoringCallsLimit:
    description: Maximum number of calls to Postman Monitoring
    valueType: NUMERIC
    defaultValue: 1000
    unit: call/month
    type: RENEWABLE
    linkedFeatures:
    - monitoringCalls
  mockServersCallsLimit:
    description: Maximum number of calls to Mock Servers
    valueType: NUMERIC
    defaultValue: 1000
    unit: call/month
    type: RENEWABLE
    linkedFeatures:
    - mockServersCalls
  collectionRecoveryLimit:
    description: Maximum number of days to recover a collection
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - collectionRecovery
  historyDepth:
    description: Maximum history stored in days
    valueType: NUMERIC
    defaultValue: 1
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - history
  flowSteps:
    description: Number of flows executions steps included per month
    valueType: NUMERIC
    defaultValue: 0
    unit: step/month
    type: RENEWABLE
    linkedFeatures:
    - postmanFlows
  flowsPayloadSize:
    description: Number of flows payload size included per month
    valueType: NUMERIC
    defaultValue: 0
    unit: MB/call
    type: NON_RENEWABLE
    linkedFeatures:
    - postmanFlows
