syntaxVersion: '2.1'
saasName: Postman
createdAt: '2024-06-29'
version: '2024-06-29'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20240629141749/https://www.postman.com/pricing/
features:
  apiClientHTTP:
    description: The Postman API client supports REST
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiClientGraphQL:
    description: The Postman API client supports GraphQL
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiClientGRPC:
    description: The Postman API client supports gRPC
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiClientWebSocket:
    description: The Postman API client supports WebSocket
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiClientSocket.io:
    description: The Postman API client supports Socket.io
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  apiClientMQTT:
    description: The Postman API client supports MQTT
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  postmanApi:
    description: The Postman API enables you to programmatically access data stored in your Postman account.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: API
  collectionCommenting:
    description: API publishers can use commenting throughout the API lifecycle to improve the API design and resolve
      API consumers' issues. API consumers can use commenting to ask API publishers questions and receive support about
      the APIs they use.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collectionAnnotations:
    description: API publishers can use annotations in collections to add additonal information.s
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  collectionRecovery:
    description: If you delete a collection and want to recover it, go to the trash. Then, hover over the collection
      you want to restore and select the arrow [restore] icon to retrieve it.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicApiDocumentation:
    description: Publishing your documentation makes it publicly available to anyone with the link to the documentation.
      Publish your documentation to help people around the world learn how to use your collection or interact with your
      public API.

      Public documentation automatically includes details for each request or endpoint in the published collection, along
      with sample code in various client languages. As you update your collection, the published documentation automatically
      stays in sync with your latest changes. There's no need to publish the documentation again after making changes.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  privateApiDocumentation:
    description:  To view API documentation, open an API in Postman, or search for APIs on your Private API Network.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  slackIntegration:
    description: Slack is a messaging app that teams all over the world rely on for collaboration. With Postman's integrations for Slack,
      you can bring your API development workflow into your Slack workspace. Get notifications, share what you're working on, and stay up
      to date with your Postman team, all within Slack.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://slack.com/pricing
  microsoftTeamsIntegration:
    description: Microsoft Teams is a platform for real-time collaboration and communication. With Postman's integrations
      for Microsoft Teams, you don't have to leave Teams to collaborate on API development. Share what you're working on,
      get notifications, and stay up to date with Postman activity, all within Teams.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: WEB_SAAS
    pricingUrls:
    - https://www.microsoft.com/en-us/microsoft-365/microsoft-teams/group-chat-software
  teamWorkspaces:
    description: Collaborative spaces for API development + consumption (org-wide visibility)
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  personalWorkspaces:
    description: Collaborative spaces for API development + consumption (individual visibility)
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicWorkspaces:
    description: Workspaces enable you to organize your Postman work and collaborate with teammates. You can group your
      projects together, with workspace acting as the single source of truth for related APIs, collections, environments,
      mocks, monitors, and other linked elements. By collaborating in a workspace, your edits sync with your team in real time.
      Public workspaces enable you to collaborate on elements with anyone across the world.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateWorkspaces:
    description: Workspaces enable you to organize your Postman work and collaborate with teammates. You can group your
      projects together, with workspace acting as the single source of truth for related APIs, collections, environments,
      mocks, monitors, and other linked elements. By collaborating in a workspace, your edits sync with your team in real time.
      Private workspaces are visible to you and to any team members you invite to them (Professional and Enterprise plans).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  singlePartnerWorkspaces:
    description: Workspaces enable you to organize your Postman work and collaborate with teammates. You can group your
      projects together, with workspace acting as the single source of truth for related APIs, collections, environments,
      mocks, monitors, and other linked elements. By collaborating in a workspace, your edits sync with your team in real time.
      Collaborative spaces for API development + consumption (one-to-one external partner/customer visibility by invitation only).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  multiPartnerWorkspaces:
    description: Workspaces enable you to organize your Postman work and collaborate with teammates. You can group your
      projects together, with workspace acting as the single source of truth for related APIs, collections, environments,
      mocks, monitors, and other linked elements. By collaborating in a workspace, your edits sync with your team in real time.
      Collaborative spaces for API development + consumption (One-to-many external partner/customer visibility by invitation only)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  workspaceUpdates:
    description: Workspace updates keep your team and your users aware of your API changes. API publishers can share
      updates across multiple collections, with links to the resources that changed. API consumers who fork or watch
      a workspace get notified and can engage with these updates by visiting, commenting, and reacting.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  workspaceThemes:
    description: "You can customize the visual experience for your workspace members in order to:

      - Reflect team branding or corporate identity in public workspaces.
      - Distinguish Partner Workspaces integrated with different third-party services or clients.
      - Represent different stages of a workflow in workspaces, such as planning, development, testing, and deployment."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicApiNetwork:
    description: Explore the largest network of APIs, public workspaces, collections, and Flows by developers.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  privateApiNetwork:
    description: Central directory of workspaces, collections, and APIs your team uses internally.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  packagelibrary:
    description: Team-managed repository to store, share, and reuse test scripts.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  packages:
    description: Number of packages that can be stored in the Package Library.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  mockServers:
    description: Get started fast by creating a mock from a collection, a spec, or your request history.
      Postman matches incoming requests to your saved examples by URL, method, body, and headers.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  monitoring:
    description: Postman Monitors enable you to continuously check the health and performance of your APIs. You can
      create monitors that run requests in selected collections. Requests can run API test scripts, chain together
      multiple requests, and more. You can also schedule how often Postman runs monitored collections.

      You'll be alerted to any test failures once the monitor is running, so you can identify and address issues before
      your API's consumers are affected.
    valueType: BOOLEAN
    defaultValue: true
    type: INFORMATION
  collectionRunner:
    description: Send some or all of the API requests in a Postman Collection in the order you choose with the Collection
      Runner. The Collection Runner logs the test results for each request, and it can use scripts to pass data between
      requests and change the request workflow.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  testDataStorage:
    description: Postman now enables you to effortlessly upload files to the cloud that can be used in your API requests.
      This functionality empowers you to include a diverse range of data in your POST requests, enhancing the depth and
      authenticity of your testing scenarios.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  postmanCLI:
    description: A secure command-line companion for Postman. The Postman CLI is signed and secured by Postman.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  newmanCLI:
    description: A command-line Collection Runner for Postman. Newman's repository is public and Newman isn't signed or
      secured by Postman.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  localPerformanceTesting:
    description: Test the performance of your APIs with the Postman desktop app. Simulate user traffic by automatically
      sending requests in the app. You can observe how your API behaves under load and identify potential issues or
      bottlenecks that affect performance.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  desktopApp:
    description: Postman is the API platform for using, building, and testing APIs. You can use the Postman desktop app to
      power every part of your API lifecycle
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  webApp:
    description: Postman is available as a web app.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTERNAL_DEVICE
  ideExtension:
    description: With the Postman VS Code extension, you can develop and test your APIs in Postman right from Visual Studio
      Code and Visual Studio Code Insiders. The VS Code extension also supports VSCodium and Cursor. Streamline your
      development workflow by testing your APIs in the same application you use to develop them.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  postmanApiSupport:
    description: Need help? Check out our FAQ, documentation or submit a request.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  auditLogs:
    description: Audit logs display events related to your team, team members, and billing. Admins and Super Admins can
      view which team member performed an action, and when they did so. Events include team members signing in to your
      team, creating a Postman API key, adding a team member, upgrading to a paid plan, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  deploymentControl:
    description: Postman's Enterprise app is a variant of Postman's Desktop app that offers greater control to administrators
      looking to deploy Postman at an enterprise level. It's available as an MSI package for Windows and PKG package for macOS,
      and supports silent installation, system-wide installation, and additional configurations to control how Postman is
      installed on users' devices.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  userLevelReportingAndAnalytics:
    description: Postman Reporting gives you visibility at both the API and team levels, providing you with key insights
      into what's happening across operations.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  postmanVault:
    description: Store sensitive data in your local instance of Postman for secure reuse in collections,
      environments, and requests.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customDomains:
    description: You can create custom domains for your API documentation. Each custom domain can be a full domain or a
      subdomain (e.g., example.com</em> or api.example.com).
      
      Additional custom domains available as add-ons for Basic plans or higher.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  publicElements:
    description: If the Secret Scanner detects exposed supported secrets in your public workspaces, Postman automatically
      replaces each secret with a placeholder. Postman notifies Admins and Workspace Admins by email and in-app notification
      that the secrets were detected and replaced with placeholders.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  githubAndGitlabPublicRepos:
    description: Postman works with GitLab or Gitlab to protect your Postman API keys in GitLab or Gitlab public repositories
      for free and paid Postman plans. If you commit a valid Postman API key to a public GitLab or Github repository,
      Postman notifies you by email and in-app notification.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customAlerts:
    description: Set up custom alerts when the secret scanner detects secrets.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  secretScanner:
    description: The Postman Secret Scanner scans public workspaces and published documentation to detect exposed
      secrets on all Postman plans. The Secret Scanner monitors the collections, global variables, environment variables,
      API schemas, and documentation in public workspaces. It safeguards your organization from potential threats and
      malicious users attempting to access any exposed secrets. It also scans the documentation your team has published,
      regardless of the type of workspace it's found in.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  singleSignOn:
    description: Single sign-on support includes Google Workspace, Microsoft AD FS, Microsoft Entra ID,
      Custom SAML, Duo, Okta, OneLogin, and Ping Identity.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userProvisioning:
    description: Automated user provisioning supports SCIM API, Okta, Microsoft Entra ID and OneLogin.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  SAML:
    description: Configure SSO with custom SAML.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userGroups:
    description: With Postman user groups, you can organize your team members into functional groups that mimic
      your organizational structure.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  superAdminRole:
    description: Manages everything within a team, including team settings, members, roles, and resources.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  adminRole:
    description: Manages team members and team settings. Can also view monitor metadata and run, pause, and resume monitors.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  billingRole:
    description: Manages team plan and payments. Billing roles can be granted by a Super Admin, Team Admin, or by a
      fellow team member with a Billing role.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  developerRole:
    description: Has access to all team resources and workspaces.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  communityManagerRole:
    description: Manages the public visibility of workspaces and team profile.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  externalPartnerRole:
    description: All partners are automatically granted the Partner role at the team level. Partners can only access
      the Partner Workspaces they've been invited to.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  partnerManagerRole:
    description: Manages all Partner Workspaces within an organization. Controls Partner Workspace settings and
      visibility, and can send invites to partners.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiGovernanceManagerRole:
    description: Manages API governance within a team, including governance rules, functions, and workspace groups.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiNetworkManagerRole:
    description: Manages a team's Private API Network.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  workspaceAdminRole:
    description: Can manage workspace resources and settings.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  workspaceEditorRole:
    description: Can create and edit workspace resources.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  workspaceViewerRole:
    description: Can view, fork, and export workspace resources.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  partnerViewerRole:
    description: Can view, fork, and export partner workspace resources.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  partnerEditorRole:
    description: Can create and share collections, edit resources, import and export, and fork elements.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  collectionViewerRole:
    description: Can view, fork, and export collections. Role is also mapped to workspace and team, but the access
      is granted at the collection level.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  collectionGuestViewerRole:
    description: Invite internal team members without Postman licenses to view, fork, and export Collections.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  collectionEditorRole:
    description: Can edit collections directly. Role is also mapped to workspace and team, but the access is
      granted at the collection level.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiAdminRole:
    description: Can publish, move, and delete APIs.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiEditorRole:
    description: Can edit APIs and API definitions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiViewerRole:
    description: Can view published API versions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  environmentEditorRole:
    description: Can edit and manage environments.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  environmentViewerRole:
    description: Can view and use environments.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  mockServerEditorRole:
    description: Can edit and manage mock servers.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  mockServerViewerRole:
    description: Can view mock servers and associated metadata.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  monitoringEditorRole:
    description: Can view monitor metadata, metrics, jobs, and runs. Can run, update, delete, pause, and resume the monitor.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  monitoringViewerRole:
    description: Can view and use environments.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiNetworkFolderManagerRole:
    description: Manages specific folders and the elements in them in a team's Private API Network. Team members with this
      role can perform all actions that API Network Manager role can perform but only in folders they have permission to manage.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  communitySupport:
    description: Postman community is a space where people learn, build, and help each other.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  emailSupport:
    description: Support via email
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  priorityEmailSupport:
    description: Priority support via email
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  customerSuccessManager:
    description: Get a customer success manager from our Postman team
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  trainingContent:
    description: Access to Postman Academy (for on-demand self study learning modules), Postman Intergalactic
      (for educational trainings taught by Postman team members), and periodic webinars covering Postman platform updates.
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
  postmanProxy:
    description: By default, the Postman desktop app uses your system's configured proxy to send API requests or access the
      internet. If needed, you can enter authentication details for the default proxy in the Postman desktop app. You can also
      configure Postman to use the system proxy or a custom proxy when sending requests. If you haven't already, download
      and install the Postman desktop app to get started.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  postmanInterceptor:
    description: Postman Interceptor is a browser extension that acts as a companion to Postman. Interceptor enables you
      to capture API traffic, including requests and cookies, from a web browser. After capturing requests or cookies,
      you can view and work with them in Postman.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  postmanPublicDocs:
    description: The Postman API enables you to programmatically access data stored in your Postman account.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  paymentMethod:
    description: Postman provides a self-serve billing process. Refer to the following sections for guidance on
      managing your account, plan, and payment.
    valueType: TEXT
    defaultValue:
    - CARD
    type: PAYMENT
  termsOfService:
    description: Master Service Agreement (MSA) & Security Review.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  postbot:
    description: Supercharge your API development with Postbot, our AI-powered assistant, using natural language input
      and contextual suggestions.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  postbotWriteTestsForAPIs:
    description: Postbot writes tests for your APIs
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  postbotAutomatesDocumentation:
    description: Postbot automates documentation
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  postbotDebugsRequests:
    description: Postbot debugs requests
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  postbotVisualizesApiResponses:
    description: Postbot visualizes API responses
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  postbotExpertSupport:
    description: Expert Support for Postbot
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  postbotEnterpriseGradeAvailability:
    description: Dedicated multi-tenant infrastructure, ensuring separate compute bandwidth for enhanced uptime.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  postbotEnhancedPrivacy:
    description: Postbot data is not used to train any third-party models.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  postmanFlows:
    description: Postman Flows is an easy to use visual editor that helps you create API automations, integrations,
      and demonstrations, with no-code transformations and built-in visualizations.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  flowsRoleManagement:
    description: Limit access to flows and separate responsibilities between flow editors, runners and viewers.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  flowsSupportForAI:
    description: Use built-in AI blocks within your flows to generate JSON, text and images. You can also use Postbot
      as an assistant to build flows faster.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  advancedSecurity:
    description: Deploy account-wide security features that protect your corporate IP across private Postman elements.

      - Launch domain capture to redirect all corporate email logins.
      - Check for exposed secrets in Team Workspaces with Secret Scanner.
      - Access the Secret Scanner analytics dashboard.
      - Securely reuse sensitive data with 1Password, Azure Key Vault, HashiCorp Vault, or AWS Secrets Manager.
      - BYOK Encryption (Bring Your Own Key) to encrypt your sensitive data in compliance with industry standards.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  apiBuilder:
    description: Standardize your API designs and get complete API life cycle management capabilities for all your APIs
      with API Builder.

      - Design and build unlimited APIs with the API Builder.
      - Connect APIs with Git repositories, ensuring that collections and specifications always remain in sync with source code.
      - Enable exclusive access to specific consumers by publishing APIs to the Private API Network, ensuring confidentiality and compliance.
      - Utilize the built-in governance rule library, create custom rules via Spectral Rule Builder, and access insightful reports to ensure API conformance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
usageLimits:
  callsToPostmanApi:
    description: Maximum calls to Postman API
    valueType: NUMERIC
    defaultValue: 10000
    unit: calls/month
    type: RENEWABLE
    linkedFeatures:
    - postmanApi
  collectionRecoveryLimit:
    description: Maximum number of days to recover a collection
    valueType: NUMERIC
    defaultValue: 30
    unit: day
    type: NON_RENEWABLE
    linkedFeatures:
    - collectionRecovery
  packagesLimit:
    description: Number of packages that can be stored in the Package Library.
    valueType: NUMERIC
    defaultValue: 3
    unit: package
    type: NON_RENEWABLE
    linkedFeatures:
    - packages
  mockServerCallsLimit:
    description: Maximum number of calls to Mock Servers
    valueType: NUMERIC
    defaultValue: 1000
    unit: call/month
    type: RENEWABLE
    linkedFeatures:
    - mockServers
  monitoringCallsLimit:
    description: Maximum number of calls to Postman Monitoring
    valueType: NUMERIC
    defaultValue: 1000
    unit: call/month
    type: RENEWABLE
    linkedFeatures:
    - monitoring
  collectionRunsLimit:
    description: Maximum number of runs for Postman Collection runner
    valueType: NUMERIC
    defaultValue: 25
    unit: run/month
    type: RENEWABLE
    linkedFeatures:
    - collectionRunner
  localPerformanceTestingUserLimit:
    description: Maximum number of virtual users for local performance testing
    valueType: NUMERIC
    defaultValue: 100
    unit: virtual user
    type: NON_RENEWABLE
    linkedFeatures:
    - localPerformanceTesting
  localPerformanceTestingRunsLimit:
    description: Maximum number of tests runs for local performace testing
    valueType: NUMERIC
    defaultValue: 25
    unit: run
    type: NON_RENEWABLE
    linkedFeatures:
    - localPerformanceTesting
  customDomainsLimit:
    description: Maximum number of custom domains
    valueType: NUMERIC
    defaultValue: 1
    unit: domain
    type: NON_RENEWABLE
    linkedFeatures:
    - customDomains
  collectionGuestViewerLimit:
    description: Invite users to view specific collections in your team.
    valueType: NUMERIC
    defaultValue: 5
    unit: viewer/collection
    type: NON_RENEWABLE
    linkedFeatures:
    - collectionGuestViewerRole
  flowCredits:
    description: Number of flows executions steps included per month
    valueType: NUMERIC
    defaultValue: 0
    unit: credit/month
    type: RESPONSE_DRIVEN
    linkedFeatures:
