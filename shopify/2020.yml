usageLimits:
  staffAccountsLimit:
    description: Maximum limit of staff accounts
    valueType: NUMERIC
    defaultValue: 2
    unit: account
    type: NON_RENEWABLE
    linkedFeatures:
      - staffAccounts
  locationsLimit:
    description: Maximum invertory locations
    valueType: NUMERIC
    defaultValue: 4
    unit: location
    type: NON_RENEWABLE
    linkedFeatures:
      - locations
  thirdPartyPaymentProcessorsRate:
    description: Additional fees using all payment providers other than Shopify Payments
    valueType: NUMERIC
    defaultValue: 0.02
    type: NON_RENEWABLE
    linkedFeatures:
      - thirdPartyPaymentProcessors
  shippingDiscountRate:
    description: Shipping discount rate
    valueType: NUMERIC
    defaultValue: 0.64
    type: NON_RENEWABLE
    linkedFeatures:
      - shippingDiscount
