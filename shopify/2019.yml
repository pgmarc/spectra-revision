      - staffAccounts
  shopifyDiscountRate:
    description: Shopify discount rate
    valueType: NUMERIC
    defaultValue: 0.64
    type: NON_RENEWABLE
    linkedFeatures:
      - shippingDiscount
  additionaFeesOtherThanShopifyPaymentsRate:
    description: Additional fees using all payment providers other than Shopify Payments
    valueType: NUMERIC
    defaultValue: 0.02
    type: NON_RENEWABLE
