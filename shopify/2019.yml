    type: NON_RENEWABLE
    linkedFeatures:
      - staffPosPins
  storeLocationsLimit:
    description: Maximum invertory locations
    valueType: NUMERIC
    defaultValue: 0
    unit: location
    type: NON_RENEWABLE
    linkedFeatures:
      - storeLocations
