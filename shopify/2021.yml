  - Shopify Payments
  - Point of Sale
  - Global Selling
url: https://web.archive.org/web/20211120143802/https://www.shopify.com/pricing
features:
  onlineStore:
    description: Includes ecommerce website and blog
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  products:
    description: Add unlimited products to your store
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  staffAccounts:
    description: Staff members with access to the Shopify admin and Shopify POS
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  24/7Support:
    description: Get 24/7 phone, email, and live chat support
    valueType: BOOLEAN
    defaultValue: true
    type: SUPPORT
    tag: Features
  salesChannels:
    description: Sell on online marketplaces and social media. Channel availability varies by country
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  inventoryLocations:
    description: Assign inventory to retail stores, warehouses, pop-ups, or wherever you store products
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  manualOrderCreation:
    description: Create new orders and enter payment details right from your Shopify admin
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  discountCodes:
    description: Offer your customers a fixed value, percentage, or shipping discount on products or collections
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  freeSslCertificate:
    description: Shopify provides free SSL certificates to encrypt your online store's content and publish it securely
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  abandonedCartRecovery:
    description: Automatically send emails to customers who leave your store without completing the checkout process
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  giftCards:
    description: Expand your current customer base and attract new customers by offering gift cards
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  reports:
    description: Access a wide variety of reports to help track and analyze your store's performance
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Features
  thirdPartyCalculatedShippingRates:
    description: Show calculated rates with your own account or third-party apps at checkout
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Features
  shippingDiscount:
    description: Competitive shipping rates from DHL Express, UPS, or USPS
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Shopify Shipping
  shippingLabels:
    description: Print shipping labels for orders using a standard printer—no special equipment required
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Shopify Shipping
  uspsPriorityMailCubicPricing:
    description: Priority Mail® service includes tracking and delivery in 2-3 days1. Check delivery time estimates
      with the USPS Service Standards Map.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Shopify Shipping
  fraudAnalysis:
    description: When you use Shopify Payments, you automatically get a built-in
      fraud analysis feature. This feature flags orders that are
      potentially fraudulent and brings them to your attention
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Shopify Payments
  onlineCreditCardRates:
    description: You can accept Visa, Mastercard, Discover the minute you launch your shop
    valueType: TEXT
    defaultValue: 2.9% + 30¢
    type: DOMAIN
    tag: Shopify Payments
  inPersonCreditCardRates:
    description: Shopify payments in-person credit/debit card rates
    valueType: TEXT
    defaultValue: 2.7% + 0¢
    type: DOMAIN
    tag: Shopify Payments
  transactionFeeNotUsingShopifyPayments:
    description: Transaction fee if not using Shopify Payment
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Shopify Payments
  shopifyPosLite:
    description: Accept in-person payments instantly at pop-ups, markets, fairs, and more
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Point of Sale
  shopifyPosPro:
    description: Choose locations to upgrade to POS Pro for faster workflows, staff permissions, and advanced inventory tools
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Point of Sale
  sellInCurrencies:
    description: Use price rounding to create consistency in your prices after conversion
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Global Selling
  sellInMultipleLanguages:
    description: Sell in multiple languages
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
    tag: Global Selling
  internationalDomains:
    description: Set country-specific domains to optimize international SEO
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Global Selling
  internationalPricing:
    description: Customize your product prices for different countries/regions with a percentage increase or decrease
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Global Selling
  internationalPricingPerVariantPricing:
    description: Set individual product prices for different countries/regions
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
    tag: Global Selling
usageLimits:
  staffAccountsLimit:
    description: Maximum limit of staff accounts
    valueType: NUMERIC
    defaultValue: 2
    unit: account
    type: NON_RENEWABLE
    linkedFeatures:
      - staffAccounts
  inventoryLocationsLimit:
    description: Maximum invertory locations
    valueType: NUMERIC
    defaultValue: 4
    unit: location
    type: NON_RENEWABLE
    linkedFeatures:
      - inventoryLocations
  reportType:
    description: Type of reports permitted
    valueType: TEXT
    defaultValue: None
    type: NON_RENEWABLE
    linkedFeatures:
      - reports
  shippingDiscountRate:
    description: Shipping discount rate
    valueType: NUMERIC
    defaultValue: 0.77
    type: NON_RENEWABLE
    linkedFeatures:
      - shippingDiscount
  transactionFeeNotUsingShopifyPaymentsRate:
    description: Additional fees using all payment providers other than Shopify Payments
    valueType: NUMERIC
    defaultValue: 0.02
    type: NON_RENEWABLE
    linkedFeatures:
      - transactionFeeNotUsingShopifyPayments
  sellInMultipleLanguagesCap:
    description: Maximum languages to sell in
    valueType: NUMERIC
    defaultValue: 20
    unit: language
    type: NON_RENEWABLE
    linkedFeatures:
      - sellInMultipleLanguages
plans:
  BASIC_SHOPIFY:
    description: Best for new ecommerce businesses with occasional in-person sales
    price: 29
    unit: user/month
    features: null
    usageLimits: null
  SHOPIFY:
    description: Best for growing businesses selling online or in-store
    price: 79
    unit: user/month
    features:
      uspsPriorityMailCubicPricing:
        value: true
      onlineCreditCardRates:
        value: 2.6% + 30¢
      inPersonCreditCardRates:
        value: 2.5% + 0¢
      internationalDomains:
        value: true
      internationalPricing:
        value: true
    usageLimits:
      staffAccountsLimit:
        value: 5
      shippingDiscountRate:
        value: 0.88
      reportType:
        value: Standard
      transactionFeeNotUsingShopifyPaymentsRate:
        value: 0.01
      inventoryLocationsLimit:
        value: 5
  ADVANCED_SHOPIFY:
    description: Best for scaling businesses that require advanced reporting
    price: 299
    unit: user/month
    features:
      thirdPartyCalculatedShippingRates:
        value: true
      uspsPriorityMailCubicPricing:
        value: true
      onlineCreditCardRates:
        value: 2.4% + 30¢
      inPersonCreditCardRates:
        value: 2.4% + 0¢
      internationalDomains:
        value: true
      internationalPricing:
        value: true
      internationalPricingPerVariantPricing:
        value: true
    usageLimits:
      staffAccountsLimit:
        value: 15
      inventoryLocationsLimit:
        value: 8
      reportType:
        value: Advanced
      shippingDiscountRate:
        value: 0.88
      transactionFeeNotUsingShopifyPaymentsRate:
        value: 0.005
addOns:
  SHOPIFY_POS_PRO:
    description: Choose locations to upgrade to POS Pro for faster workflows, staff permissions, and advanced inventory tools
    price: 89
    features:
      shopifyPosPro:
        value: true