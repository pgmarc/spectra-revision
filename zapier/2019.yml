syntaxVersion: '2.1'
saasName: Zapier
createdAt: '2019-11-13'
version: '2019-11-13'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20191113034602/https://zapier.com/pricing
features:
  tasks:
    description: A task is counted every time a Zap successfully moves data or completes an action for you automatically.
      For example, if your Zap has an action to create new Google Contacts, each contact created will use one task. If
      the action isn't successfully completed, it doesn't count against your task limit.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  zaps:
    description: Zaps connect your apps and services together to automate repetitive tasks and save you time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  singleStepZaps:
    description: Single-step Zaps have one trigger (e.g., new email lead) and one action (e.g., add to my CRM).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiStepZaps:
    description: Multi-step Zaps let a single trigger (e.g., new email lead) perform as many actions as you
      want (e.g., add to my CRM and message my team).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  premiumApps:
    description: Premium apps are select apps that are exclusively available to users on paid plans.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  filters:
    description: Filters tell your Zaps to run only if your data matches certain criteria.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  formatters:
    description: Formatter steps let you tweak numbers, dates, and text in over a dozen ways to get it in the format you need.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customIntegrations:
    description: Build powerful, custom integrations that connect any app with Webhooks by Zapier.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  paths:
    description: Build advanced workflows using branching logic to run different actions based on conditions you decide.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  autoReplay:
    description: Intelligently retries any Task failures due to temporary errors or downtime for you.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  folderPermissions:
    description: Control who can edit shared Zaps and access shared folders.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  premierSupport:
    description: Get faster, prioritized responses from our dedicated Premier Support team.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  sharedAppConnections:
    description: Connect your team's favorite tools, like Trello, Dropbox, or Typeform, so everyone can use
      them in their workflows without needing to share passwords and API keys.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sharedWorkspace:
    description: Share access to your Zaps with your team.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  userProvisioning:
    description: Automatically create, change, disable, and delete user accounts to ensure the right people have access.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  appsAccessControl:
    description: Control who can access every Zapier app
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  samlSingleSignOn:
    description: Ensure secure access for your team using SAML 2.0 identity and access management (IAM) providers.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  customDataRetention:
    description: Customize your task history retention to match your company's legal and regulatory requirements.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  accountCapture:
    description: Account capture
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  usersLimit:
    description: Maximum users in your Zapier account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  tasksLimit:
    description: Maximum tasks available
    valueType: NUMERIC
    defaultValue: 100
    unit: task/month
    type: RENEWABLE
    linkedFeatures:
    - tasks
  zapsLimit:
    description: Maximum zaps available per month
    valueType: NUMERIC
    defaultValue: 5
    unit: zap/month
    type: RENEWABLE
    linkedFeatures:
    - zaps
  updateTimeThreshold:
    description: Maximum update time threshold
    valueType: NUMERIC
    defaultValue: 15
    unit: min
    type: NON_RENEWABLE
    linkedFeatures:
    - tasks
    - zaps
  premiumAppsLimit:
    description: Maximum premium apps available
    valueType: NUMERIC
    defaultValue: 0
    unit: app
    type: NON_RENEWABLE
    linkedFeatures:
    - premiumApps
