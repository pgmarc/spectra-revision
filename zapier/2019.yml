    features:
      multiStepZaps:
        value: true
      premiumApps:
        value: true
      filters:
        value: true
      formatters:
        value: true
      customIntegrations:
        value: true
      paths:
        value: true
      autoReplay:
        value: true
      folderPermissions:
        value: true
      premierSupport:
        value: true
      sharedAppConnections:
        value: true
      sharedWorkspace:
        value: true
      userProvisioning:
        value: true
      appsAccessControl:
        value: true
      samlSingleSignOn:
        value: true
      customDataRetention:
        value: true
      accountCapture:
        value: true
    usageLimits:
