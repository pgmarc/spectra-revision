        value: true
      filters:
        value: true
      formatters:
        value: true
      customIntegrations:
        value: true
      paths:
        value: true
      autoReplay:
        value: true
      folderPermissions:
        value: true
      premierSupport:
        value: true
      sharedAppConnections:
        value: true
      sharedWorkspace:
        value: true
    usageLimits:
      usersLimit:
        value: .inf
      tasksLimit:
        value: 50000
      zapsLimit:
        value: .inf
      updateTimeThreshold:
        value: 1
      premiumAppsLimit:
