syntaxVersion: '2.1'
saasName: Zapier
createdAt: '2025-03-02'
version: '2025'
billing:
  monthly: 1.0
  annual: 0.67
currency: USD
url: https://web.archive.org/web/20250302124820/https://zapier.com/pricing
features:
  tasks:
    description: A task is counted every time a Zap successfully moves data or completes an action for you automatically.
      For example, if your Zap has an action to create new Google Contacts, each contact created will use one task. If
      the action isn't successfully completed, it doesn't count against your task limit.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  twoFactorAuthentication:
    description: Add an extra layer of security to your Zapier account by requiring access to your mobile device
      in addition to your password.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  payPerTaskForOverageTasks:
    description: If you exceed your plan's task limit, you'll automatically switch to pay-per-task billing for the
      remainder of your pay period so your Zaps stay on. Each task above your plan's limit will cost 1.25x the cost of a
      task on your base subscription.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  auditLogs:
    description: "Monitor all your team's automation activity. Team: 6 months, Enterprise: 1 year."
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  staticIp:
    description: Use Static IP addresses to control traffic to and from Zapier and your private apps.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  ownerAccess:
    description: See everything in your account, including private Zaps.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  samlSingleSignOn:
    description: Ensure secure access for your team using SAML 2.0 identity and access management (IAM) providers.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  userProvisioning:
    description: Automatically create, change, disable, and delete user accounts to ensure the right people have access.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  domainCapture:
    description: Ensure your employees auto-join the right account.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  superAdmin:
    description: Grant multiple team members access to see everything in your account, including private Zaps.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedAdminPermissions:
    description: Add unlimited teams to your account for managing workspace-level permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  appRestrictions:
    description: Specify a list of approved apps your teams can use on Zapier.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  actionRestrictions:
    description: Granular controls that allow you to control what actions an app can perform.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customDataRetention:
    description: Customize your task history retention to match your company's legal and regulatory requirements
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  observabilityAPI:
    description: Get a 360° view of your account. See what users are building and which apps they're using with
      Analytics, export activity to a SIEM tool with our Zap Runs API, and more.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  analytics:
    description: Gain visibility into Zap performance, app usage, and team activity, and find areas for optimization.
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  annualTaskLimits:
    description: Get your plan's total annual tasks upfront for more predictable pricing—even with seasonal spikes.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  sharedWorkspace:
    description: Share access to your Zaps with your team.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  folderPermissions:
    description: Control who can edit shared Zaps and access shared folders.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  approvalRequests:
    description: Require approvals for changes to Zaps. Empower your team while safeguarding critical workflows.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  emailSupport:
    description: Connect with our technical support team through email 24 hours a day, 7 days a week.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  liveChat:
    description: Access real-time, human support 12 hours a day, 5 days a week. *Live chat is only available to
      Professional 2,000 and above task tier plans.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  premierSupport:
    description: Get faster, prioritized responses from our dedicated Premier Support team.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  designatedTechnicalSupport:
    description: Get a named Support rep who's deeply familiar with your account to get issues addressed sooner.
      Work the way you like by connecting over email or setting up calls.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  zapierInterfaces:
    description: Build forms, web pages, and basic apps that are connected directly to your Zaps. Basic access is
      available on all plans. Get premium features and usage with Interfaces add-ons.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  zapierTables:
    description: Store, edit, and collaborate on data that powers your Zaps. Connect Zaps to your tables and
      data with confidence. Basic access is available on all plans. Get premium features and usage with Tables add-ons.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  zapierChatbots:
    description: Create advanced, AI-powered chatbots and take action with built-in automation. Basic access is
      available on all plans. Get premium features and usage with Chatbots add-ons.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: BOT
  zaps:
    description: Create as many Zaps as your task limit allows.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  twoStepsZaps:
    description: Two-step Zaps have one trigger and one action (e.g., a new email lead is automatically added to your CRM).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiStepZaps:
    description: Multi-step Zaps have one trigger that prompts multiple actions (e.g., a single email lead is automatically added
      to your CRM and notifies your team in Slack).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  visualEditor:
    description: Intuitive visual drag-and-drop editor to build automated workflows.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  aiPowerUps:
    description: Create Zaps with the AI-powered Zap builder. And use AI to customize your Zaps by mapping data
      fields across apps, writing documentation for Zaps, and troubleshooting Zaps when there's an error.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  customTestRecords:
    description: Create your own test records when testing your Zap trigger.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  filters:
    description: Filter by Zapier tells your Zaps to run only if your data matches certain criteria.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  paths:
    description: Paths by Zapier helps you create different actions for your workflows—all based on conditions you set.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  formatter:
    description: Formatter by Zapier steps let you tweak numbers, dates, and text in over a dozen ways to get it in
      the format you need.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  drafts:
    description: Edit your Zaps without turning them off to iterate quickly.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  autoReplay:
    description: Retries any task failures due to temporary errors or downtime for you. Set a Zap to always or
      never autoreplay if an error occurs.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  customizedErrorSettings:
    description: Customize error notifications on a Zap-by-Zap basis. Get error notifications instantly or as a summary
      every hour. Decide whether a Zap should continue to run if it encounters a high number of errors with error ratio settings.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  customizedPollingTime:
    description: Specify how often Zapier should check for new data to start your Zap.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  floodProtectionSetting:
    description: Customize limits at which to hold tasks for high-volume triggers.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  versions:
    description: "Save multiple versions and recover previous versions of your Zap. Professional: 1 month,
      Team: 6 months, Enterprise: 1 year."
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  compareVersions:
    description: Easily spot changes and deploy with confidence. Compare Zap versions side-by-side to see what's different.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  alerts:
    description: Get notified about critical errors. Access all issues from a single dashboard to resolve problems fast.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  customActions:
    description: Build your own custom actions and share them with your team.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  premiumApps:
    description: Premium apps are select apps that are exclusively available to users on paid plans.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  connectionsViaWebhooks:
    description: Build powerful, custom integrations that connect any app with Webhooks by Zapier.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
usageLimits:
  usersLimit:
    description: Maximum users in your Zapier account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  tasksLimit:
    description: Maximum tasks available
    valueType: NUMERIC
    defaultValue: 100
    unit: task/month
    type: RENEWABLE
    linkedFeatures:
    - tasks
  pollingTimeThreshold:
    description: Maximum polling time threshold. How often Zapier checks for new data to start your Zap.
    valueType: NUMERIC
    defaultValue: 15
    unit: min
    type: NON_RENEWABLE
    linkedFeatures:
    - tasks
    - zaps
