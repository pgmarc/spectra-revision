syntaxVersion: '2.1'
saasName: Zapier
createdAt: '2023-11-29'
version: '2023-11-29'
billing:
  monthly: 1.0
currency: USD
url: https://web.archive.org/web/20231129054019/https://zapier.com/pricing
features:
  tasks:
    description: A task is counted every time a Zap successfully moves data or completes an action for you automatically.
      For example, if your Zap has an action to create new Google Contacts, each contact created will use one task. If
      the action isn't successfully completed, it doesn't count against your task limit.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  zaps:
    description: Zaps connect your apps and services together to automate repetitive tasks and save you time.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  singleStepZaps:
    description: Single-step Zaps have one trigger (e.g., new email lead) and one action (e.g., add to my CRM).
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  multiStepZaps:
    description: Multi-step Zaps let a single trigger (e.g., new email lead) perform as many actions as you
      want (e.g., add to my CRM and message my team).
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  premiumApps:
    description: Premium apps are select apps that are exclusively available to users on paid plans.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  tablesBasic:
    description: Store, edit, and collaborate on data that powers your Zaps. Connect Zaps to your tables
      and data with confidence.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  tablesAdvanced:
    description: Enhanced Zapier tables
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  noCodeEditor:
    description: Intuitive no-code editor to build automated workflows.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  aiPoweredZapBuilder:
    description: Start a Zap using natural language.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  aiPoweredFieldMapping:
    description: Have AI recommend field mappings so you can publish your Zap faster.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  drafts:
    description: Edit your Zaps without turning them off to iterate quickly.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  copyAndPasteSteps:
    description: Reuse the steps you've built from one Zap to another.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  duplicateAndReorderSteps:
    description: Duplicate and drag-and-drop steps to reorder your Zap.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  codeSteps:
    description: Generate Javascript or Python code to customize your Zaps, using a prompt.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customTestRecords:
    description: Create your own test records when testing your Zap trigger.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  notes:
    description: Document your Zap with a note, or have AI generate it for you.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  exportImageOfZap:
    description: Export your Zap as a PNG to share with your team.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  transfer:
    description: Transfer lets you move data in bulk from one app to another.
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  filters:
    description: Filters tell your Zaps to run only if your data matches certain criteria.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  formatters:
    description: Formatter steps let you tweak numbers, dates, and text in over a dozen ways to get it in the format you need.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  versionHistory:
    description: "Save multiple versions of your Zaps and view previous versions in a history log. Starter:
      1 week, Professional: 1 month, Team: 6 months, Company: 1 year."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  versionRollback:
    description: "Recover previous versions of your Zap. Starter: 1 week, Professional: 1 month, Team: 6 months, Company: 1 year."
    valueType: BOOLEAN
    defaultValue: true
    type: DOMAIN
  customLogicWithPaths:
    description: Build advanced workflows using branching logic to run different actions based on conditions you set.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  duplicateAndReorderPaths:
    description: Duplicate steps and Paths, plus drag-and-drop steps to reorder your Zap.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  autoReplay:
    description: Retries any task failures due to temporary errors or downtime for you.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  errorRatioSettings:
    description: Decide whether a Zap should continue to run if it encounters a high number of errors.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  customizedPollingIntervals:
    description: Specify how often Zapier should check for new data to start your Zap.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  floodProtectionSetting:
    description: Customize limits at which to hold tasks for high-volume triggers.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  perZapAutoReplay:
    description: Set a Zap to always or never autoreplay if an error occurs.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TASK_AUTOMATION
  appExtensions:
    description: Build your own custom actions and share them with your team.
    valueType: BOOLEAN
    defaultValue: true
    type: INTEGRATION
    integrationType: EXTENSION
  connectionsViaWebhooks:
    description: Build powerful, custom integrations that connect any app with Webhooks by Zapier.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  subfolders:
    description: Create nested folders on the My Zaps page for more flexibility and ease of organization.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  folderPermissions:
    description: Control who can edit shared Zaps and access shared folders.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  sharedAppConnections:
    description: Connect your team's favorite tools so everyone can use them in their workflows without needing to
      share passwords and API keys.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  sharedWorkspace:
    description: Share access to your Zaps with your team.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  auditLogs:
    description: "Monitor your team's Zap activity across the entire account. Team: 6 months, Company: 1 year."
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  exportAllZaps:
    description: Export your Zaps.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  ownerAccess:
    description: See everything in your account, including private Zaps.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  superAdmin:
    description: Grant multiple team members access to see everything in your account, including private Zaps.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  advancedAdminPermissions:
    description: Add unlimited teams to your account for managing workspace-level permissions.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  allowedApps:
    description: Specify a list of approved apps your teams can use on Zapier.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  twoFactorAuthentication:
    description: Add an extra layer of security to your Zapier account by requiring access to your mobile device
      in addition to your password.
    valueType: BOOLEAN
    defaultValue: true
    type: MANAGEMENT
  aiTroubleshooting:
    description: Get personalized error messages to troubleshoot your Zaps.
    valueType: BOOLEAN
    defaultValue: true
    type: AUTOMATION
    automationType: BOT
  customErrorNotifications:
    description: Decide what sends an error notification to reduce noise and keep critical workflows on track.
    valueType: BOOLEAN
    defaultValue: false
    type: AUTOMATION
    automationType: TRACKING
  staticIp:
    description: Use Static IP addresses to control traffic to and from Zapier.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  liveChat:
    description: Access real-time, human support 12 hours a day, 5 days a week.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  premierSupport:
    description: Get faster, prioritized responses from our dedicated Premier Support team.
    valueType: BOOLEAN
    defaultValue: false
    type: SUPPORT
  userProvisioning:
    description: Automatically create, change, disable, and delete user accounts to ensure the right people have access.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  appRestrictions:
    description: Manage which apps and services employees can connect to your Zapier account.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
  samlSingleSignOn:
    description: Ensure secure access for your team using SAML 2.0 identity and access management (IAM) providers.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: IDENTITY_PROVIDER
  customDataRetention:
    description: Customize your task history retention to match your company's legal and regulatory requirements.
    valueType: BOOLEAN
    defaultValue: false
    type: GUARANTEE
  accountConsolidation:
    description: Make sure your entire company is using a single account and that your security policies are enforced company wide.
    valueType: BOOLEAN
    defaultValue: false
    type: MANAGEMENT
usageLimits:
  usersLimit:
    description: Maximum users in your Zapier account
    valueType: NUMERIC
    defaultValue: 1
    unit: user
    type: NON_RENEWABLE
  tasksLimit:
    description: Maximum tasks available
    valueType: NUMERIC
    defaultValue: 100
    unit: task/month
    type: RENEWABLE
    linkedFeatures:
    - tasks
  zapsLimit:
    description: Maximum zaps available per month
    valueType: NUMERIC
    defaultValue: 5
    unit: zap/month
    type: RENEWABLE
    linkedFeatures:
    - zaps
  updateTimeThreshold:
    description: Maximum update time threshold
    valueType: NUMERIC
    defaultValue: 15
    unit: min
    type: NON_RENEWABLE
    linkedFeatures:
    - tasks
    - zaps
  premiumAppsLimit:
    description: Maximum premium apps available
    valueType: NUMERIC
    defaultValue: 0
    unit: app
    type: NON_RENEWABLE
    linkedFeatures:
    - premiumApps
