  seamlessMfaBuiltIntoYourSshWorkflows:
    description: Seamless MFA authentication built into your SSH workflows
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  seamlessMfaBuiltIntoYourRdpWorkflows:
    description: Seamless MFA authentication built into your Remote Desktop Protocol (RDP) workflows
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  backup:
    description: "Backed by a Programmable CA that mints just-in-time, single-use client certificates"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  clienApplicationsForLocalSshIntegrations:
    description: Client application for local SSH integrations
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  clienApplicationsForLocalRdpIntegrations:
    description: Client application for local Remote Desktop Protocol (RDP) integrations
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  clienApplicationsForDynamicDeviceBinding:
    description: Client application for dynamic device binding
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  apiAllowsForCustomAuthenticationWorkflows:
    description: API allows for custom authentication
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  apiAllowsForCustomManagementWorkflows:
    description: API allows for custom management workflows
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: API
  # Access Gateway
  unlimitedAppIntegrations:
    description: Unlimited Okta Single Sign-on and MFA app integrations
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  headerBasedApplications:
    description: The most common Access Gateway integration involves Web Access Management (WAM)
      apps based on values contained in request headers.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  kerberosApplications:
    description: Use the Access Gateway Admin UI console to add a Kerberos app with Okta.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  iwaApplications:
    description: The Okta IWA Web agent is a lightweight Internet Information Services (IIS) web agent that
      enables Desktop Single Sign-on (DSSO) on the Okta service. DSSO allows users to be automatically
      authenticated by Okta and any apps accessed through Okta, whenever they sign in to your Windows network.

      The Okta IWA Web agent uses Microsoft's IWA and ASP.NET to authenticate users from specified gateway IPs.
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  onPremiseApplications:
    description: "Such as Oracle E-Business Suite, PeopleSoft, and Sharepoint"
    valueType: BOOLEAN
    defaultValue: false
    type: INTEGRATION
    integrationType: MARKETPLACE
  customWebApps:
    description: Configure Auth0 as the Identity Provider (IdP) for Okta Access Gateway (OAG), a reverse proxy virtual appliance,
      to enable secure single sign-on (SSO) access for external users to applications that do not natively
      support modern federation standards.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customWebPages:
    description: Configure Auth0 as the Identity Provider (IdP) for Okta Access Gateway (OAG), a reverse proxy virtual appliance,
