  # Access Governance
  accessCertification:
    description: Use Access Certifications to launch security access reviews and campaigns to review and remediate user access.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  accessRequests:
    description: "Directly integrated into an Okta org, Access Requests automates the process of requesting
      access to apps, groups, and entitlement bundles. Access Requests delivers a simplified and frictionless
      approach that automatically routes user requests to one or more approvers for action.

      This allows Access Requests to eliminate the challenges common in more traditional request management processes:

      - Poor request experience
      - Risk of human error
      - Decreased IT productivity
      - Complex and rigid processes
      - Audit and compliance deficiencies"
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  reporting:
    description: "You can do the following tasks using these reports:
      - Obtain a high-level overview of past certification campaigns, including their duration and resources included.
      - See details of past resource access requests and campaigns, including users involved, remediation
        status, and user entitlements.
      - Help meet audit and compliance requirements."
    valueType: BOOLEAN
    defaultValue: false
    type: INFORMATION
  advancedSourcing:
    description: Attribute-level sourcing (Advanced sourcing) lets you designate different profile
      sources for different user attributes.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  oppProvisioning:
    description: Like cloud-based provisioning, on-premises provisioning (OPP provisioning) uses the SCIM protocol to synchronize
