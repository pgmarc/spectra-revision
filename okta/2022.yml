      support modern federation standards.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customWebPortals:
    description: Configure Auth0 as the Identity Provider (IdP) for Okta Access Gateway (OAG), a reverse proxy virtual appliance,
      to enable secure single sign-on (SSO) access for external users to applications that do not natively
      support modern federation standards.
    valueType: BOOLEAN
    defaultValue: false
