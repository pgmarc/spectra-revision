    description: Unlimited On-premise application policies for Okta Access Gateway (OAG)
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  applicationPolicies:
    description: Policies let you control access to an app URL. You can allow or deny access to individual
      users or groups and configure custom access in advanced configurations.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  customHeaderVariables:
    description: Add additional header app attributes
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  authorizationPolicies:
    description: Custom authorization servers allow you to define and apply authorization policies to secure
      your own APIs and resources.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  accessGatewayServers:
    description: Access Gateway can help reduce the need for middleware and database servers and protect against
      security breaches, all while saving you time.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  dataCenters:
    description: The multiple data center Access Gateway architecture represents the set of components required
      to deploy Access Gateway in a high performing, fault tolerant multi-data center environment.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  networks:
    description: Manage network interfaces including routing for the Access Gateway appliance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
  hosts:
    description: Edit the /etc/hosts file on the Access Gateway appliance.
    valueType: BOOLEAN
    defaultValue: false
    type: DOMAIN
